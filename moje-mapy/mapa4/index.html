<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Wspomnień</title>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=EB+Garamond:wght@400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1530;--bg2:#161e3f;--karta:#1c2750;--obw:rgba(245,210,114,.25);--tekst:#f3eeff;--tekst-mil:#bcb7d8;--tekst-cichy:#8b85a8;--akcent:#f5d272;--akcent2:#e8a0c0;--wino:#bd4a5a;--niebo:#5ab4ff;--cien-l:0 6px 18px rgba(0,0,0,.35);--cien-g:0 18px 44px rgba(0,0,0,.55);--mapa-bg:#0a0f24;--tile-filter:none;}
body.dzien{--bg:#f4ecd8;--bg2:#ebe0c1;--karta:#fff7e6;--obw:rgba(156,43,43,.3);--tekst:#3d2817;--tekst-mil:#6b4a2e;--tekst-cichy:#9c7d57;--akcent:#9c2b2b;--akcent2:#bd4a3a;--wino:#9c2b2b;--niebo:#1976d2;--mapa-bg:#e8e0cc;--tile-filter:none;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'EB Garamond',serif;color:var(--tekst);background:var(--bg);transition:background .3s}
#mapa{position:absolute;inset:0;z-index:1;background:var(--mapa-bg)}
.leaflet-container{background:var(--mapa-bg)}
.leaflet-control-attribution{background:rgba(14,21,48,.7)!important;color:var(--tekst-cichy)!important;font-size:10px}
body.dzien .leaflet-control-attribution{background:rgba(255,247,230,.85)!important;color:#6b4a2e!important}
.leaflet-control-attribution a{color:var(--akcent)!important}
.leaflet-bar a{background:var(--karta)!important;color:var(--akcent)!important;border-color:var(--obw)!important}
.gora{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(180deg,var(--bg) ,transparent);backdrop-filter:blur(6px);pointer-events:none;gap:10px}
.gora>*{pointer-events:auto}
.tytul{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:var(--akcent);letter-spacing:.5px;line-height:1}
.tytul em{font-style:italic;color:var(--akcent2);font-weight:500}
.gora-prawo{display:flex;align-items:center;gap:8px}
.licznik-gora{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--tekst-mil)}
.licznik-gora b{color:var(--akcent);font-weight:600;font-size:18px}
.btn-ikon{width:38px;height:38px;border-radius:50%;background:var(--karta);border:1px solid var(--obw);color:var(--akcent);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.2s}
.btn-ikon:hover{background:var(--bg2);transform:scale(1.06)}
.btn-ikon.akt{background:linear-gradient(135deg,var(--akcent2),var(--akcent));color:#2a1830;border-color:var(--akcent)}
.dol{position:fixed;bottom:0;left:0;right:0;z-index:1000;display:flex;justify-content:center;padding:18px;background:linear-gradient(0deg,var(--bg),transparent);pointer-events:none}
.dol>*{pointer-events:auto}
.btn-dodaj{display:flex;align-items:center;gap:10px;font-family:'EB Garamond',serif;font-size:17px;font-weight:500;background:linear-gradient(135deg,var(--akcent2),var(--akcent));color:#2a1830;border:none;border-radius:30px;padding:14px 28px;cursor:pointer;box-shadow:0 6px 24px rgba(232,160,192,.45);transition:.25s}
.btn-dodaj:hover{transform:translateY(-2px)}
.btn-dodaj.tryb-aktywny{background:linear-gradient(135deg,var(--wino),#8c2e3e);color:#fff;animation:pulsuj 1.6s ease-in-out infinite}
@keyframes pulsuj{0%,100%{box-shadow:0 6px 24px rgba(189,74,90,.5)}50%{box-shadow:0 6px 24px rgba(189,74,90,.7),0 0 48px rgba(189,74,90,.5)}}
.panel-tlo{position:fixed;inset:0;z-index:5000;background:rgba(8,12,28,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.panel-tlo.poka{display:flex}
.panel{background:linear-gradient(180deg,var(--karta),var(--bg2));border:1px solid var(--obw);border-radius:18px;padding:24px;max-width:480px;width:100%;box-shadow:var(--cien-g);max-height:90vh;overflow-y:auto}
.panel-naglo{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
.panel-naglo h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;color:var(--akcent)}
.zamknij{background:rgba(255,255,255,.05);border:1px solid var(--obw);color:var(--tekst-mil);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.zamknij:hover{background:var(--wino);color:#fff}
.etyk{font-family:'Caveat',cursive;font-size:20px;color:var(--akcent2);margin-bottom:6px;display:block}
input[type=text],textarea{width:100%;font-family:'EB Garamond',serif;font-size:17px;color:var(--tekst);background:rgba(255,255,255,.04);border:1px solid var(--obw);border-radius:10px;padding:12px 14px;resize:none}
body.dzien input[type=text],body.dzien textarea{background:rgba(255,255,255,.6)}
input::placeholder,textarea::placeholder{color:var(--tekst-cichy);font-style:italic}
input:focus,textarea:focus{outline:none;border-color:var(--akcent2);box-shadow:0 0 0 3px rgba(232,160,192,.18)}
textarea{min-height:110px;line-height:1.5}
.licznik-zn{text-align:right;font-size:12px;color:var(--tekst-cichy);margin-top:4px}
.rzad-pol{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.pole{margin-bottom:14px}
.btn{font-family:'EB Garamond',serif;font-size:16px;font-weight:500;border-radius:10px;padding:12px 20px;cursor:pointer;border:1px solid transparent}
.btn-prim{background:linear-gradient(135deg,var(--akcent2),var(--akcent));color:#2a1830}
.btn-prim:disabled{background:#3a3a5a;color:#888;cursor:not-allowed}
.btn-sec{background:rgba(255,255,255,.05);color:var(--tekst-mil);border-color:var(--obw)}
body.dzien .btn-sec{background:rgba(0,0,0,.04)}
.rzad-btn{display:flex;gap:10px;margin-top:6px}.rzad-btn .btn{flex:1}
.instr{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:900;background:var(--karta);backdrop-filter:blur(10px);border:1px solid var(--akcent);border-radius:16px;padding:22px 28px;text-align:center;box-shadow:0 0 40px rgba(245,210,114,.3);pointer-events:none;max-width:380px;display:none}
.instr .ikon{font-size:38px;margin-bottom:8px}
.instr .nag{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--akcent);margin-bottom:6px}
.instr .opis{font-size:15px;color:var(--tekst-mil);line-height:1.5}
.leaflet-popup-content-wrapper{background:linear-gradient(180deg,var(--karta),var(--bg2))!important;color:var(--tekst)!important;border:1px solid var(--obw)!important;border-radius:14px!important}
.leaflet-popup-tip{background:var(--karta)!important}
.leaflet-popup-content{margin:18px 20px!important;font-family:'EB Garamond',serif!important;font-size:15px!important;color:var(--tekst)!important;min-width:230px;max-width:280px}
.leaflet-popup-close-button{color:var(--tekst-mil)!important;font-size:22px!important}
.pop-tyt{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;color:var(--akcent);margin-bottom:6px}
.pop-od{font-family:'Caveat',cursive;font-size:17px;color:var(--akcent2);margin-bottom:8px}
.pop-tresc{color:var(--tekst);font-size:15px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.pop-data{font-size:12px;color:var(--tekst-cichy);margin-top:10px;font-style:italic;border-top:1px solid var(--obw);padding-top:8px;display:flex;justify-content:space-between;align-items:center}
.pop-akcje{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--obw)}
.pop-akcje button{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--obw);color:var(--tekst);padding:8px 10px;border-radius:8px;cursor:pointer;font-family:'EB Garamond',serif;font-size:13px;display:flex;align-items:center;justify-content:center;gap:5px;transition:.2s}
.pop-akcje button:hover{background:var(--bg2);border-color:var(--akcent)}
.pop-akcje .lajk.zlajkowane{background:linear-gradient(135deg,var(--wino),var(--akcent2));border-color:var(--akcent2);color:#fff}
.kropka-css{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--akcent2),var(--wino));box-shadow:0 0 0 3px rgba(232,160,192,.2),0 0 14px rgba(232,160,192,.7);border:2px solid #fff;cursor:pointer}
.kropka-css:hover{transform:scale(1.4)}
.kropka-nowa{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--akcent),#d4a017);box-shadow:0 0 0 4px rgba(245,210,114,.25),0 0 22px rgba(245,210,114,.8);border:2px solid #fff;animation:pulsk 1.2s ease-in-out infinite}
@keyframes pulsk{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.kropka-ja{width:18px;height:18px;border-radius:50%;background:var(--niebo);border:3px solid #fff;box-shadow:0 0 0 4px rgba(90,180,255,.3),0 0 18px rgba(90,180,255,.9);animation:pulsja 2s ease-in-out infinite;position:relative}
@keyframes pulsja{0%,100%{box-shadow:0 0 0 4px rgba(90,180,255,.3),0 0 18px rgba(90,180,255,.9)}50%{box-shadow:0 0 0 12px rgba(90,180,255,.1),0 0 30px rgba(90,180,255,1)}}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:linear-gradient(135deg,var(--akcent2),var(--akcent))!important;color:#2a1830!important;font-family:'Cormorant Garamond',serif!important;font-weight:600!important;border:2px solid #fff!important}
#toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--karta);color:var(--tekst);padding:13px 22px;border-radius:30px;font-size:15px;opacity:0;pointer-events:none;transition:.3s;z-index:9999;text-align:center;border:1px solid var(--obw);box-shadow:var(--cien-l)}
#toast.poka{opacity:1;transform:translateX(-50%) translateY(0)}
.fab-grupa{position:fixed;right:18px;bottom:90px;z-index:900;display:flex;flex-direction:column;gap:10px}
.fab{width:46px;height:46px;border-radius:50%;background:var(--karta);border:1px solid var(--obw);color:var(--akcent);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:.2s;box-shadow:var(--cien-l)}
.fab:hover{transform:scale(1.05);border-color:var(--akcent)}
.fab.akt{background:linear-gradient(135deg,var(--niebo),#1976d2);color:#fff;animation:pulsfab 1.8s ease-in-out infinite}
.fab.spacer-akt{background:linear-gradient(135deg,var(--akcent2),var(--akcent));color:#2a1830;animation:pulsfab 1.8s ease-in-out infinite}
@keyframes pulsfab{0%,100%{box-shadow:0 0 0 0 rgba(90,180,255,.5)}50%{box-shadow:0 0 0 10px rgba(90,180,255,0)}}
.spacer-info{position:fixed;left:50%;top:78px;transform:translateX(-50%);z-index:900;background:var(--karta);border:1px solid var(--akcent2);border-radius:24px;padding:10px 18px;font-size:14px;color:var(--tekst);box-shadow:var(--cien-l);display:none;align-items:center;gap:10px}
.spacer-info.poka{display:flex;animation:slidd .3s ease}
@keyframes slidd{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translateX(-50%)}}
.spacer-info b{color:var(--akcent2)}
.spacer-info .kropek-pulse{width:8px;height:8px;border-radius:50%;background:var(--akcent2);animation:pulsja 1.2s ease-in-out infinite}
@media(max-width:500px){.tytul{font-size:22px}.licznik-gora{font-size:12px}.licznik-gora b{font-size:15px}.panel{padding:20px}.gora{padding:12px 14px}.btn-ikon{width:34px;height:34px;font-size:16px}}
</style>
</head>
<body>
<div id="mapa"></div>
<div class="gora">
  <div class="tytul">Mapa <em>Wspomnień</em></div>
  <div class="gora-prawo">
    <div class="licznik-gora">kropek: <b id="liczKropek">—</b></div>
    <button class="btn-ikon" id="btnMotyw" onclick="przelaczMotyw()" title="Tryb dzień/noc">🌙</button>
  </div>
</div>

<div class="fab-grupa">
  <button class="fab" id="fabGps" onclick="trybGpsZywo()" title="GPS na żywo">📍</button>
  <button class="fab" id="fabSpacer" onclick="trybSpaceru()" title="Tryb spaceru (audio)">🚶</button>
</div>

<div class="spacer-info" id="spacerInfo">
  <span class="kropek-pulse"></span>
  <span>Tryb spaceru — <b id="spacerLicz">0</b> kropek w 500 m</span>
</div>

<div class="dol">
  <button class="btn-dodaj" id="btnDodaj" onclick="trybDodawania()">
    <span id="btnIk">✨</span><span id="btnTxt">Zostaw wspomnienie</span>
  </button>
</div>

<div class="instr" id="instr">
  <div class="ikon">👆</div>
  <div class="nag">Dotknij mapy</div>
  <div class="opis">Wskaż miejsce, o którym chcesz opowiedzieć</div>
</div>

<div class="panel-tlo" id="panelTlo" onclick="zamknijTlo(event)">
  <div class="panel">
    <div class="panel-naglo">
      <h2>Twoje wspomnienie</h2>
      <button class="zamknij" onclick="zamknijPanel()">✕</button>
    </div>
    <div class="rzad-pol">
      <div><span class="etyk">Tytuł miejsca</span><input type="text" id="polTytul" placeholder="np. Stara ławka" maxlength="50"></div>
      <div><span class="etyk">Twój podpis</span><input type="text" id="polAutor" placeholder="anonim, ksywa…" maxlength="20"></div>
    </div>
    <div class="pole">
      <span class="etyk">Opowiedz o tym miejscu</span>
      <textarea id="polTresc" placeholder="Co się tu wydarzyło? Co czujesz, gdy tu jesteś?" maxlength="500"></textarea>
      <div class="licznik-zn"><span id="lzTresc">0</span> / 500</div>
    </div>
    <div class="rzad-btn">
      <button class="btn btn-sec" onclick="zamknijPanel()">Anuluj</button>
      <button class="btn btn-prim" id="btnZapisz" onclick="zapiszWspom()">Zostaw kropkę ✨</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>
<script defer>
/* ════ FIREBASE (ładowany leniwie, dopiero gdy potrzebny) ════ */
const FIREBASE_CONFIG={apiKey:"AIzaSyDRR3vSfgpEmbpZz_-VldMTnTHoXRfuGKg",authDomain:"ksiega-ramzi.firebaseapp.com",projectId:"ksiega-ramzi",storageBucket:"ksiega-ramzi.firebasestorage.app",messagingSenderId:"400735142662",appId:"1:400735142662:web:0b52a57f4fedf367839487"};
let db=null,online=false,firebaseGotowyPromise=null;

function wczytajSkrypt(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

function inicjujFirebase(){
  if(firebaseGotowyPromise)return firebaseGotowyPromise;
  firebaseGotowyPromise=(async()=>{
    try{
      await wczytajSkrypt('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
      await wczytajSkrypt('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js');
      firebase.initializeApp(FIREBASE_CONFIG);
      db=firebase.firestore();
      online=true;
    }catch(e){console.warn('Firebase niedostępny, działam offline (localStorage).',e);online=false;}
    return online;
  })();
  return firebaseGotowyPromise;
}

/* ════ FILTR ════ */
const STOP=['kurw','chuj','huj','pizd','jeb','pierdol','spierdal','cipa','kutas','suka','dziwka','debil','fuck','shit','bitch','nigger'];
function normF(s){return(s||'').toLowerCase().replace(/ł/g,'l').normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function maStop(t){const n=normF(t).replace(/[^a-z0-9]/g,'');return STOP.some(s=>n.includes(s));}

/* ════ POMOC ════ */
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('poka');clearTimeout(el._tk);el._tk=setTimeout(()=>el.classList.remove('poka'),2800);}
function escHtml(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtData(ms){if(!ms)return'';const d=new Date(ms),roz=Date.now()-ms;if(roz<60000)return'przed chwilą';if(roz<3600000)return Math.floor(roz/60000)+' min temu';if(roz<86400000)return Math.floor(roz/3600000)+' godz. temu';if(roz<604800000)return Math.floor(roz/86400000)+' dni temu';return d.toLocaleDateString('pl-PL',{day:'numeric',month:'long',year:'numeric'});}
function metrowDo(la1,lo1,la2,lo2){const R=6371000,t1=la1*Math.PI/180,t2=la2*Math.PI/180,dt=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;const a=Math.sin(dt/2)**2+Math.cos(t1)*Math.cos(t2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

/* ════ MOTYW ════ */
function przelaczMotyw(){
  const dzien=document.body.classList.toggle('dzien');
  document.getElementById('btnMotyw').textContent=dzien?'☀️':'🌙';
  try{localStorage.setItem('mw_motyw',dzien?'dzien':'noc');}catch(e){}
  if(warstwaKafelki){mapa.removeLayer(warstwaKafelki);}
  warstwaKafelki=L.tileLayer(dzien?'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OSM · © CARTO'}).addTo(mapa);
}

/* ════ MAPA ════ */
let mapa,warstwaKafelki,grupaMarkerow,markerNowy=null,pozWybrana=null,trybAkt=false,wszystkieKropki=[],markeryWgKropki={};
let gpsZywo=false,gpsWatchId=null,markerJa=null,mojaPoz=null;
let spaceruTryb=false,spaceruPrzeczytane=new Set(),spaceruWatchId=null;

function initMapa(){
  mapa=L.map('mapa').setView([52.0,19.4],6);
  const startDzien=localStorage.getItem('mw_motyw')==='dzien';
  if(startDzien){document.body.classList.add('dzien');document.getElementById('btnMotyw').textContent='☀️';}
  warstwaKafelki=L.tileLayer(startDzien?'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OSM · © CARTO'}).addTo(mapa);
  grupaMarkerow=L.markerClusterGroup({maxClusterRadius:50,showCoverageOnHover:false});
  mapa.addLayer(grupaMarkerow);
  mapa.on('click',obslKlikMapy);
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{if(!trybAkt&&!pozWybrana)mapa.setView([p.coords.latitude,p.coords.longitude],13);},()=>{},{timeout:5000});
  zaladujKropki().then(otworzZUrl);
}

/* ════ GPS NA ŻYWO ════ */
function trybGpsZywo(){
  if(gpsZywo){zatrzymajGps();return;}
  if(!navigator.geolocation){toast('Brak GPS');return;}
  gpsZywo=true;
  document.getElementById('fabGps').classList.add('akt');
  toast('📍 Śledzenie pozycji włączone');
  gpsWatchId=navigator.geolocation.watchPosition(p=>{
    mojaPoz={lat:p.coords.latitude,lng:p.coords.longitude};
    if(markerJa){markerJa.setLatLng(mojaPoz);}
    else{const ik=L.divIcon({html:'<div class="kropka-ja"></div>',className:'',iconSize:[24,24],iconAnchor:[12,12]});markerJa=L.marker([mojaPoz.lat,mojaPoz.lng],{icon:ik,zIndexOffset:1000}).addTo(mapa);mapa.setView([mojaPoz.lat,mojaPoz.lng],15);}
    if(spaceruTryb)sprawdzKropkiWokol();
  },err=>{toast('Błąd GPS: '+err.message);zatrzymajGps();},{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
}
function zatrzymajGps(){
  gpsZywo=false;
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  if(markerJa){mapa.removeLayer(markerJa);markerJa=null;}
  document.getElementById('fabGps').classList.remove('akt');
  if(spaceruTryb)zatrzymajSpacer();
  toast('Śledzenie wyłączone');
}

/* ════ TRYB SPACERU ════ */
function trybSpaceru(){
  if(spaceruTryb){zatrzymajSpacer();return;}
  if(!('speechSynthesis' in window)){toast('Twoja przeglądarka nie obsługuje czytania głosem');return;}
  spaceruTryb=true;
  spaceruPrzeczytane.clear();
  document.getElementById('fabSpacer').classList.add('spacer-akt');
  document.getElementById('spacerInfo').classList.add('poka');
  odblokujMowe();
  if(!gpsZywo)trybGpsZywo();
  toast('🚶 Tryb spaceru: czytam kropki w 500 m');
  setTimeout(sprawdzKropkiWokol,1000);
}
function zatrzymajSpacer(){
  spaceruTryb=false;
  try{speechSynthesis.cancel();}catch(e){}
  document.getElementById('fabSpacer').classList.remove('spacer-akt');
  document.getElementById('spacerInfo').classList.remove('poka');
  toast('Tryb spaceru wyłączony');
}
function odblokujMowe(){try{const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);}catch(e){}}
function powiedz(t){if(!('speechSynthesis' in window))return;try{const u=new SpeechSynthesisUtterance(t);u.lang='pl-PL';u.rate=0.95;speechSynthesis.speak(u);}catch(e){}}

function sprawdzKropkiWokol(){
  if(!spaceruTryb||!mojaPoz)return;
  const wPoblizu=wszystkieKropki.filter(k=>metrowDo(mojaPoz.lat,mojaPoz.lng,k.lat,k.lng)<=500);
  document.getElementById('spacerLicz').textContent=wPoblizu.length;
  const doPrzeczytania=wPoblizu.filter(k=>!spaceruPrzeczytane.has(k.id));
  if(doPrzeczytania.length&&!speechSynthesis.speaking){
    const k=doPrzeczytania[0];
    spaceruPrzeczytane.add(k.id);
    const tekst='Tu '+(k.autor||'anonim')+' wspomina: '+(k.tytul||'')+'. '+k.tresc;
    powiedz(tekst);
    if(markeryWgKropki[k.id])markeryWgKropki[k.id].openPopup();
  }
}

/* ════ DODAWANIE ════ */
function obslKlikMapy(e){if(!trybAkt)return;pozWybrana=[e.latlng.lat,e.latlng.lng];if(markerNowy)mapa.removeLayer(markerNowy);const ik=L.divIcon({html:'<div class="kropka-nowa"></div>',className:'',iconSize:[22,22],iconAnchor:[11,11]});markerNowy=L.marker(pozWybrana,{icon:ik}).addTo(mapa);ukryjInstr();zakonczTryb();otworzPanel();}
function trybDodawania(){if(trybAkt){zakonczTryb();return;}trybAkt=true;document.getElementById('btnDodaj').classList.add('tryb-aktywny');document.getElementById('btnIk').textContent='✕';document.getElementById('btnTxt').textContent='Anuluj';pokazInstr();mapa.getContainer().style.cursor='crosshair';}
function zakonczTryb(){trybAkt=false;document.getElementById('btnDodaj').classList.remove('tryb-aktywny');document.getElementById('btnIk').textContent='✨';document.getElementById('btnTxt').textContent='Zostaw wspomnienie';ukryjInstr();mapa.getContainer().style.cursor='';}
function pokazInstr(){const i=document.getElementById('instr');i.style.display='block';clearTimeout(i._tk);i._tk=setTimeout(ukryjInstr,3500);}
function ukryjInstr(){document.getElementById('instr').style.display='none';}
function otworzPanel(){document.getElementById('panelTlo').classList.add('poka');setTimeout(()=>document.getElementById('polTytul').focus(),200);}
function zamknijPanel(){document.getElementById('panelTlo').classList.remove('poka');if(markerNowy){mapa.removeLayer(markerNowy);markerNowy=null;}pozWybrana=null;document.getElementById('polTytul').value='';document.getElementById('polTresc').value='';document.getElementById('polAutor').value='';document.getElementById('lzTresc').textContent='0';}
function zamknijTlo(e){if(e.target===document.getElementById('panelTlo'))zamknijPanel();}
document.getElementById('polTresc').addEventListener('input',e=>{document.getElementById('lzTresc').textContent=e.target.value.length;});

async function zapiszWspom(){
  const tytul=document.getElementById('polTytul').value.trim();
  const tresc=document.getElementById('polTresc').value.trim();
  const autor=document.getElementById('polAutor').value.trim()||'Anonim';
  if(!pozWybrana){toast('Wskaż miejsce.');return;}
  if(!tresc){toast('Napisz coś.');return;}
  if(maStop(tytul)||maStop(tresc)||maStop(autor)){toast('Brzydkie słowo — popraw.');return;}
  const btn=document.getElementById('btnZapisz');btn.disabled=true;btn.textContent='Zapisuję…';
  const rek={tytul:tytul||'Bez tytułu',tresc,autor,lat:pozWybrana[0],lng:pozWybrana[1],utworzono:Date.now(),lajki:0};
  try{
    await inicjujFirebase();
    if(online){const r=await db.collection('wspomnienia').add(rek);rek.id=r.id;}
    else{rek.id='lok_'+Date.now();const lok=JSON.parse(localStorage.getItem('mw_lok')||'[]');lok.push(rek);localStorage.setItem('mw_lok',JSON.stringify(lok));}
    if(markerNowy){mapa.removeLayer(markerNowy);markerNowy=null;}
    dodajKropkeNaMape(rek);toast('✨ Kropka postawiona!');zamknijPanel();
  }catch(e){console.error(e);toast('Błąd zapisu.');}
  finally{btn.disabled=false;btn.textContent='Zostaw kropkę ✨';}
}

/* ════ KROPKI ════ */
async function zaladujKropki(){
  let lista=[];
  try{
    await inicjujFirebase();
    if(online){const snap=await db.collection('wspomnienia').get();snap.forEach(d=>{const v=d.data();v.id=d.id;lista.push(v);});}
    else{lista=JSON.parse(localStorage.getItem('mw_lok')||'[]');}
  }catch(e){console.warn(e);lista=JSON.parse(localStorage.getItem('mw_lok')||'[]');}
  wszystkieKropki=lista;lista.forEach(dodajKropkeNaMape);document.getElementById('liczKropek').textContent=lista.length;
}

function lajknieteLok(){try{return JSON.parse(localStorage.getItem('mw_lajki')||'[]');}catch(e){return[];}}
function dodajLajkLok(id){try{const l=lajknieteLok();if(l.indexOf(id)===-1){l.push(id);localStorage.setItem('mw_lajki',JSON.stringify(l));}}catch(e){}}

function htmlPopup(r){
  const lajkn=lajknieteLok().indexOf(r.id)!==-1;
  return '<div class="pop-tyt">'+escHtml(r.tytul||'Bez tytułu')+'</div>'+
    '<div class="pop-od">— '+escHtml(r.autor||'Anonim')+'</div>'+
    '<div class="pop-tresc">'+escHtml(r.tresc||'')+'</div>'+
    '<div class="pop-data"><span>'+fmtData(r.utworzono)+'</span></div>'+
    '<div class="pop-akcje">'+
      '<button class="lajk '+(lajkn?'zlajkowane':'')+'" onclick="lajkuj(\''+r.id+'\',this)">❤️ <span>'+(r.lajki||0)+'</span></button>'+
      '<button onclick="udostepnij(\''+r.id+'\',\''+escHtml(r.tytul||'Wspomnienie').replace(/'/g,"\\'")+'\')">📤 Udostępnij</button>'+
    '</div>';
}

function dodajKropkeNaMape(r){
  const ik=L.divIcon({html:'<div class="kropka-css"></div>',className:'',iconSize:[18,18],iconAnchor:[9,9]});
  const m=L.marker([r.lat,r.lng],{icon:ik});
  m.bindPopup(htmlPopup(r),{maxWidth:300,minWidth:240});
  m.on('popupopen',()=>{r._marker=m;});
  grupaMarkerow.addLayer(m);
  markeryWgKropki[r.id]=m;
  if(wszystkieKropki.indexOf(r)===-1)wszystkieKropki.push(r);
  document.getElementById('liczKropek').textContent=wszystkieKropki.length;
}

/* ════ LAJKI ════ */
async function lajkuj(id,btn){
  if(lajknieteLok().indexOf(id)!==-1){toast('Już polubiłeś tę kropkę ❤️');return;}
  const k=wszystkieKropki.find(x=>x.id===id);if(!k)return;
  k.lajki=(k.lajki||0)+1;
  dodajLajkLok(id);
  btn.classList.add('zlajkowane');
  btn.querySelector('span').textContent=k.lajki;
  try{
    if(online&&id.indexOf('lok_')!==0){await db.collection('wspomnienia').doc(id).update({lajki:firebase.firestore.FieldValue.increment(1)});}
    else{const lok=JSON.parse(localStorage.getItem('mw_lok')||'[]');const p=lok.find(x=>x.id===id);if(p){p.lajki=(p.lajki||0)+1;localStorage.setItem('mw_lok',JSON.stringify(lok));}}
  }catch(e){console.warn(e);}
}

/* ════ UDOSTĘPNIANIE ════ */
async function udostepnij(id,tytul){
  const link=location.origin+location.pathname+'#k='+id;
  const tekst='Zobacz wspomnienie „'+tytul+'" na Mapie Wspomnień:\n'+link;
  if(navigator.share){
    try{await navigator.share({title:'Mapa Wspomnień',text:tekst,url:link});return;}catch(e){if(e.name==='AbortError')return;}
  }
  try{await navigator.clipboard.writeText(link);toast('🔗 Link skopiowany! Wklej w WhatsApp/Messenger.');}
  catch(e){prompt('Skopiuj link:',link);}
}

function otworzZUrl(){
  const h=location.hash;
  if(!h.startsWith('#k='))return;
  const id=h.slice(3);
  const k=wszystkieKropki.find(x=>x.id===id);
  if(!k){toast('Wspomnienie nieznalezione.');return;}
  mapa.setView([k.lat,k.lng],17);
  setTimeout(()=>{const m=markeryWgKropki[id];if(m)m.openPopup();},700);
}

initMapa();
</script>
