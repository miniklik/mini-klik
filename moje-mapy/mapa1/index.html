<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Przymierz zdjęcie — Pod Wielkim Dachem Nieba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Literata:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b2340; --ink-deep:#12172c; --lead:#0f0f18;
    --parchment:#f3ead6; --parchment-dim:#e8dcc1;
    --gold:#c9a227; --gold-soft:#e4c96a;
    --ruby:#a33b3b; --sapphire:#2e5090; --emerald:#2f6d5b; --ink-text:#2a2318;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(ellipse at 50% -10%, #232c52 0%, var(--ink) 45%, var(--ink-deep) 100%);
    color:var(--parchment); font-family:'Literata',serif; min-height:100vh;
  }
  h1,h2,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:.01em}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:.05em}

  .wrap{max-width:640px;margin:0 auto;padding:30px 24px 90px;text-align:center}
  .title{font-size:24px;color:var(--parchment);margin-bottom:4px}
  .sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:30px}

  /* wybór przeznaczenia */
  .chooser{display:flex;flex-direction:column;gap:14px;max-width:420px;margin:0 auto}
  .choice{
    border:1px solid rgba(243,234,214,.2);background:rgba(243,234,214,.04);border-radius:4px;
    padding:22px 20px;text-align:left;color:var(--parchment);display:flex;align-items:center;gap:18px;
    transition:border-color .2s, background .2s, transform .2s;
  }
  .choice:hover{border-color:var(--gold);background:rgba(201,162,39,.08);transform:translateY(-2px)}
  .choice .iko{font-size:30px;flex-shrink:0}
  .choice .txt .nm{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
  .choice .txt .ds{color:var(--parchment-dim);font-size:13px;margin-top:3px}
  .choice .ksztalt{margin-left:auto;flex-shrink:0}
  .mini-kolo{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold-soft)}
  .mini-prost{width:28px;height:37px;border-radius:2px;border:2px solid var(--gold-soft)}

  /* edytor kadru */
  .editor{display:none}
  .editor.on{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .back-line{text-align:left;margin-bottom:16px}

  .drop{
    border:2px dashed rgba(243,234,214,.3);border-radius:6px;padding:40px 20px;
    color:var(--parchment-dim);cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:20px;
  }
  .drop:hover{border-color:var(--gold-soft);background:rgba(201,162,39,.06)}
  .drop.hide{display:none}
  .drop .big{font-size:34px;margin-bottom:10px}

  .stage-area{display:none}
  .stage-area.on{display:block}

  /* ramka podglądu — wspólny kontener, kształt przez klasę */
  .frame-holder{display:flex;justify-content:center;margin:10px 0 18px}
  .frame{
    position:relative;overflow:hidden;background:#000;
    border:4px solid var(--gold);box-shadow:0 0 0 1px var(--lead), 0 14px 40px -12px rgba(0,0,0,.6);
    touch-action:none;cursor:grab;
  }
  .frame.dragging{cursor:grabbing}
  .frame.kolo{width:300px;height:300px;border-radius:50%}
  .frame.prost{width:270px;height:360px;border-radius:4px}   /* 3:4 */
  .frame canvas{position:absolute;top:0;left:0}

  .hint-drag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--parchment-dim);opacity:.6;margin-bottom:14px;letter-spacing:.04em}

  /* suwak zoom */
  .zoom-row{display:flex;align-items:center;gap:12px;max-width:380px;margin:0 auto 22px}
  .zoom-row .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold-soft);letter-spacing:.05em}
  input[type=range]{flex:1;accent-color:var(--gold)}

  /* nazwa + zapis */
  .save-box{max-width:420px;margin:0 auto}
  label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold-soft);margin:0 0 6px;text-align:left}
  input[type=text]{
    width:100%;background:rgba(15,15,24,.5);border:1px solid rgba(243,234,214,.2);border-radius:2px;
    color:var(--parchment);font-family:'JetBrains Mono',monospace;font-size:14px;padding:10px 12px;
  }
  input[type=text]:focus{outline:none;border-color:var(--gold)}
  .filehint{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--parchment-dim);opacity:.6;margin-top:6px;text-align:left}

  .btn{
    border:1px solid var(--gold);color:var(--gold-soft);background:none;
    padding:12px 22px;border-radius:2px;font-family:'JetBrains Mono',monospace;
    font-size:12px;letter-spacing:.06em;text-transform:uppercase;transition:background .2s,color .2s;
  }
  .btn:hover{background:var(--gold);color:var(--ink-deep)}
  .btn.solid{background:var(--gold);color:var(--ink-deep)}
  .btn.solid:hover{background:var(--gold-soft)}
  .btn.ghost{border-color:rgba(243,234,214,.3);color:var(--parchment-dim)}
  .btn.ghost:hover{background:rgba(243,234,214,.1);color:var(--parchment)}
  .btn:disabled{opacity:.3;pointer-events:none}
  .btn-row{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .ok-flash{color:#8fc7b5;font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">

  <div class="title display">Przymierz zdjęcie</div>
  <div class="sub">Pod Wielkim Dachem Nieba · przygotowanie zdjęć</div>

  <!-- ====== WYBÓR PRZEZNACZENIA ====== -->
  <div class="chooser" id="chooser">
    <button class="choice" onclick="wybierz('kolo','Zdjęcie miejscowości')">
      <span class="iko">🏘️</span>
      <span class="txt"><span class="nm">Miejscowość</span><span class="ds">okrągłe, w kole na mapie</span></span>
      <span class="ksztalt"><span class="mini-kolo"></span></span>
    </button>
    <button class="choice" onclick="wybierz('kolo','Zdjęcie artysty')">
      <span class="iko">👤</span>
      <span class="txt"><span class="nm">Artysta</span><span class="ds">okrągłe, portret w kole</span></span>
      <span class="ksztalt"><span class="mini-kolo"></span></span>
    </button>
    <button class="choice" onclick="wybierz('prost','Okładka tomiku')">
      <span class="iko">📖</span>
      <span class="txt"><span class="nm">Okładka tomiku</span><span class="ds">pionowa, jak książka (3:4)</span></span>
      <span class="ksztalt"><span class="mini-prost"></span></span>
    </button>
  </div>

  <!-- ====== EDYTOR KADRU ====== -->
  <div class="editor" id="editor">
    <div class="back-line"><button class="btn ghost" onclick="wroc()">← Zmień przeznaczenie</button></div>
    <div class="sub" id="ed-tytul" style="margin-bottom:18px"></div>

    <div class="drop" id="drop" onclick="document.getElementById('file-img').click()">
      <div class="big">🖼️</div>
      <div>Kliknij lub przeciągnij tu zdjęcie</div>
      <div class="mono" style="font-size:10px;opacity:.6;margin-top:8px">JPG lub PNG</div>
    </div>
    <input type="file" id="file-img" accept="image/*" style="display:none">

    <div class="stage-area" id="stage-area">
      <div class="frame-holder">
        <div class="frame" id="frame">
          <canvas id="cv"></canvas>
        </div>
      </div>
      <div class="hint-drag">przeciągnij zdjęcie, aby ustawić kadr</div>

      <div class="zoom-row">
        <span class="lbl">−</span>
        <input type="range" id="zoom" min="1" max="4" step="0.01" value="1">
        <span class="lbl">+</span>
      </div>

      <div class="save-box">
        <label>Nazwa pliku</label>
        <input type="text" id="fname" placeholder="np. halina-wierzbicka" oninput="czyscNazwe(this)">
        <div class="filehint">zapisze się jako <span id="fname-prev">nazwa</span>.jpg — wpisuj bez spacji i polskich znaków</div>
        <div class="btn-row">
          <button class="btn ghost" onclick="innaFotka()">Inne zdjęcie</button>
          <button class="btn solid" id="btn-save" onclick="zapisz()">⬇ Zapisz zdjęcie</button>
        </div>
        <div class="ok-flash" id="save-ok" style="display:none">zapisano ✓ — teraz wrzuć plik na GitHub</div>
      </div>
    </div>
  </div>

</div>

<script>
/* =========================================================
   STAN
   ========================================================= */
let ksztalt = 'kolo';          // 'kolo' | 'prost'
let img = null;                // wczytany obraz
let scale = 1, minScale = 1;   // zoom
let offX = 0, offY = 0;        // przesunięcie obrazu (w px canvasa)
let drag = false, lastX=0, lastY=0;

// rozmiar canvasa podglądu = rozmiar ramki (px)
const RAMKA = { kolo:{w:300,h:300}, prost:{w:270,h:360} };
// rozmiar pliku wyjściowego (px) — dobra jakość, lekki plik
const WYJSCIE = { kolo:{w:800,h:800}, prost:{w:600,h:800} };

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const frame = document.getElementById('frame');

/* =========================================================
   WYBÓR PRZEZNACZENIA
   ========================================================= */
function wybierz(k, tytul){
  ksztalt = k;
  document.getElementById('ed-tytul').textContent = tytul;
  document.getElementById('chooser').style.display = 'none';
  document.getElementById('editor').classList.add('on');
  // ustaw kształt ramki
  frame.classList.remove('kolo','prost');
  frame.classList.add(k);
  const r = RAMKA[k];
  cv.width = r.w; cv.height = r.h;
  cv.style.width = r.w+'px'; cv.style.height = r.h+'px';
  // reset
  resetFotka();
}
function wroc(){
  document.getElementById('editor').classList.remove('on');
  document.getElementById('chooser').style.display = 'flex';
}
function resetFotka(){
  img = null;
  document.getElementById('drop').classList.remove('hide');
  document.getElementById('stage-area').classList.remove('on');
  document.getElementById('save-ok').style.display='none';
}
function innaFotka(){ resetFotka(); }

/* =========================================================
   WCZYTANIE OBRAZU
   ========================================================= */
const fileInput = document.getElementById('file-img');
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) wczytajPlik(e.target.files[0]); });

// drag & drop
const drop = document.getElementById('drop');
['dragover','dragenter'].forEach(ev=> drop.addEventListener(ev, e=>{e.preventDefault(); drop.style.borderColor='var(--gold)';}));
['dragleave','drop'].forEach(ev=> drop.addEventListener(ev, e=>{e.preventDefault(); drop.style.borderColor='';}));
drop.addEventListener('drop', e=>{ const f=e.dataTransfer.files[0]; if(f && f.type.startsWith('image/')) wczytajPlik(f); });

function wczytajPlik(plik){
  const r = new FileReader();
  r.onload = ()=>{
    const im = new Image();
    im.onload = ()=>{
      img = im;
      document.getElementById('drop').classList.add('hide');
      document.getElementById('stage-area').classList.add('on');
      dopasujStart();
      rysuj();
    };
    im.src = r.result;
  };
  r.readAsDataURL(plik);
}

/* obraz na start: wypełnia ramkę (cover), wyśrodkowany */
function dopasujStart(){
  const r = RAMKA[ksztalt];
  // skala tak, by obraz pokrył ramkę
  const s = Math.max(r.w/img.width, r.h/img.height);
  minScale = s;
  scale = s;
  document.getElementById('zoom').min = s.toFixed(3);
  document.getElementById('zoom').max = (s*4).toFixed(3);
  document.getElementById('zoom').value = s.toFixed(3);
  // wyśrodkuj
  offX = (r.w - img.width*scale)/2;
  offY = (r.h - img.height*scale)/2;
}

/* =========================================================
   RYSOWANIE PODGLĄDU
   ========================================================= */
function rysuj(){
  const r = RAMKA[ksztalt];
  ctx.clearRect(0,0,r.w,r.h);
  if(!img) return;
  ctx.drawImage(img, offX, offY, img.width*scale, img.height*scale);
}

/* ograniczenie przesunięcia, by nie odsłonić tła */
function ogranicz(){
  const r = RAMKA[ksztalt];
  const w = img.width*scale, h = img.height*scale;
  if(offX > 0) offX = 0;
  if(offY > 0) offY = 0;
  if(offX < r.w - w) offX = r.w - w;
  if(offY < r.h - h) offY = r.h - h;
}

/* zoom suwakiem — powiększa względem środka ramki */
document.getElementById('zoom').addEventListener('input', e=>{
  if(!img) return;
  const r = RAMKA[ksztalt];
  const noweScale = parseFloat(e.target.value);
  // punkt środka ramki w koordynatach obrazu
  const cx = (r.w/2 - offX)/scale;
  const cy = (r.h/2 - offY)/scale;
  scale = Math.max(noweScale, minScale);
  // utrzymaj środek
  offX = r.w/2 - cx*scale;
  offY = r.h/2 - cy*scale;
  ogranicz();
  rysuj();
});

/* przeciąganie */
frame.addEventListener('pointerdown', e=>{
  if(!img) return;
  drag = true; frame.classList.add('dragging');
  lastX = e.clientX; lastY = e.clientY;
  frame.setPointerCapture(e.pointerId);
});
frame.addEventListener('pointermove', e=>{
  if(!drag || !img) return;
  offX += e.clientX - lastX;
  offY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  ogranicz();
  rysuj();
});
frame.addEventListener('pointerup', e=>{ drag=false; frame.classList.remove('dragging'); });
frame.addEventListener('pointercancel', e=>{ drag=false; frame.classList.remove('dragging'); });

/* =========================================================
   NAZWA PLIKU
   ========================================================= */
function czyscNazwe(el){
  // slug-like: bez spacji, polskich znaków, tylko a-z 0-9 i myślnik
  const map={'ą':'a','ć':'c','ę':'e','ł':'l','ń':'n','ó':'o','ś':'s','ź':'z','ż':'z','Ą':'a','Ć':'c','Ę':'e','Ł':'l','Ń':'n','Ó':'o','Ś':'s','Ź':'z','Ż':'z'};
  let v = el.value.split('').map(c=>map[c]||c).join('').toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/^-+/,'');
  el.value = v;
  document.getElementById('fname-prev').textContent = v || 'nazwa';
}

/* =========================================================
   ZAPIS — wycina DOKŁADNIE widoczny kadr, skaluje do rozmiaru wyjścia
   ========================================================= */
function zapisz(){
  if(!img){ alert('Najpierw wgraj zdjęcie.'); return; }
  let nazwa = document.getElementById('fname').value.trim();
  if(!nazwa){ alert('Wpisz nazwę pliku.'); document.getElementById('fname').focus(); return; }

  const r = RAMKA[ksztalt];
  const out = WYJSCIE[ksztalt];
  // ile "px wyjścia" na 1 "px ramki"
  const k = out.w / r.w;

  const oc = document.createElement('canvas');
  oc.width = out.w; oc.height = out.h;
  const octx = oc.getContext('2d');
  // białe tło pod ewentualną przezroczystość (JPG i tak nie ma alfy)
  octx.fillStyle = '#000';
  octx.fillRect(0,0,out.w,out.h);
  // rysuj obraz w skali wyjścia — to samo ułożenie co w podglądzie, przemnożone przez k
  octx.drawImage(img, offX*k, offY*k, img.width*scale*k, img.height*scale*k);

  // eksport JPG
  oc.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = nazwa + '.jpg';
    a.click();
    URL.revokeObjectURL(url);
    const ok = document.getElementById('save-ok');
    ok.style.display='block';
    setTimeout(()=> ok.style.display='none', 3000);
  }, 'image/jpeg', 0.9);
}
</script>
</body>
</html>
