<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje mapy · mini-klik.pl</title>
<meta name="description" content="Moje mapy — kolekcja interaktywnych map miejscowości">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;overflow-x:hidden}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:radial-gradient(ellipse at 20% 0%,#1a0f2e 0%,#0a0a14 50%,#000 100%);
    color:#e8e8ea;
    min-height:100vh;
    padding:32px 24px 48px;
    position:relative;
  }

  /* Gwiazdki w tle */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 23% 14%,#fff,transparent),
      radial-gradient(1px 1px at 67% 28%,#fff,transparent),
      radial-gradient(1px 1px at 41% 52%,#fff,transparent),
      radial-gradient(2px 2px at 89% 71%,#ffd9a3,transparent),
      radial-gradient(1px 1px at 12% 84%,#fff,transparent),
      radial-gradient(1px 1px at 76% 91%,#fff,transparent),
      radial-gradient(1px 1px at 55% 8%,#a3d9ff,transparent),
      radial-gradient(1px 1px at 33% 39%,#fff,transparent),
      radial-gradient(2px 2px at 8% 47%,#ff9a3d,transparent),
      radial-gradient(1px 1px at 92% 35%,#fff,transparent);
    opacity:0.7;
    animation:twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:0.7}50%{opacity:0.4}}

  /* Pomarańczowa poświata u góry */
  body::after{
    content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:800px;height:600px;
    background:radial-gradient(ellipse,rgba(255,154,61,0.15) 0%,transparent 60%);
    pointer-events:none;
  }

  .wrapper{position:relative;z-index:2;max-width:1100px;margin:0 auto}

  /* === NAGŁÓWEK === */
  header{text-align:center;margin-bottom:56px;padding-top:24px}

  .ikona-strony{
    font-size:80px;line-height:1;margin-bottom:18px;display:inline-block;
    filter:drop-shadow(0 4px 16px rgba(255,154,61,0.5));
    animation:floatIcon 3s ease-in-out infinite;
  }
  @keyframes floatIcon{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
  }

  h1{
    font-size:56px;font-weight:700;letter-spacing:-1px;line-height:1;
    background:linear-gradient(180deg,#ff9a3d 0%,#e87a1d 70%,#a04510 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 80px rgba(255,154,61,0.4);
  }

  .line{
    width:60px;height:2px;background:#ff9a3d;margin:20px auto;
  }

  .tagline{
    color:#888;font-size:14px;letter-spacing:4px;text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;
  }

  /* === GRID Z KAFELKAMI === */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
    margin-top:24px;
  }

  .tile{
    background:linear-gradient(180deg,rgba(40,40,55,0.6) 0%,rgba(20,20,30,0.8) 100%);
    border:1px solid rgba(255,154,61,0.2);
    border-radius:16px;
    padding:32px 28px;
    cursor:pointer;
    text-align:center;
    transition:all 0.3s cubic-bezier(0.2,0.9,0.3,1);
    backdrop-filter:blur(10px);
    position:relative;
    overflow:hidden;
    display:block;
    text-decoration:none;
    color:inherit;
    animation:tileIn 0.7s cubic-bezier(0.2,0.9,0.3,1.1) both;
  }
  .tile:nth-child(1){animation-delay:0.1s}
  .tile:nth-child(2){animation-delay:0.2s}
  .tile:nth-child(3){animation-delay:0.3s}
  .tile:nth-child(4){animation-delay:0.4s}
  .tile:nth-child(5){animation-delay:0.5s}
  .tile:nth-child(6){animation-delay:0.6s}

  .tile::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,#ff9a3d,transparent);
    transform:translateX(-100%);transition:transform 0.6s;
  }

  .tile:hover{
    transform:translateY(-6px);
    border-color:rgba(255,154,61,0.6);
    box-shadow:0 16px 48px rgba(255,154,61,0.2);
  }
  .tile:hover::before{transform:translateX(0)}

  .tile-numer{
    position:absolute;top:14px;right:18px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;letter-spacing:2px;
    color:rgba(255,154,61,0.4);
  }

  .tile .icon{
    font-size:56px;margin-bottom:16px;display:block;
    filter:drop-shadow(0 4px 12px rgba(255,154,61,0.4));
  }

  .tile-title{
    font-size:18px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    color:#ff9a3d;margin-bottom:6px;
  }

  .tile-desc{
    font-size:12px;color:#888;line-height:1.5;
    font-family:'JetBrains Mono',monospace;
  }

  /* === STOPKA === */
  .bottomnav{
    text-align:center;margin-top:48px;padding-top:24px;
    border-top:1px solid rgba(255,154,61,0.15);
  }
  .back{
    color:#888;text-decoration:none;font-size:14px;letter-spacing:2px;
    font-family:'JetBrains Mono',monospace;
    transition:color 0.2s;
    padding:8px 16px;
    border-radius:6px;
  }
  .back:hover{color:#ff9a3d;background:rgba(255,154,61,0.05)}

  footer{
    text-align:center;margin-top:24px;padding:16px 0;
    color:#555;font-size:12px;letter-spacing:2px;
    font-family:'JetBrains Mono',monospace;
  }

  @keyframes tileIn{
    from{opacity:0;transform:translateY(30px) scale(0.95)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  /* === RESPONSYWNOŚĆ === */
  @media (max-width:900px) and (min-width:701px){
    .grid{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:700px){
    body{padding:20px 14px 32px}
    .ikona-strony{font-size:60px}
    h1{font-size:38px}
    .tagline{font-size:11px;letter-spacing:2px}
    .grid{grid-template-columns:1fr;gap:16px}
    .tile{padding:24px 20px}
  }
</style>
</head>
<body>

<div class="wrapper">

  <header>
    <span class="ikona-strony">📍</span>
    <h1>Moje mapy</h1>
    <div class="line"></div>
    <p class="tagline">kolekcja moich map</p>
  </header>

  <div class="grid">
    <a href="./troplist/" class="tile">
      <span class="tile-numer">// 01</span>
      <span class="icon">💌</span>
      <div class="tile-title">Troplist</div>
      <div class="tile-desc">zostaw komuś anonimowy list<br>w prawdziwym miejscu</div>
    </a>
    <a href="https://majstered.github.io/paranormal/" target="_blank" rel="noopener noreferrer" class="tile">
      <span class="tile-numer">// 02</span>
      <span class="icon">👻</span>
      <div class="tile-title">Paranormal Detector</div>
      <div class="tile-desc">mapa zjawisk i miejsc<br>niewyjaśnionych</div>
    </a>
    <a href="../edytor-map/gra-kosmiczna/" class="tile">
      <span class="tile-numer">// 03</span>
      <span class="icon">🚀</span>
      <div class="tile-title">Gra kosmiczna</div>
      <div class="tile-desc">podróż między gwiazdami<br>odkrywanie planet i misji</div>
    </a>
  </div>

  <!-- POWRÓT -->
  <div class="bottomnav">
    <a href="../" class="back">← powrót do mini-klik</a>
  </div>

  <footer>// moje-mapy · mini-klik.pl · 2026</footer>

</div>

</body>
</html>
