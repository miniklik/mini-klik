<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa w budowie · mini-klik.pl</title>
<meta name="description" content="Ta mapa jest jeszcze w budowie. Wróć za chwilę.">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;overflow-x:hidden}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:radial-gradient(ellipse at 20% 0%,#1a0f2e 0%,#0a0a14 50%,#000 100%);
    color:#e8e8ea;
    min-height:100vh;
    padding:48px 24px;
    position:relative;
    overflow:hidden;
  }

  /* Gwiazdy */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 23% 14%,#fff,transparent),
      radial-gradient(1px 1px at 67% 28%,#fff,transparent),
      radial-gradient(1px 1px at 41% 52%,#fff,transparent),
      radial-gradient(2px 2px at 89% 71%,#ffd9a3,transparent),
      radial-gradient(1px 1px at 12% 84%,#fff,transparent),
      radial-gradient(1px 1px at 76% 91%,#fff,transparent),
      radial-gradient(1px 1px at 55% 8%,#a3d9ff,transparent),
      radial-gradient(1px 1px at 33% 39%,#fff,transparent),
      radial-gradient(2px 2px at 8% 47%,#ff9a3d,transparent),
      radial-gradient(1px 1px at 92% 35%,#fff,transparent);
    opacity:0.7;
    animation:twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:0.7}50%{opacity:0.4}}

  body::after{
    content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:800px;height:600px;
    background:radial-gradient(ellipse,rgba(255,154,61,0.15) 0%,transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  /* Latające pinezki w tle */
  .latajaca-pinezka{
    position:fixed;font-size:32px;opacity:0.15;
    pointer-events:none;z-index:1;
    filter:drop-shadow(0 0 8px rgba(255,154,61,0.6));
  }
  .latajaca-pinezka:nth-child(1){top:15%;left:10%;animation:latanie1 18s linear infinite}
  .latajaca-pinezka:nth-child(2){top:70%;left:85%;animation:latanie2 22s linear infinite}
  .latajaca-pinezka:nth-child(3){top:45%;left:5%;animation:latanie3 25s linear infinite}
  .latajaca-pinezka:nth-child(4){top:25%;left:80%;animation:latanie4 20s linear infinite}
  .latajaca-pinezka:nth-child(5){top:85%;left:20%;animation:latanie5 24s linear infinite}
  @keyframes latanie1{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(100px,80px) rotate(90deg)}50%{transform:translate(200px,-40px) rotate(180deg)}75%{transform:translate(50px,120px) rotate(270deg)}100%{transform:translate(0,0) rotate(360deg)}}
  @keyframes latanie2{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(-120px,60px) rotate(-90deg)}50%{transform:translate(-60px,-100px) rotate(-180deg)}75%{transform:translate(-180px,20px) rotate(-270deg)}100%{transform:translate(0,0) rotate(-360deg)}}
  @keyframes latanie3{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(160px,-60px) rotate(180deg)}100%{transform:translate(0,0) rotate(360deg)}}
  @keyframes latanie4{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(-80px,100px) rotate(-90deg)}50%{transform:translate(-140px,-30px) rotate(-180deg)}75%{transform:translate(-40px,-80px) rotate(-270deg)}100%{transform:translate(0,0) rotate(-360deg)}}
  @keyframes latanie5{0%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(80px,-70px) rotate(120deg)}66%{transform:translate(180px,40px) rotate(240deg)}100%{transform:translate(0,0) rotate(360deg)}}

  .wrapper{position:relative;z-index:5;max-width:720px;margin:0 auto;text-align:center;padding-top:20px}

  /* Pinezka + radar */
  .pinezka-wrap{
    position:relative;width:200px;height:200px;margin:0 auto 32px;
    display:flex;align-items:center;justify-content:center;
  }
  .krag{
    position:absolute;top:50%;left:50%;
    width:80px;height:80px;
    border:2px solid #ff9a3d;border-radius:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    animation:radar 3s ease-out infinite;
  }
  .krag:nth-child(2){animation-delay:1s}
  .krag:nth-child(3){animation-delay:2s}
  @keyframes radar{
    0%{opacity:0.9;width:60px;height:60px}
    100%{opacity:0;width:200px;height:200px}
  }
  .pinezka{
    font-size:96px;line-height:1;
    filter:drop-shadow(0 6px 20px rgba(255,154,61,0.7));
    animation:spadanie 1.6s cubic-bezier(0.34,1.56,0.64,1) both, bicie 2.4s ease-in-out 1.6s infinite;
    position:relative;z-index:2;
  }
  @keyframes spadanie{
    0%{transform:translateY(-500px) rotate(-180deg);opacity:0}
    60%{transform:translateY(20px) rotate(-10deg);opacity:1}
    75%{transform:translateY(-8px) rotate(5deg)}
    90%{transform:translateY(4px) rotate(-2deg)}
    100%{transform:translateY(0) rotate(0deg)}
  }
  @keyframes bicie{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.06)}
  }

  h1{
    font-size:52px;font-weight:700;letter-spacing:-1px;line-height:1.1;
    background:linear-gradient(180deg,#ff9a3d 0%,#e87a1d 70%,#a04510 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 80px rgba(255,154,61,0.4);
    animation:h1Wjazd 1s 0.8s both, migotanie 4s 3s infinite;
  }
  @keyframes h1Wjazd{
    from{opacity:0;transform:translateY(20px) scale(0.95)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }
  @keyframes migotanie{
    0%,90%,100%{opacity:1;filter:none}
    91%{opacity:0.4}
    92%{opacity:1}
    93%{opacity:0.6}
    94%{opacity:1}
    95%{opacity:0.3}
    96%{opacity:1}
  }

  .line{width:60px;height:2px;background:#ff9a3d;margin:22px auto;animation:linkaWjazd 1s 1s both}
  @keyframes linkaWjazd{from{opacity:0;width:0}to{opacity:1;width:60px}}

  .tagline{
    color:#888;font-size:13px;letter-spacing:4px;text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;
    animation:fadeUp 1s 1.2s both;
  }

  /* Pasek postępu */
  .progress-wrap{
    max-width:520px;margin:40px auto 20px;
    animation:fadeUp 1s 1.5s both;
  }
  .progress-naglowek{
    display:flex;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:#888;letter-spacing:1.5px;
    margin-bottom:10px;
  }
  .progress-procent{color:#ff9a3d;font-weight:700}
  .progress-bar{
    height:8px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,154,61,0.2);
    border-radius:20px;overflow:hidden;
    box-shadow:inset 0 2px 6px rgba(0,0,0,0.4);
  }
  .progress-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg,#a04510 0%,#e87a1d 50%,#ff9a3d 100%);
    box-shadow:0 0 12px rgba(255,154,61,0.6);
    border-radius:20px;
    transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* Status - komunikat typewriter */
  .status-wrap{
    max-width:520px;margin:16px auto 24px;
    padding:14px 18px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(255,154,61,0.15);
    border-radius:8px;
    text-align:left;
    animation:fadeUp 1s 1.8s both;
    min-height:52px;
  }
  .status-line{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;color:#aaa;
    display:flex;gap:10px;align-items:center;
  }
  .prompt{color:#ff9a3d;font-weight:700}
  .status-tekst::after{
    content:'▊';color:#ff9a3d;margin-left:2px;
    animation:kursor 0.8s step-end infinite;
  }
  @keyframes kursor{50%{opacity:0}}

  /* Kropki loading */
  .kropki-loading{
    display:flex;gap:8px;justify-content:center;margin:24px auto;
    animation:fadeUp 1s 2s both;
  }
  .kropka-load{
    width:10px;height:10px;border-radius:50%;
    background:#ff9a3d;
    box-shadow:0 0 8px rgba(255,154,61,0.6);
    animation:skok 1.4s ease-in-out infinite;
  }
  .kropka-load:nth-child(2){animation-delay:0.2s}
  .kropka-load:nth-child(3){animation-delay:0.4s}
  @keyframes skok{
    0%,100%,80%{transform:translateY(0);opacity:0.4}
    40%{transform:translateY(-12px);opacity:1}
  }

  /* Komunikat główny */
  .komunikat-box{
    max-width:560px;margin:32px auto 0;
    padding:24px 28px;
    background:linear-gradient(180deg,rgba(40,40,55,0.6) 0%,rgba(20,20,30,0.8) 100%);
    border:1px solid rgba(255,154,61,0.25);
    border-radius:14px;
    backdrop-filter:blur(10px);
    animation:fadeUp 1s 2.2s both;
  }
  .komunikat-box p{
    font-size:16px;line-height:1.6;color:#ccc;
  }
  .komunikat-box p + p{margin-top:10px}
  .komunikat-box b{color:#ff9a3d;font-weight:600}

  /* Powrót */
  .bottomnav{
    text-align:center;margin-top:36px;
    animation:fadeUp 1s 2.5s both;
  }
  .powrot{
    display:inline-block;
    padding:11px 26px;
    color:#888;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;letter-spacing:1.5px;
    text-decoration:none;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;
    transition:all 0.25s;
  }
  .powrot:hover{
    color:#ff9a3d;
    border-color:rgba(255,154,61,0.5);
    background:rgba(255,154,61,0.06);
    transform:translateY(-2px);
  }

  footer{
    text-align:center;margin-top:28px;padding-bottom:16px;
    color:#555;font-size:11px;
    font-family:'JetBrains Mono',monospace;letter-spacing:2px;
    animation:fadeUp 1s 2.8s both;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(15px)}
    to{opacity:1;transform:translateY(0)}
  }

  @media (max-width:520px){
    body{padding:32px 16px}
    h1{font-size:36px}
    .pinezka{font-size:72px}
    .pinezka-wrap{width:160px;height:160px}
    .komunikat-box{padding:18px 20px}
    .komunikat-box p{font-size:15px}
    .latajaca-pinezka{font-size:22px}
  }
</style>
</head>
<body>

<!-- Latające pinezki w tle -->
<span class="latajaca-pinezka">📍</span>
<span class="latajaca-pinezka">📍</span>
<span class="latajaca-pinezka">📍</span>
<span class="latajaca-pinezka">📍</span>
<span class="latajaca-pinezka">📍</span>

<div class="wrapper">

  <!-- Pinezka z radarem -->
  <div class="pinezka-wrap">
    <div class="krag"></div>
    <div class="krag"></div>
    <div class="krag"></div>
    <div class="pinezka">📍</div>
  </div>

  <h1>Mapa w budowie</h1>
  <div class="line"></div>
  <p class="tagline">// trwają prace nad zawartością</p>

  <!-- Pasek postępu -->
  <div class="progress-wrap">
    <div class="progress-naglowek">
      <span>// postęp prac</span>
      <span class="progress-procent" id="procent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="fill"></div>
    </div>
  </div>

  <!-- Status - komunikat typewriter -->
  <div class="status-wrap">
    <p class="status-line">
      <span class="prompt">$</span>
      <span class="status-tekst" id="status">inicjalizacja...</span>
    </p>
  </div>

  <!-- Kropki loading -->
  <div class="kropki-loading">
    <div class="kropka-load"></div>
    <div class="kropka-load"></div>
    <div class="kropka-load"></div>
  </div>

  <!-- Komunikat główny -->
  <div class="komunikat-box">
    <p>Ta mapa jeszcze nie jest gotowa — <b>autor pracuje</b> nad jej zawartością.</p>
    <p>Wróć tu za jakiś czas albo zajrzyj do innych map z listy.</p>
  </div>

  <!-- Powrót -->
  <div class="bottomnav">
    <a href="../" class="powrot">← powrót do listy map</a>
  </div>

  <footer>// mapa w budowie · mini-klik.pl</footer>

</div>

<script>
  // === PASEK POSTĘPU (skacze losowo, cofa się, w końcu utyka na 94%) ===
  const skoki = [23, 47, 51, 49, 68, 71, 65, 82, 88, 91, 89, 94];
  let iSkok = 0;
  const fill = document.getElementById('fill');
  const procent = document.getElementById('procent');

  function nastepnySkok(){
    if (iSkok >= skoki.length) {
      // Utyka na 94% - drobne wahania
      const wahanie = 94 + (Math.random() * 0.4 - 0.2);
      fill.style.width = wahanie + '%';
      procent.textContent = Math.floor(wahanie) + '%';
      setTimeout(nastepnySkok, 1800 + Math.random() * 1200);
      return;
    }
    const v = skoki[iSkok];
    fill.style.width = v + '%';
    procent.textContent = v + '%';
    iSkok++;
    setTimeout(nastepnySkok, 700 + Math.random() * 900);
  }
  setTimeout(nastepnySkok, 2400);

  // === KOMUNIKATY TYPEWRITER ===
  const komunikaty = [
    'parzenie kawy autora...',
    'pies sąsiada zatrzymał prace',
    'autor poszedł na obiad',
    'pinezka 14 odmawia współpracy',
    'ostatnie szlify (tym razem na serio)...',
    'autor patrzy w sufit',
    'autor ma pomysł!',
    'wczytywanie inspiracji...',
    'sprawdzanie czy działa...',
    'nie działa. debugowanie...',
    'działa. ale nie wiadomo dlaczego',
    'autor zapomniał pomysłu',
    'restart procedury...',
    'kompilowanie klimatu...',
    'szukanie zaginionej kropki',
    'kot autora usiadł na klawiaturze',
    'przerwa na herbatę',
    'liczenie pinezek: 1... 2... wiele',
    'poprawianie literówek',
    'autor pisze i kasuje',
    'mapa się zamyśliła',
    'ładowanie klimatu...',
    'znowu ta sama pinezka',
    'chwila, coś się dzieje...',
    'prawie gotowe (trzeci raz w tym tygodniu)',
  ];

  const statusEl = document.getElementById('status');
  let komIdx = 0;
  let znakIdx = 0;
  let kasowanie = false;
  let aktualnyTekst = '';

  function typuj(){
    if (!kasowanie) {
      aktualnyTekst = komunikaty[komIdx].substring(0, znakIdx + 1);
      statusEl.textContent = aktualnyTekst;
      znakIdx++;
      if (znakIdx > komunikaty[komIdx].length) {
        kasowanie = true;
        setTimeout(typuj, 2500);
        return;
      }
      setTimeout(typuj, 35 + Math.random() * 50);
    } else {
      aktualnyTekst = komunikaty[komIdx].substring(0, znakIdx - 1);
      statusEl.textContent = aktualnyTekst;
      znakIdx--;
      if (znakIdx <= 0) {
        kasowanie = false;
        komIdx = (komIdx + 1) % komunikaty.length;
        setTimeout(typuj, 400);
        return;
      }
      setTimeout(typuj, 15 + Math.random() * 20);
    }
  }

  setTimeout(() => {
    statusEl.textContent = '';
    typuj();
  }, 5400);
</script>

</body>
</html>
