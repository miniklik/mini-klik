<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mini-klik.pl</title>
<meta name="description" content="mini-klik.pl — gry, edytor, kalendarz katolicki i droga wiary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;overflow-x:hidden}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:radial-gradient(ellipse at 20% 0%,#1a0f2e 0%,#0a0a14 50%,#000 100%);
    color:#e8e8ea;
    position:relative;
    min-height:100vh;
    padding:48px 32px;
  }

  /* gwiazdy */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 23% 14%,#fff,transparent),
      radial-gradient(1px 1px at 67% 28%,#fff,transparent),
      radial-gradient(1px 1px at 41% 52%,#fff,transparent),
      radial-gradient(2px 2px at 89% 71%,#ffd9a3,transparent),
      radial-gradient(1px 1px at 12% 84%,#fff,transparent),
      radial-gradient(1px 1px at 76% 91%,#fff,transparent),
      radial-gradient(1px 1px at 55% 8%,#a3d9ff,transparent),
      radial-gradient(1px 1px at 33% 39%,#fff,transparent),
      radial-gradient(2px 2px at 8% 47%,#ff9a3d,transparent),
      radial-gradient(1px 1px at 92% 35%,#fff,transparent);
    opacity:0.85;
    animation:twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:0.85}50%{opacity:0.45}}

  /* poświata u góry */
  body::after{
    content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:800px;height:600px;
    background:radial-gradient(ellipse,rgba(255,154,61,0.15) 0%,transparent 60%);
    pointer-events:none;
  }

  .wrapper{position:relative;z-index:2;max-width:1200px;margin:0 auto}

  header{text-align:center;margin-bottom:80px;padding-top:40px}

  .logo{
    font-size:88px;font-weight:700;letter-spacing:-3px;line-height:1;
    background:linear-gradient(180deg,#ff9a3d 0%,#e87a1d 70%,#a04510 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 80px rgba(255,154,61,0.4);
    animation:logoIn 1.2s cubic-bezier(0.2,0.9,0.3,1.1) both;
  }
  .logo .dot{color:#888;font-weight:400}
  .logo .pl{color:#ddd;font-weight:500}

  .line{
    width:60px;height:2px;background:#ff9a3d;margin:24px auto;
    animation:fadeUp 1s 0.6s both;
  }

  .tagline{
    margin-top:18px;font-size:18px;color:#888;letter-spacing:6px;
    text-transform:uppercase;
    animation:fadeUp 1s 0.4s both;
  }

  .grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:60px;
  }

  .tile{
    background:linear-gradient(180deg,rgba(40,40,55,0.6) 0%,rgba(20,20,30,0.8) 100%);
    border:1px solid rgba(255,154,61,0.2);
    border-radius:16px;padding:36px 24px;
    cursor:pointer;text-align:center;
    transition:all 0.3s cubic-bezier(0.2,0.9,0.3,1);
    backdrop-filter:blur(10px);
    position:relative;overflow:hidden;
    display:block;text-decoration:none;color:inherit;
    animation:tileIn 0.8s cubic-bezier(0.2,0.9,0.3,1.1) both;
  }
  .tile:nth-child(1){animation-delay:0.7s}
  .tile:nth-child(2){animation-delay:0.85s}
  .tile:nth-child(3){animation-delay:1.0s}
  .tile:nth-child(4){animation-delay:1.15s}

  .tile::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,#ff9a3d,transparent);
    transform:translateX(-100%);transition:transform 0.6s;
  }

  .tile:hover{
    transform:translateY(-8px);
    border-color:rgba(255,154,61,0.6);
    box-shadow:0 20px 60px rgba(255,154,61,0.2);
  }
  .tile:hover::before{transform:translateX(0)}

  .icon{
    font-size:64px;margin-bottom:20px;display:block;
    filter:drop-shadow(0 4px 12px rgba(255,154,61,0.4));
  }

  .tile-title{
    font-size:18px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    color:#ff9a3d;margin-bottom:8px;
  }

  .tile-desc{
    font-size:13px;color:#888;line-height:1.5;
    font-family:'JetBrains Mono',monospace;
  }

  footer{
    text-align:center;margin-top:80px;padding-bottom:40px;
    color:#555;font-size:13px;
    font-family:'JetBrains Mono',monospace;letter-spacing:2px;
  }

  @keyframes logoIn{
    from{opacity:0;transform:translateY(-30px) scale(0.9)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes tileIn{
    from{opacity:0;transform:translateY(40px) scale(0.95)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  /* awaryjna responsywność (zostawiamy drobnostki, główny target to desktop) */
  @media (max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .logo{font-size:64px}
  }
  @media (max-width:500px){
    .grid{grid-template-columns:1fr}
    .logo{font-size:48px}
    .tagline{font-size:14px;letter-spacing:3px}
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <h1 class="logo">mini<span class="dot">·</span>klik<span class="pl">.pl</span></h1>
    <div class="line"></div>
    <p class="tagline">twórz · graj · odkrywaj</p>
  </header>

  <div class="grid">
    <a href="./gry/" class="tile">
      <span class="icon">🎮</span>
      <div class="tile-title">Gry</div>
      <div class="tile-desc">kolekcja małych gier<br>do grania w przeglądarce</div>
    </a>
    <a href="./edytor/" class="tile">
      <span class="icon">✏️</span>
      <div class="tile-title">Edytor</div>
      <div class="tile-desc">studio tworzenia<br>własnych poziomów</div>
    </a>
    <a href="./kalendarz/" class="tile">
      <span class="icon">📅</span>
      <div class="tile-title">Kalendarz</div>
      <div class="tile-desc">kalendarz katolicki<br>święta i wspomnienia</div>
    </a>
    <a href="./droga-wiary/" class="tile">
      <span class="icon">🎮</span>
      <div class="tile-title">Droga</div>
      <div class="tile-desc">hmm.</div>
    </a>
  </div>

  <footer>// mini-klik.pl · 2026</footer>
</div>

</body>
</html>
