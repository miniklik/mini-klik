<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>mini-klik • portal z grami</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --cyan: #00f7ff;
        --pink: #ff00c8;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0a0a0a;
        color: #eee;
        overflow-x: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 30% 20%, rgba(0,247,255,0.12), transparent 50%),
                    radial-gradient(circle at 70% 80%, rgba(255,0,200,0.12), transparent 50%);
        z-index: -2;
    }

    nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(10,10,10,0.96);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--cyan);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .logo {
        font-size: 28px;
        font-weight: bold;
        color: var(--cyan);
        text-shadow: 0 0 15px var(--cyan);
    }

    .menu { display: flex; gap: 28px; }
    .menu a { color: #ccc; text-decoration: none; font-weight: 500; }
    .menu a:hover { color: var(--cyan); }

    .hamburger { display: none; font-size: 30px; cursor: pointer; }

    /* HERO Z ANIMACJĄ */
    .hero {
        height: 90vh;
        min-height: 620px;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    #heroCanvas {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .hero-content {
        position: relative;
        z-index: 2;
    }

    .hero h1 {
        font-size: 4.6rem;
        background: linear-gradient(90deg, var(--cyan), var(--pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 40px rgba(0,247,255,0.6);
        margin-bottom: 20px;
    }

    .hero p {
        font-size: 1.5rem;
        margin-bottom: 35px;
    }

    .btn {
        padding: 16px 42px;
        font-size: 1.2rem;
        border: none;
        border-radius: 50px;
        background: var(--cyan);
        color: black;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 20px var(--cyan);
    }

    .btn:hover {
        transform: scale(1.08);
        box-shadow: 0 0 35px var(--cyan);
    }

    /* KARTY GIER - TWÓJ ULUBIONY STYL */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 26px;
        padding: 20px;
        max-width: 1320px;
        margin: 0 auto;
    }

    .card {
        background: #111;
        border-radius: 14px;
        overflow: hidden;
        transition: all 0.4s;
        border: 1px solid #222;
    }

    .card:hover {
        transform: translateY(-12px) scale(1.03);
        box-shadow: 0 0 30px rgba(0, 247, 255, 0.35);
        border-color: var(--cyan);
    }

    .card img {
        width: 100%;
        height: 170px;
        object-fit: cover;
    }

    .card-info {
        padding: 18px;
    }

    .card-info h3 {
        margin-bottom: 6px;
    }

    .genre {
        font-size: 0.9rem;
        color: #888;
        margin: 6px 0 12px;
    }

    .card button {
        width: 100%;
        padding: 12px;
        background: var(--cyan);
        color: black;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
    }

    .card button:hover {
        background: white;
    }

    @media (max-width: 768px) {
        .menu { display: none; position: absolute; top: 75px; left:0; right:0; background:#0a0a0a; flex-direction:column; padding:20px; border-top:1px solid #333; }
        .menu.active { display: flex; }
        .hamburger { display: block; }
        .hero h1 { font-size: 3.1rem; }
    }
</style>
</head>

<body>

<nav>
    <div class="logo">🎮 mini-klik</div>
    <div class="menu" id="menu">
        <a href="#">Gry</a>
        <a href="#">Nowe</a>
        <a href="#">Kategorie</a>
        <a href="#">Społeczność</a>
    </div>
    <div style="display:flex; align-items:center; gap:15px;">
        <input type="text" placeholder="Szukaj gier..." style="background:#111; border:1px solid #333; padding:9px 16px; border-radius:30px; width:250px;">
        <span class="hamburger" id="hamburger">☰</span>
    </div>
</nav>

<div class="hero">
    <canvas id="heroCanvas"></canvas>
    <div class="hero-content">
        <h1>Twórz.<br>Graj.<br>Udostępniaj.</h1>
        <p>Portal dla twórców małych, kreatywnych gier 2D</p>
        <button class="btn" onclick="document.getElementById('games').scrollIntoView({behavior:'smooth'})">
            Przeglądaj gry →
        </button>
    </div>
</div>

<section id="games">
    <h2 style="text-align:center; color:var(--cyan); margin:60px 0 35px; font-size:2.5rem;">🔥 Najnowsze gry</h2>
    
    <div class="grid">
        <!-- TWOJA GRA -->
        <div class="card">
            <img src="https://picsum.photos/400/200?random=55" alt="Neon Platformer">
            <div class="card-info">
                <h3>mini-klik.pl</h3>
                <div class="genre">Zaawansowany edytor</div>
        
                <button onclick="window.open('demo1/', '_blank')">▶️ D E M O</button>
            </div>
        </div>

        <!-- Przykładowe inne gry -->
        <div class="card">
            <img src="https://picsum.photos/400/200?random=11" alt="">
            <div class="card-info">
                <h3>Neon Runner 2077</h3>
                <div class="genre">Endless Runner</div>
                <button onclick="alert('Gra w przygotowaniu...')">▶️ GRAJ</button>
            </div>
        </div>
    </div>
</section>

<footer style="text-align:center; padding:50px 20px; color:#555; font-size:0.9rem;">
    © 2026 mini-klik • zrobione z ❤️ i neonu
</footer>

<script>
// ================= ANIMACJA W HERO =================
const canvas = document.getElementById('heroCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.92;
}
resize();
window.addEventListener('resize', resize);

let particles = [];
let platforms = [];
let player = { x: 320, y: 420, vy: 0, size: 30, trail: [] };

for (let i = 0; i < 70; i++) {
    particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2.2 + 0.8, speed: Math.random()*0.8 + 0.3 });
}

for (let i = 0; i < 12; i++) {
    platforms.push({
        x: Math.random() * canvas.width * 1.6,
        y: 220 + Math.random() * 320,
        w: 130 + Math.random() * 90,
        speed: 1 + Math.random() * 0.7
    });
}

let time = 0;

function animate() {
    time += 0.016;
    ctx.fillStyle = 'rgba(10, 10, 20, 0.88)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Particles
    ctx.fillStyle = '#99ffff';
    particles.forEach(p => {
        p.y += p.speed;
        if (p.y > canvas.height) p.y = 0;
        ctx.globalAlpha = 0.7;
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Platforms
    ctx.strokeStyle = '#00dddd';
    ctx.lineWidth = 4;
    platforms.forEach(pl => {
        pl.x -= pl.speed;
        if (pl.x < -300) pl.x = canvas.width + 300;
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#00ffff';
        ctx.beginPath();
        ctx.moveTo(pl.x, pl.y);
        ctx.lineTo(pl.x + pl.w, pl.y);
        ctx.stroke();
    });
    ctx.shadowBlur = 0;

    // Player neon trail
    player.vy += 0.55;
    player.y += player.vy;
    if (player.y > 520) { player.y = 520; player.vy = -13; }

    player.trail.push({x: player.x, y: player.y});
    if (player.trail.length > 10) player.trail.shift();

    player.trail.forEach((p,i) => {
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff00ff';
        ctx.fillStyle = `rgba(255,0,200,${i/10*0.6})`;
        ctx.fillRect(p.x-15, p.y-15, 30, 30);
    });

    // Główny gracz
    ctx.shadowBlur = 35;
    ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = '#ff00ff';
    ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);

    ctx.shadowColor = '#00ffff';
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(player.x-10, player.y-10, player.size-20, player.size-20);
    ctx.shadowBlur = 0;

    requestAnimationFrame(animate);
}

animate();

// Hamburger
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');
hamburger.addEventListener('click', () => menu.classList.toggle('active'));
</script>

</body>
</html>
