<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game Player</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 12px 20px;
    gap: 10px;
  }

  #playerFrame {
    background: #1a1a1a;
    border: 3px solid #444;
    border-radius: 16px;
    padding: 12px 16px 10px 16px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(0,100,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-width: 840px;
    width: 100%;
  }

  #titleBar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  #gameTitle {
    font-size: 18px;
    font-weight: bold;
    color: #adf;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #4af;
  }

  #topControls {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    padding: 10px 22px;
    font-size: 14px;
    font-weight: bold;
    background: linear-gradient(180deg, #555, #222);
    border: 2px solid #666;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 0 4px 0 #111, 0 0 10px rgba(0,0,0,0.5);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:hover {
    background: linear-gradient(180deg, #666, #333);
    transform: translateY(-2px);
    box-shadow: 0 6px 0 #111, 0 0 12px rgba(0,0,0,0.7);
  }
  .ctrl-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #111;
  }
  .ctrl-btn.demo-btn {
    background: linear-gradient(180deg, #665500, #332900);
    border-color: #aa8800;
    color: #ffd700;
  }
  .ctrl-btn.demo-btn:hover {
    background: linear-gradient(180deg, #887700, #443300);
  }
  .ctrl-btn.nav-btn {
    background: linear-gradient(180deg, #005533, #002218);
    border-color: #00aa66;
    color: #00ff99;
    padding: 10px 14px;
    font-size: 13px;
  }
  .ctrl-btn.nav-btn:hover {
    background: linear-gradient(180deg, #007744, #003322);
  }
  .ctrl-btn.nav-btn.active {
    background: linear-gradient(180deg, #00aa66, #005533);
    border-color: #00ff99;
    color: #fff;
    box-shadow: 0 4px 0 #001a0f, 0 0 14px rgba(0,255,150,0.4);
  }

  #canvasWrapper {
    position: relative;
    border: 2px solid #333;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 800px;
  }

  canvas {
    background: #87CEEB;
    display: block;
    width: 100%;
    height: auto;
  }

  #noGameMsg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    gap: 16px;
  }
  #noGameMsg.hidden { display: none; }

  #noGameMsg h2 {
    font-size: 26px;
    color: #adf;
    text-shadow: 0 0 12px #48f;
  }
  #noGameMsg p {
    color: #888;
    font-size: 14px;
  }

  /* ===== ON-CANVAS NAV BUTTONS ===== */
  /* These are absolutely positioned INSIDE #canvasWrapper */
  .canvas-nav-group {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    pointer-events: auto;
    transition: opacity 0.2s;
  }
  .canvas-nav-group.hidden-nav {
    opacity: 0;
    pointer-events: none;
  }
  .canvas-nav-group.left-group {
    left: 6px;
  }
  .canvas-nav-group.right-group {
    right: 6px;
  }

  .nav-arrow {
    width: 48px;
    height: 48px;
    background: linear-gradient(180deg, rgba(80,80,80,0.85), rgba(30,30,30,0.85));
    border: 2px solid rgba(150,150,150,0.7);
    border-radius: 12px;
    color: white;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.12);
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    transition: all 0.07s ease;
    backdrop-filter: blur(2px);
  }
  .nav-arrow:hover {
    background: linear-gradient(180deg, rgba(100,100,100,0.9), rgba(50,50,50,0.9));
    border-color: rgba(200,200,200,0.8);
  }
  .nav-arrow.pressed,
  .nav-arrow:active {
    background: linear-gradient(180deg, rgba(58,143,255,0.9), rgba(26,95,212,0.9)) !important;
    border-color: rgba(34,119,255,0.9);
    box-shadow: 0 2px 0 rgba(0,0,0,0.5), 0 0 16px rgba(58,143,255,0.7), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: translateY(3px);
  }
  /* The middle horizontal button (left/right direction) */
  .nav-arrow.nav-horizontal {
    background: linear-gradient(180deg, rgba(100,100,100,0.88), rgba(40,40,40,0.88));
    border-color: rgba(180,180,180,0.75);
  }

  #scrollWrapper {
    width: 100%;
    max-width: 800px;
  }

  #scrollX {
    width: 100%;
    accent-color: #4CAF50;
    background: #333;
    height: 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  #statusBar {
    font-size: 12px;
    color: #666;
    text-align: center;
    padding: 2px 0;
  }

  .blink {
    animation: blinkAnim 1s infinite;
  }
  @keyframes blinkAnim {
    0%   { opacity: 1; }
    50%  { opacity: 0.2; }
    100% { opacity: 1; }
  }
</style>
</head>

    <div id="gameTitle">🎮 GAME PLAYER</div>
    <div id="topControls">
      <button class="ctrl-btn" onclick="wczytajProjekt()">📂 LOAD</button>
      <button class="ctrl-btn nav-btn" id="navToggleBtn" onclick="toggleNav()">🕹 NAWIGACJA</button>
      <button class="ctrl-btn demo-btn" onclick="loadDemo()">MOJA GRA</button>
    </div>
  </div>

  <div id="canvasWrapper">
    <canvas id="scena" width="800" height="450"></canvas>

    <!-- LEFT nav group: up top, left middle, down bottom -->
    <div class="canvas-nav-group left-group hidden-nav" id="navLeft">
      <div class="nav-arrow"
        ontouchstart="navPress('up',event)" ontouchend="navRelease('up')" ontouchcancel="navRelease('up')"
        onmousedown="navPress('up',event)" onmouseup="navRelease('up')" onmouseleave="navRelease('up')"
        id="btn-left-up">▲</div>
      <div class="nav-arrow nav-horizontal"
        ontouchstart="navPress('left',event)" ontouchend="navRelease('left')" ontouchcancel="navRelease('left')"
        onmousedown="navPress('left',event)" onmouseup="navRelease('left')" onmouseleave="navRelease('left')"
        id="btn-left-mid">◀</div>
      <div class="nav-arrow"
        ontouchstart="navPress('down',event)" ontouchend="navRelease('down')" ontouchcancel="navRelease('down')"
        onmousedown="navPress('down',event)" onmouseup="navRelease('down')" onmouseleave="navRelease('down')"
        id="btn-left-down">▼</div>
    </div>

    <!-- RIGHT nav group: up top, right middle, down bottom -->
    <div class="canvas-nav-group right-group hidden-nav" id="navRight">
      <div class="nav-arrow"
        ontouchstart="navPress('up',event)" ontouchend="navRelease('up')" ontouchcancel="navRelease('up')"
        onmousedown="navPress('up',event)" onmouseup="navRelease('up')" onmouseleave="navRelease('up')"
        id="btn-right-up">▲</div>
      <div class="nav-arrow nav-horizontal"

        onmousedown="navPress('right',event)" onmouseup="navRelease('right')" onmouseleave="navRelease('right')"
        id="btn-right-mid">▶</div>
      <div class="nav-arrow"
        ontouchstart="navPress('down',event)" ontouchend="navRelease('down')" ontouchcancel="navRelease('down')"
        onmousedown="navPress('down',event)" onmouseup="navRelease('down')" onmouseleave="navRelease('down')"
        id="btn-right-down">▼</div>
    </div>

    <div id="noGameMsg">
      <h2>Brak załadowanej gry</h2>
      <p>Kliknij <strong>LOAD</strong> aby wczytać plik .json</p>
      <p>lub <strong>DEMO</strong> aby zagrać w demonstrację</p>
    </div>
  </div>

  <div id="scrollWrapper">
    <input type="range" id="scrollX" min="0" value="0" step="1">
  </div>

  <div id="statusBar">Wczytaj grę aby rozpocząć</div>

</div>

  navVisible = !navVisible
  const btn = document.getElementById("navToggleBtn")

  const navR = document.getElementById("navRight")

    navL.classList.remove("hidden-nav")

    btn.classList.add("active")
  } else {
    navL.classList.add("hidden-nav")
    navR.classList.add("hidden-nav")
    btn.classList.remove("active")
  }
}

function getLevel(){ return levels[currentLevel] }

function syncLevelData(){
  const lvl = levels[currentLevel]
  if (!lvl) return
  players   = lvl.players   || []
  platforms = lvl.platforms || []
  blocks    = lvl.blocks    || []
  enemies   = lvl.enemies   || []
  bonuses   = Array.isArray(lvl.bonuses) ? lvl.bonuses : []
  texts     = lvl.texts     || []
}

function syncScrollbar(){
  scrollXEl.value = Math.max(0, Math.min(cameraX, worldWidth - canvas.width))
}

scrollXEl.addEventListener("input", () => {
  cameraX = Number(scrollXEl.value)
})

// ===== DPAD — pressed state synced across left/right groups =====
function navPress(dir, e) {
  if (e) e.preventDefault()
  // highlight all matching direction buttons
  document.querySelectorAll('[id$="-up"]').forEach(el => { if (dir === 'up') el.classList.add('pressed') })
  document.querySelectorAll('[id$="-down"]').forEach(el => { if (dir === 'down') el.classList.add('pressed') })
  if (dir === 'left')  document.getElementById('btn-left-mid')?.classList.add('pressed')
  if (dir === 'right') document.getElementById('btn-right-mid')?.classList.add('pressed')

  if (dir === 'left'  && sterowanie.lewo)  keys[sterowanie.lewo]  = true
  if (dir === 'right' && sterowanie.prawo) keys[sterowanie.prawo] = true
  if (dir === 'up'    && sterowanie.skok)  keys[sterowanie.skok]  = true
}

function navRelease(dir) {
  document.querySelectorAll('[id$="-up"]').forEach(el => { if (dir === 'up') el.classList.remove('pressed') })
  document.querySelectorAll('[id$="-down"]').forEach(el => { if (dir === 'down') el.classList.remove('pressed') })
  if (dir === 'left')  document.getElementById('btn-left-mid')?.classList.remove('pressed')
  if (dir === 'right') document.getElementById('btn-right-mid')?.classList.remove('pressed')

  if (dir === 'left'  && sterowanie.lewo)  keys[sterowanie.lewo]  = false
  if (dir === 'right' && sterowanie.prawo) keys[sterowanie.prawo] = false
  if (dir === 'up'    && sterowanie.skok)  keys[sterowanie.skok]  = false
}

// ===== KEYBOARD =====
document.addEventListener("keydown", e => { keys[e.key] = true })
document.addEventListener("keyup",   e => { keys[e.key] = false })

// ===== LOAD =====
function wczytajProjekt(){
  const input = document.createElement("input")
  input.type = "file"
  input.accept = ".json"
  input.onchange = e => {
    const file = e.target.files[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result)
        applyGameData(data)
      } catch(err) {
        alert("Błąd podczas wczytywania pliku JSON")
        console.error(err)
      }
    }
    reader.readAsText(file)
  }
  input.click()
}

function loadDemo(){
  applyGameData(GAME_DATA)
}

function applyGameData(data){
  gameData = data || {}
  gameData.stats = gameData.stats || {}

  levels = gameData.levels || []
  if (levels.length === 0) {
    levels.push({ players:[], platforms:[], blocks:[], enemies:[], bonuses:[], texts:[], backgroundType:"none", playerStartX:100, playerStartY:100 })
  }

  currentLevel = 0
  syncLevelData()

  const lvl = getLevel() || {}
  bonuses = Array.isArray(lvl.bonuses) ? lvl.bonuses : []
  backgroundType = lvl.backgroundType || "none"
  playerStartX = lvl.playerStartX ?? 100
  playerStartY = lvl.playerStartY ?? 100

  const s = gameData.settings || {}
  nazwaGry   = s.nazwaGry   || "Gra"
  autorGry   = s.autorGry   || ""
  opisGry    = s.opisGry    || ""
  sterowanie = s.sterowanie || { lewo:"ArrowLeft", prawo:"ArrowRight", skok:"ArrowUp" }

  counters = {
    lives: s.counters?.lives ?? 3,
    points: 0,
    time: s.counters?.time ?? 60
  }
  startTime       = s.startTime ?? counters.time
  useTimer        = s.useTimer !== undefined ? !!s.useTimer : true
  useLives        = s.useLives !== undefined ? !!s.useLives : true
  respawnMode     = s.respawnMode || "death"
  autoScroll      = !!s.autoScroll
  autoScrollSpeed = Number(s.autoScrollSpeed) || 2
  worldWidth      = Number(s.worldWidth) || 2000

  scrollXEl.max = worldWidth - canvas.width

  gameLoaded = true
  gameState = "game"
  gameOver = false
  gameOverTriggered = false
  hitPause = 0
  pendingRespawn = false
  invulnerable = 0
  fallTimer = 0
  warningText = null
  hitEffect = null
  levelDelay = null
  levelTextAnim = null
  cameraX = 0

  showIntro = true
  lastTime = Date.now()

  document.getElementById("gameTitle").textContent = "🎮 " + nazwaGry
  statusBar.textContent = "Gra: " + nazwaGry + (autorGry ? " — " + autorGry : "")
  noGameMsg.classList.add("hidden")

  respawnPlayer()
  window.bgParticles = null
}

// ===== RESPAWN =====
function respawnPlayer(){
  if (!players[0]) return
  const lvl = getLevel()
  players[0].x = lvl?.playerStartX ?? playerStartX
  players[0].y = lvl?.playerStartY ?? playerStartY
  players[0].vx = 0
  players[0].vy = 0
  cameraX = Math.max(0, players[0].x - canvas.width / 2)
  syncScrollbar()
}

// ===== UPDATE =====
function update(){
  if (!gameLoaded) return
  if (showIntro) return

  if (gameState === "results" || gameState === "win") {
    updateResults()
    return
  }

  if (levelDelay) {
    levelDelay.time--
    if (levelDelay.time <= 0) {
      let target = levelDelay.target
      currentLevel = target
      syncLevelData()
      const lvl = getLevel()
      playerStartX = lvl?.playerStartX ?? 100
      playerStartY = lvl?.playerStartY ?? 100
      respawnPlayer()
      cameraX = 0
      levelDelay = null
      levelTextAnim = null
      gameState = "game"
      gameOver = false
      window.bgParticles = null
    }
    return
  }

  if (gameOver) return

  let now = Date.now()
  let delta = (now - lastTime) / 1000
  lastTime = now

  if (useTimer) {
    if (counters.time > 0) counters.time = Math.max(0, counters.time - delta)
    if (counters.time <= 0 && !pendingRespawn && hitPause === 0) {
      if (useLives) counters.lives -= 1
      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true
        gameOver = true
        gameState = "results"
        initResultsScene()
        return
      }
      hitEffect = { x: players[0]?.x || canvas.width/2, y: players[0]?.y || canvas.height/2, time: 60 }
      hitPause = hitPauseTime
      pendingRespawn = true
      counters.time = startTime
    }
  }

  if (hitPause > 0) {
    hitPause--
    if (hitPause === 0 && pendingRespawn && players[0]) {
      const p = players[0]
      if (diedByFalling) {
        p.x = cameraX + 140; p.y = 180
      } else if (respawnMode === "death") {
        p.x = deathRespawnX; p.y = deathRespawnY
      } else {
        p.x = playerStartX; p.y = playerStartY
      }
      p.vx = diedByFalling ? 4 : 0
      p.y = Math.max(p.y, 100)
      p.vy = -5
      invulnerable = invulnerabilityTime * 1.4
      pendingRespawn = false
      diedByFalling = false
    }
    return
  }

  // FX on objects
  for (let obj of [...platforms, ...blocks, ...enemies]) {
    if (!obj.effects) obj.effects = []
    for (let fx of obj.effects) {
      if (fx.enabled === false) continue
      if (fx.type === "move") {
        obj.x += fx.dx * fx.speed
        obj.y += fx.dy * fx.speed
        fx.travel += fx.speed
        if (fx.travel >= fx.distance) {
          if (fx.loop) { fx.dx *= -1; fx.dy *= -1; fx.travel = 0 }
          else fx.speed = 0
        }
      }
    }

    if (obj.type === "ghost") {
      if (!obj.baseY) obj.baseY = obj.y
      obj.floatTime = (obj.floatTime || 0) + 0.05
      obj.y = obj.baseY + Math.sin(obj.floatTime) * 15
    }

    if (obj.type === "walker" || obj.type === "walker2") {
      obj.vy = (obj.vy || 0) + 0.5
      obj.y += obj.vy
      obj.x += obj.vx || 0
      if (obj.y > floorY - obj.h) { obj.y = floorY - obj.h; obj.vy = 0 }
      for (let pl of platforms) {
        if (obj.x + obj.w > pl.x && obj.x < pl.x + pl.w &&
            obj.y + obj.h > pl.y && obj.y + obj.h < pl.y + (pl.h||20) + 10) {
          obj.y = pl.y - obj.h; obj.vy = 0
        }
      }
      for (let b of blocks) {
        if (obj.x + obj.w > b.x && obj.x < b.x + b.w &&
            obj.y + obj.h > b.y && obj.y + obj.h < b.y + 10) {
          obj.y = b.y - obj.h; obj.vy = 0
        }
      }
      if (obj.x < 0 || obj.x + obj.w > worldWidth) obj.vx = -(obj.vx || 1)
    }
  }

  // Player movement
  for (let p of players) {
    p.vx = 0
    if (keys[sterowanie.lewo])  p.vx = -4
    if (keys[sterowanie.prawo]) p.vx = 4
    if (keys[sterowanie.skok] && p.vy === 0) p.vy = -10
    p.vy += gravity
    p.x += p.vx
    p.y += p.vy

    if (p.y > floorY) { p.y = floorY; p.vy = 0 }

    for (let pl of platforms) {
      if (p.x > pl.x - p.r && p.x < pl.x + pl.w + p.r) {
        if (p.y + p.r > pl.y && p.y < pl.y + (pl.h||20)) {
          if (pl.solid === "top" && p.vy > 0) { p.y = pl.y - p.r; p.vy = 0 }
          if (pl.solid === "full") {
            if (p.vy > 0) { p.y = pl.y - p.r; p.vy = 0 }
            if (p.vy < 0) { p.y = pl.y + (pl.h||20) + p.r; p.vy = 1 }
          }
        }
      }
    }

    for (let b of blocks) {
      if (p.x + p.r > b.x && p.x - p.r < b.x + b.w && p.y + p.r > b.y && p.y - p.r < b.y + b.h) {
        if (p.vy > 0 && p.y < b.y)             { p.y = b.y - p.r; p.vy = 0 }
        else if (p.vy < 0 && p.y > b.y + b.h)  { p.y = b.y + b.h + p.r; p.vy = 0 }
        else if (p.vx > 0 && p.x < b.x)        { p.x = b.x - p.r; p.vx = 0 }
        else if (p.vx < 0 && p.x > b.x + b.w)  { p.x = b.x + b.w + p.r; p.vx = 0 }
      }
    }
  }

  checkEnemyCollision()

  // Fall detection
  if (players.length > 0) {
    const p = players[0]
    const outOfBounds = p.y > floorY + 150 || p.x < cameraX - 40 || p.x > cameraX + canvas.width + 40
    if (outOfBounds) {
      fallTimer++
      if (fallTimer === 25 && !warningText) warningText = { time: 150 }
      if (fallTimer >= FALL_TIME_LIMIT) {
        diedByFalling = true
        if (useLives) counters.lives -= 1
        hitEffect = { x: p.x, y: Math.min(p.y, floorY), time: 60 }
        hitPause = hitPauseTime
        pendingRespawn = true
        fallTimer = 0
        warningText = null
        if (useLives && counters.lives <= 0 && !gameOverTriggered) {
          gameOverTriggered = true; gameOver = true; gameState = "results"; initResultsScene(); return
        }
      }
    } else {
      fallTimer = 0; warningText = null
    }
  }

  // Bonuses
  for (let b of bonuses) {
    b.pulseTime = (b.pulseTime || 0) + 0.05
    b.scale = 1 + Math.sin(b.pulseTime) * 0.05
  }

  for (let i = bonuses.length - 1; i >= 0; i--) {
    let b = bonuses[i]
    let p = players[0]
    if (!p) continue
    let dist = Math.hypot(p.x - b.x, p.y - b.y)
    if (dist < p.r + (b.r || 12)) {
      if (b.type === "key_level") {
        let target = b.targetLevel || 0
        if (target >= levels.length) { alert("❌ Ten poziom nie istnieje"); return }
        levelDelay = { time: 180, target }
        levelTextAnim = { time: 180 }
        matrixCols = []
        for (let j = 0; j < canvas.width / 8; j++) matrixCols[j] = Math.random() * 50
        return
      }
      if (b.type === "key_win") {
        gameOver = true; gameOverTriggered = true; gameState = "win"; initResultsScene(); return
      }
      counters.points += 1
      bonuses.splice(i, 1)
      const lvl = getLevel()
      if (lvl) lvl.bonuses = bonuses
    }
  }

  // Camera follow
  if (players.length > 0) {
    const player = players[0]
    if (autoScroll) {
      cameraX += autoScrollSpeed
    } else {
      const targetX = player.x - canvas.width / 2 + player.r
      cameraX += (targetX - cameraX) * 0.12
    }
    cameraX = Math.max(0, Math.min(cameraX, worldWidth - canvas.width))
    syncScrollbar()
  }
}

// ===== ENEMY COLLISION =====
function checkEnemyCollision(){
  if (gameOver || players.length === 0) return
  if (invulnerable > 0) { invulnerable--; return }
  const player = players[0]
  for (let enemy of enemies) {
    let ew = enemy.w || 40, eh = enemy.h || 40
    let px = player.x - player.r, py = player.y - player.r
    let pw = player.r * 2, ph = player.r * 2
    if (px < enemy.x + ew && px + pw > enemy.x && py < enemy.y + eh && py + ph > enemy.y) {
      deathRespawnX = player.x; deathRespawnY = player.y
      if (useLives) counters.lives--
      hitEffect = { x: player.x, y: player.y, time: 60 }
      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true; gameOver = true; gameState = "results"; initResultsScene(); return
      }
      hitPause = hitPauseTime; pendingRespawn = true; invulnerable = invulnerabilityTime
      return
    }
  }
}

// ===== RESULTS =====
function initResultsScene(){
  resultsEnemies = []
  for (let i = 0; i < 6; i++) {
    resultsEnemies.push({ angle: i * (Math.PI * 2 / 6), dist: 120, speed: 0.02 + Math.random() * 0.02 })
  }
}

function updateResults(){
  for (let en of resultsEnemies) en.angle += en.speed
}

function drawResults(){
  ctx.fillStyle = "black"
  ctx.fillRect(0, 0, canvas.width, canvas.height)
  ctx.fillStyle = "red"
  ctx.beginPath()
  ctx.arc(resultsBall.x, resultsBall.y, resultsBall.r, 0, Math.PI*2)
  ctx.fill()

  for (let i = 0; i < resultsEnemies.length; i++) {
    let en = resultsEnemies[i]
    let baseAngle = (i / resultsEnemies.length) * Math.PI * 2
    let finalAngle = en.angle * 0.25 + baseAngle
    let x = resultsBall.x + Math.cos(finalAngle) * en.dist
    let y = resultsBall.y + Math.sin(finalAngle) * en.dist
    ctx.font = "32px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.fillText("👻", x, y)
  }

  ctx.textAlign = "center"
  ctx.font = "40px Arial"
  ctx.fillStyle = gameState === "win" ? "#00ff88" : "white"
  ctx.fillText(gameState === "win" ? "GRATULACJE!!!" : "KONIEC GRY", canvas.width/2, 80)
  ctx.font = "22px Arial"
  ctx.fillStyle = "white"
  ctx.fillText("Punkty: " + counters.points, canvas.width/2, 300)
  ctx.fillText("Życia: " + counters.lives, canvas.width/2, 330)
  ctx.fillText("Czas: " + Math.ceil(counters.time), canvas.width/2, 360)

  ctx.fillStyle = "#3a3a3a"
  ctx.beginPath(); ctx.roundRect(255, 395, 140, 42, 8); ctx.fill()
  ctx.fillStyle = "#aa2222"
  ctx.beginPath(); ctx.roundRect(410, 395, 140, 42, 8); ctx.fill()

  ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center"
  ctx.fillText("🔄 RESTART", 325, 421)
  ctx.fillText("🏠 MENU", 480, 421)
}

canvas.addEventListener("click", e => {
  if (!gameLoaded) return
  if (showIntro) { showIntro = false; return }
  if (gameState === "results" || gameState === "win") {
    const rect = canvas.getBoundingClientRect()
    const scaleX = canvas.width / rect.width
    const mx = (e.clientX - rect.left) * scaleX
    const my = (e.clientY - rect.top) * scaleX
    if (mx > 255 && mx < 395 && my > 395 && my < 437) restartGame()
    if (mx > 410 && mx < 550 && my > 395 && my < 437) location.reload()
  }
})

function restartGame(){
  gameOver = false; gameOverTriggered = false
  gameState = "game"
  currentLevel = 0
  syncLevelData()
  bonuses = Array.isArray(getLevel()?.bonuses) ? [...getLevel().bonuses] : []
  counters.lives = gameData.settings?.counters?.lives ?? 3
  counters.points = 0
  counters.time = startTime
  hitPause = 0; pendingRespawn = false; invulnerable = 0
  fallTimer = 0; warningText = null; hitEffect = null
  levelDelay = null; levelTextAnim = null
  cameraX = 0
  window.bgParticles = null
  respawnPlayer()
}

// ===== DRAW =====
function draw(){
  if (!gameLoaded) {
    ctx.fillStyle = "#111"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    return
  }

  if (levelDelay) { drawMatrix(); return }

  if (showIntro) { drawIntro(); return }

  if (gameState === "results" || gameState === "win") { drawResults(); return }

  ctx.clearRect(0, 0, canvas.width, canvas.height)
  drawBackground()

  ctx.save()
  ctx.translate(-cameraX, 0)

  // Platforms
  for (let pl of platforms) {
    const x = pl.x, y = pl.y, w = pl.w, h = pl.h || 20
    let neon = pl.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) { ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 10 + Math.sin(Date.now()*0.001)*10 }

    if (pl.typ === "line") {
      const ly = y + 10
      ctx.shadowColor = neon ? "#00ffff" : "#44aaff"
      ctx.shadowBlur = neon ? 20 : 10
      ctx.strokeStyle = neon ? "#00ffff" : "#5599ff"; ctx.lineWidth = 4
      ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x+w, ly); ctx.stroke()
      ctx.shadowBlur = 0
      ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.moveTo(x+6, ly); ctx.lineTo(x+w-6, ly); ctx.stroke()
      ctx.shadowBlur = 0

    } else if (pl.typ === "round") {
      const grad = ctx.createLinearGradient(x, y, x, y+h)
      grad.addColorStop(0, "#6aaadd"); grad.addColorStop(0.3, "#4477bb"); grad.addColorStop(1, "#223366")
      ctx.fillStyle = grad
      ctx.beginPath(); ctx.roundRect(x, y, w, h, 10); ctx.fill()
      ctx.strokeStyle = "#88ccff"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.roundRect(x+1, y+1, w-2, h-2, 9); ctx.stroke()
      const shine = ctx.createLinearGradient(x, y, x, y+h*0.5)
      shine.addColorStop(0, "rgba(255,255,255,0.25)"); shine.addColorStop(1, "rgba(255,255,255,0)")
      ctx.fillStyle = shine
      ctx.beginPath(); ctx.roundRect(x+2, y+2, w-4, h*0.5, 8); ctx.fill()
      const screwPositions = [[x+7, y+h/2], [x+w-7, y+h/2]]
      for (let [sx, sy] of screwPositions) {
        ctx.fillStyle = "#1a3355"
        ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI*2); ctx.fill()
        ctx.strokeStyle = "#99ccff"; ctx.lineWidth = 1
        ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI*2); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(sx-2, sy); ctx.lineTo(sx+2, sy); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(sx, sy-2); ctx.lineTo(sx, sy+2); ctx.stroke()
      }

    } else {
      const grad = ctx.createLinearGradient(x, y, x, y+h)
      grad.addColorStop(0, "#5a8fcc"); grad.addColorStop(0.4, "#3a6499"); grad.addColorStop(1, "#1e3d66")
      ctx.fillStyle = grad; ctx.fillRect(x, y, w, h)
      ctx.strokeStyle = "#6699cc"; ctx.lineWidth = 1.5
      ctx.strokeRect(x+0.5, y+0.5, w-1, h-1)
      ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(x, y+h-3, w, 3)
      const shine = ctx.createLinearGradient(x, y, x, y+h*0.5)
      shine.addColorStop(0, "rgba(255,255,255,0.22)"); shine.addColorStop(1, "rgba(255,255,255,0)")
      ctx.fillStyle = shine; ctx.fillRect(x+1, y+1, w-2, h*0.5)
      const nitCount = Math.max(2, Math.floor(w/28))
      for (let i = 0; i < nitCount; i++) {
        const nx = x + 8 + i * ((w-16)/(nitCount-1||1)), ny = y + h/2
        ctx.fillStyle = "#1a3355"
        ctx.beginPath(); ctx.arc(nx, ny, 2.5, 0, Math.PI*2); ctx.fill()
        ctx.strokeStyle = "#aaddff"; ctx.lineWidth = 0.8
        ctx.beginPath(); ctx.arc(nx, ny, 2.5, 0, Math.PI*2); ctx.stroke()
      }
    }
    ctx.shadowBlur = 0
  }

  // Blocks
  for (let b of blocks) {
    const x = b.x, y = b.y, w = b.w, h = b.h
    let neon = b.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) { ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 10 + Math.sin(Date.now()*0.001)*10 }

    if (b.typ === "blockTall") {
      const g = ctx.createLinearGradient(x, y, x+w, y)
      g.addColorStop(0,"#553322"); g.addColorStop(0.5,"#8b4a2e"); g.addColorStop(1,"#3d2010")
      ctx.fillStyle = g; ctx.fillRect(x, y, w, h)
      const bH = 12; ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1.5
      for (let row = 0; row*bH < h; row++) {
        const by2 = y+row*bH
        ctx.beginPath(); ctx.moveTo(x,by2); ctx.lineTo(x+w,by2); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(x+w/2,by2); ctx.lineTo(x+w/2,by2+bH); ctx.stroke()
      }
      ctx.strokeStyle="rgba(200,140,80,0.4)"; ctx.lineWidth=1.5
      ctx.beginPath(); ctx.moveTo(x,y+h); ctx.lineTo(x,y); ctx.lineTo(x+w,y); ctx.stroke()
      ctx.strokeStyle="rgba(0,0,0,0.4)"; ctx.lineWidth=1.5
      ctx.beginPath(); ctx.moveTo(x+w,y); ctx.lineTo(x+w,y+h); ctx.lineTo(x,y+h); ctx.stroke()

    } else if (b.typ === "blockGrid") {
      const t = Date.now() * 0.002
      const pulse = Math.sin(t) * 0.5 + 0.5
      const bg = ctx.createLinearGradient(x, y, x, y+h)
      bg.addColorStop(0,"#1a1a2e"); bg.addColorStop(1,"#0d0d1a")
      ctx.fillStyle = bg; ctx.fillRect(x, y, w, h)
      const lineColors = ["#00ffff","#0088ff","#00ffcc","#4400ff","#00ffff"]
      const lineCount = Math.max(2, Math.floor(h/18))
      for (let i = 0; i < lineCount; i++) {
        const ly = y + (i+0.5)*(h/lineCount)
        const shift = ((t*0.4 + i*0.3) % 1)
        const lg = ctx.createLinearGradient(x, ly, x+w, ly)
        const c = lineColors[i % lineColors.length]
        lg.addColorStop(0,"rgba(0,0,0,0)")
        lg.addColorStop(Math.max(0,shift-0.25),"rgba(0,0,0,0)")
        lg.addColorStop(shift,"#ffffff")
        lg.addColorStop(Math.min(1,shift+0.25),c)
        lg.addColorStop(1,"rgba(0,0,0,0)")
        ctx.strokeStyle=lg; ctx.lineWidth=1.5
        ctx.beginPath(); ctx.moveTo(x,ly); ctx.lineTo(x+w,ly); ctx.stroke()
      }
      ctx.strokeStyle=`rgba(0,255,255,${0.5+pulse*0.5})`; ctx.lineWidth=1.5
      ctx.strokeRect(x+2, y+2, w-2, h-2)
      const cs = Math.min(12, w*0.18)
      ctx.strokeStyle="#ffffff"; ctx.lineWidth=2.5
      for (const [cx2,cy2,dx,dy] of [[x+2,y+2,1,1],[x+w-2,y+2,-1,1],[x+2,y+h-2,1,-1],[x+w-2,y+h-2,-1,-1]]) {
        ctx.beginPath(); ctx.moveTo(cx2+dx*cs,cy2); ctx.lineTo(cx2,cy2); ctx.lineTo(cx2,cy2+dy*cs); ctx.stroke()
      }
      const kcx=x+w/2, kcy=y+h/2
      const kr=Math.min(w,h)*0.22*(0.88+pulse*0.12)
      ctx.shadowColor="#00ffff"; ctx.shadowBlur=12+pulse*14
      const rg=ctx.createRadialGradient(kcx,kcy,1,kcx,kcy,kr*1.6)
      rg.addColorStop(0,"rgba(0,255,255,0.3)"); rg.addColorStop(1,"rgba(0,100,255,0)")
      ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(kcx,kcy,kr*1.6,0,Math.PI*2); ctx.fill()
      ctx.shadowBlur=0
      const krg=ctx.createLinearGradient(kcx-kr,kcy,kcx+kr,kcy)
      krg.addColorStop(0,"#0044ff"); krg.addColorStop(0.5,"#ffffff"); krg.addColorStop(1,"#00ccff")
      ctx.fillStyle=krg
      ctx.beginPath(); ctx.moveTo(kcx,kcy-kr); ctx.lineTo(kcx+kr*0.6,kcy); ctx.lineTo(kcx,kcy+kr); ctx.lineTo(kcx-kr*0.6,kcy); ctx.closePath(); ctx.fill()
      ctx.strokeStyle="rgba(255,255,255,0.7)"; ctx.lineWidth=1
      ctx.beginPath(); ctx.moveTo(kcx-kr*0.6,kcy); ctx.lineTo(kcx+kr*0.6,kcy); ctx.stroke()

    } else {
      const bGrad = ctx.createLinearGradient(x, y, x, y+h)
      bGrad.addColorStop(0,"#445566"); bGrad.addColorStop(0.5,"#2a3a4a"); bGrad.addColorStop(1,"#1a2530")
      ctx.fillStyle=bGrad; ctx.fillRect(x, y, w, h)
      const brickH=14, brickW=w/2
      ctx.strokeStyle="rgba(0,0,0,0.5)"; ctx.lineWidth=1.5
      for (let row=0; row*brickH<h; row++) {
        const by2=y+row*brickH
        ctx.beginPath(); ctx.moveTo(x,by2); ctx.lineTo(x+w,by2); ctx.stroke()
        const offset=row%2===0?0:brickW/2
        for (let col=offset; col<w; col+=brickW) {
          ctx.beginPath(); ctx.moveTo(x+col,by2); ctx.lineTo(x+col,by2+brickH); ctx.stroke()
        }
      }
      const bShine=ctx.createLinearGradient(x,y,x,y+h*0.4)
      bShine.addColorStop(0,"rgba(255,255,255,0.12)"); bShine.addColorStop(1,"rgba(255,255,255,0)")
      ctx.fillStyle=bShine; ctx.fillRect(x,y,w,h*0.4)
      ctx.strokeStyle="rgba(150,200,255,0.35)"; ctx.lineWidth=1.5
      ctx.beginPath(); ctx.moveTo(x,y+h); ctx.lineTo(x,y); ctx.lineTo(x+w,y); ctx.stroke()
      ctx.strokeStyle="rgba(0,0,0,0.5)"; ctx.lineWidth=1.5
      ctx.beginPath(); ctx.moveTo(x+w,y); ctx.lineTo(x+w,y+h); ctx.lineTo(x,y+h); ctx.stroke()
    }
    ctx.shadowBlur = 0
  }

  // Players
  for (let p of players) {
    if (invulnerable > 0 && Math.floor(invulnerable/5) % 2 === 0) continue
    if (p.type === "ball" || !p.type) drawPlayer(ctx, p.x, p.y, p.r, Date.now())
    else drawCar(p.x, p.y, p.r, p.vx || 0)
  }

// Enemies
  for (let en of enemies) {
  ctx.globalAlpha = 1
  const x = en.x, y = en.y, w = en.w || 40, h = en.h || 40

  if (en.type === "ghost") {
    let float = 0
    let moving = en.effects && en.effects.some(fx => fx.type==="move" && fx.enabled!==false)
    if (!moving) float = Math.sin(Date.now()*0.003+en.x)*6
    const t = Date.now()*0.002, gx=x+w/2, gy=y+h/2+float, gr=w*0.45
    ctx.save()
    ctx.shadowColor="#aaaaff"; ctx.shadowBlur=18
    ctx.fillStyle="rgba(200,200,255,0.82)"
    ctx.beginPath(); ctx.arc(gx, gy-gr*0.2, gr, Math.PI, 0)
    const steps=5
    for(let i=steps;i>=0;i--){
      const wx=gx-gr+i*(gr*2/steps), wy=gy+gr*0.8+(i%2===0?Math.sin(t)*5:-Math.sin(t)*5)
      ctx.lineTo(wx,wy)
    }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur=0
    ctx.shadowColor="#ff4444"; ctx.shadowBlur=8; ctx.fillStyle="#ff2222"
    ctx.beginPath(); ctx.ellipse(gx-gr*0.28,gy-gr*0.18,gr*0.14,gr*0.18,0,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.ellipse(gx+gr*0.28,gy-gr*0.18,gr*0.14,gr*0.18,0,0,Math.PI*2); ctx.fill()
    ctx.shadowBlur=0; ctx.fillStyle="#000"
    ctx.beginPath(); ctx.arc(gx-gr*0.28,gy-gr*0.15,gr*0.07,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(gx+gr*0.28,gy-gr*0.15,gr*0.07,0,Math.PI*2); ctx.fill()
    ctx.restore()

  } else if (en.type === "worm") {
    const t=Date.now()*0.004, seg=4, segR=w/(seg*2+1)
    ctx.save()
    for(let i=seg-1;i>=0;i--){
      const sx=x+segR+i*(w-segR*2)/seg+Math.sin(t+i*1.2)*3
      const sy=y+h/2+Math.sin(t*1.5+i)*4
      const shade=Math.floor(80+i*20)
      ctx.fillStyle=`rgb(${shade+60},${shade+140},${shade})`
      ctx.shadowColor="#44ff00"; ctx.shadowBlur=i===0?10:4
      ctx.beginPath(); ctx.arc(sx,sy,segR*(i===0?1.3:1.0),0,Math.PI*2); ctx.fill()
      ctx.fillStyle="rgba(180,255,120,0.5)"
      ctx.beginPath(); ctx.ellipse(sx,sy+segR*0.3,segR*0.5,segR*0.35,0,0,Math.PI*2); ctx.fill()
    }
    ctx.shadowBlur=0
    const hx=x+segR+Math.sin(t)*3, hy=y+h/2+Math.sin(t*1.5)*4
    ctx.fillStyle="#fff"
    ctx.beginPath(); ctx.arc(hx-segR*0.4,hy-segR*0.4,segR*0.3,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(hx+segR*0.4,hy-segR*0.4,segR*0.3,0,Math.PI*2); ctx.fill()
    ctx.fillStyle="#000"
    ctx.beginPath(); ctx.arc(hx-segR*0.38,hy-segR*0.42,segR*0.15,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(hx+segR*0.42,hy-segR*0.42,segR*0.15,0,Math.PI*2); ctx.fill()
    ctx.strokeStyle="#44cc00"; ctx.lineWidth=2
    ctx.beginPath(); ctx.moveTo(hx-segR*0.3,hy-segR); ctx.lineTo(hx-segR*0.5,hy-segR*1.8); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(hx+segR*0.3,hy-segR); ctx.lineTo(hx+segR*0.5,hy-segR*1.8); ctx.stroke()
    ctx.restore()

  } else if (en.type === "enemy1") {
    let s=w/8, t=Date.now()*0.005
    let waveX=Math.sin(t+en.x*0.05)*2, waveY=Math.cos(t*1.5)*2
    let bx=x+waveX, by=y+waveY
    ctx.fillStyle="#6a35d4"; ctx.fillRect(bx+1*s,by+2*s,6*s,4*s)
    ctx.fillStyle="#8a5cff"; ctx.fillRect(bx+2*s,by+1*s,4*s,2*s)
    ctx.fillStyle="white"
    ctx.fillRect(bx+2*s+waveX*0.3,by+2*s,s,s); ctx.fillRect(bx+5*s+waveX*0.3,by+2*s,s,s)
    ctx.fillStyle="#6ecbff"
    ctx.fillRect(bx+2*s+0.25*s+waveX*0.5,by+2*s+0.25*s,0.5*s,0.5*s)
    ctx.fillRect(bx+5*s+0.25*s+waveX*0.5,by+2*s+0.25*s,0.5*s,0.5*s)
    ctx.fillStyle="#00e5ff"
    ctx.fillRect(bx+2*s,by+6*s+Math.sin(t)*2,s,s); ctx.fillRect(bx+5*s,by+6*s-Math.sin(t)*2,s,s)

  } else if (en.type === "water") {
    let t=Date.now()*0.003
    ctx.fillStyle="#1e3a5f"; ctx.fillRect(x,y,w,h)
    ctx.fillStyle="#4fc3f7"
    for(let i=0;i<w;i+=4){let wave=Math.sin(t+i*0.05)*3; ctx.fillRect(x+i,y+wave,4,3)}
    ctx.fillStyle="#8fe9ff"
    for(let i=0;i<w;i+=20){let wave=Math.sin(t*1.5+i*0.08)*2; ctx.fillRect(x+i,y+6+wave,4,1)}

  } else if (en.type === "fire") {
    const t=Date.now()*0.005, fx=x+w/2, fbase=y+h
    ctx.save()
    for(let f=0;f<3;f++){
      const offset=(f-1)*w*0.28, flicker=Math.sin(t*1.3+f*2.1)*4
      const fh=h*(0.6+Math.sin(t+f)*0.2)
      const grad=ctx.createRadialGradient(fx+offset,fbase-fh*0.3,2,fx+offset,fbase,fh*0.5)
      grad.addColorStop(0,"rgba(255,220,50,0.95)"); grad.addColorStop(0.4,"rgba(255,100,0,0.85)"); grad.addColorStop(1,"rgba(200,0,0,0)")
      ctx.fillStyle=grad
      ctx.beginPath(); ctx.moveTo(fx+offset-w*0.18,fbase)
      ctx.quadraticCurveTo(fx+offset-w*0.12+flicker,fbase-fh*0.5,fx+offset,fbase-fh)
      ctx.quadraticCurveTo(fx+offset+w*0.12-flicker,fbase-fh*0.5,fx+offset+w*0.18,fbase)
      ctx.closePath(); ctx.fill()
    }
    const core=ctx.createRadialGradient(fx,fbase-h*0.25,1,fx,fbase-h*0.2,w*0.2)
    core.addColorStop(0,"rgba(255,255,180,1)"); core.addColorStop(1,"rgba(255,200,0,0)")
    ctx.fillStyle=core; ctx.beginPath(); ctx.arc(fx,fbase-h*0.22,w*0.2,0,Math.PI*2); ctx.fill()
    ctx.restore()

  } else if (en.type === "spikes") {
    const spikeCount=4, sw=w/spikeCount, base=y+h
    ctx.save()
    for(let i=0;i<spikeCount;i++){
      const sx=x+i*sw, tip=y+4
      const sGrad=ctx.createLinearGradient(sx,base,sx+sw/2,tip)
      sGrad.addColorStop(0,"#2a2a3a"); sGrad.addColorStop(0.5,"#8899bb"); sGrad.addColorStop(1,"#ddeeff")
      ctx.fillStyle=sGrad
      ctx.beginPath(); ctx.moveTo(sx+1,base); ctx.lineTo(sx+sw/2,tip); ctx.lineTo(sx+sw-1,base); ctx.closePath(); ctx.fill()
      ctx.strokeStyle="rgba(200,230,255,0.7)"; ctx.lineWidth=1.5
      ctx.beginPath(); ctx.moveTo(sx+2,base-2); ctx.lineTo(sx+sw/2,tip+1); ctx.stroke()
    }
    const baseGrad=ctx.createLinearGradient(x,base-5,x,base)
    baseGrad.addColorStop(0,"#333344"); baseGrad.addColorStop(1,"#111122")
    ctx.fillStyle=baseGrad; ctx.fillRect(x,base-5,w,5)
    ctx.restore()

  } else if (en.type === "walker") {
    const t=Date.now()*0.004, cx2=x+w/2, cy2=y+h/2, legBob=Math.sin(t*2)*4
    ctx.save()
    ctx.strokeStyle="#66aadd"; ctx.lineWidth=3; ctx.lineCap="round"
    ctx.beginPath(); ctx.moveTo(cx2-w*0.2,cy2+h*0.2); ctx.lineTo(cx2-w*0.25,cy2+h*0.5+legBob); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(cx2+w*0.2,cy2+h*0.2); ctx.lineTo(cx2+w*0.25,cy2+h*0.5-legBob); ctx.stroke()
    ctx.fillStyle="#4488bb"
    ctx.fillRect(cx2-w*0.38,cy2+h*0.5+legBob-2,w*0.26,5)
    ctx.fillRect(cx2+w*0.12,cy2+h*0.5-legBob-2,w*0.26,5)
    const bodyGrad=ctx.createLinearGradient(cx2-w*0.35,cy2-h*0.25,cx2+w*0.35,cy2+h*0.25)
    bodyGrad.addColorStop(0,"#5599ee"); bodyGrad.addColorStop(1,"#224488")
    ctx.fillStyle=bodyGrad
    ctx.beginPath(); ctx.roundRect(cx2-w*0.35,cy2-h*0.28,w*0.7,h*0.55,5); ctx.fill()
    ctx.strokeStyle="#88ccff"; ctx.lineWidth=1
    ctx.beginPath(); ctx.roundRect(cx2-w*0.35,cy2-h*0.28,w*0.7,h*0.55,5); ctx.stroke()
    ctx.fillStyle="#4477cc"
    ctx.beginPath(); ctx.roundRect(cx2-w*0.28,cy2-h*0.52,w*0.56,h*0.28,4); ctx.fill()
    ctx.strokeStyle="#88ccff"; ctx.lineWidth=2
    ctx.beginPath(); ctx.moveTo(cx2,cy2-h*0.52); ctx.lineTo(cx2,cy2-h*0.75); ctx.stroke()
    ctx.shadowColor="#00ffff"; ctx.shadowBlur=8; ctx.fillStyle="#00ffee"
    ctx.beginPath(); ctx.arc(cx2,cy2-h*0.78,3.5,0,Math.PI*2); ctx.fill()
    ctx.shadowBlur=0
    ctx.shadowColor="#00ffff"; ctx.shadowBlur=10; ctx.fillStyle="#00ffff"
    ctx.beginPath(); ctx.arc(cx2-w*0.12,cy2-h*0.4,4,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx2+w*0.12,cy2-h*0.4,4,0,Math.PI*2); ctx.fill()
    ctx.shadowBlur=0; ctx.restore()

  } else if (en.type === "walker2") {
    const t=Date.now()*0.01, cx2=x+w/2, legAnim=Math.sin(t)*8
    ctx.save()
    ctx.fillStyle="#aa3399"; ctx.fillRect(x,y+h*0.45,w,h*0.55)
    ctx.fillStyle="#cc55bb"
    ctx.beginPath(); ctx.arc(cx2,y+h*0.45,w*0.5,Math.PI,0); ctx.fill()
    ctx.fillStyle="#ffff00"
    ctx.beginPath(); ctx.arc(cx2-w*0.18,y+h*0.32,5.5,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx2+w*0.18,y+h*0.32,5.5,0,Math.PI*2); ctx.fill()
    ctx.fillStyle="#000"
    ctx.beginPath(); ctx.arc(cx2-w*0.18,y+h*0.32,2.5,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx2+w*0.18,y+h*0.32,2.5,0,Math.PI*2); ctx.fill()
    ctx.strokeStyle="#882277"; ctx.lineWidth=6; ctx.lineCap="round"
    ctx.beginPath(); ctx.moveTo(cx2-w*0.22,y+h); ctx.lineTo(cx2-w*0.22+legAnim,y+h+10); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(cx2+w*0.22,y+h); ctx.lineTo(cx2+w*0.22-legAnim,y+h+10); ctx.stroke()
    ctx.restore()

  } else if (en.type === "walker3") {
    const t=Date.now()*0.004, cx2=x+w/2, cy2=y+h/2, legAnim=Math.sin(Date.now()*0.009)*6
    ctx.save()
    ctx.strokeStyle="#445566"; ctx.lineWidth=5; ctx.lineCap="round"
    ctx.beginPath(); ctx.moveTo(cx2-w*0.22,cy2+h*0.38); ctx.lineTo(cx2-w*0.28+legAnim,cy2+h*0.58); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(cx2+w*0.22,cy2+h*0.38); ctx.lineTo(cx2+w*0.28-legAnim,cy2+h*0.58); ctx.stroke()
    ctx.fillStyle="#334455"
    ctx.fillRect(cx2-w*0.42+legAnim,cy2+h*0.55,w*0.28,6)
    ctx.fillRect(cx2+w*0.14-legAnim,cy2+h*0.55,w*0.28,6)
    const bGrad=ctx.createLinearGradient(cx2-w*0.4,cy2,cx2+w*0.4,cy2)
    bGrad.addColorStop(0,"#334455"); bGrad.addColorStop(0.5,"#5577aa"); bGrad.addColorStop(1,"#334455")
    ctx.fillStyle=bGrad
    ctx.beginPath(); ctx.roundRect(cx2-w*0.42,cy2-h*0.12,w*0.84,h*0.52,4); ctx.fill()
    ctx.strokeStyle="#7799cc"; ctx.lineWidth=1.5
    ctx.beginPath(); ctx.roundRect(cx2-w*0.42,cy2-h*0.12,w*0.84,h*0.52,4); ctx.stroke()
    const hGrad=ctx.createLinearGradient(cx2-w*0.32,cy2-h*0.5,cx2+w*0.32,cy2-h*0.1)
    hGrad.addColorStop(0,"#445566"); hGrad.addColorStop(1,"#223344")
    ctx.fillStyle=hGrad
    ctx.beginPath(); ctx.roundRect(cx2-w*0.32,cy2-h*0.52,w*0.64,h*0.42,5); ctx.fill()
    ctx.shadowColor="#ff2200"; ctx.shadowBlur=10; ctx.fillStyle="#ff3300"
    ctx.beginPath(); ctx.arc(cx2-w*0.14,cy2-h*0.34,5,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx2+w*0.14,cy2-h*0.34,5,0,Math.PI*2); ctx.fill()
    ctx.shadowBlur=0
    ctx.strokeStyle="#7799cc"; ctx.lineWidth=2
    ctx.beginPath(); ctx.moveTo(cx2,cy2-h*0.52); ctx.lineTo(cx2+w*0.1,cy2-h*0.72); ctx.stroke()
    ctx.fillStyle="#ff4400"; ctx.shadowColor="#ff4400"; ctx.shadowBlur=6
    ctx.beginPath(); ctx.arc(cx2+w*0.1,cy2-h*0.74,3,0,Math.PI*2); ctx.fill()
    ctx.shadowBlur=0; ctx.restore()

  } else if (en.type === "walker4") {
    const t=Date.now()*0.003, cx2=x+w/2, cy2=y+h/2
    const hover=Math.sin(t*1.5)*5, pulse=Math.sin(t)*0.5+0.5
    const kcy=cy2+hover
    ctx.save()
    const beamAlpha=0.15+Math.sin(t*3)*0.1
    const beamGrad=ctx.createLinearGradient(cx2,kcy+h*0.18,cx2,kcy+h*0.9)
    beamGrad.addColorStop(0,`rgba(100,255,100,${beamAlpha+0.2})`); beamGrad.addColorStop(1,"rgba(100,255,100,0)")
    ctx.fillStyle=beamGrad
    ctx.beginPath(); ctx.moveTo(cx2-w*0.22,kcy+h*0.18); ctx.lineTo(cx2-w*0.5,kcy+h*0.9)
    ctx.lineTo(cx2+w*0.5,kcy+h*0.9); ctx.lineTo(cx2+w*0.22,kcy+h*0.18); ctx.closePath(); ctx.fill()
    const diskGrad=ctx.createLinearGradient(cx2-w*0.5,kcy,cx2+w*0.5,kcy+h*0.25)
    diskGrad.addColorStop(0,"#888899"); diskGrad.addColorStop(0.4,"#ccccdd"); diskGrad.addColorStop(1,"#556677")
    ctx.fillStyle=diskGrad
    ctx.beginPath(); ctx.ellipse(cx2,kcy+h*0.12,w*0.5,h*0.18,0,0,Math.PI*2); ctx.fill()
    ctx.strokeStyle="#aabbcc"; ctx.lineWidth=1.5
    ctx.beginPath(); ctx.ellipse(cx2,kcy+h*0.12,w*0.5,h*0.18,0,0,Math.PI*2); ctx.stroke()
    const domeGrad=ctx.createRadialGradient(cx2-w*0.1,kcy-h*0.15,2,cx2,kcy,w*0.32)
    domeGrad.addColorStop(0,"rgba(180,255,180,0.9)"); domeGrad.addColorStop(0.5,"rgba(80,200,120,0.7)"); domeGrad.addColorStop(1,"rgba(20,100,60,0.5)")
    ctx.fillStyle=domeGrad
    ctx.beginPath(); ctx.ellipse(cx2,kcy,w*0.3,h*0.28,0,Math.PI,0); ctx.fill()
    const lights=[-0.35,-0.18,0,0.18,0.35]
    lights.forEach((offset,i)=>{
      const phase=(t*4+i*1.2)%(Math.PI*2), on=Math.sin(phase)>0
      ctx.shadowColor=on?"#ffff00":"transparent"; ctx.shadowBlur=on?8:0
      ctx.fillStyle=on?"#ffee00":"#555544"
      ctx.beginPath(); ctx.arc(cx2+w*offset,kcy+h*0.22,3.5,0,Math.PI*2); ctx.fill()
    })
    ctx.shadowBlur=0; ctx.restore()

  } else {
    ctx.fillStyle = "#7b3fe4"; ctx.fillRect(x, y, w, h)
  }
}

  // Bonuses
  for (let b of bonuses) {
    ctx.save()
    ctx.translate(b.x, b.y)
    ctx.scale(b.scale||1, b.scale||1)
    ctx.font = "22px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"
    let icon = b.type === "key_win" ? "🏁" : b.type === "key_level" ? "🔑" : "💎"
    ctx.fillText(icon, 0, 0)
    ctx.restore()
  }

  // Texts
  for (let t of texts) {
    ctx.save()
    ctx.textAlign = "center"; ctx.textBaseline = "middle"
    ctx.font = t.size + "px " + (t.font || "Arial")
    if (t.neon) {
      ctx.shadowColor = t.neonColor || "#00ffff"; ctx.shadowBlur = 15
      ctx.fillStyle = t.neonColor || "#00ffff"; ctx.fillText(t.text, t.x, t.y)
      ctx.shadowBlur = 40; ctx.fillText(t.text, t.x, t.y)
    }
    ctx.shadowBlur = 0
    if (t.outline) {
      ctx.strokeStyle = t.outlineColor || "#ffffff"; ctx.lineWidth = t.outlineWidth || 4
      ctx.lineJoin = "round"; ctx.strokeText(t.text, t.x, t.y)
    }
    ctx.fillStyle = t.color || "white"; ctx.fillText(t.text, t.x, t.y)
    ctx.restore()
  }

  ctx.restore()

  // HUD
  if (hitEffect) {
    hitEffect.time--
    if (Math.floor(hitEffect.time/5) % 2 === 0) {
      ctx.font = "50px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"
      ctx.fillText("💀", hitEffect.x - cameraX, hitEffect.y)
    }
    if (hitEffect.time <= 0) hitEffect = null
  }

  ctx.fillStyle = "white"; ctx.font = "20px Arial"
  ctx.textAlign = "left"
  if (useLives) ctx.fillText("❤️ ".repeat(Math.max(0, counters.lives)), 20, 30)
  ctx.textAlign = "center"
  ctx.fillText("⭐ " + counters.points, canvas.width/2, 30)
  ctx.textAlign = "right"
  if (useTimer) ctx.fillText("⏱ " + Math.ceil(counters.time), canvas.width - 20, 30)

  if (warningText) {
    warningText.time--
    if (warningText.time <= 0) warningText = null
    const alpha = Math.sin(Date.now()*0.008)*0.3 + 0.7
    ctx.save(); ctx.globalAlpha = alpha
    ctx.shadowColor = "#ff0000"; ctx.shadowBlur = 30
    ctx.font = "bold 58px Arial"; ctx.textAlign = "center"; ctx.fillStyle = "#ff2222"
    ctx.fillText("WRACAJ SZYBKO!", canvas.width/2, canvas.height/2 - 40)
    ctx.font = "bold 26px Arial"; ctx.fillStyle = "#ff8888"
    ctx.fillText("Spadniesz za chwilę!", canvas.width/2, canvas.height/2 + 30)
    ctx.restore()
  }

  ctx.fillStyle = "#333"
  ctx.fillRect(0, 450, 800, 50)
}

// ===== INTRO =====
function drawIntro(){
  const time = Date.now() * 0.001
  const cx = canvas.width / 2
  const grad = ctx.createLinearGradient(0,0,0,canvas.height)
  grad.addColorStop(0, "#0a001f"); grad.addColorStop(1, "#1a0033")
  ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height)

  ctx.strokeStyle = "rgba(0,255,200,0.08)"; ctx.lineWidth = 1.5
  for (let i = -5; i < 25; i++) {
    const offset = (time*40 + i*80) % (canvas.height+300) - 150
    ctx.beginPath(); ctx.moveTo(0, offset); ctx.lineTo(canvas.width, offset+80); ctx.stroke()
  }

  ctx.textAlign = "center"; ctx.textBaseline = "middle"
  const pulse = Math.sin(time*3)*4
  ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 35
  ctx.fillStyle = "#00ffff"; ctx.font = "bold 72px Arial"
  ctx.fillText(nazwaGry || "Gra", cx, 165 + pulse)
  ctx.shadowBlur = 0
  ctx.font = "22px Arial"; ctx.fillStyle = "#aaccff"

  // Łamanie opisu po słowach, max 60 znaków na linię, max 3 linie
  const opisTekst = opisGry || ""
  if (opisTekst) {
    const slowa = opisTekst.split(" ")
    const opisLinie = []
    let aktLinia = ""
    for (const slowo of slowa) {
      if (opisLinie.length >= 3) break
      const proba = aktLinia ? aktLinia + " " + slowo : slowo
      if (proba.length <= 60) {
        aktLinia = proba
      } else {
        if (aktLinia) opisLinie.push(aktLinia)
        aktLinia = slowo.length > 60 ? slowo.substring(0, 60) : slowo
      }
    }
    if (aktLinia && opisLinie.length < 3) opisLinie.push(aktLinia)
    opisLinie.forEach((linia, i) => {
      ctx.fillText(linia, cx, 255 + i * 26)
    })
  }
  ctx.font = "17px Arial"; ctx.fillStyle = "#557799"
  ctx.fillText("by " + (autorGry || "nieznany"), cx, canvas.height - 28)
  ctx.font = "bold 18px Arial"; ctx.fillStyle = "#4af"
  ctx.fillText("KLIKNIJ aby rozpocząć", cx, canvas.height/2 + 80)
}

// ===== BACKGROUND =====
function drawBackground(){
  let bgType = getLevel()?.backgroundType || backgroundType || "none"
  if (bgType === "none") { ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,canvas.width,canvas.height); return }
  if (bgType === "forest") { drawForest(); return }
  if (bgType === "snow") {
    ctx.fillStyle = "#0f1a2b"; ctx.fillRect(0,0,canvas.width,canvas.height)
    ctx.fillStyle = "#ffffff"
    for (let i=0;i<120;i++) { let x=(i*97-cameraX*0.1)%2000,y=(i*53+Date.now()*0.2)%canvas.height; ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill() }
  }
  if (bgType === "space") { drawStarsBg(); for(let i=0;i<18;i++){let x=(i*220-cameraX*0.15)%(canvas.width+300),h=95+(i*53%95);ctx.fillStyle="#1e2f52";ctx.beginPath();ctx.moveTo(x-20,canvas.height);ctx.lineTo(x+80,canvas.height-h);ctx.lineTo(x+190,canvas.height);ctx.fill()} }
  if (bgType === "rain") {
    ctx.fillStyle = "#0b0f1a"; ctx.fillRect(0,0,canvas.width,canvas.height)
    ctx.strokeStyle = "#88aaff"; ctx.lineWidth = 1
    for (let i=0;i<120;i++){let x=(i*97-cameraX*0.2)%2000,y=(i*53+Date.now()*0.5)%canvas.height;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+3,y+10);ctx.stroke()}
  }
  if (bgType === "west") {
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7)
    skyGrad.addColorStop(0, "#ff4d00")
    skyGrad.addColorStop(0.4, "#ff8c33")
    skyGrad.addColorStop(0.7, "#ffbb77")
    skyGrad.addColorStop(1, "#ffe0b3")
    ctx.fillStyle = skyGrad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    let purpleGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.35)
    purpleGrad.addColorStop(0, "rgba(120, 40, 140, 0.25)")
    purpleGrad.addColorStop(1, "rgba(120, 40, 140, 0)")
    ctx.fillStyle = purpleGrad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    let sunX = canvas.width - 140
    let sunY = 110
    ctx.fillStyle = "rgba(255, 220, 100, 0.35)"
    ctx.beginPath(); ctx.arc(sunX, sunY, 75, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = "rgba(255, 200, 80, 0.25)"
    ctx.beginPath(); ctx.arc(sunX, sunY, 110, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = "#ffdd77"
    ctx.beginPath(); ctx.arc(sunX, sunY, 48, 0, Math.PI * 2); ctx.fill()

    ctx.fillStyle = "#c46a2e"
    for (let i = 0; i < 8; i++) {
      let x = (i * 280 - cameraX * 0.1) % (canvas.width + 400) - 100
      let h = 95 + (i * 37 % 70)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height - 100)
      ctx.lineTo(x + 140, canvas.height - 100 - h)
      ctx.lineTo(x + 290, canvas.height - 100)
      ctx.fill()
    }

    ctx.fillStyle = "#a04d1f"
    for (let i = 0; i < 7; i++) {
      let x = (i * 340 - cameraX * 0.25) % (canvas.width + 500) - 80
      let h = 135 + (i * 51 % 110)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height - 100)
      ctx.lineTo(x + 160, canvas.height - 100 - h)
      ctx.lineTo(x + 340, canvas.height - 100)
      ctx.fill()
    }

    let groundGrad = ctx.createLinearGradient(0, canvas.height - 130, 0, canvas.height)
    groundGrad.addColorStop(0, "#e8b57c")
    groundGrad.addColorStop(1, "#c17f3f")
    ctx.fillStyle = groundGrad
    ctx.fillRect(0, canvas.height - 130, canvas.width, 130)

    ctx.fillStyle = "#9f5f2a"
    ctx.fillRect(0, canvas.height - 55, canvas.width, 55)

    ctx.fillStyle = "#2a8c4a"
    for (let i = 0; i < 12; i++) {
      let x = (i * 190 - cameraX * 0.7) % (canvas.width + 300) - 30
      let baseY = canvas.height - 95
      ctx.fillRect(x + 8, baseY - 65, 18, 70)
      ctx.fillRect(x - 6, baseY - 48, 16, 22)
      ctx.fillRect(x + 24, baseY - 38, 14, 18)
    }

    ctx.fillStyle = "#b36d38"
    for (let i = 0; i < 15; i++) {
      let x = (i * 85 - cameraX * 0.85) % (canvas.width + 150)
      let size = 18 + (i % 5) * 7
      ctx.beginPath()
      ctx.ellipse(x, canvas.height - 48, size, size * 0.45, 0, 0, Math.PI * 2)
      ctx.fill()
    }
  }
  if (bgType === "city") {
    drawStarsBg()
    for(let i=0;i<20;i++){
      let x=(i*160-cameraX*0.3)%(canvas.width+200),h=120+(i*37%200),w=100
      ctx.fillStyle="#1e2a3a";ctx.fillRect(x,canvas.height-h,w,h)
      for(let wy=0;wy<h;wy+=30)for(let wx=0;wx<w;wx+=25){
        if((wx+wy+i)%3!==0)continue
        ctx.fillStyle=((wx+wy+i)%5===0)?"#333":"#ffd966"
        ctx.fillRect(x+wx+5,canvas.height-h+wy+5,8,12)
      }
    }
  }
  if (bgType === "stars" || bgType === "neon") {
    let g=ctx.createLinearGradient(0,0,0,canvas.height)
    g.addColorStop(0,"#0a001f");g.addColorStop(1,"#1a0033")
    ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height)
    drawParticles()
  }
}

function drawStarsBg(){
  let g=ctx.createLinearGradient(0,0,0,canvas.height)
  g.addColorStop(0,"#0a001f");g.addColorStop(1,"#1a0033")
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height)
  drawParticles()
}

function drawParticles(){
  if (!window.bgParticles) {
    window.bgParticles=[]
    for(let i=0;i<90;i++) window.bgParticles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2.2+0.7,speed:Math.random()*0.9+0.4})
  }
  ctx.fillStyle="#99ffff"
  window.bgParticles.forEach(p=>{
    p.y+=p.speed; if(p.y>canvas.height)p.y=-5
    ctx.globalAlpha=0.75+Math.sin(Date.now()/300+p.x)*0.25
    ctx.fillRect(p.x,p.y,p.size,p.size)
  })
  ctx.globalAlpha=1
}

function drawForest(){
  ctx.fillStyle="#0b1a2f";ctx.fillRect(0,0,canvas.width,canvas.height)
  drawStarsBg()
  for(let i=0;i<20;i++){
    let x=(i*120-cameraX*0.4)%(canvas.width+200),h=120+(i*47%100),w=50+(i*31%40)
    ctx.fillStyle="#123524";ctx.fillRect(x+w/2-3,canvas.height-h,6,h)
    ctx.beginPath();ctx.moveTo(x,canvas.height-h+30);ctx.lineTo(x+w/2,canvas.height-h-40);ctx.lineTo(x+w,canvas.height-h+30);ctx.fill()
  }
  ctx.fillStyle="#0a1a12";ctx.fillRect(0,canvas.height-40,canvas.width,40)
}

// ===== MATRIX =====
function drawMatrix(){
  matrixFrame++
  ctx.fillStyle="rgba(0,0,0,0.2)";ctx.fillRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle="#0f0";ctx.font="22px monospace"
  for(let i=0;i<matrixCols.length;i++){
    let text = matrixFrame%4===0 ? String.fromCharCode(48+Math.floor(Math.random()*10)) : " "
    ctx.fillText(text, i*14, matrixCols[i]*14)
    if(matrixCols[i]*14>canvas.height && Math.random()>0.975) matrixCols[i]=0
    matrixCols[i]+=0.2
  }

  if (levelTextAnim) {
    let progress = 1 - (levelTextAnim.time / 180)
    progress = Math.min(progress/0.7, 1)
    ctx.font = "bold 40px monospace"; ctx.textAlign = "center"
    ctx.fillStyle = "#00ffcc"; ctx.shadowColor = "#00ffcc"; ctx.shadowBlur = 25
    ctx.fillText("NEXT", -200 + progress*(canvas.width/2+200), canvas.height/2-20)
    ctx.fillText("LEVEL", canvas.width+200-progress*(canvas.width/2+200), canvas.height/2+30)
    ctx.shadowBlur = 0
    levelTextAnim.time--
    if (levelTextAnim.time <= 0) levelTextAnim = null
  }
}

// ===== PLAYER DRAW =====
function drawPlayer(ctx, x, y, r, time){
  let pulse = Math.sin(time*0.005)*2.5
  let grad = ctx.createRadialGradient(x-r*0.35,y-r*0.35,r*0.25,x,y,r+pulse)
  grad.addColorStop(0,"#ffeb3b"); grad.addColorStop(1,"#ff5722")
  ctx.shadowColor="#ff9800"; ctx.shadowBlur=25
  ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(x,y,r+pulse,0,Math.PI*2); ctx.fill()
  ctx.shadowBlur=0
  ctx.fillStyle="#111"
  ctx.beginPath();ctx.arc(x-r*0.32,y-r*0.22,r*0.13,0,Math.PI*2);ctx.fill()
  ctx.beginPath();ctx.arc(x+r*0.32,y-r*0.22,r*0.13,0,Math.PI*2);ctx.fill()
  ctx.strokeStyle="#111"; ctx.lineWidth=2.5
  ctx.beginPath();ctx.arc(x,y+r*0.15,r*0.35,0.2,Math.PI-0.2);ctx.stroke()
}

// === DYM SAMOCHODU ===
let exhaustParticles = []
let carWheelAngle = 0

function spawnExhaust(x, y, vx) {
  const dir = vx >= 0 ? -1 : 1
  exhaustParticles.push({
    x, y,
    vx: dir * (0.5 + Math.random() * 1.2) - vx * 0.1,
    vy: -0.3 - Math.random() * 0.6,
    life: 1.0,
    decay: 0.012 + Math.random() * 0.012,
    size: 3 + Math.random() * 4,
    gray: Math.floor(160 + Math.random() * 80)
  })
}

function updateExhaust() {
  for (let i = exhaustParticles.length - 1; i >= 0; i--) {
    const p = exhaustParticles[i]
    p.x += p.vx; p.y += p.vy; p.size += 0.18; p.life -= p.decay
    if (p.life <= 0) exhaustParticles.splice(i, 1)
  }
}

function drawWheel(x, y, radius, angle) {
  ctx.save()
  ctx.translate(x, y); ctx.rotate(angle)
  ctx.fillStyle = '#1a1a1a'
  ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2
  ctx.beginPath(); ctx.arc(0, 0, radius - 1, 0, Math.PI * 2); ctx.stroke()
  ctx.fillStyle = '#bbbbbb'
  ctx.beginPath(); ctx.arc(0, 0, radius * 0.65, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#888'; ctx.lineWidth = radius * 0.12
  for (let i = 0; i < 5; i++) {
    const a = (i * Math.PI * 2) / 5
    ctx.beginPath()
    ctx.moveTo(Math.cos(a)*radius*0.22, Math.sin(a)*radius*0.22)
    ctx.lineTo(Math.cos(a)*radius*0.82, Math.sin(a)*radius*0.82)
    ctx.stroke()
  }
  ctx.fillStyle = '#555555'
  ctx.beginPath(); ctx.arc(0, 0, radius * 0.22, 0, Math.PI * 2); ctx.fill()
  ctx.fillStyle = '#333'
  ctx.beginPath(); ctx.arc(0, 0, radius * 0.09, 0, Math.PI * 2); ctx.fill()
  ctx.restore()
}

function drawCar(cx, cy, r, vx = 0) {
  const wheelRadius = r * 0.32
  carWheelAngle += vx / wheelRadius

  // Dym — rysujemy w układzie świata (ctx już ma translate)
  if (Math.random() < 0.4) spawnExhaust(cx - r * 1.18, cy + r * 0.145, vx)
  updateExhaust()
  // Rysuj dym w aktualnym kontekście (już przesuniętym)
  for (let p of exhaustParticles) {
    ctx.save()
    ctx.globalAlpha = p.life * 0.55
    ctx.fillStyle = `rgb(${p.gray},${p.gray},${p.gray})`
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill()
    ctx.restore()
  }

  ctx.save()
  ctx.translate(cx, cy)  // ctx już ma -cameraX, więc przekazujemy współrzędne świata

  // Rura wydechowa
  ctx.fillStyle = '#555'
  ctx.fillRect(-r*1.18, r*0.08, r*0.22, r*0.13)
  ctx.fillStyle = '#333'
  ctx.beginPath(); ctx.arc(-r*1.18, r*0.145, r*0.065, 0, Math.PI*2); ctx.fill()
  ctx.fillStyle = '#888'
  ctx.fillRect(-r*1.12, r*0.095, r*0.1, r*0.04)

  // Karoseria
  ctx.fillStyle = '#ee2222'; ctx.fillRect(-r, -r*0.5, r*2, r)
  ctx.fillStyle = '#cc1111'; ctx.fillRect(-r*0.5, -r, r, r*0.6)

  // Szyby
  ctx.fillStyle = '#88ccff'
  ctx.fillRect(-r*0.4, -r*0.9, r*0.35, r*0.4)
  ctx.fillRect(r*0.05, -r*0.9, r*0.35, r*0.4)

  // Reflektor
  ctx.fillStyle = '#ffff88'; ctx.fillRect(r*0.85, -r*0.15, r*0.2, r*0.2)
  ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 12
  ctx.fillStyle = 'rgba(255,255,200,0.6)'; ctx.fillRect(r*0.87, -r*0.13, r*0.14, r*0.14)
  ctx.shadowBlur = 0

  ctx.restore()

  // Koła — w układzie świata (ctx już przesunięty)
  drawWheel(cx - r*0.55, cy + r*0.5, wheelRadius, carWheelAngle)
  drawWheel(cx + r*0.55, cy + r*0.5, wheelRadius, carWheelAngle)
}

// ===== MAIN LOOP =====
function loop(time){
  if (time - lastFrame < frameDelay) { requestAnimationFrame(loop); return }
  lastFrame = time
  update()
  draw()
  requestAnimationFrame(loop)
}

requestAnimationFrame(loop)
</script>
