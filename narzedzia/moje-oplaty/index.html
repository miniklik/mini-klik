<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje opłaty — edytor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --zloto:#ff9a3d;
    --zloto-2:#ffc94d;
    --tlo:#0a0a14;
    --linia:rgba(255,154,61,0.22);
    --tekst:#e8e8ea;
    --szary:#9a93a8;
    --pilne:#ff6b6b;
    --blisko:#ffd166;
  }
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:radial-gradient(ellipse at 20% 0%,#1a0f2e 0%,#0a0a14 55%,#000 100%);
    color:var(--tekst);
    min-height:100vh;
    padding:32px 18px;
  }
  .wrap{max-width:860px;margin:0 auto}

  header{text-align:center;margin-bottom:22px}
  .ikona{font-size:46px;display:block;margin-bottom:6px;filter:drop-shadow(0 4px 12px rgba(255,154,61,0.45))}
  h1{
    font-size:32px;font-weight:700;letter-spacing:-0.5px;
    background:linear-gradient(180deg,var(--zloto-2),var(--zloto));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .podtytul{font-size:11px;color:var(--szary);letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-family:'JetBrains Mono',monospace}

  /* Pasek narzędzi admina */
  .pasek-admin{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
    margin-bottom:20px;
  }
  .pasek-admin button{
    background:rgba(40,40,55,0.7);border:1px solid var(--linia);
    color:var(--tekst);border-radius:10px;padding:10px 16px;
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
    cursor:pointer;transition:all .2s;letter-spacing:0.5px;
  }
  .pasek-admin button:hover{border-color:var(--zloto);color:var(--zloto-2);transform:translateY(-2px)}
  .pasek-admin .btn-html{background:linear-gradient(180deg,var(--zloto-2),var(--zloto));color:#241400;border:none}
  .pasek-admin .btn-html:hover{box-shadow:0 8px 20px rgba(255,154,61,0.35);color:#241400}

  .panel{
    background:linear-gradient(180deg,rgba(40,40,55,0.55),rgba(20,20,30,0.8));
    border:1px solid var(--linia);
    border-radius:18px;
    padding:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 18px 50px rgba(0,0,0,0.4);
  }

  table{width:100%;border-collapse:collapse}
  thead th{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--zloto);text-align:left;
    padding:0 10px 12px;border-bottom:1px solid var(--linia);
  }
  tbody td{
    padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.06);
    font-size:14px;vertical-align:middle;
  }
  tbody tr:hover{background:rgba(255,154,61,0.05)}
  .nazwa-cell{font-weight:600}
  .kwota-cell{font-family:'JetBrains Mono',monospace;color:var(--zloto-2);white-space:nowrap}
  .notatka-cell{color:var(--szary);font-size:12.5px}
  .termin-cell{white-space:nowrap}

  .badge{
    display:inline-block;padding:2px 8px;border-radius:20px;
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
    margin-left:6px;letter-spacing:0.5px;
  }
  .badge.pilne{background:rgba(255,107,107,0.18);color:var(--pilne);border:1px solid rgba(255,107,107,0.4)}
  .badge.blisko{background:rgba(255,209,102,0.15);color:var(--blisko);border:1px solid rgba(255,209,102,0.4)}
  .badge.ok{background:rgba(120,200,120,0.12);color:#7ec87e;border:1px solid rgba(120,200,120,0.35)}

  .btn-usun{
    background:transparent;border:1px solid rgba(255,107,107,0.3);
    color:var(--pilne);border-radius:8px;padding:5px 10px;cursor:pointer;
    font-size:13px;transition:all .2s;
  }
  .btn-usun:hover{background:rgba(255,107,107,0.15);border-color:var(--pilne)}

  .dodaj-rzad{
    display:grid;grid-template-columns:1.3fr 1fr 0.8fr 1.4fr auto;gap:10px;
    margin-top:18px;padding-top:18px;border-top:1px dashed var(--linia);
    align-items:center;
  }
  .dodaj-rzad input{
    background:rgba(10,7,18,0.7);border:1px solid var(--linia);border-radius:9px;
    padding:10px 12px;color:var(--tekst);font-family:'Space Grotesk',sans-serif;font-size:13px;
    width:100%;
  }
  .dodaj-rzad input:focus{outline:none;border-color:var(--zloto);box-shadow:0 0 0 3px rgba(255,154,61,0.12)}
  .btn-dodaj{
    background:linear-gradient(180deg,var(--zloto-2),var(--zloto));color:#241400;
    border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:13px;
    cursor:pointer;white-space:nowrap;transition:transform .15s,box-shadow .2s;
  }
  .btn-dodaj:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,154,61,0.35)}

  .legenda{
    margin-top:18px;font-size:11px;color:var(--szary);
    font-family:'JetBrains Mono',monospace;text-align:center;line-height:1.8;
  }
  .legenda b{color:var(--zloto-2)}

  @media(max-width:640px){
    .dodaj-rzad{grid-template-columns:1fr 1fr;gap:8px}
    .btn-dodaj{grid-column:1 / -1}
    thead{display:none}
    table,tbody,tr,td{display:block;width:100%}
    tbody tr{
      background:rgba(255,154,61,0.04);border:1px solid var(--linia);
      border-radius:12px;margin-bottom:12px;padding:6px 10px;
    }
    tbody td{border:none;padding:6px 4px;display:flex;justify-content:space-between;gap:12px}
    tbody td::before{
      content:attr(data-label);font-family:'JetBrains Mono',monospace;
      font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--zloto);
      align-self:center;
    }
    .notatka-cell,.kwota-cell{text-align:right}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="ikona">🚗</span>
      <h1 id="tytul">Moje opłaty</h1>
      <div class="podtytul">przeglądy · ubezpieczenia · opłaty</div>
    </header>

    <div class="pasek-admin">
      <button id="btnZapisz">💾 Zapisz JSON</button>
      <button id="btnWczytaj">📂 Wczytaj JSON</button>
      <button class="btn-html" id="btnHtml">⬇ Wygeneruj HTML</button>
    </div>
    <input type="file" id="plikJson" accept=".json,application/json" style="display:none">

    <div class="panel">
      <table>
        <thead>
          <tr><th>Co</th><th>Termin</th><th>Kwota</th><th>Notatka</th><th></th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div class="dodaj-rzad">
        <input type="text" id="iNazwa" placeholder="np. OC / Przegląd">
        <input type="date" id="iTermin">
        <input type="text" id="iKwota" placeholder="np. 600 zł">
        <input type="text" id="iNotatka" placeholder="np. PZU, raty">
        <button class="btn-dodaj" id="btnDodaj">+ Dodaj</button>
      </div>

      <div class="legenda">
        Znaczniki przy terminie: <b style="color:#ff6b6b">●</b> mniej niż 14 dni &nbsp;·&nbsp;
        <b style="color:#ffd166">●</b> mniej niż 30 dni &nbsp;·&nbsp;
        <b style="color:#7ec87e">●</b> w porządku
      </div>
    </div>
  </div>

<script>
  // ===== DANE =====
  let wiersze = [
    { nazwa:'OC / AC',         termin:dataZa(9),  kwota:'620 zł',  notatka:'PZU, 1 rata' },
    { nazwa:'Przegląd techn.', termin:dataZa(22), kwota:'120 zł',  notatka:'Stacja przy rynku' },
    { nazwa:'Wymiana oleju',   termin:dataZa(85), kwota:'~280 zł', notatka:'co 10 tys. km' },
  ];

  function dataZa(dni){ const d=new Date(); d.setDate(d.getDate()+dni); return d.toISOString().slice(0,10); }

  // ===== FUNKCJE WSPÓLNE (te same trafią do wygenerowanego HTML) =====
  function formatData(iso){ if(!iso) return '—'; const [r,m,dz]=iso.split('-'); return dz+'.'+m+'.'+r; }
  function dniDo(iso){
    if(!iso) return null;
    const dzis=new Date(); dzis.setHours(0,0,0,0);
    const cel=new Date(iso); cel.setHours(0,0,0,0);
    return Math.round((cel-dzis)/86400000);
  }
  function badgeTerminu(iso){
    const d=dniDo(iso);
    if(d===null) return '';
    if(d<0)   return '<span class="badge pilne">minęło</span>';
    if(d<=14) return '<span class="badge pilne">za '+d+' dni</span>';
    if(d<=30) return '<span class="badge blisko">za '+d+' dni</span>';
    return '<span class="badge ok">za '+d+' dni</span>';
  }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ===== RENDER (admin) =====
  function render(){
    const tb=document.getElementById('tbody');
    tb.innerHTML='';
    if(!wiersze.length){
      tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--szary);padding:24px">Brak wpisów. Dodaj pierwszy poniżej.</td></tr>';
      return;
    }
    wiersze.forEach((w,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML=
        '<td data-label="Co" class="nazwa-cell">'+esc(w.nazwa)+'</td>'+
        '<td data-label="Termin" class="termin-cell">'+formatData(w.termin)+badgeTerminu(w.termin)+'</td>'+
        '<td data-label="Kwota" class="kwota-cell">'+esc(w.kwota||'—')+'</td>'+
        '<td data-label="Notatka" class="notatka-cell">'+esc(w.notatka||'—')+'</td>'+
        '<td><button class="btn-usun" onclick="usun('+i+')">✕</button></td>';
      tb.appendChild(tr);
    });
  }
  window.usun=function(i){ wiersze.splice(i,1); render(); };

  document.getElementById('btnDodaj').onclick=function(){
    const nazwa=document.getElementById('iNazwa').value.trim();
    if(!nazwa){ document.getElementById('iNazwa').focus(); return; }
    wiersze.push({
      nazwa,
      termin:document.getElementById('iTermin').value,
      kwota:document.getElementById('iKwota').value.trim(),
      notatka:document.getElementById('iNotatka').value.trim()
    });
    ['iNazwa','iTermin','iKwota','iNotatka'].forEach(id=>document.getElementById(id).value='');
    render();
  };

  // ===== ZAPISZ JSON =====
  document.getElementById('btnZapisz').onclick=function(){
    const dane={ tytul:document.getElementById('tytul').textContent, wiersze };
    const blob=new Blob([JSON.stringify(dane,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='moje-oplaty.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // ===== WCZYTAJ JSON =====
  document.getElementById('btnWczytaj').onclick=function(){ document.getElementById('plikJson').click(); };
  document.getElementById('plikJson').onchange=function(e){
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=function(){
      try{
        const dane=JSON.parse(r.result);
        if(Array.isArray(dane.wiersze)) wiersze=dane.wiersze;
        else if(Array.isArray(dane)) wiersze=dane;
        if(dane.tytul) document.getElementById('tytul').textContent=dane.tytul;
        render();
      }catch(err){ alert('Nie udało się wczytać pliku — czy to na pewno JSON z tego edytora?'); }
    };
    r.readAsText(f);
    e.target.value='';
  };

  // ===== WYGENERUJ HTML (czysty, bez narzędzi admina) =====
  document.getElementById('btnHtml').onclick=function(){
    const tytul=document.getElementById('tytul').textContent;
    const html=zbudujHtml(tytul, wiersze);
    const blob=new Blob([html],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='index.html';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  function zbudujHtml(tytul, dane){
    // Style identyczne jak w edytorze, ale BEZ paska admina, formularza i przycisków ✕.
    const styl = document.querySelector('style').textContent;
    const wierszeJson = JSON.stringify(dane);
    return `<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(tytul)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>${styl}</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="ikona">🚗</span>
      <h1>${esc(tytul)}</h1>
      <div class="podtytul">przeglądy · ubezpieczenia · opłaty</div>
    </header>
    <div class="panel">
      <table>
        <thead>
          <tr><th>Co</th><th>Termin</th><th>Kwota</th><th>Notatka</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="legenda">
        Znaczniki przy terminie: <b style="color:#ff6b6b">&#9679;</b> mniej niż 14 dni &nbsp;·&nbsp;
        <b style="color:#ffd166">&#9679;</b> mniej niż 30 dni &nbsp;·&nbsp;
        <b style="color:#7ec87e">&#9679;</b> w porządku
      </div>
    </div>
  </div>
<script>
  var wiersze = ${wierszeJson};
  function formatData(iso){ if(!iso) return '\\u2014'; var p=iso.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
  function dniDo(iso){
    if(!iso) return null;
    var dzis=new Date(); dzis.setHours(0,0,0,0);
    var cel=new Date(iso); cel.setHours(0,0,0,0);
    return Math.round((cel-dzis)/86400000);
  }
  function badgeTerminu(iso){
    var d=dniDo(iso);
    if(d===null) return '';
    if(d<0)   return '<span class="badge pilne">min&#281;&#322;o</span>';
    if(d<=14) return '<span class="badge pilne">za '+d+' dni</span>';
    if(d<=30) return '<span class="badge blisko">za '+d+' dni</span>';
    return '<span class="badge ok">za '+d+' dni</span>';
  }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function render(){
    var tb=document.getElementById('tbody'); tb.innerHTML='';
    wiersze.forEach(function(w){
      var tr=document.createElement('tr');
      tr.innerHTML=
        '<td data-label="Co" class="nazwa-cell">'+esc(w.nazwa)+'</td>'+
        '<td data-label="Termin" class="termin-cell">'+formatData(w.termin)+badgeTerminu(w.termin)+'</td>'+
        '<td data-label="Kwota" class="kwota-cell">'+esc(w.kwota||'\\u2014')+'</td>'+
        '<td data-label="Notatka" class="notatka-cell">'+esc(w.notatka||'\\u2014')+'</td>';
      tb.appendChild(tr);
    });
  }
  render();
<\/script>
</body>
</html>`;
  }

  render();
</script>
</body>
</html>
