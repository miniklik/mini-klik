<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>✝️ Szczęść Boże 🕊️</title>
<style>
  :root {
    --bg: #fef4d1;
    --bg-soft: #fff4d1;
    --bg-green: #c4e7c2;
    --note-bg: #c4e7c2;
    --red: #f06d6d;
    --red-strong: #fb6262;
    --day-btn: #e1e1e1;
    --day-text: #2e7d32;
    --feast: #7a1533;
    --saints: #447766;
    --names: #885544;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: #222;
  }
  body {
    display: flex;
    justify-content: center;
    padding: 8px;
  }
  .app {
    width: 360px;
    background: var(--bg);
    padding: 4px;
  }
  .frame {
    border: 2px groove #b0a070;
    border-radius: 4px;
    padding: 8px;
    margin: 4px 0;
    background: var(--bg);
  }
  .frame-label {
    border: 2px solid #b0a070;
    border-radius: 4px;
    margin: 4px 0;
    background: var(--bg);
    position: relative;
    padding: 14px 8px 8px;
  }
  .frame-label > legend {
    position: absolute;
    top: -10px;
    left: 12px;
    background: var(--bg);
    padding: 0 6px;
    font-style: italic;
    font-size: 11px;
  }
  /* Nagłówek kalendarza */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 4px;
  }
  .cal-header button {
    width: 26px; height: 26px;
    border: 1px solid #888;
    background: #ddd;
    cursor: pointer;
    font-size: 12px;
    border-radius: 3px;
  }
  .cal-header button:hover { background: #ccc; }
  .miesiac-nazwa {
    font-weight: bold;
    font-size: 13px;
    min-width: 80px;
    text-align: center;
  }
  .rok-input {
    width: 50px;
    text-align: center;
    font-weight: bold;
    font-size: 12px;
    padding: 2px;
    border: 1px solid #888;
    border-radius: 3px;
  }
  /* Siatka kalendarza */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-grid .dow {
    text-align: center;
    font-weight: bold;
    font-size: 11px;
    padding: 3px 0;
    background: var(--bg);
  }
  .cal-grid .dow.nd { background: var(--red-strong); color: #fff; border-radius: 3px; }
  .cal-grid .day-btn {
    text-align: center;
    padding: 4px 0;
    border: 1px solid #888;
    background: var(--day-btn);
    cursor: pointer;
    border-radius: 3px;
    font-size: 12px;
    user-select: none;
    min-height: 26px;
  }
  .cal-grid .day-btn.holiday { background: var(--red); }
  .cal-grid .day-btn.selected { box-shadow: inset 0 0 0 2px #333; font-weight: bold; }
  .cal-grid .day-btn:hover { filter: brightness(0.95); }
  .cal-grid .empty { background: transparent; }
  /* Etykiety pod kalendarzem */
  .label-dzien-tyg {
    color: var(--day-text);
    font-size: 14px;
    font-style: italic;
    text-align: center;
    padding: 4px 0;
  }
  .label-feast {
    color: var(--feast);
    font-size: 13px;
    font-style: italic;
    text-align: center;
    white-space: pre-line;
    padding: 2px 0;
  }
  .label-saints {
    color: var(--saints);
    font-size: 11px;
    font-style: italic;
    text-align: center;
    padding: 4px 0;
  }
  .label-imieniny {
    color: var(--names);
    font-size: 11px;
    text-align: center;
    padding: 4px;
  }
  /* Przyciski w rzędzie */
  .button-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .button-row button {
    padding: 4px 8px;
    border: 1px solid #888;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    background: #eee;
  }
  .btn-today {
    background: #558b2f !important;
    color: #fff !important;
    font-weight: bold;
  }
  .btn-pink { background: #ffdada !important; }
  .btn-yellow { background: #ffe08a !important; }
  .btn-green { background: #03e857 !important; }
  /* Pole notatek */
  .pole-notatki {
    width: 100%;
    height: 110px;
    background: var(--note-bg);
    border: 1px solid #888;
    border-radius: 3px;
    padding: 6px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    resize: vertical;
    outline: none;
  }
  .pole-notatki.readonly {
    background: var(--note-bg);
    cursor: pointer;
  }
  .link-line {
    color: blue;
    text-decoration: underline;
    cursor: pointer;
    display: block;
    padding: 1px 0;
  }
  .link-line:hover { background: rgba(0,0,255,0.06); }
  /* Modale */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-bg.hidden { display: none; }
  .modal {
    background: var(--bg-soft);
    border: 2px solid #888;
    border-radius: 6px;
    padding: 14px;
    max-width: 360px;
    width: calc(100vw - 24px);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .modal h3 {
    margin: 0 0 8px;
    font-size: 14px;
    text-align: center;
  }
  .modal p { font-size: 12px; margin: 6px 0; white-space: pre-wrap; }
  .modal input[type=text], .modal textarea {
    width: 100%;
    padding: 4px;
    font-family: inherit;
    font-size: 12px;
    border: 1px solid #888;
    border-radius: 3px;
    margin: 4px 0;
  }
  .modal-buttons {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .modal-buttons button {
    padding: 4px 12px;
    border: 1px solid #888;
    border-radius: 3px;
    cursor: pointer;
    background: #eee;
    font-size: 12px;
  }
  /* Widok pamiętnika */
  .pamietnik-view {
    display: none;
    background: var(--note-bg);
    border: 2px solid #888;
    border-radius: 4px;
    padding: 10px;
  }
  .pamietnik-view.active { display: block; }
  .pamietnik-view h3 {
    margin: 0 0 8px;
    font-size: 12px;
    font-style: italic;
  }
  .pamietnik-pole {
    width: 100%;
    height: 360px;
    background: var(--bg-soft);
    border: 1px solid #888;
    padding: 6px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
  }
  .pamietnik-list-item {
    color: blue;
    text-decoration: underline;
    cursor: pointer;
    padding: 2px 0;
    display: block;
  }
  .pamietnik-list-item:hover { background: rgba(0,0,255,0.08); }
  .pamietnik-buttons {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .pamietnik-buttons button {
    padding: 4px 10px;
    font-size: 11px;
    border: 1px solid #888;
    border-radius: 3px;
    cursor: pointer;
  }
  .pin-mark { font-size: 9px; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- WIDOK GŁÓWNY -->
  <div id="main-view">

    <fieldset class="frame-label">
      <legend>Kalendarz katolicki - notatnik</legend>

      <div class="cal-header">
        <button id="btn-prev">◀</button>
        <span class="miesiac-nazwa" id="miesiac-nazwa"></span>
        <input type="text" class="rok-input" id="rok-input" maxlength="4">
        <button id="btn-next">▶</button>
      </div>

      <div class="cal-grid" id="cal-grid"></div>
    </fieldset>

    <div class="frame">
      <div class="label-dzien-tyg" id="label-dzien-tyg"></div>
    </div>

    <div class="label-feast" id="label-feast"></div>
    <div class="label-saints" id="label-saints"></div>

    <div class="frame">
      <div class="label-imieniny" id="label-imieniny"></div>
    </div>

    <div class="frame button-row">
      <button id="btn-linki">Ważne strony</button>
      <button id="btn-today" class="btn-today">✖</button>
      <button id="btn-swieci">Święci z dnia</button>
    </div>

    <textarea class="pole-notatki" id="pole-notatki" placeholder="Wpisz notatkę dla tego dnia..."></textarea>
    <div id="pole-notatki-display" style="display:none"></div>

    <div class="button-row" style="margin-top:6px">
      <button id="btn-zapisz" class="btn-pink">Zapisz</button>
      <button id="btn-zapisz-rok" class="btn-pink">Co rok</button>
      <button id="btn-usun" class="btn-pink">Usuń</button>
      <button id="btn-mysl" class="btn-yellow">Myśl dnia</button>
      <button id="btn-pisac" class="btn-green">Pisać</button>
      <button id="btn-info" class="btn-green">i</button>
    </div>
  </div>

  <!-- WIDOK PAMIĘTNIKA -->
  <div id="pamietnik-view" class="pamietnik-view">
    <h3>🖊️ Notatki - modlitwy - pamiętnik</h3>
    <textarea class="pamietnik-pole" id="pamietnik-pole"></textarea>
    <div class="pamietnik-buttons">
      <button id="pa-lista" style="background:#d2f0ff">Lista</button>
      <button id="pa-nowa" style="background:#ffe4a1">Nowa</button>
      <button id="pa-zapisz" style="background:#c1f0c1">Zapisz</button>
      <button id="pa-usun" style="background:#f0c1c1">🗑 Usuń</button>
      <button id="pa-szukaj" style="background:#e0e0ff">🔍 Szukaj</button>
      <button id="pa-zamknij" style="background:#ffd580">Zamknij</button>
    </div>
  </div>

</div>

<!-- MODAL: alert/info -->
<div class="modal-bg hidden" id="modal-alert">
  <div class="modal">
    <h3 id="modal-alert-title">Informacja</h3>
    <p id="modal-alert-text"></p>
    <div class="modal-buttons">
      <button id="modal-alert-ok">OK</button>
    </div>
  </div>
</div>

<!-- MODAL: prompt -->
<div class="modal-bg hidden" id="modal-prompt">
  <div class="modal">
    <h3 id="modal-prompt-title">Wprowadź wartość</h3>
    <p id="modal-prompt-text"></p>
    <input type="text" id="modal-prompt-input">
    <div class="modal-buttons">
      <button id="modal-prompt-cancel">Anuluj</button>
      <button id="modal-prompt-ok">OK</button>
    </div>
  </div>
</div>

<!-- MODAL: confirm -->
<div class="modal-bg hidden" id="modal-confirm">
  <div class="modal">
    <h3 id="modal-confirm-title">Potwierdź</h3>
    <p id="modal-confirm-text"></p>
    <div class="modal-buttons">
      <button id="modal-confirm-cancel">Anuluj</button>
      <button id="modal-confirm-ok">OK</button>
    </div>
  </div>
</div>

// ===========================================================================
// 3. Praca z datami – pomocnicze
// ===========================================================================
function ymd(d) {
  return d.getFullYear() + "-" +
         String(d.getMonth()+1).padStart(2,"0") + "-" +
         String(d.getDate()).padStart(2,"0");
}
function md(d) { return (d.getMonth()+1) + "-" + d.getDate(); }
function ymdRok(d) { return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate(); }
// poniedziałek = 0, niedziela = 6 (jak w Pythonie)
function weekdayPL(d) {
  return (d.getDay() + 6) % 7;
}
function makeDate(y, m, d) { return new Date(y, m-1, d); }
function addDays(d, n) {
  const r = new Date(d.getTime());
  r.setDate(r.getDate() + n);
  return r;
}
function dateEq(a, b) {
  return a.getFullYear()===b.getFullYear() &&
         a.getMonth()===b.getMonth() &&
         a.getDate()===b.getDate();
}
function daysInMonth(y, m) {
  return new Date(y, m, 0).getDate();
}
function romanNumeral(n) {
  const vals = [
    [1000,"M"],[900,"CM"],[500,"D"],[400,"CD"],
    [100,"C"],[90,"XC"],[50,"L"],[40,"XL"],
    [10,"X"],[9,"IX"],[5,"V"],[4,"IV"],[1,"I"]
  ];
  let res = "";
  for (const [v, sym] of vals) {
    while (n >= v) { res += sym; n -= v; }
  }
  return res;
}

// 4. Święta ruchome (algorytm Gaussa) i okresy liturgiczne
// ===========================================================================
function getSwietaRuchome(rok) {
  // Algorytm Gaussa
  const a = rok % 19;
  const b = Math.floor(rok / 100);
  const c = rok % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const p = (h + l - 7 * m + 114) % 31;
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = p + 1;

  const wielkanoc = makeDate(rok, month, day);

  return {
    "Wielkanoc": wielkanoc,
    "Poniedziałek Wielkanocny": addDays(wielkanoc, 1),
    "Wtorek Wielkanocny":      addDays(wielkanoc, 2),
    "Środa Wielkanocna":       addDays(wielkanoc, 3),
    "Czwartek Wielkanocny":    addDays(wielkanoc, 4),
    "Piątek Wielkanocny":      addDays(wielkanoc, 5),
    "Sobota Wielkanocna":      addDays(wielkanoc, 6),
    "Niedziela Palmowa":       addDays(wielkanoc, -7),
    "Poniedziałek Wielkiego Tygodnia": addDays(wielkanoc, -6),
    "Wtorek Wielkiego Tygodnia":       addDays(wielkanoc, -5),
    "Środa Wielkiego Tygodnia":        addDays(wielkanoc, -4),
    "Wielki Czwartek":         addDays(wielkanoc, -3),
    "Wielki Piątek":           addDays(wielkanoc, -2),
    "Wielka Sobota":           addDays(wielkanoc, -1),
    "Popielec":                addDays(wielkanoc, -46),
    "Tłusty czwartek":         addDays(wielkanoc, -52),
    "Zesłanie Ducha Świętego": addDays(wielkanoc, 49),
    "Najśw. Maryi Panny Matki Kościoła": addDays(wielkanoc, 50),
    "Jezusa Chr. Najw. i Wiecz. Kapłana": addDays(wielkanoc, 53),
    "Boże Ciało":              addDays(wielkanoc, 60),
    "Oktawa Bożego Ciała":     addDays(wielkanoc, 67),
    "Najśw. Serca Pana Jezusa":addDays(wielkanoc, 68),
    "Niepokalanego Serca Maryi": addDays(wielkanoc, 69),
    "Niedziela Miłosierdzia":  addDays(wielkanoc, 7),
    "II Niedziela Wielkanocna":addDays(wielkanoc, 7),
    "Wniebowstąpienie":        addDays(wielkanoc, 42),
    "Niedziela Dobrego Pasterza": addDays(wielkanoc, 21),
    "Trójca Przenajświętsza":  addDays(wielkanoc, 56),
  };
}

// Cache świąt ruchomych
const _cacheSwietaRuchome = {};
function getSwietaRuchomeCached(rok) {
  if (!(rok in _cacheSwietaRuchome)) {
    _cacheSwietaRuchome[rok] = getSwietaRuchome(rok);
  }
  return _cacheSwietaRuchome[rok];
}

function getPoczatekAdwentu(rok) {
  const bn = makeDate(rok, 12, 25);
  return addDays(bn, -(weekdayPL(bn) + 22));
}
function getNiedzielaChrystusaKrola(rok) {
  return addDays(getPoczatekAdwentu(rok), -7);
}
function getNiedzielaSwRodziny(rok) {
  const bn = makeDate(rok, 12, 25);
  for (let i = 0; i < 7; i++) {
    const d = addDays(bn, i);
    if (weekdayPL(d) === 6) return d;
  }
  return null;
}
function getNiedzielaChrztuPanskiego(rok) {
  const obj = makeDate(rok, 1, 6);
  for (let i = 1; i <= 7; i++) {
    const d = addDays(obj, i);
    if (weekdayPL(d) === 6) return d;
  }
  return null;
}
function getNiedzielaTrojcy(rok, swieta) {
  return addDays(swieta["Zesłanie Ducha Świętego"], 7);
}

function getOkresLiturgiczny(data, swieta) {
  const rok = data.getFullYear();
  const wigilia = makeDate(rok, 12, 24);
  const popielec = swieta["Popielec"];
  const wielkiCzw = swieta["Wielki Czwartek"];
  const wielkanoc = swieta["Wielkanoc"];
  const zeslanie = swieta["Zesłanie Ducha Świętego"];
  const adwent = getPoczatekAdwentu(rok);
  const chrzestNd = getNiedzielaChrztuPanskiego(rok);

  if (data >= adwent && data < wigilia) return "Adwent";
  if (data >= wigilia && data <= chrzestNd) return "Okres Bożego Narodzenia";
  if (data > chrzestNd && data < popielec) return "Okres zwykły (I część)";
  if (data >= popielec && data < wielkiCzw) return "Wielki Post";
  if (data >= wielkiCzw && data < wielkanoc) return "Triduum Paschalne";
  if (data >= wielkanoc && data <= zeslanie) return "Okres Wielkanocny";
  if (data > zeslanie && data < adwent) return "Okres zwykły (II część)";
  return "";
}

function getNiedzieleZwykleZPoczatkiem(rok, swieta) {
  const chrzest = getNiedzielaChrztuPanskiego(rok);
  const popielec = swieta["Popielec"];
  const result = [];
  for (let i = 0; i < 8; i++) {
    const n = addDays(chrzest, i * 7);
    if (n < popielec) {
      const opis = (i === 0)
        ? "Niedziela Chrztu Pańskiego\n(I Niedziela zwykła)"
        : `${i + 1} Niedziela zwykła`;
      result.push([n, opis]);
    }
  }
  return result;
}

function getNiedzieleZwykleAfterZeslanie(rok, swieta) {
  const zeslanie = swieta["Zesłanie Ducha Świętego"];
  const trojca = swieta["Trójca Przenajświętsza"];
  const adwent = getPoczatekAdwentu(rok);

  let data = addDays(adwent, -1);
  while (weekdayPL(data) !== 6) data = addDays(data, -1);

  let numer = 34;
  const wynik = [];
  while (data > zeslanie) {
    if (!dateEq(data, trojca)) {
      wynik.push([new Date(data), `${numer} Niedziela zwykła`]);
      numer--;
    }
    data = addDays(data, -7);
  }
  wynik.sort((a, b) => a[0] - b[0]);
  return wynik;
}

function getNiedzielaLiturgiczna(data, swieta) {
  const rok = data.getFullYear();

  // II Niedziela Bożego Narodzenia
  if (data.getMonth() === 0 && data.getDate() >= 2 && data.getDate() <= 5
      && weekdayPL(data) === 6) {
    return "II Niedziela Bożego Narodzenia";
  }
  if (dateEq(data, getNiedzielaChrystusaKrola(rok))) return "Urocz. Chrystusa, Króla Wszechświata";
  if (dateEq(data, getNiedzielaSwRodziny(rok)))      return "Niedziela Świętej Rodziny";
  if (dateEq(data, getNiedzielaChrztuPanskiego(rok))) return "Niedziela Chrztu Pańskiego";

  for (const [d, opis] of getNiedzieleZwykleZPoczatkiem(rok, swieta)) {
    if (dateEq(data, d)) return opis;
  }
  for (const [d, opis] of getNiedzieleZwykleAfterZeslanie(rok, swieta)) {
    if (dateEq(data, d)) return opis;
  }
  if (dateEq(data, getNiedzielaTrojcy(rok, swieta))) return "Uroczystość Najświętszej Trójcy";
  if (dateEq(data, swieta["Niedziela Palmowa"])) return "Niedziela Palmowa";
  if (dateEq(data, swieta["Wielkanoc"])) return "Niedziela Zmartwychwstania Pańskiego";
  if (dateEq(data, swieta["Niedziela Miłosierdzia"])) return "Niedziela Miłosierdzia Bożego";
  if (dateEq(data, swieta["Wniebowstąpienie"])) return "Urocz. Wniebowstąpienia Pańskiego\n(VII Niedziela Wielkanocna)";
  if (dateEq(data, swieta["Zesłanie Ducha Świętego"])) return "Zesłanie Ducha Świętego";

  if (weekdayPL(data) !== 6) return null;

  const okres = getOkresLiturgiczny(data, swieta);
  const adwent = getPoczatekAdwentu(rok);
  const popielec = swieta["Popielec"];
  const wielkanoc = swieta["Wielkanoc"];
  const zeslanie = swieta["Zesłanie Ducha Świętego"];
  const chrzestNd = getNiedzielaChrztuPanskiego(rok);

  if (okres === "Adwent") {
    const n = Math.floor((data - adwent) / 86400000 / 7) + 1;
    return romanNumeral(n) + " Niedziela Adwentu";
  }
  if (okres === "Wielki Post") {
    const n = Math.floor((data - popielec) / 86400000 / 7) + 1;
    return romanNumeral(n) + " Niedziela Wielkiego Postu";
  }
  if (okres === "Okres Wielkanocny") {
    const n = Math.floor((data - wielkanoc) / 86400000 / 7) + 1;
    return romanNumeral(n) + " Niedziela Wielkanocna";
  }
  if (okres.startsWith("Okres zwykły")) {
    if (data > chrzestNd && data < popielec) {
      const n = Math.floor((data - chrzestNd) / 86400000 / 7) + 1;
      return romanNumeral(n) + " Niedziela zwykła";
    }
    if (data > zeslanie && data < adwent) {
      const przedPopielcem = [];
      let t = addDays(chrzestNd, 1);
      while (t < popielec) {
        if (weekdayPL(t) === 6) przedPopielcem.push(new Date(t));
        t = addDays(t, 1);
      }
      const start = przedPopielcem.length + 1;
      const n = Math.floor((data - zeslanie) / 86400000 / 7) + start;
      return romanNumeral(n) + " Niedziela zwykła";
    }
  }
  return null;
}

function showAlert(text, title) {
  return new Promise(res => {
    document.getElementById("modal-alert-title").textContent = title || "Informacja";
    document.getElementById("modal-alert-text").textContent = text;
    const bg = document.getElementById("modal-alert");
    bg.classList.remove("hidden");
    document.getElementById("modal-alert-ok").onclick = () => {
      bg.classList.add("hidden");
      res();
    };
  });
}
function showPrompt(text, title, defaultVal) {
  return new Promise(res => {
    document.getElementById("modal-prompt-title").textContent = title || "Wprowadź wartość";
    document.getElementById("modal-prompt-text").textContent = text;
    const input = document.getElementById("modal-prompt-input");
    input.value = defaultVal || "";
    const bg = document.getElementById("modal-prompt");
    bg.classList.remove("hidden");
    setTimeout(() => input.focus(), 50);

    const ok = () => { bg.classList.add("hidden"); res(input.value); };
    const cancel = () => { bg.classList.add("hidden"); res(null); };
    document.getElementById("modal-prompt-ok").onclick = ok;
    document.getElementById("modal-prompt-cancel").onclick = cancel;
    input.onkeydown = (e) => {
      if (e.key === "Enter") ok();
      if (e.key === "Escape") cancel();
    };
  });
}
function showConfirm(text, title) {
  return new Promise(res => {
    document.getElementById("modal-confirm-title").textContent = title || "Potwierdź";
    document.getElementById("modal-confirm-text").textContent = text;
    const bg = document.getElementById("modal-confirm");
    bg.classList.remove("hidden");
    document.getElementById("modal-confirm-ok").onclick = () => { bg.classList.add("hidden"); res(true); };
    document.getElementById("modal-confirm-cancel").onclick = () => { bg.classList.add("hidden"); res(false); };
  });
}

// 6. Stan aplikacji + renderowanie kalendarza
// ===========================================================================
const state = {
  rok: new Date().getFullYear(),
  miesiac: new Date().getMonth() + 1,
  selected: new Date(),
  // Tryb pola notatek: "edit" (textarea, edycja notatki) lub "display" (klikalne linki / tekst readonly)
  poleMode: "edit",
};

function renderKalendarz() {
  document.getElementById("miesiac-nazwa").textContent = NAZWY_MIESIECY[state.miesiac - 1];
  document.getElementById("rok-input").value = state.rok;

  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  // Nagłówki dni tygodnia
  const dows = ["Pn","Wt","Śr","Cz","Pt","So","Nd"];
  dows.forEach((d, i) => {
    const cell = document.createElement("div");
    cell.className = "dow" + (i === 6 ? " nd" : "");
    cell.textContent = d;
    grid.appendChild(cell);
  });

  const pierwszy = makeDate(state.rok, state.miesiac, 1);
  const przesuniecie = weekdayPL(pierwszy);
  const dni = daysInMonth(state.rok, state.miesiac);
  const swieta = getSwietaRuchomeCached(state.rok);
  const swietaWolneRuchome = new Set(
    Object.entries(swieta)
      .filter(([n,_]) => SWIETA_WOLNE_RUCHOME.includes(n))
      .map(([_,d]) => md(d))
  );

  // Puste komórki przed 1. dniem
  for (let i = 0; i < przesuniecie; i++) {
    const c = document.createElement("div");
    c.className = "empty";
    grid.appendChild(c);
  }

  for (let d = 1; d <= dni; d++) {
    const data = makeDate(state.rok, state.miesiac, d);
    const btn = document.createElement("div");
    btn.className = "day-btn";
    const isSunday = weekdayPL(data) === 6;
    const isWolne = SWIETA_WOLNE.includes(md(data)) || swietaWolneRuchome.has(md(data));
    if (isSunday || isWolne) btn.classList.add("holiday");
    if (dateEq(data, state.selected)) btn.classList.add("selected");

    const klucz = ymd(data);
    const hasNote = NOTATKI[klucz] && NOTATKI[klucz].trim() !== "";
    btn.innerHTML = (hasNote ? '<span class="pin-mark">📌</span> ' : '') + d;

    btn.onclick = () => ustawDzien(data);
    grid.appendChild(btn);
  }
}

function ustawDzien(data) {
  state.selected = new Date(data.getFullYear(), data.getMonth(), data.getDate());
  // Jeśli wybrany dzień jest w innym miesiącu/roku niż wyświetlany – przelicz widok
  if (data.getFullYear() !== state.rok || data.getMonth() + 1 !== state.miesiac) {
    state.rok = data.getFullYear();
    state.miesiac = data.getMonth() + 1;
  }
  renderKalendarz();
  renderInfoDnia();
  ladujNotatkeDoEdytora();
}

function renderInfoDnia() {
  const data = state.selected;
  const swieta = getSwietaRuchomeCached(data.getFullYear());

  // Etykieta: "Poniedziałek, 5 Maja"
  document.getElementById("label-dzien-tyg").textContent =
    `${NAZWY_DNI[weekdayPL(data)]}, ${data.getDate()} ${NAZWY_MIESIECY[data.getMonth()]}`;

  // święta typu (z wyjątkami rocznymi)
  const swietoTyp = SWIETA_TYP_ROK[ymdRok(data)] || SWIETA_TYP[md(data)] || "";
  const swietoNietyp = SWIETA_NIETYPOWE[md(data)] || "";

  // mapa: (m-d) -> nazwa święta ruchomego
  const swietaRuchomeInv = {};
  for (const [name, d] of Object.entries(swieta)) {
    swietaRuchomeInv[md(d)] = name;
  }

  const niedzielaTxt = (weekdayPL(data) === 6) ? getNiedzielaLiturgiczna(data, swieta) : null;
  const isWolne = SWIETA_WOLNE.includes(md(data)) ||
                  Object.entries(swieta).some(([n, d]) =>
                    SWIETA_WOLNE_RUCHOME.includes(n) && md(d) === md(data));

  // ---- Tekst nazwy święta dnia ----
  // Lista świąt ruchomych, które MAJĄ PIERWSZEŃSTWO nawet nad niedzielą zwykłą
  // (przeniesione 1:1 z Pythona – tam były rozbite na osobne if-y)
  const RUCHOME_PRIORYTET = [
    "Boże Ciało",
    "Najśw. Serca Pana Jezusa",
    "Najśw. Maryi Panny Matki Kościoła",
    "Jezusa Chr. Najw. i Wiecz. Kapłana",
    "Niepokalanego Serca Maryi",
    "Poniedziałek Wielkanocny", "Wtorek Wielkanocny", "Środa Wielkanocna",
    "Czwartek Wielkanocny", "Piątek Wielkanocny", "Sobota Wielkanocna",
    "Popielec", "Wielki Czwartek", "Wielki Piątek", "Wielka Sobota",
  ];

  let tekstSwieta = "";
  const ruchomeTen = swietaRuchomeInv[md(data)];

  if (ruchomeTen && RUCHOME_PRIORYTET.includes(ruchomeTen)) {
    tekstSwieta = ruchomeTen;
  } else if (niedzielaTxt) {
    let dodatek = "";
    const BLOKOWANE = ["Wniebowstąpienie","Trójca Przenajświętsza","Wielkanoc"];
    if (swietoTyp && !niedzielaTxt.includes(swietoTyp) && !BLOKOWANE.includes(swietoTyp)) {
      dodatek = `\n(${swietoTyp})`;
    } else if (ruchomeTen && !niedzielaTxt.includes(ruchomeTen) && !BLOKOWANE.includes(ruchomeTen)) {
      dodatek = `\n(${ruchomeTen})`;
    }
    tekstSwieta = niedzielaTxt + dodatek;
  } else if (isWolne) {
    tekstSwieta = swietoTyp || ruchomeTen || "Dzień świąteczny";
  } else {
    tekstSwieta = swietoTyp || ruchomeTen || "Dzień powszedni";
  }
  document.getElementById("label-feast").textContent = tekstSwieta;

  // ---- Święci z dnia ----
  const swieci = SWIECI_Z_DNIA[md(data)] || "";
  document.getElementById("label-saints").textContent = swieci;

  // ---- Imieniny + święto nietypowe ----
  const im = IMIENINY[md(data)] || "";
  let imText = "";
  if (im && swietoNietyp) imText = `${im} (${swietoNietyp})`;
  else if (im) imText = im;
  else if (swietoNietyp) imText = `(${swietoNietyp})`;
  document.getElementById("label-imieniny").textContent = imText;
}

// ===========================================================================
// 7. Pole notatek – tryb edycji + tryb wyświetlania linków
// ===========================================================================
function setPoleMode(mode) {
  state.poleMode = mode;
  const ed = document.getElementById("pole-notatki");
  const dp = document.getElementById("pole-notatki-display");
  if (mode === "edit") {
    ed.style.display = "block";
    dp.style.display = "none";
  } else {
    ed.style.display = "none";
    dp.style.display = "block";
    dp.className = "pole-notatki readonly";
  }
}

function ladujNotatkeDoEdytora() {
  setPoleMode("edit");
  const klucz = ymd(state.selected);
  document.getElementById("pole-notatki").value = NOTATKI[klucz] || "";
}

function renderLinki(linkiArr, pustyKomunikat) {
  const dp = document.getElementById("pole-notatki-display");
  dp.innerHTML = "";
  if (!linkiArr || linkiArr.length === 0) {
    dp.textContent = pustyKomunikat;
    return;
  }
  for (const [nazwa, url] of linkiArr) {
    const a = document.createElement("a");
    a.className = "link-line";
    a.textContent = "🌐 " + nazwa;
    a.href = url;
    a.target = "_blank";
    a.rel = "noopener";
    dp.appendChild(a);
  }
  setPoleMode("display");
}

// ===========================================================================
// 8. Akcje przycisków
// ===========================================================================
async function akcjaZapisz() {
  if (state.poleMode !== "edit") {
    // jeśli wyświetlamy linki/info – nic nie zapisujemy
    return;
  }
  const tekst = document.getElementById("pole-notatki").value.trim();
  const klucz = ymd(state.selected);
  if (tekst) NOTATKI[klucz] = tekst;
  else delete NOTATKI[klucz];
  zapiszNotatki(NOTATKI);
  renderKalendarz();
  await showAlert("Notatka została zapisana!", "Zapisano");
}

async function akcjaZapiszCoRok() {
  if (state.poleMode !== "edit") return;
  const tekst = document.getElementById("pole-notatki").value.trim();
  if (!tekst) {
    await showAlert("Notatka jest pusta.", "Brak treści");
    return;
  }
  const dzien = state.selected.getDate();
  const miesiac = state.selected.getMonth() + 1;
  let zapisanych = 0;
  const startRok = state.selected.getFullYear();
  for (let r = startRok; r < startRok + 99; r++) {
    // Pomiń 29 lutego w latach nieprzestępnych
    if (miesiac === 2 && dzien === 29) {
      const test = new Date(r, 1, 29);
      if (test.getMonth() !== 1) continue;
    }
    const data = makeDate(r, miesiac, dzien);
    NOTATKI[ymd(data)] = tekst;
    zapisanych++;
  }
  zapiszNotatki(NOTATKI);
  renderKalendarz();
  await showAlert(`Zapisano notatkę do ${zapisanych} lat.`, "Zapisano");
}

async function akcjaUsun() {
  const klucz = ymd(state.selected);
  if (klucz in NOTATKI) {
    delete NOTATKI[klucz];
    zapiszNotatki(NOTATKI);
  }
  ladujNotatkeDoEdytora();
  renderKalendarz();
  await showAlert("Notatka została usunięta.", "Usunięto");
}

function akcjaDzis() {
  const dzis = new Date();
  state.rok = dzis.getFullYear();
  state.miesiac = dzis.getMonth() + 1;
  ustawDzien(dzis);
}

function akcjaSwieci() {
  const klucz = md(state.selected);
  const lista = SWIECI_LINKI[klucz];
  renderLinki(lista, "Brak świętego z linkiem dla tego dnia.");
}

function akcjaLinki() {
  const linki = (LINKI_DODATKOWE.linki || []).map(w => [w.nazwa || "Link", w.link || ""]);
  renderLinki(linki, "Brak dostępnych linków.");
}

function akcjaMyslDnia() {
  setPoleMode("edit");
  if (MYSLI_DNIA && MYSLI_DNIA.length) {
    const losowa = MYSLI_DNIA[Math.floor(Math.random() * MYSLI_DNIA.length)];
    document.getElementById("pole-notatki").value = "\n" + losowa;
  } else {
    document.getElementById("pole-notatki").value = "Brak myśli duchowych do wylosowania.";
  }
}

function akcjaInfo() {
  setPoleMode("edit");
  const opis =
    "📅 Kalendarz Katolicki\n\n" +
    "• Notatnik do każdego dnia\n" +
    "• Łatwe wyszukiwanie daty\n" +
    "• Uroczystości, Święta, Święci, Imieniny\n\n" +
    "• Ważne strony (linki duchowe)\n" +
    "• Święci z dnia\n" +
    "• Myśl Dnia – losowana duchowa refleksja\n\n" +
    "• Przycisk „X” – przywracanie bieżącej daty\n" +
    "• Edytowanie plików JSON (można rozbudowywać)\n\n" +
    "Wersja webowa – notatki zapisywane w przeglądarce.\n\n" +
    "          Opracowanie: Piotr Przebiorowski\n" +
    "- A. D. 2025 - Szczęść Boże";
  document.getElementById("pole-notatki").value = opis;
}

// ===========================================================================
// 9. Pamiętnik (drugi widok)
// ===========================================================================
let pamietnikAktualnaData = null;
let pamietnikAktualnyIndeks = null;

function otworzPamietnik() {
  document.getElementById("main-view").style.display = "none";
  document.getElementById("pamietnik-view").classList.add("active");
  pokazListeNotatek();
}

function zamknijPamietnik() {
  document.getElementById("main-view").style.display = "block";
  document.getElementById("pamietnik-view").classList.remove("active");
  pamietnikAktualnaData = null;
  pamietnikAktualnyIndeks = null;
}

function pokazListeNotatek() {
  pamietnikAktualnaData = null;
  pamietnikAktualnyIndeks = null;
  const pole = document.getElementById("pamietnik-pole");
  pole.value = "";
  // Wyświetlamy listę zamiast textarea
  const items = [];
  for (const [data, wpisy] of Object.entries(PAMIETNIK)) {
    if (Array.isArray(wpisy)) {
      wpisy.forEach((w, i) => {
        items.push({ data, indeks: i, tytul: w.tytul || "Bez tytułu" });
      });
    } else if (typeof wpisy === "object" && wpisy) {
      items.push({ data, indeks: 0, tytul: wpisy.tytul || "Bez tytułu" });
    }
  }
  if (items.length === 0) {
    pole.value = "Brak zapisanych notatek.\n\nKliknij „Nowa” aby dodać notatkę,\nlub „Zamknij” aby wrócić do kalendarza.";
    return;
  }
  pole.value = "📋 Lista notatek (kliknij dwukrotnie wpis poniżej):\n\n" +
    items.map((it, idx) =>
      `[${idx + 1}] 📌 ${it.data || "(bez daty)"}: ${it.tytul}`
    ).join("\n") +
    "\n\nKliknij „Lista”, wpisz numer:";
  // Po wciśnięciu Lista ponownie – pokażmy prompt po kliknięciu pole
  pole.dataset.listItems = JSON.stringify(items);
}

async function wczytajZListy() {
  const pole = document.getElementById("pamietnik-pole");
  const items = JSON.parse(pole.dataset.listItems || "[]");
  if (!items.length) {
    await showAlert("Brak notatek do wybrania.", "Lista");
    return;
  }
  const wybor = await showPrompt("Podaj numer notatki (1–" + items.length + "):", "Wybierz notatkę");
  if (wybor === null) return;
  const n = parseInt(wybor, 10);
  if (!n || n < 1 || n > items.length) {
    await showAlert("Nieprawidłowy numer.", "Błąd");
    return;
  }
  const wybrana = items[n - 1];
  const wpisy = PAMIETNIK[wybrana.data];
  let tresc = "";
  if (Array.isArray(wpisy)) tresc = wpisy[wybrana.indeks].tresc || "";
  else if (wpisy) tresc = wpisy.tresc || "";
  pole.value = tresc;
  pole.dataset.listItems = "";
  pamietnikAktualnaData = wybrana.data;
  pamietnikAktualnyIndeks = wybrana.indeks;
}

async function akcjaListaPamietnik() {
  const pole = document.getElementById("pamietnik-pole");
  if (pole.dataset.listItems && JSON.parse(pole.dataset.listItems).length) {
    // już wyświetlamy listę – kliknięcie ponownie wybiera numer
    await wczytajZListy();
  } else {
    pokazListeNotatek();
  }
}

async function nowaNotatkaPamietnik() {
  document.getElementById("pamietnik-pole").value = "";
  document.getElementById("pamietnik-pole").dataset.listItems = "";
  pamietnikAktualnaData = null;
  pamietnikAktualnyIndeks = null;
  await showAlert("✏️ Nowa notatka.\nNie zapomnij jej zapisać.", "Nowa notatka");
}

async function zapiszPamietnikAkcja() {
  const pole = document.getElementById("pamietnik-pole");
  const tresc = pole.value.trim();
  if (!tresc) {
    await showAlert("Nie wpisano żadnej treści do zapisania.", "Brak treści");
    return;
  }
  // edycja istniejącej
  if (pamietnikAktualnaData !== null && pamietnikAktualnyIndeks !== null) {
    const wpisy = PAMIETNIK[pamietnikAktualnaData];
    if (Array.isArray(wpisy) && wpisy[pamietnikAktualnyIndeks]) {
      wpisy[pamietnikAktualnyIndeks].tresc = tresc;
      zapiszPamietnik(PAMIETNIK);
      pamietnikAktualnaData = null;
      pamietnikAktualnyIndeks = null;
      await showAlert("Notatka została zaktualizowana.", "Zapisano");
      return;
    }
  }
  // nowa notatka
  const tytul = await showPrompt("Tytuł notatki:", "Tytuł notatki");
  if (!tytul) return;
  const dzis = ymd(new Date());
  if (!Array.isArray(PAMIETNIK[dzis])) PAMIETNIK[dzis] = [];
  PAMIETNIK[dzis].push({ tytul: tytul, tresc: tresc });
  zapiszPamietnik(PAMIETNIK);
  pamietnikAktualnaData = null;
  pamietnikAktualnyIndeks = null;
  await showAlert("Nowa notatka została zapisana.", "Zapisano");
}

async function usunPamietnikAkcja() {
  if (pamietnikAktualnaData === null || pamietnikAktualnyIndeks === null) {
    await showAlert("Najpierw kliknij „Lista” i wybierz notatkę do usunięcia.", "Brak wybranej notatki");
    return;
  }
  const ok = await showConfirm("Czy na pewno usunąć tę notatkę?", "Potwierdź");
  if (!ok) return;
  const wpisy = PAMIETNIK[pamietnikAktualnaData];
  if (Array.isArray(wpisy) && pamietnikAktualnyIndeks < wpisy.length) {
    wpisy.splice(pamietnikAktualnyIndeks, 1);
    if (!wpisy.length) delete PAMIETNIK[pamietnikAktualnaData];
  } else if (typeof wpisy === "object") {
    delete PAMIETNIK[pamietnikAktualnaData];
  }
  zapiszPamietnik(PAMIETNIK);
  document.getElementById("pamietnik-pole").value = "";
  pamietnikAktualnaData = null;
  pamietnikAktualnyIndeks = null;
  await showAlert("📌 Notatka została usunięta.", "Usunięto");
}

async function szukajWPamietniku() {
  const zapytanie = await showPrompt("Wpisz słowo do wyszukania:", "Wyszukiwanie");
  if (!zapytanie) return;
  const q = zapytanie.toLowerCase();
  const wyniki = [];
  for (const [data, wpisy] of Object.entries(PAMIETNIK)) {
    if (Array.isArray(wpisy)) {
      wpisy.forEach(w => {
        if ((w.tresc || "").toLowerCase().includes(q))
          wyniki.push(`📌 ${data}: ${w.tytul || "Bez tytułu"}`);
      });
    } else if (typeof wpisy === "object" && wpisy) {
      if ((wpisy.tresc || "").toLowerCase().includes(q))
        wyniki.push(`📌 ${data}: ${wpisy.tytul || "Bez tytułu"}`);
    }
  }
  const tekst = wyniki.length
    ? `🔍 Znaleziono słowo: „${zapytanie}”\n\n` + wyniki.join("\n")
    : `❌ Nie znaleziono słowa: „${zapytanie}”`;
  await showAlert(tekst, "Wyniki wyszukiwania");
}

// ===========================================================================
// 10. Podpięcie eventów + start
// ===========================================================================
document.getElementById("btn-prev").onclick = () => {
  if (state.miesiac === 1) { state.miesiac = 12; state.rok--; }
  else state.miesiac--;
  renderKalendarz();
};
document.getElementById("btn-next").onclick = () => {
  if (state.miesiac === 12) { state.miesiac = 1; state.rok++; }
  else state.miesiac++;
  renderKalendarz();
};
document.getElementById("rok-input").onkeydown = (e) => {
  if (e.key !== "Enter") return;
  const v = parseInt(e.target.value, 10);
  if (v && v > 0) {
    state.rok = v;
    renderKalendarz();
  }
};
document.getElementById("rok-input").onblur = (e) => {
  const v = parseInt(e.target.value, 10);
  if (v && v > 0 && v !== state.rok) {
    state.rok = v;
    renderKalendarz();
  } else {
    e.target.value = state.rok;
  }
};

document.getElementById("btn-zapisz").onclick = akcjaZapisz;
document.getElementById("btn-zapisz-rok").onclick = akcjaZapiszCoRok;
document.getElementById("btn-usun").onclick = akcjaUsun;
document.getElementById("btn-today").onclick = akcjaDzis;
document.getElementById("btn-swieci").onclick = akcjaSwieci;
document.getElementById("btn-linki").onclick = akcjaLinki;
document.getElementById("btn-mysl").onclick = akcjaMyslDnia;
document.getElementById("btn-info").onclick = akcjaInfo;
document.getElementById("btn-pisac").onclick = otworzPamietnik;

document.getElementById("pa-lista").onclick = akcjaListaPamietnik;
document.getElementById("pa-nowa").onclick = nowaNotatkaPamietnik;
document.getElementById("pa-zapisz").onclick = zapiszPamietnikAkcja;
document.getElementById("pa-usun").onclick = usunPamietnikAkcja;
document.getElementById("pa-szukaj").onclick = szukajWPamietniku;
document.getElementById("pa-zamknij").onclick = zamknijPamietnik;

// Start
ustawDzien(new Date());
</script>
