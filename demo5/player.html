<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini-Klik PIXI Prototyp — Kosmiczna Gra na GPU</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: white;
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow: hidden;
  }
  h1 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff;
  }
  .info-bar {
    background: rgba(0, 247, 255, 0.1);
    border: 1px solid rgba(0, 247, 255, 0.3);
    padding: 8px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #88ddff;
  }
  #game-container {
    position: relative;
    border: 2px solid #00f7ff;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0, 247, 255, 0.5);
    background: #000;
  }
  #fps-counter {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #0f0;
    font-family: 'Consolas', monospace;
    font-weight: bold;
    font-size: 18px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(0, 255, 0, 0.5);
    z-index: 100;
    pointer-events: none;
  }
  #levelBadge {
    position: absolute;
    top: 10px;
    left: 110px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    color: #ffe97a;
    letter-spacing: 2px;
    padding: 6px 14px;
    background: linear-gradient(180deg, #2a1a4a, #120828);
    border: 2px solid #ff9e3d;
    border-radius: 10px;
    text-shadow: 0 0 8px #ff9e3d;
    box-shadow: 0 0 12px rgba(255, 158, 61, 0.45), inset 0 0 8px rgba(255, 200, 100, 0.2);
    white-space: nowrap;
    user-select: none;
    z-index: 100;
    pointer-events: none;
    animation: levelGlow 2.5s ease-in-out infinite alternate;
  }
  @keyframes levelGlow {
    from { box-shadow: 0 0 10px rgba(255,158,61,0.3), inset 0 0 6px rgba(255,200,100,0.15); }
    to   { box-shadow: 0 0 20px rgba(255,158,61,0.7), inset 0 0 12px rgba(255,200,100,0.3); }
  }
  #stats-panel {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #aaa;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    line-height: 1.6;
    z-index: 100;
    pointer-events: none;
  }
  #hud {
    position: absolute;
    top: 10px;
    right: 10px;
    color: white;
    font-family: 'Consolas', monospace;
    font-size: 14px;
    text-align: right;
    z-index: 100;
    text-shadow: 0 0 8px black;
    pointer-events: none;
  }
  .controls {
    margin-top: 12px;
    font-size: 12px;
    color: #888;
    text-align: center;
  }
  .controls kbd {
    background: #333;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid #555;
    font-family: monospace;
    margin: 0 2px;
  }

  /* === PANEL PRZYCISKÓW WCZYTYWANIA === */
  .button-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ctrl-btn {
    background: linear-gradient(180deg, #1a3a55 0%, #0a2a45 100%);
    border: 2px solid #00f7ff;
    color: white;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Arial', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
    box-shadow: 0 0 12px rgba(0, 247, 255, 0.3);
    user-select: none;
  }
  .ctrl-btn:hover {
    background: linear-gradient(180deg, #2a5a85 0%, #1a4a75 100%);
    box-shadow: 0 0 18px rgba(0, 247, 255, 0.6);
    transform: translateY(-1px);
  }
  .ctrl-btn:active {
    transform: translateY(1px);
    box-shadow: 0 0 8px rgba(0, 247, 255, 0.4);
  }
  .ctrl-btn.demo-btn {
    border-color: #00ff88;
    box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
  }
  .ctrl-btn.demo-btn:hover {
    box-shadow: 0 0 18px rgba(0, 255, 136, 0.6);
  }
  .ctrl-btn.restart-btn {
    border-color: #ffaa00;
    box-shadow: 0 0 12px rgba(255, 170, 0, 0.3);
  }
  .ctrl-btn.restart-btn:hover {
    box-shadow: 0 0 18px rgba(255, 170, 0, 0.6);
  }
  #file-input { display: none; }
  .game-name {
    color: #88ddff;
    font-size: 13px;
    margin-bottom: 8px;
    font-family: monospace;
  }

  /* === MENU STARTOWE (overlay) === */
  #menu-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(0,15,40,0.95), rgba(10,30,60,0.95));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 200;
    backdrop-filter: blur(4px);
    text-align: center;
  }
  #menu-overlay.hidden { display: none; }
  #menu-title {
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(90deg, #00f7ff, #88aaff, #ff88ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0, 247, 255, 0.5);
    letter-spacing: 2px;
  }
  #menu-author {
    font-size: 13px;
    color: #88ddff;
    margin-bottom: 20px;
    font-style: italic;
  }
  #menu-author::before { content: "✨ "; }
  #menu-description {
    font-size: 14px;
    color: #ddffff;
    max-width: 600px;
    line-height: 1.6;
    margin-bottom: 24px;
    padding: 12px 18px;
    background: rgba(0, 247, 255, 0.05);
    border-left: 3px solid #00f7ff;
    border-right: 3px solid #00f7ff;
    border-radius: 4px;
  }
  #menu-controls {
    font-size: 12px;
    color: #aaccdd;
    margin-bottom: 32px;
    text-align: center;
    line-height: 1.8;
    max-width: 720px;
  }
  #menu-controls strong {
    display: inline-block;
    margin-bottom: 14px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  #menu-controls kbd {
    background: rgba(0, 247, 255, 0.1);
    border: 1px solid rgba(0, 247, 255, 0.4);
    padding: 3px 8px;
    border-radius: 4px;
    margin: 0 3px;
    font-family: monospace;
  }
  #menu-start-btn {
    background: linear-gradient(180deg, #0a5a55 0%, #093a35 100%);
    border: 2px solid #00ff88;
    color: white;
    padding: 14px 50px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Arial', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    transition: all 0.15s;
    animation: pulse 2s infinite;
  }
  #menu-start-btn:hover {
    background: linear-gradient(180deg, #1a8a85 0%, #196a65 100%);
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
    transform: translateY(-2px);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
    50% { box-shadow: 0 0 35px rgba(0, 255, 136, 0.9); }
  }
  /* ════════════ MOBILE NAVIGATION (proste przyciski) ════════════ */
  .canvas-nav-group {
    position: absolute;
    bottom: 70px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 50;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .canvas-nav-group.left-group { left: 12px; }
  .canvas-nav-group.right-group { right: 12px; }

  .nav-arrow {
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(60, 80, 120, 0.35) 0%, rgba(30, 40, 70, 0.35) 100%);
    border: 1px solid rgba(120, 180, 255, 0.4);
    border-radius: 14px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 32px;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(80, 130, 200, 0.25);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .nav-arrow:active {
    background: linear-gradient(180deg, rgba(100, 140, 200, 0.7) 0%, rgba(60, 80, 130, 0.7) 100%);
    color: white;
  }

  /* Przycisk STRZAŁ — czerwony, w lewej grupie zamiast ▲ */
  .nav-arrow.nav-shoot-arrow {
    background: linear-gradient(180deg, rgba(200, 60, 60, 0.45) 0%, rgba(140, 30, 30, 0.45) 100%);
    border-color: rgba(255, 100, 100, 0.55);
    box-shadow: 0 0 10px rgba(220, 80, 80, 0.35);
    font-size: 36px;
  }
  .nav-arrow.nav-shoot-arrow:active {
    background: linear-gradient(180deg, rgba(240, 100, 100, 0.85) 0%, rgba(180, 50, 50, 0.85) 100%);
  }

  /* Domyślnie ukryte — pokazują się po kliknięciu "🕹 NAWIGACJA" */
  .hidden-nav { display: none !important; }

  /* Przycisk NAWIGACJA */
  .ctrl-btn.nav-btn {
    border-color: #66ddaa;
    box-shadow: 0 0 10px rgba(102, 221, 170, 0.3);
  }
  .ctrl-btn.nav-btn.active {
    background: linear-gradient(180deg, #338866 0%, #226644 100%);
    box-shadow: 0 0 15px rgba(102, 221, 170, 0.6);
  }

  /* ════════════════════════════════════════════════════════════════ */
  /* STYLE V2 — niebieski podwodny portal mini-klik */
  /* ════════════════════════════════════════════════════════════════ */

  /* Body — niebieski gradient podwodny */
  body {
    background: linear-gradient(180deg, #0a3550 0%, #134a6f 30%, #0d3050 70%, #061830 100%) !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: flex-start !important;
    min-height: 100vh !important;
    padding: 12px 20px 40px 20px !important;
    gap: 10px !important;
    position: relative !important;
    overflow: hidden !important;
  }
  html { overflow: hidden; }

  /* Promienie i bąbelki USUNIĘTE — mordowały FPS na tabletach (9 radial-gradient + nieskończona animacja CSS) */

  /* Kontent nad dekoracjami */
  #playerFrame, h1 { position: relative; z-index: 1; }

  /* RAMKA GRACZA */
  #playerFrame {
    background: linear-gradient(145deg, #0f2a44 0%, #1a3d5f 100%);
    border: 3px solid #2a6a9a;
    border-radius: 20px;
    padding: 14px 16px 12px 16px;
    box-shadow:
      0 0 40px rgba(0,0,0,0.6),
      0 0 80px rgba(80,180,255,0.2),
      inset 0 1px 0 rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-width: 840px;
    width: 100%;
  }

  /* TITLE BAR (nad grą) */
  #titleBar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 8px;
  }
  #gameTitle {
    font-size: 18px;
    font-weight: bold;
    color: #adf;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #4af;
  }

  /* STATUS BAR (pod grą) */
  #statusBar {
    font-size: 12px;
    color: #6a9dc0;
    text-align: center;
    padding: 2px 0;
    width: 100%;
  }

  /* OVERRIDE: button-bar w playerFrame ma być częścią title-bara, więc zniknie z domyślnej lokalizacji */
  #playerFrame .button-bar {
    margin: 0;
    padding: 0;
    background: none;
    box-shadow: none;
    border: none;
  }

  /* ════════════════════════════════════════════════════════════════ */
  /* RESPONSYWNOŚĆ — hybryda: desktop 800×450 ostro, mobile CSS scale */
  /* ════════════════════════════════════════════════════════════════ */

  /* game-container ZAWSZE max 800px szerokości, ale zwija się elastycznie */
  #game-container {
    width: 100%;
    max-width: 800px;
    /* aspect-ratio gwarantuje 800:450 (16:9) niezależnie od szerokości */
    aspect-ratio: 800 / 450;
  }

  /* Canvas wstrzyknięty przez PIXI — zostaje 800×450 wewnętrznie,
     ale CSS skaluje go do szerokości kontenera. PIXI antialias=false
     więc skalowanie nie psuje wyglądu (pixel-art friendly). */
  #game-container canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    /* Ostry pixel-art przy skalowaniu na mobile — nie rozmazuj */
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  /* === MOBILE / TABLET (≤ 860px LUB urządzenia dotykowe) === */
  @media (max-width: 860px), (hover: none) and (pointer: coarse) {
    /* Na mobile pozwalamy scrollować pionowo (button-bar może iść w 2 rzędy
       i zwiększyć wysokość) — blokujemy tylko niechciany scroll poziomy */
    html, body {
      overflow-x: hidden !important;
      overflow-y: auto !important;
    }
    body {
      padding: 8px 8px 12px 8px !important;
    }
    #playerFrame {
      padding: 8px 8px 8px 8px !important;
      border-width: 2px;
      border-radius: 12px;
      gap: 6px !important;
    }
    #titleBar {
      flex-direction: column;
      gap: 6px;
    }
    #gameTitle {
      font-size: 15px;
    }
    .button-bar {
      gap: 6px;
      flex-wrap: wrap;
    }
    .ctrl-btn {
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    /* Ukrywamy ręczny przełącznik nav — buttony są zawsze widoczne */
    #navToggleBtn {
      display: none !important;
    }
    /* Nav-buttony ZAWSZE widoczne na touch — nadpisuje .hidden-nav */
    .canvas-nav-group.hidden-nav {
      display: flex !important;
    }
    /* Mniejsze nav-arrowy żeby nie zasłaniały całej gry na małym ekranie */
    .nav-arrow {
      width: 56px;
      height: 56px;
      font-size: 26px;
      border-radius: 12px;
    }
    .nav-arrow.nav-shoot-arrow {
      font-size: 28px;
    }
    .canvas-nav-group {
      bottom: 8px;
      gap: 6px;
    }
    .canvas-nav-group.left-group { left: 6px; }
    .canvas-nav-group.right-group { right: 6px; }
    /* HUD i licznik FPS mniejsze, żeby nie zjadały przestrzeni gry */
    #hud {
      font-size: 11px;
      padding: 0;
    }
    #fps-counter {
      font-size: 12px;
      padding: 3px 6px;
    }
    #stats-panel {
      font-size: 9px;
      padding: 3px 6px;
    }
    #menu-title {
      font-size: 26px;
    }
    #menu-description {
      font-size: 12px;
      padding: 8px 12px;
    }
    #menu-start-btn {
      padding: 12px 36px;
      font-size: 16px;
    }
  }

  /* === BARDZO MAŁE TELEFONY (≤ 480px) === */
  @media (max-width: 480px) {
    .nav-arrow {
      width: 48px;
      height: 48px;
      font-size: 22px;
    }
    .canvas-nav-group {
      gap: 4px;
      bottom: 4px;
    }
    .ctrl-btn {
      padding: 6px 10px;
      font-size: 11px;
    }
  }
/* === EKRAN WYNIKÓW (wygrana / przegrana) === */
#resultsScreen.hidden { display: none !important; }
#resultsScreen {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: linear-gradient(135deg, #001122 0%, #000820 100%);
  background-image:
    linear-gradient(135deg, #001122 0%, #000820 100%),
    repeating-linear-gradient(0deg, transparent 0px, transparent 39px, rgba(0,255,136,0.04) 39px, rgba(0,255,136,0.04) 40px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 39px, rgba(0,255,136,0.04) 39px, rgba(0,255,136,0.04) 40px);
  background-blend-mode: normal, lighten, lighten;
  font-family: Arial, sans-serif;
  overflow: hidden;
  pointer-events: auto;
}
#resultsScreen.lose {
  background: linear-gradient(135deg, #110000 0%, #0d0008 100%);
  background-image:
    linear-gradient(135deg, #110000 0%, #0d0008 100%),
    repeating-linear-gradient(0deg, transparent 0px, transparent 39px, rgba(255,68,0,0.04) 39px, rgba(255,68,0,0.04) 40px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 39px, rgba(255,68,0,0.04) 39px, rgba(255,68,0,0.04) 40px);
}
#resultsContent {
  width: 100%;
  max-width: 600px;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}
#resultsBall {
  font-size: 60px;
  line-height: 1;
  margin: 0 auto 8px auto;
  filter: drop-shadow(0 0 20px #00ff88);
  animation: resultsBallPulse 1.5s ease-in-out infinite;
}
#resultsScreen.lose #resultsBall {
  filter: drop-shadow(0 0 20px #ff4400);
}
@keyframes resultsBallPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
#resultsTitle {
  font-size: 32px;
  font-weight: bold;
  color: #00ff88;
  text-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88;
  margin: 4px 0 2px 0;
}
#resultsScreen.lose #resultsTitle {
  color: #ff4400;
  text-shadow: 0 0 20px #ff4400, 0 0 30px #ff4400;
}
#resultsGameName {
  color: #888;
  font-size: 13px;
  margin-bottom: 16px;
}
#resultsTable {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: 10px;
  padding: 10px 14px;
  margin: 0 auto 14px auto;
  max-width: 360px;
}
#resultsScreen.lose #resultsTable {
  border-color: rgba(255,68,0,0.3);
}
#resultsTableHeader {
  color: #00ff88;
  font-size: 11px;
  font-weight: bold;
  text-align: left;
  margin-bottom: 6px;
}
#resultsScreen.lose #resultsTableHeader {
  color: #ff6644;
}
#resultsWarning {
  color: #886644;
  font-size: 10px;
  margin-bottom: 8px;
}
#resultsWarning:empty {
  display: none;
}
.results-row {
  display: flex;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
  font-weight: bold;
}
.results-row.is-me {
  background: rgba(0,255,136,0.12);
  border-radius: 6px;
  padding-left: 8px;
  padding-right: 8px;
}
.results-row .medal { font-size: 15px; margin-right: 10px; }
.results-row .name { color: #ddd; flex: 1; text-align: left; }
.results-row.is-me .name { color: #00ff88; }
.results-row .points { color: #ffcc00; margin-right: 8px; }
.results-row .win-mark { font-size: 13px; }
.results-row .win-mark.yes { color: #00cc66; }
.results-row .win-mark.no { color: #cc4444; }
#resultsEmptyMsg {
  color: #555;
  font-size: 12px;
  padding: 14px 0;
}
#resultsEmptyMsg:empty {
  display: none;
}
#resultsButtons {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 14px;
}
.results-btn {
  font-family: Arial, sans-serif;
  font-size: 13px;
  font-weight: bold;
  padding: 10px 18px;
  border-radius: 9px;
  border-width: 2px;
  border-style: solid;
  cursor: pointer;
  min-width: 150px;
  transition: transform 0.1s, box-shadow 0.1s;
}
.results-btn:hover { transform: translateY(-1px); }
.results-btn:active { transform: translateY(1px); }
.results-btn-green {
  background: #0a2a0a;
  border-color: #2a6a2a;
  color: #88ff88;
}
.results-btn-blue {
  background: #0a0a2a;
  border-color: #2a2a6a;
  color: #8888ff;
}
#resultsEnemyStrip {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to top, rgba(0,60,30,0.9) 0%, rgba(0,40,20,0.7) 70%, transparent 100%);
  border-top: 1.5px solid rgba(0,255,136,0.5);
  display: flex;
  justify-content: space-around;
  align-items: center;
  font-size: 28px;
  pointer-events: none;
  overflow: hidden;
}
#resultsScreen.lose #resultsEnemyStrip {
  background: linear-gradient(to top, rgba(60,0,0,0.9) 0%, rgba(40,0,0,0.7) 70%, transparent 100%);
  border-top-color: rgba(255,68,0,0.5);
}
.results-enemy {
  animation: resultsEnemyBob 1.5s ease-in-out infinite;
  display: inline-block;
}
.results-enemy:nth-child(2) { animation-delay: -0.2s; }
.results-enemy:nth-child(3) { animation-delay: -0.4s; }
.results-enemy:nth-child(4) { animation-delay: -0.6s; }
.results-enemy:nth-child(5) { animation-delay: -0.8s; }

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.0/dist/pixi.min.js"></script>

// ═══════════════════════════════════════════════════════════════════

// === DANE GRY (wczytane z demo.json Kosmicznej Gry) ===
const GAME_DATA_PLACEHOLDER = "REPLACE_WITH_INLINE_JSON";

// === KONFIGURACJA ===
const CANVAS_WIDTH = 800
const CANVAS_HEIGHT = 450

// === INICJALIZACJA PIXI APP ===
const app = new PIXI.Application({
  width: CANVAS_WIDTH,
  height: CANVAS_HEIGHT,
  backgroundColor: 0x000814,
  antialias: false,
  // Sprawdza czy WebGL jest dostępne, jeśli nie spada na Canvas2D (ale mamy nadzieję że WebGL pójdzie)
})
document.getElementById('game-container').appendChild(app.view)

// Sprawdź który renderer jest aktywny
const rendererType = app.renderer.type === PIXI.RENDERER_TYPE.WEBGL ? 'WebGL (GPU) ✅' : 'Canvas 2D (CPU) ❌'
console.log('🎮 Renderer:', rendererType)
const statusEl = document.getElementById('statusBar')
if (statusEl) {
  statusEl.innerHTML = `✨ Renderowanie: <strong style="color:#0f0">${rendererType}</strong> — porównaj z Canvas 2D!`
}

// === KONTENERY (warstwy renderowania na GPU) ===
const stage = app.stage
const bgLayer = new PIXI.Container()           // Tło (gwiazdy + parallax)
const bgFxLayer = new PIXI.Container()         // Tło fx (cząstki, hyperspace) - sprite'y batchują się automatycznie
const enemyLayer = new PIXI.Container()         // Wrogowie
const blockLayer = new PIXI.Container()         // Bloki
const bonusLayer = new PIXI.Container()         // Bonusy
const textLayer = new PIXI.Container()          // Teksty na świecie z neonem (z JSON: texts)
const playerLayer = new PIXI.Container()        // Statek
const bulletLayer = new PIXI.Container()        // Pociski
const fxLayer = new PIXI.Container()            // Eksplozje, particle
const transitionLayer = new PIXI.Container()    // Efekt Matrix + NEXT LEVEL (na samym wierzchu)
stage.addChild(bgLayer, bgFxLayer, blockLayer, bonusLayer, enemyLayer, textLayer, bulletLayer, playerLayer, fxLayer, transitionLayer)
transitionLayer.visible = false   // domyślnie ukryty

// === TWORZENIE TEKSTUR Z GRAFIKI (RAZ — potem GPU używa) ===
function createTexture(drawFn, w, h) {
  const g = new PIXI.Graphics()
  drawFn(g)
  const renderTexture = PIXI.RenderTexture.create({ width: w, height: h })
  app.renderer.render(g, { renderTexture })
  g.destroy()
  return renderTexture
}

  for (let i = 0; i < 4; i++) {
    g.beginFill(0x8899bb)
    g.lineStyle(1, 0x445566)
    g.drawPolygon([
      i * 10 + 1, 40,
      i * 10 + 5, 4,
      i * 10 + 9, 40
    ])
    g.endFill()
  }

  g.beginFill(0x222233)
  g.drawRect(0, 35, 40, 5)
  g.endFill()
}, 40, 40)

// Statek (spaceship) — 40×40
// === STATEK — przepisany 1:1 z drawSpaceship() ze starego player (4) ===
// r = 30 (z JSON), pełna grafika mieści się w ~96×64, używamy anchor (centrum)
// Tekstura zawiera WSZYSTKO co statyczne: cień, skrzydła, kadłub, kokpit, dziób, "obudowy" silników.
// PŁOMIENIE i ŚWIECĄCE DIODY są osobno (animowane w pętli) — patrz TEXTURES.flame i engineGlow.
TEXTURES.spaceship = createTexture((g) => {
  const r = 30
  // Centrum tekstury — tłumaczymy współrzędne z drawSpaceship (które rysował od x,y)
  // Tekstura 96×64, centrum (48, 32). Wszystkie współrzędne z oryginału + (48, 32).
  const cx = 48, cy = 32

  // 1. Cień pod statkiem (eliptyczny)
  g.beginFill(0x0064ff, 0.12)  // rgba(0,100,255,0.12)
  g.drawEllipse(cx + 0, cy + r*0.7, r*0.7, 5)
  g.endFill()

  // 2. SKRZYDŁA — górne i dolne (trójkąty z konturem)
  // Górne skrzydło: M(-r*0.1,-r*0.18) L(-r*0.7,-r*0.78) L(-r*0.9,-r*0.48) L(-r*0.05,-r*0.18)
  g.lineStyle(1, 0x3366bb)
  g.beginFill(0x1a3a7a)
  g.drawPolygon([
    cx - r*0.1,  cy - r*0.18,
    cx - r*0.7,  cy - r*0.78,
    cx - r*0.9,  cy - r*0.48,
    cx - r*0.05, cy - r*0.18
  ])
  g.endFill()
  // Dolne skrzydło (lustro)
  g.beginFill(0x1a3a7a)
  g.drawPolygon([
    cx - r*0.1,  cy + r*0.18,
    cx - r*0.7,  cy + r*0.78,
    cx - r*0.9,  cy + r*0.48,
    cx - r*0.05, cy + r*0.18
  ])
  g.endFill()
  g.lineStyle(0)

  // 3. BOCZNE KLAPY (cieńszy ciemny niebieski)
  g.beginFill(0x2255aa)
  g.drawPolygon([
    cx - r*0.6,  cy - r*0.72,
    cx - r*0.8,  cy - r*0.78,
    cx - r*0.88, cy - r*0.5
  ])
  g.drawPolygon([
    cx - r*0.6,  cy + r*0.72,
    cx - r*0.8,  cy + r*0.78,
    cx - r*0.88, cy + r*0.5
  ])
  g.endFill()

  // 4. GŁÓWNY KADŁUB — gradient pionowy aaccee→6699cc→334477→112244 emulowany przez nakładanie elips
  // PIXI nie ma gradientów wbudowanych — symuluję 4 elipsami od najjaśniejszej do najciemniejszej
  // Górna jasna: aaccee
  g.beginFill(0xaaccee)
  g.drawEllipse(cx, cy - r*0.18, r*0.95, r*0.16)
  g.endFill()
  // Środkowa-góra: 6699cc
  g.beginFill(0x6699cc)
  g.drawEllipse(cx, cy - r*0.05, r*0.95, r*0.12)
  g.endFill()
  // Środkowa-dół: 334477
  g.beginFill(0x334477)
  g.drawEllipse(cx, cy + r*0.10, r*0.95, r*0.14)
  g.endFill()
  // Dolna ciemna: 112244
  g.beginFill(0x112244)
  g.drawEllipse(cx, cy + r*0.22, r*0.95, r*0.10)
  g.endFill()

  // 5. Linia środkowa (subtelna)
  g.lineStyle(1, 0x64a0dc, 0.5)  // rgba(100,160,220,0.5)
  g.moveTo(cx - r*0.8, cy)
  g.lineTo(cx + r*0.6, cy)
  g.lineStyle(0)

  // 6. OBUDOWY SILNIKÓW (czarne owale po obu stronach — tu NIE rysujemy diod, te są osobno)
  g.beginFill(0x223355)
  g.drawEllipse(cx - r*0.88, cy - r*0.28, 8, 6)
  g.drawEllipse(cx - r*0.88, cy + r*0.28, 8, 6)
  g.endFill()

  // 7. KOKPIT — kopuła z efektem 3D (gradient radialny aproksymowany 3 elipsami)
  // Najciemniejszy spód: rgba(20,60,140,0.4)
  g.beginFill(0x143c8c, 0.4)
  g.drawEllipse(cx + r*0.15, cy - r*0.14, r*0.28, r*0.22)
  g.endFill()
  // Środek: rgba(80,160,255,0.75)
  g.beginFill(0x50a0ff, 0.75)
  g.drawEllipse(cx + r*0.15, cy - r*0.16, r*0.22, r*0.17)
  g.endFill()
  // Najjaśniejszy "highlight": rgba(200,235,255,0.95)
  g.beginFill(0xc8ebff, 0.95)
  g.drawEllipse(cx + r*0.15, cy - r*0.18, r*0.14, r*0.10)
  g.endFill()
  // Kontur kopuły
  g.lineStyle(1, 0x96d2ff, 0.7)
  g.drawEllipse(cx + r*0.15, cy - r*0.14, r*0.28, r*0.22)
  g.lineStyle(0)
  // Mały odblask na kopule (rgba(255,255,255,0.3) elipsa pod kątem -0.4 rad)
  // PIXI Graphics nie wspiera rotacji elipsy, ale efekt jest mały i prawie niezauważalny — daję zwykłą
  g.beginFill(0xffffff, 0.3)
  g.drawEllipse(cx + r*0.05, cy - r*0.20, r*0.10, r*0.07)
  g.endFill()

  // 8. CZUBEK DZIOBU (gradient lin. 7799cc→aaccee, kształt łuku)
  // PIXI: aproksymujemy dwoma elipsami nachodzącymi
  g.beginFill(0x7799cc)
  g.drawEllipse(cx + r*1.0, cy, r*0.12, r*0.06)
  g.endFill()
  g.beginFill(0xaaccee)
  g.drawEllipse(cx + r*1.05, cy, r*0.07, r*0.04)
  g.endFill()

  // 9. Subtelny refleks na całym kadłubie (rgba(255,255,255,0.12))
  g.beginFill(0xffffff, 0.12)
  g.drawEllipse(cx - r*0.1, cy - r*0.15, r*0.4, r*0.10)
  g.endFill()
}, 96, 64)

// Bonus (diament) — emoji 💎 jako tekstura, 1:1 ze starego player (4)
// Stary używał ctx.fillText("💎") z fontSize = (b.r || 12) * 1.8 = 43.2 dla r=24.
// Tworzymy PIXI.Text z emoji raz, konwertujemy na teksturę i potem każdy diament
// jest tanim spritem (tak samo jak inne tekstury — szybkie batchowanie GPU).
TEXTURES.diamond = (() => {
  const text = new PIXI.Text('💎', {
    fontFamily: 'Arial',
    fontSize: 43,  // (24 * 1.8) ze starego
    align: 'center'
  })
  // Generujemy teksturę z renderu tekstu, niszczymy obiekt PIXI.Text (już go nie potrzebujemy)
  const texture = app.renderer.generateTexture(text)
  text.destroy()
  return texture
})()

// FLAGA META (key_win) — przepisana 1:1 z drawFinishFlag(24) ze starego.
// Wave (falowanie) FIX = 0 (pozycja spoczynkowa), zgodnie z wyborem użytkownika.
// Oryginał: poleTop = -size*2.8 = -67.2. Maszt sięga od poleTop do size*0.85 = 20.4.
// Flaga jest po prawej masztu, do x = size*1.4 = 33.6.
// Wymiar: szerokość ~36 (0..36), wysokość ~95 (-67..28). Daję teksturę 48×104, anchor (0.5, 0.5)
// Ale anchor musi być na podstawie masztu (środek u dołu, x=center) — bo w grze sprite jest
// pozycjonowany na b.x, b.y a flaga "stoi" na ziemi. Robię translate w PIXI: rysuję od centrum tekstury.
TEXTURES.finishFlag = createTexture((g) => {
  const size = 24
  const wave = 0  // pozycja spoczynkowa — bez animacji
  const poleTop = -size * 2.8  // -67.2

  // Tekstura 48×104, lokalne (0,0) = lewy-górny róg.
  // Centrum X: 24 (środek). Centrum Y: oryginał miał (0,0) jako pkt zaczepienia, ale rysuje
  // od y=poleTop=-67.2 do y=size*0.85=20.4. Czyli wysokość rzeczywista 87.6.
  // Daję teksturę 48×104, środek X = 24, oraz przesunięcie Y żeby wszystko mieściło się.
  // Pkt referencyjny ze starego (0,0) → w teksturze: (24, 80). Używamy translate.
  const ox = 24, oy = 80   // (0,0) ze starego = ten punkt w teksturze

  // 1. CIEŃ U PODSTAWY — radial gradient zielony (PIXI brak gradientów, aproksymujemy 3 elipsami)
  // Oryginał: ellipse(0, size*0.85, size*0.7, size*0.22)
  // Najjaśniejszy środek: #4ade80
  g.beginFill(0x4ade80)
  g.drawEllipse(ox, oy + size * 0.85, size * 0.5, size * 0.16)
  g.endFill()
  // Średnia warstwa: #22a055
  g.beginFill(0x22a055)
  g.drawEllipse(ox, oy + size * 0.85, size * 0.62, size * 0.20)
  g.endFill()
  // Zewnętrzna ciemna: #0d6030 (rysujemy NAJPIERW jako podkład, ale bo jest największa)
  // Tu kolejność jest odwrotna - najpierw ciemne, potem jaśniejsze (już zrobione wyżej)
  // Faktycznie: trzeba narysować od ciemnego do jasnego = najciemniejsze najpierw
  // Cofam — trzeba przerysować w odwrotnej kolejności

  // Kontur cienia
  g.lineStyle(1.5, 0x0a4020)
  g.drawEllipse(ox, oy + size * 0.85, size * 0.7, size * 0.22)
  g.lineStyle(0)

  // 2. MASZT — gradient pionowy (PIXI: aproksymujemy 3 cienkimi prostokątami)
  // Oryginał: fillRect(-2, poleTop, 4, size*0.85 - poleTop) → 4×88
  // Gradient: lewy 0d6030 → środek 2a8050 → prawy 0a4020
  // Lewy ciemny pasek
  g.beginFill(0x0d6030)
  g.drawRect(ox - 2, oy + poleTop, 1.5, size * 0.85 - poleTop)
  g.endFill()
  // Środkowy jasny
  g.beginFill(0x2a8050)
  g.drawRect(ox - 0.5, oy + poleTop, 1, size * 0.85 - poleTop)
  g.endFill()
  // Prawy ciemny
  g.beginFill(0x0a4020)
  g.drawRect(ox + 0.5, oy + poleTop, 1.5, size * 0.85 - poleTop)
  g.endFill()

  // 3. ZŁOTA GAŁKA NA CZUBKU (był shadowBlur, w PIXI dajemy mniejsze + jasny środek)
  // Najpierw "glow" jako większa ciemniejsza
  g.beginFill(0xffcc00, 0.5)
  g.drawCircle(ox, oy + poleTop, 5)
  g.endFill()
  g.beginFill(0xffdd44)
  g.drawCircle(ox, oy + poleTop, 3)
  g.endFill()

  // 4. SAMA FLAGA — czerwona, kształt z quadraticCurveTo. Przy wave=0 krzywe są płaskie.
  // PIXI Graphics.quadraticCurveTo działa identycznie jak Canvas2D
  // Translate ze starego: ctx.translate(2, poleTop + size*0.05) → flaga rysowana od (2, poleTop+1.2)
  const fox = ox + 2
  const foy = oy + poleTop + size * 0.05  // (2, poleTop+1.2) lokalne

  // Gradient liniowy ff4444 → ee2222 → aa1111 — aproksymujemy przez nakładkę:
  // Bazowa najjaśniejsza, potem ciemniejsza warstwa po prawej
  g.beginFill(0xff4444)
  g.moveTo(fox + 0, foy + 0)
  g.quadraticCurveTo(fox + size * 0.7, foy + size * wave * 2, fox + size * 1.4, foy + size * 0.3 + wave * size * 0.3)
  g.lineTo(fox + size * 0.9, foy + size * 0.5)
  g.quadraticCurveTo(fox + size * 0.3, foy + size * 0.7 + wave * size * 0.2, fox + 0, foy + size * 0.7)
  g.closePath()
  g.endFill()
  // Ciemniejszy odcień na prawej części flagi (gradient feel)
  g.beginFill(0xaa1111, 0.4)
  g.moveTo(fox + size * 0.7, foy + size * 0.15)
  g.quadraticCurveTo(fox + size * 1.05, foy + size * 0.2, fox + size * 1.4, foy + size * 0.3)
  g.lineTo(fox + size * 0.9, foy + size * 0.5)
  g.quadraticCurveTo(fox + size * 0.85, foy + size * 0.4, fox + size * 0.7, foy + size * 0.5)
  g.closePath()
  g.endFill()
  // Kontur flagi (#880000)
  g.lineStyle(1.2, 0x880000)
  g.moveTo(fox + 0, foy + 0)
  g.quadraticCurveTo(fox + size * 0.7, foy + size * wave * 2, fox + size * 1.4, foy + size * 0.3 + wave * size * 0.3)
  g.lineTo(fox + size * 0.9, foy + size * 0.5)
  g.quadraticCurveTo(fox + size * 0.3, foy + size * 0.7 + wave * size * 0.2, fox + 0, foy + size * 0.7)
  g.closePath()
  g.lineStyle(0)

  // 5. CIEŃ FAŁDY (cienka krzywa rgba(0,0,0,0.2))
  g.lineStyle(1, 0x000000, 0.2)
  g.moveTo(fox + size * 0.2, foy + size * 0.1)
  g.quadraticCurveTo(fox + size * 0.4, foy + size * 0.3 + wave * size * 0.15, fox + size * 0.5, foy + size * 0.55)
  g.lineStyle(0)
}, 48, 104)

// Stary: i*14 wzdłuż X, 22px monospace. Liczba kolumn: canvas.width / 8 = 100 (taki był oryginał).
// Ale skoro tekst jest 14px szeroki i renderowany co 14px, optymalna liczba to canvas.width / 14 ≈ 57.
// Idziemy 57 — tyle co w starym wizualnie pokrywało ekran.
const matrixCols = []
const MATRIX_COL_COUNT = Math.ceil(CANVAS_WIDTH / 14)
for (let i = 0; i < MATRIX_COL_COUNT; i++) {

  })
  t.x = i * 14
  t.y = 0
  transitionLayer.addChild(t)
  matrixCols.push({ sprite: t, y: Math.random() * 50 })  // y = pozycja w "wierszach", potem * 14 pikseli
}

// Stary: bold 40px monospace, fill #00ffcc, shadow #00ffcc blur 25
const TRANSITION_TEXT_STYLE = {
  fontFamily: 'monospace',
  fontSize: 40,
  fontWeight: 'bold',
  fill: 0x00ffcc,
  // PIXI.Text ma dropShadow zamiast shadowBlur
  dropShadow: true,
  dropShadowColor: 0x00ffcc,
  dropShadowBlur: 12,    // PIXI's dropShadowBlur ≈ Canvas2D shadowBlur/2
  dropShadowDistance: 0  // shadow w 0 odległości = czysty glow
}
const transitionNextText = new PIXI.Text('NEXT', TRANSITION_TEXT_STYLE)
transitionNextText.anchor.set(0.5)

transitionLevelText.anchor.set(0.5)
transitionLayer.addChild(transitionLevelText)

// === FUNKCJA URUCHAMIANIA TRANSITION ===
function startLevelTransition(targetLevel) {
  levelTransition = { time: 180, target: targetLevel, frame: 0 }
  // Reset pozycji deszczu cyfr — losowe pozycje startowe (jak w starym)
  for (const col of matrixCols) col.y = Math.random() * 50
  transitionLayer.visible = true
  gameRunning = false  // pauzujemy logikę gry podczas przejścia
}

// === AKTUALIZACJA EFEKTU MATRIX (wywoływana co klatkę gdy levelTransition aktywny) ===
function updateLevelTransition() {
  if (!levelTransition) return false
  levelTransition.frame++
  levelTransition.time--

  // 1. Deszcz cyfr: co 4 klatkę nowa losowa cyfra, każda kolumna spada o 0.2 wiersza/klatkę
  const showDigits = levelTransition.frame % 4 === 0
  for (const col of matrixCols) {
    if (showDigits) {
      col.sprite.text = String.fromCharCode(48 + Math.floor(Math.random() * 10))  // '0'..'9'
    }
    col.sprite.y = col.y * 14
    // Spadanie + reset gdy spadnie poniżej ekranu (z małym losowym pominięciem żeby było natur.)
    if (col.y * 14 > CANVAS_HEIGHT && Math.random() > 0.975) col.y = 0
    col.y += 0.2
  }

  // 2. NEXT/LEVEL animacja — wjeżdżanie z boków, po 70% drogi się zatrzymują (jak w starym)
  let progress = 1 - (levelTransition.time / 180)
  progress = Math.min(progress / 0.7, 1)
  // NEXT wjeżdża z lewej (z -200) do środka (canvas.width/2)
  transitionNextText.x = -200 + progress * (CANVAS_WIDTH / 2 + 200)
  transitionNextText.y = CANVAS_HEIGHT / 2 - 20
  // LEVEL wjeżdża z prawej (z canvas.width+200) do środka
  transitionLevelText.x = CANVAS_WIDTH + 200 - progress * (CANVAS_WIDTH / 2 + 200)
  transitionLevelText.y = CANVAS_HEIGHT / 2 + 30

  // 3. Po 180 klatkach: ładujemy nowy level i kończymy transition
  if (levelTransition.time <= 0) {
    const target = levelTransition.target
    levelTransition = null
    transitionLayer.visible = false
    loadLevel(target)
    gameRunning = true  // wznawiamy grę po przejściu
    return true   // sygnał do pętli: wykonaliśmy zmianę levelu
  }
  return false
}

// === GENEROWANIE TŁA (wiele typów: stars/space/neon/snow) ===
// Konteneryzowane: bgLayer trzyma statyczne elementy (gradient + parę warstw),
// fxBgParticles (animowane cząstki) i hyperLayer (boost smugi) są dynamiczne.
let bgParticles = []      // dla "neon" (cyjan padające)
let snowParticles = []    // dla "snow" (kosmiczny śnieg)
let spaceMountains = []   // dla "space" (piramidy z dali)
let hyperStreaks = []     // dla efektu hiperprzestrzeni (boost)
let currentBgType = 'stars'

function generateBackground() {
  // Wyczyść poprzednie
  bgLayer.removeChildren()
  stars = []
  bgParticles = []
  snowParticles = []
  spaceMountains = []
  hyperStreaks = []

  // Czytamy backgroundType z settings (level lub global, fallback "stars")
  const level = levels[currentLevel] || {}
  let bgType = level.backgroundType || (GAME_DATA && GAME_DATA.settings && GAME_DATA.settings.backgroundType) || 'stars'
  if (!['stars', 'space', 'neon', 'snow'].includes(bgType)) bgType = 'stars'
  currentBgType = bgType

  // === GRADIENT TŁA (różny dla każdego typu) ===
  const bg = new PIXI.Graphics()
  if (bgType === 'neon') {
    // Fioletowy gradient #0a001f → #1a0033
    bg.beginFill(0x0a001f); bg.drawRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT/2); bg.endFill()
    bg.beginFill(0x1a0033); bg.drawRect(0, CANVAS_HEIGHT/2, CANVAS_WIDTH, CANVAS_HEIGHT/2); bg.endFill()
  } else if (bgType === 'snow') {
    bg.beginFill(0x0f1a2b); bg.drawRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); bg.endFill()
  } else {
    // stars / space → ciemnogranatowe
    bg.beginFill(0x000814); bg.drawRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); bg.endFill()
  }
  bg._fixed = true  // tag żeby nie ruszać przy parallax
  bgLayer.addChild(bg)

  // === GWIAZDY (stars + space + neon mają tło z gwiazdami) ===
  // OPTYMALIZACJA: Sprite z gotowej tekstury zamiast Graphics. PIXI batchuje sprite'y w 1 draw call,
  // Graphics by się nie batchowało (200 osobnych draw calls).
  if (bgType === 'stars' || bgType === 'space' || bgType === 'neon') {
    const count = bgType === 'neon' ? 100 : 200
    for (let i = 0; i < count; i++) {
      const star = new PIXI.Sprite(TEXTURES.particleCircle)
      star.anchor.set(0.5)
      const scale = (Math.random() < 0.7 ? 1 : 2) / 6  // tekstura jest 12px, chcemy 1-2px
      star.scale.set(scale)
      star.alpha = 0.3 + Math.random() * 0.7
      star.x = Math.random() * worldWidth
      star.y = Math.random() * CANVAS_HEIGHT
      star.parallax = 0.3 + Math.random() * 0.4
      bgLayer.addChild(star)
      stars.push(star)
    }
  }

  // === PIRAMIDY DLA "space" — góry kosmiczne z dali ===
  if (bgType === 'space') {
    for (let i = 0; i < 18; i++) {
      const m = new PIXI.Graphics()
      const h = 95 + (i * 53 % 95)
      const x = i * 220
      m.beginFill(0x1e2f52)
      m.moveTo(x - 20, CANVAS_HEIGHT)
      m.lineTo(x + 80, CANVAS_HEIGHT - h)
      m.lineTo(x + 190, CANVAS_HEIGHT)
      m.endFill()
      m._baseX = x  // zapisujemy bazowe x dla parallax animacji
      m.parallax = 0.15
      bgLayer.addChild(m)
      spaceMountains.push(m)
    }
  }

  // === CZĄSTKI NEON — cyjanowe punkty spadające (screen space, ParticleContainer) ===
  if (bgType === 'neon') {
    bgFxLayer.removeChildren()
    for (let i = 0; i < 90; i++) {
      const p = new PIXI.Sprite(TEXTURES.particleCircle)
      p.anchor.set(0.5)
      p.tint = 0x99ffff
      const scale = (Math.random() * 2.2 + 0.7) / 6
      p.scale.set(scale)
      p.x = Math.random() * CANVAS_WIDTH
      p.y = Math.random() * CANVAS_HEIGHT
      p._speed = Math.random() * 0.9 + 0.4
      p._phase = Math.random() * Math.PI * 2
      p._baseScale = scale
      bgFxLayer.addChild(p)
      bgParticles.push(p)
    }
  }

  // === CZĄSTKI SNOW — białe punkty padające szybko (screen space, ParticleContainer) ===
  if (bgType === 'snow') {
    bgFxLayer.removeChildren()
    for (let i = 0; i < 120; i++) {
      const p = new PIXI.Sprite(TEXTURES.particleCircle)
      p.anchor.set(0.5)
      p.scale.set(2/6)  // tekstura 12px → 2px
      p.x = Math.random() * CANVAS_WIDTH
      p.y = Math.random() * CANVAS_HEIGHT
      p._speed = 1 + Math.random() * 1.5
      bgFxLayer.addChild(p)
      snowParticles.push(p)
    }
  }

  // Wyczyść bgFxLayer dla typów które jej nie używają
  if (bgType === 'stars' || bgType === 'space') {
    bgFxLayer.removeChildren()
  }
}

// === EFEKT HIPERPRZESTRZENI — smugi światła gdy boost > 1.1 ===
// Aktywuje się automatycznie gdy gracz leci szybko w prawo.
function updateHyperspace(delta) {
  if (scrollBoost <= 1.1) {
    // Wyłącz: schowaj wszystkie smugi
    for (let i = 0; i < hyperStreaks.length; i++) hyperStreaks[i].visible = false
    return
  }
  // Pierwsze użycie? Stwórz smugi.
  if (hyperStreaks.length === 0) {
    for (let i = 0; i < 50; i++) {
      const streak = new PIXI.Sprite(TEXTURES.particleRect)
      streak.anchor.set(0, 0.5)  // anchor po lewej
      streak.tint = 0xddeeff
      streak.height = 1.5  // wysokość smugi
      streak._x = Math.random() * CANVAS_WIDTH
      streak._y = Math.random() * CANVAS_HEIGHT
      streak._speed = 8 + Math.random() * 20
      streak._length = 30 + Math.random() * 80
      streak._alpha = 0.3 + Math.random() * 0.5
      bgFxLayer.addChild(streak)
      hyperStreaks.push(streak)
    }
  }
  // Animuj
  const intensity = Math.min((scrollBoost - 1.1) / 0.5, 1)
  for (let i = 0; i < hyperStreaks.length; i++) {
    const s = hyperStreaks[i]
    s.visible = true
    s._x -= s._speed * intensity * 1.5 * delta
    if (s._x + s._length < 0) {
      s._x = CANVAS_WIDTH + Math.random() * 50
      s._y = Math.random() * CANVAS_HEIGHT
    }
    const len = s._length * (0.5 + intensity * 1.5)
    s.x = s._x
    s.y = s._y
    s.width = len
    s.alpha = s._alpha * intensity
  }
}

  const key = "scores_" + nazwaGry.replace(/\s/g, "_")

}
function saveLeaderboard(board) {
  const nazwaGry = (GAME_DATA && GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || "gra"
  const key = "scores_" + nazwaGry.replace(/\s/g, "_")
  try { localStorage.setItem(key, JSON.stringify(board)) } catch (e) {}
}

function showResults(isWin) {
  if (resultsActive) return
  resultsActive = true
  resultsIsWin = isWin
  gameRunning = false  // pauzujemy gameplay

  const screen = document.getElementById('resultsScreen')
  const nazwaGry = (GAME_DATA && GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || "Gra"

  // Tryb win/lose przez klasę CSS
  if (isWin) screen.classList.remove('lose')
  else screen.classList.add('lose')

  // Wypełnianie zawartości
  document.getElementById('resultsBall').textContent = isWin ? '🏆' : '💀'
  document.getElementById('resultsTitle').textContent = isWin ? '🏆 WYGRANA! 🏆' : '💀 KONIEC GRY 💀'
  document.getElementById('resultsGameName').textContent = nazwaGry

  // Header tabeli
  document.getElementById('resultsTableHeader').textContent =
    (isWin ? '🏅 HALL OF FAME — ' : '📊 NAJLEPSZE WYNIKI — ') + nazwaGry.toUpperCase()
  document.getElementById('resultsWarning').textContent =
    isWin ? '' : '⚠ Zapis tylko przy wygranej — dotknij flagi!'

  // Wiersze rankingu
  const board = getLeaderboard()
  const rowsContainer = document.getElementById('resultsRows')
  const emptyMsg = document.getElementById('resultsEmptyMsg')
  rowsContainer.innerHTML = ''
  if (board.length === 0) {
    emptyMsg.textContent = isWin ? 'Brak wyników — wygraj i zapisz!' : 'Brak wyników'
  } else {
    emptyMsg.textContent = ''
    const medals = ['🥇', '🥈']
    for (let i = 0; i < Math.min(board.length, 2); i++) {
      const entry = board[i]
      const isMe = isWin && resultsNameEntered && entry.name === resultsPlayerName && i === 0
      const row = document.createElement('div')
      row.className = 'results-row' + (isMe ? ' is-me' : '')
      row.innerHTML = `
        <span class="medal">${medals[i]}</span>
        <span class="name"></span>
        <span class="points">⭐ ${entry.points}</span>
        <span class="win-mark ${entry.win ? 'yes' : 'no'}">${entry.win ? '✔' : '✖'}</span>
      `
      // Nazwa przez textContent (bezpieczeństwo XSS)
      row.querySelector('.name').textContent = entry.name
      rowsContainer.appendChild(row)
    }
  }

  // Pokaż ekran
  screen.classList.remove('hidden')

  // Modal nazwy (tylko wygrana, opóźniony 300ms jak w starym)
  if (isWin && !resultsNameEntered) {
    setTimeout(() => showNameInput(), 300)
  }
}

function hideResults() {
  resultsActive = false
  document.getElementById('resultsScreen').classList.add('hidden')
}

function showNameInput() {
  document.getElementById('nameModalGP')?.remove()
  const isWin = resultsIsWin
  const modal = document.createElement('div')
  modal.id = 'nameModalGP'
  modal.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Arial;`
  modal.innerHTML = `
    <div style="background:linear-gradient(135deg,#1a0030,#0a0020);border:2px solid ${isWin ? '#00ff88' : '#ff4400'};border-radius:20px;padding:36px 44px;text-align:center;box-shadow:0 0 40px ${isWin ? 'rgba(0,255,136,0.4)' : 'rgba(255,68,0,0.4)'};min-width:300px;">
      <div style="font-size:50px;margin-bottom:8px;">${isWin ? '🏆' : '💀'}</div>
      <div style="color:${isWin ? '#00ff88' : '#ff4400'};font-size:26px;font-weight:bold;margin-bottom:6px;">${isWin ? 'WYGRANA!' : 'KONIEC GRY'}</div>
      <div style="color:#aaa;font-size:13px;margin-bottom:18px;">Punkty: <b style="color:#ffcc00">${counters.score}</b> &nbsp;|&nbsp; Życia: <b style="color:#ff6666">${counters.lives}</b></div>
      <div style="color:#ccc;font-size:14px;margin-bottom:10px;">Podaj swoje imię:</div>
      <input id="nameInputGP" maxlength="16" placeholder="Twoje imię..." style="width:100%;padding:11px 14px;font-size:17px;border-radius:10px;border:2px solid #444;background:#111;color:white;outline:none;text-align:center;box-sizing:border-box;">
      <button id="submitScoreBtn" style="margin-top:14px;width:100%;padding:13px;font-size:15px;font-weight:bold;background:linear-gradient(180deg,${isWin ? '#00cc66,#006633' : '#cc3300,#661100'});border:none;border-radius:10px;color:white;cursor:pointer;box-shadow:0 4px 0 ${isWin ? '#003322' : '#330000'};">✔ ZAPISZ WYNIK</button>
    </div>`
  document.body.appendChild(modal)
  setTimeout(() => document.getElementById('nameInputGP')?.focus(), 50)

  const submit = () => {
    const inputEl = document.getElementById('nameInputGP')
    const name = (inputEl?.value?.trim() || 'Gracz').substring(0, 16) || 'Gracz'
    resultsPlayerName = name
    resultsNameEntered = true
    const board = getLeaderboard()
    board.push({
      name, points: counters.score, lives: counters.lives,
      win: resultsIsWin,
      date: new Date().toLocaleDateString('pl-PL')
    })
    board.sort((a, b) => b.points - a.points)
    saveLeaderboard(board.slice(0, 2))
    document.getElementById('nameModalGP')?.remove()
    // Refresh ekranu — pokaż zaktualizowany ranking
    if (resultsActive) {
      hideResults()
      showResults(resultsIsWin)
    }
  }
  document.getElementById('submitScoreBtn')?.addEventListener('click', submit)
  document.getElementById('nameInputGP')?.addEventListener('keydown', e => { if (e.key === 'Enter') submit() })
}

document.addEventListener('DOMContentLoaded', () => {

    counters.score = 0
