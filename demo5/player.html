// === WCZYTYWANIE POZIOMU ===
function loadLevel(levelIndex) {
  currentLevel = levelIndex   // pamiętamy który level jest aktywny (dla key_level)

  // Wyczyść warstwy
  enemyLayer.removeChildren()
  blockLayer.removeChildren()
  bonusLayer.removeChildren()
  bulletLayer.removeChildren()
  fxLayer.removeChildren()
  playerLayer.removeChildren()
  textLayer.removeChildren()

  enemies = []
  blocks = []
  bonuses = []
  bullets = []
  cameraX = 0

  const level = levels[levelIndex]
  if (!level) return

  // Settings — autoScroll może być na poziomie ALBO globalny
  worldWidth = (GAME_DATA.settings && GAME_DATA.settings.worldWidth) || 10000
  // Najpierw global, potem level może nadpisać
  if (GAME_DATA.settings) {
    autoScroll = !!GAME_DATA.settings.autoScroll
    autoScrollSpeed = Number(GAME_DATA.settings.autoScrollSpeed) || 2
  }
  if (level.autoScroll !== undefined) autoScroll = !!level.autoScroll
  if (level.autoScrollSpeed !== undefined) autoScrollSpeed = Number(level.autoScrollSpeed)

  // Statek
  const playerData = (level.players && level.players[0]) || { x: 100, y: 200 }

  // Kontener gracza — zawiera kadłub + płomienie + diody. To pozwala animować części osobno.
  const playerContainer = new PIXI.Container()
  playerContainer.x = playerData.x
  playerContainer.y = playerData.y

  // PŁOMIENIE — dwa, z anchor (1, 0.5) czyli prawa krawędź na pozycji silnika.
  // Pozycja silników w starym kodzie: (-r*0.9, side*r*0.28). Dla r=30: (-27, ±8.4).
  // Sprite flame ma 40px szerokości, anchor (1, 0.5) → renderowany od x do x-40.
  const flameTop = new PIXI.Sprite(TEXTURES.flame)
  flameTop.anchor.set(1, 0.5)
  flameTop.x = -27   // -r*0.9 dla r=30
  flameTop.y = -8.4  // -r*0.28
  playerContainer.addChild(flameTop)

  const flameBottom = new PIXI.Sprite(TEXTURES.flame)
  flameBottom.anchor.set(1, 0.5)
  flameBottom.x = -27
  flameBottom.y = 8.4
  playerContainer.addChild(flameBottom)

  // KADŁUB — statyczna tekstura 96×64 z anchor (0.5)
  const playerSprite = new PIXI.Sprite(TEXTURES.spaceship)
  playerSprite.anchor.set(0.5)
  playerContainer.addChild(playerSprite)

  // DIODY SILNIKÓW — dwie, na pozycji silników (taka sama co płomienie).
  // Anchor (0.5) — wyśrodkowane na obudowie silnika.
  const glowTop = new PIXI.Sprite(TEXTURES.engineGlow)
  glowTop.anchor.set(0.5)
  glowTop.x = -26.4   // -r*0.88
  glowTop.y = -8.4    // -r*0.28
  playerContainer.addChild(glowTop)

  const glowBottom = new PIXI.Sprite(TEXTURES.engineGlow)
  glowBottom.anchor.set(0.5)
  glowBottom.x = -26.4
  glowBottom.y = 8.4
  playerContainer.addChild(glowBottom)

  playerLayer.addChild(playerContainer)
  player = {
    sprite: playerContainer,   // kontener — to on będzie się ruszać
    flames: [flameTop, flameBottom],
    glows: [glowTop, glowBottom],
    x: playerData.x,
    y: playerData.y,
    vx: 0, vy: 0,
    r: 18,
    cooldown: 0
  }

  // Wrogowie
  for (const e of (level.enemies || [])) {
    let textureKey = e.type
    // Mapowanie walker* → walker0/1/2/3
    if (e.type === 'walker') textureKey = 'walker0'
    else if (e.type === 'walker2') textureKey = 'walker1'
    else if (e.type === 'walker3') textureKey = 'walker2'
    else if (e.type === 'walker4') textureKey = 'ufo'

    const tex = TEXTURES[textureKey]
    if (!tex) continue  // pomijam nieobsługiwane typy

    const sprite = new PIXI.Sprite(tex)
    sprite.anchor.set(0.5)
    const w = e.w || 40, h = e.h || 40
    sprite.x = e.x + w/2
    sprite.y = e.y + h/2
    if (textureKey.startsWith('rock')) {
      // Skala asteroidy — tekstura jest 200×200 (HD), target rozmiar to e.w
      sprite.scale.set(w / 200)
    } else if (textureKey === 'saw') {
      // Tekstura 256×256 (HD PNG), target rozmiar to e.w (40)
      sprite.scale.set(w / 256 * 1.4)
    } else if (textureKey === 'ufo') {
      // Tekstura UFO 256×128 (HD PNG), target rozmiar 1.7x e.w żeby UFO było wystarczająco widoczne
      sprite.scale.set(w / 256 * 1.7)
    }
    enemyLayer.addChild(sprite)

    // Dla UFO: dodajemy beam (pod sprite'em) i lampki (na sprite'ie) jako PIXI Graphics — ANIMOWANE
    let ufoBeam = null, ufoLights = null
    if (e.type === 'walker4') {
      ufoBeam = new PIXI.Graphics()
      enemyLayer.addChildAt(ufoBeam, enemyLayer.getChildIndex(sprite))  // pod sprite'em
      ufoLights = new PIXI.Graphics()
      enemyLayer.addChild(ufoLights)  // na sprite'ie
    }

    enemies.push({
      sprite, type: e.type, x: e.x, y: e.y, w, h,
      effects: e.effects ? JSON.parse(JSON.stringify(e.effects)) : [],
      // Dla rocków: zachowujemy rotSpeed i floatTime z JSON (1:1 ze starego)
      rotation: e.rotation || 0,
      rotSpeed: e.rotSpeed != null ? e.rotSpeed : 0.01,
      floatTime: e.floatTime || 0,
      _prevFloat: e._prevFloat || (e.floatTime || 0),
      _baseY: e.y,   // bazowa pozycja Y (do bujania)
      sawAngle: 0,
      ufoBeam, ufoLights,
      ufoTime: 0  // timer animacji UFO
    })
  }

  // Bloki — blockGrid jako TilingSprite z PNG, reszta kolorowe prostokąty
  for (const b of (level.blocks || [])) {
    if (b.typ === 'blockGrid') {
      // TilingSprite tła z kafelkami (40×40 każdy kafel)
      const tile = new PIXI.TilingSprite(TEXTURES.blockgrid, b.w, b.h)
      tile.tileScale.set(40 / 64)  // skalujemy tile do 40px (tekstura jest 64px HD)
      tile.x = b.x
      tile.y = b.y
      blockLayer.addChild(tile)

      // Neonowa ramka na wierzchu (statyczna, świecący cyjan)
      const frame = new PIXI.Graphics()
      // Glow zewnętrzny (półprzezroczysty cyjan, lekko poza blokiem)
      frame.lineStyle(4, 0x00ffff, 0.3)
      frame.drawRect(b.x - 1, b.y - 1, b.w + 2, b.h + 2)
      // Średnia ramka
      frame.lineStyle(2, 0x00ffff, 0.7)
      frame.drawRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2)
      // Ostra ramka wewnętrzna (jasny cyjan)
      frame.lineStyle(1, 0xaaffff, 1)
      frame.drawRect(b.x + 2, b.y + 2, b.w - 4, b.h - 4)

      // 4 białe rogi L-kształtne (jak na screenshocie)
      const cs = Math.min(12, b.w * 0.25, b.h * 0.18)
      frame.lineStyle(2.5, 0xffffff, 1)
      // Lewy-górny
      frame.moveTo(b.x + 2, b.y + cs); frame.lineTo(b.x + 2, b.y + 2); frame.lineTo(b.x + cs, b.y + 2)
      // Prawy-górny
      frame.moveTo(b.x + b.w - cs, b.y + 2); frame.lineTo(b.x + b.w - 2, b.y + 2); frame.lineTo(b.x + b.w - 2, b.y + cs)
      // Lewy-dolny
      frame.moveTo(b.x + 2, b.y + b.h - cs); frame.lineTo(b.x + 2, b.y + b.h - 2); frame.lineTo(b.x + cs, b.y + b.h - 2)
      // Prawy-dolny
      frame.moveTo(b.x + b.w - cs, b.y + b.h - 2); frame.lineTo(b.x + b.w - 2, b.y + b.h - 2); frame.lineTo(b.x + b.w - 2, b.y + b.h - cs)

      blockLayer.addChild(frame)

      blocks.push({ sprite: tile, frame, ...b })
    } else {
      // Pozostałe bloki — zwykłe kolorowe prostokąty (na razie)
      const block = new PIXI.Graphics()
      let color = 0x666666
      if (b.typ === 'blockBomb') color = 0xff4444
      else if (b.typ === 'blockIce') color = 0x88ccff
      else if (b.typ === 'blockTall') color = 0x884400
      block.beginFill(color)
      block.lineStyle(2, 0x222222)
      block.drawRect(0, 0, b.w, b.h)
      block.endFill()
      block.x = b.x
      block.y = b.y
      blockLayer.addChild(block)
      blocks.push({ sprite: block, ...b })
    }
  }

  // Bonusy
  for (const b of (level.bonuses || [])) {
    let tex = TEXTURES.diamond
    if (b.type === 'key_level') tex = TEXTURES.key
    else if (b.type === 'key_win') tex = TEXTURES.finishFlag
    const sprite = new PIXI.Sprite(tex)
    if (b.type === 'key_win') {
      // Flaga "stoi" na ziemi: pkt zaczepienia (b.x, b.y) to środek-podstawa, nie środek tekstury.
      // Tekstura 48×104 ma pkt referencyjny (24, 80) ze starego (środek X, blisko podstawy masztu).
      sprite.anchor.set(24/48, 80/104)  // = (0.5, ~0.77)
    } else {
      sprite.anchor.set(0.5)
    }
    sprite.x = b.x
    sprite.y = b.y
    bonusLayer.addChild(sprite)
    bonuses.push({ sprite, ...b, pulseTime: 0 })
  }

  // === TEKSTY NA ŚWIECIE Z NEONEM (z JSON: texts) ===
  // 1:1 ze starego: { x, y, text, size, font, color, neon, neonColor, outline, outlineColor, outlineWidth }
  // Stary używał shadowBlur:15 + shadowBlur:40 (dwie warstwy poświaty).
  // PIXI nie ma shadowBlur — aproksymujemy 2 nakładkami Text z dropShadow + tekstem głównym.
  for (const t of (level.texts || [])) {
    const fontSize = t.size || 28
    const fontFamily = t.font || "Arial"
    const mainColor = t.color || "#ffffff"
    const neonColor = t.neonColor || "#00ffff"

    // Konwersja '#ffffff' → 0xffffff dla PIXI
    const toHex = (c) => {
      if (typeof c === 'number') return c
      if (typeof c === 'string' && c.startsWith('#')) return parseInt(c.slice(1), 16)
      return 0xffffff
    }
    const mainHex = toHex(mainColor)
    const neonHex = toHex(neonColor)

    if (t.neon) {
      // Warstwa 1: zewnętrzna poświata (mocno rozmazana, alpha 0.5) — odpowiednik shadowBlur:40
      const glowOuter = new PIXI.Text(t.text, {
        fontFamily, fontSize, fontWeight: 'bold',
        fill: neonHex,
        dropShadow: true, dropShadowColor: neonHex,
        dropShadowBlur: 40, dropShadowDistance: 0, dropShadowAlpha: 0.5
      })
      glowOuter.anchor.set(0.5)
      glowOuter.x = t.x; glowOuter.y = t.y
      textLayer.addChild(glowOuter)

      // Warstwa 2: wewnętrzna poświata (ostrzejsza, alpha 0.9) — odpowiednik shadowBlur:15
      const glowInner = new PIXI.Text(t.text, {
        fontFamily, fontSize, fontWeight: 'bold',
        fill: neonHex,
        dropShadow: true, dropShadowColor: neonHex,
        dropShadowBlur: 18, dropShadowDistance: 0, dropShadowAlpha: 0.9
      })
      glowInner.anchor.set(0.5)
      glowInner.x = t.x; glowInner.y = t.y
      textLayer.addChild(glowInner)
    }

    // Główny tekst (ostry kolor, na wierzchu)
    const style = {
      fontFamily, fontSize, fontWeight: 'bold',
      fill: mainHex, align: 'center'
    }
    if (t.outline) {
      style.stroke = toHex(t.outlineColor || "#ffffff")
      style.strokeThickness = t.outlineWidth || 4
      style.lineJoin = 'round'
    }
    const mainText = new PIXI.Text(t.text, style)
    mainText.anchor.set(0.5)
    mainText.x = t.x; mainText.y = t.y
    textLayer.addChild(mainText)
  }

  generateBackground()
}

// === PASEK PRZEŁADOWANIA nad statkiem (1:1 ze starego, world coords) ===
// Stary kod: rysowany gdy burstReload>0, z napisem "ładowanie...", kolory zależne od pct.
// W PIXI: jeden Graphics tworzony raz, redrawany co klatkę gdy widoczny.
const reloadBar = new PIXI.Graphics()
const reloadText = new PIXI.Text('ładowanie...', {
  fontFamily: 'Arial', fontSize: 9, fill: 0xffffff, align: 'center'
})
reloadText.anchor.set(0.5, 0.5)
fxLayer.addChild(reloadBar, reloadText)
reloadBar.visible = false
reloadText.visible = false

function updateReloadBar() {
  if (!player) return
  if (burstReload <= 0) {
    reloadBar.visible = false
    reloadText.visible = false
    return
  }
  reloadBar.visible = true
  reloadText.visible = true
  // Pozycja: nad statkiem, sx = player.x, sy = player.y - r - 16 (jak w starym)
  const sx = player.x, sy = player.y - player.r - 16
  const barW = 50, barH = 5
  const pct = 1 - burstReload / BURST_RELOAD
  const barColor = pct < 0.5 ? 0xff4400 : 0xffcc00

  reloadBar.clear()
  // Tło paska (czarne pół-przezroczyste)
  reloadBar.beginFill(0x000000, 0.5)
  reloadBar.drawRect(sx - barW/2, sy, barW, barH)
  reloadBar.endFill()
  // Wypełnienie (kolor zależny od progresu)
  reloadBar.beginFill(barColor)
  reloadBar.drawRect(sx - barW/2, sy, barW * pct, barH)
  reloadBar.endFill()
  // Glow aproksymacja: większy prostokąt z mniejszą alpha
  reloadBar.beginFill(barColor, 0.3)
  reloadBar.drawRect(sx - barW/2 - 1, sy - 1, barW * pct + 2, barH + 2)
  reloadBar.endFill()

  // Tekst nad paskiem
  reloadText.x = sx
  reloadText.y = sy - 6
}

// === STRZAŁ ===
function shoot() {
  // Reload aktywny — nie strzelaj
  if (burstReload > 0) return
  if (player.cooldown > 0) return
  // Magazynek pełny? (nie powinno się zdarzyć — sprawdzamy poniżej, ale wczesny return safe)
  if (burstCount >= BURST_MAX) return

  const sprite = new PIXI.Sprite(TEXTURES.bullet)
  sprite.anchor.set(5/28, 0.5)
  sprite.x = player.x + 20
  sprite.y = player.y
  bulletLayer.addChild(sprite)
  bullets.push({ sprite, x: player.x + 20, y: player.y, vx: 12 })
  player.cooldown = 4
  burstCount++

  // Wystrzelałeś cały magazynek → uruchom reload
  if (burstCount >= BURST_MAX) {
    burstReload = BURST_RELOAD
    burstCount = 0
  }
}

// === EKSPLOZJA (PARTICLE) — 1:1 ze starego player (4) ===
// 22 cząstki, kąty rozłożone równomiernie + szum, grawitacja, rotacja, drag.
// W PIXI używamy Sprite + tint zamiast Graphics — szybsze (stała tekstura, zmienna tylko transformacja).
// Dwie tekstury: koło i kwadrat. Kolor ustawiamy przez tint.

// Tekstura cząstki KOŁO — biała, 12×12, rysujemy z lekką poświatą (aproksymacja Canvas2D shadowBlur:8)
TEXTURES.particleCircle = createTexture((g) => {
  // Zewnętrzna miękka poświata
  g.beginFill(0xffffff, 0.3)
  g.drawCircle(6, 6, 6)
  g.endFill()
  // Wnętrze — najjaśniejsze, krawędzie ostre
  g.beginFill(0xffffff, 1.0)
  g.drawCircle(6, 6, 4)
  g.endFill()
}, 12, 12)

// Tekstura cząstki KWADRAT — biała, 12×12, z lekką poświatą
TEXTURES.particleRect = createTexture((g) => {
  g.beginFill(0xffffff, 0.3)
  g.drawRect(0, 0, 12, 12)
  g.endFill()
  g.beginFill(0xffffff, 1.0)
  g.drawRect(2, 2, 8, 8)
  g.endFill()
}, 12, 12)

// 8 kolorów ze starego (jako liczby PIXI)
const EXPLOSION_COLORS = [
  0xff4400, 0xff8800, 0xffdd00, 0xff0055,
  0x00ffcc, 0xff00ff, 0xffffff, 0x44ff00
]

// Iskry odbicia pocisku od blockGrid - małe szybkie cyjan punkty
function spawnSparks(x, y) {
  fxLayer['_particles'] = fxLayer['_particles'] || []
  for (let i = 0; i < 10; i++) {
    // Iskry rozlatują się głównie w lewo (bo pocisk leci w prawo) z lekkim szumem
    const angle = Math.PI + (Math.random() - 0.5) * Math.PI * 0.9  // 135-225°
    const speed = 3 + Math.random() * 4
    const sprite = new PIXI.Sprite(TEXTURES.particleCircle)
    sprite.anchor.set(0.5)
    // Cyjanowe iskry, niektóre białe (jak prawdziwe iskry)
    sprite.tint = Math.random() > 0.4 ? 0x00ffff : 0xffffff
    sprite.x = x
    sprite.y = y
    const baseSize = 2 + Math.random() * 3   // mniejsze niż explosion (2..5)
    fxLayer.addChild(sprite)
    fxLayer['_particles'].push({
      sprite,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 0.8,                              // krótsze niż explosion
      decay: 0.04 + Math.random() * 0.03,     // szybciej znikają
      baseSize,
      gravity: 0.15 + Math.random() * 0.1,
      rotSpeed: 0
    })
  }
}

function spawnExplosion(x, y) {
  fxLayer['_particles'] = fxLayer['_particles'] || []
  for (let i = 0; i < 22; i++) {
    // Kąt: równomierne rozłożenie (żeby cząstki rozprysły się we wszystkie strony) + losowy szum
    const angle = (i / 22) * Math.PI * 2 + Math.random() * 0.4
    const speed = 2.5 + Math.random() * 5
    // Wybór tekstury 50/50 koło/kwadrat
    const isCircle = Math.random() > 0.5
    const tex = isCircle ? TEXTURES.particleCircle : TEXTURES.particleRect
    const color = EXPLOSION_COLORS[Math.floor(Math.random() * EXPLOSION_COLORS.length)]
    const sprite = new PIXI.Sprite(tex)
    sprite.anchor.set(0.5)
    sprite.tint = color           // PIXI tint — kolor wymnożony przez teksturę (biała → kolorowa)
    sprite.x = x
    sprite.y = y
    // baseSize to docelowy rozmiar (ze starego: 4 + Math.random() * 6 = 4..10)
    // Tekstura jest 12×12, więc skala = baseSize / 12
    const baseSize = 4 + Math.random() * 6
    sprite.rotation = Math.random() * Math.PI * 2
    fxLayer.addChild(sprite)
    fxLayer['_particles'].push({
      sprite,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,   // -1.5 = lekki wystrzał do góry (jak w starym)
      life: 1.0,                            // 0..1, jak w starym
      decay: 0.02 + Math.random() * 0.025,
      baseSize,
      gravity: 0.12 + Math.random() * 0.1,
      rotSpeed: (Math.random() - 0.5) * 0.25
    })
  }
}

// === GŁÓWNA PĘTLA — UPDATE + RENDER (PIXI render automatyczne!) ===
// Helper - aplikuje effects.move na pojedynczy obiekt (blok/wróg)
// Optymalizacja: brak alokacji nowych tablic w pętli update
function applyMoveEffect(obj, delta) {
  if (!obj.effects) return
  for (let i = 0; i < obj.effects.length; i++) {
    const eff = obj.effects[i]
    if (eff.type !== 'move' || eff.enabled === false) continue
    const step = eff.speed * delta
    const dx = eff.dx * step
    const dy = eff.dy * step
    obj.x += dx
    obj.y += dy
    eff.travel = (eff.travel || 0) + step
    if (eff.travel >= eff.distance) {
      if (eff.loop) { eff.dx *= -1; eff.dy *= -1; eff.travel = 0 }
      else eff.speed = 0
    }
    if (obj.sprite) { obj.sprite.x += dx; obj.sprite.y += dy }
    if (obj.frame) { obj.frame.x += dx; obj.frame.y += dy }
  }
}

function update(delta) {
  // Efekt przejścia między poziomami — działa NIEZALEŻNIE od gameRunning
  // (gameRunning=false podczas transition, ale animacja Matrix musi lecieć)
  if (levelTransition) {
    updateLevelTransition()
    return  // przerywamy całą resztę logiki — gracz, wrogowie, kolizje wszystko stoi
  }
  if (!player) return
  if (!gameRunning) return  // 📋 Menu otwarte → pauza gameplay (renderowanie i tak działa)

  // === AUTO-SCROLL — statek płynie z kamerą + boost gdy lecisz w prawo ===
  if (autoScroll) {
    const cameraAtEnd = cameraX >= worldWidth - CANVAS_WIDTH - 0.5
    let currentScrollSpeed = autoScrollSpeed

    if (!cameraAtEnd) {
      // Boost — gdy gracz jest w prawej połowie ekranu, kamera przyspiesza
      const screenPos = (player.x - cameraX) / CANVAS_WIDTH
      const boostTarget = screenPos > 0.4
        ? 1 + Math.min((screenPos - 0.4) * 1.0, 0.6)
        : 1.0
      scrollBoost += (boostTarget - scrollBoost) * 0.05
      currentScrollSpeed = autoScrollSpeed * scrollBoost

      cameraX += currentScrollSpeed * delta
      // KLUCZOWE: statek "płynie razem z kamerą" — zachowuje pozycję względem ekranu
      player.x += currentScrollSpeed * delta
    } else {
      // Koniec planszy — zatrzymaj scroll, gracz steruje swobodnie
      scrollBoost = 1
    }

    cameraX = Math.max(0, Math.min(cameraX, worldWidth - CANVAS_WIDTH))
  }

  // Sterowanie statku — klawisze z JSON
  const speed = 4 * delta
  if (keys[CONTROLS.lewo])  player.vx = -speed
  else if (keys[CONTROLS.prawo]) player.vx = speed
  else player.vx *= 0.9
  if (keys[CONTROLS.skok])  player.vy = -speed
  else if (keys[CONTROLS.dol])  player.vy = speed
  else player.vy *= 0.9

  player.x += player.vx
  player.y += player.vy

  // Granice
  player.x = Math.max(cameraX + 20, Math.min(player.x, cameraX + CANVAS_WIDTH - 20))
  player.y = Math.max(20, Math.min(player.y, CANVAS_HEIGHT - 20))

  // === ANIMACJE STATKU (1:1 ze starego drawSpaceship) ===
  // Bazują na czasie w sekundach, dokładnie jak w oryginale: const t = time * 0.001
  const t = performance.now() * 0.001

  // Hover — statek faluje góra-dół: sin(t * 2.2) * 2.5
  // Wpływa TYLKO na pozycję sprite'a (kolizje używają czystego player.y)
  const hover = Math.sin(t * 2.2) * 2.5
  player.sprite.x = player.x
  player.sprite.y = player.y + hover

  // Płomienie — długość: 14 + sin(t*18 + side) * 6 → bazowa skala 1.0, oscyluje ±0.43
  // side = -1 (top), +1 (bottom). Tekstura ma 40px szerokości; bazowy "flameLen" w starym = 14+
  // Mapowanie: scale.x = (14 + sin(t*18 + side)*6) / 20  (gdzie 20 to bazowa szerokość tekstury widzialna)
  const flameLenTop    = (14 + Math.sin(t * 18 - 1) * 6) / 20
  const flameLenBottom = (14 + Math.sin(t * 18 + 1) * 6) / 20
  player.flames[0].scale.x = flameLenTop
  player.flames[1].scale.x = flameLenBottom

  // Diody silników — pulsowanie: sin(t*12 + side*1.5)*0.3 + 0.7 → zakres 0.4..1.0
  player.glows[0].alpha = Math.sin(t * 12 - 1.5) * 0.3 + 0.7
  player.glows[1].alpha = Math.sin(t * 12 + 1.5) * 0.3 + 0.7

  // Strzelanie — klawisz z JSON
  if (keys[CONTROLS.strzal]) shoot()
  if (player.cooldown > 0) player.cooldown--
  // Reload odlicza się co klatkę
  if (burstReload > 0) burstReload--
  // Aktualizuj wizualny pasek przeładowania nad statkiem
  updateReloadBar()

  // Update kontenerów wg kamery — przesuwamy CAŁE warstwy o cameraX
  enemyLayer.x = -cameraX
  blockLayer.x = -cameraX
  bonusLayer.x = -cameraX
  bulletLayer.x = -cameraX
  fxLayer.x = -cameraX
  playerLayer.x = -cameraX
  textLayer.x = -cameraX
  // Tło z parallax (sam offset bgLayer wystarczy, gwiazdy ruszają się razem)
  bgLayer.x = -cameraX * 0.3

  // === ANIMACJE TŁA — cząstki neon/snow + hiperprzestrzeń (screen space, bgFxLayer) ===
  // Cyjanowe cząstki (neon) — padają z migotaniem, wraparound
  if (currentBgType === 'neon') {
    const t = Date.now() / 300
    for (let i = 0; i < bgParticles.length; i++) {
      const p = bgParticles[i]
      p.y += p._speed * delta
      if (p.y > CANVAS_HEIGHT) p.y = -5
      p.alpha = 0.75 + Math.sin(t + p._phase) * 0.25
    }
  }
  // Białe cząstki (snow) — padają szybciej, wraparound
  if (currentBgType === 'snow') {
    for (let i = 0; i < snowParticles.length; i++) {
      const p = snowParticles[i]
      p.y += p._speed * delta * 2
      if (p.y > CANVAS_HEIGHT) {
        p.y = -5
        p.x = Math.random() * CANVAS_WIDTH
      }
    }
  }
  // Hiperprzestrzeń — overlay smug światła przy boost
  updateHyperspace(delta)

  // Asteroidy się obracają i lewitują (1:1 ze starego)
  // Stary: obj.rotation += obj.rotSpeed; obj.floatTime += 0.04; obj.y += (sin(t)-sin(prev))*12
  for (const e of enemies) {
    if (e.type.startsWith('rock')) {
      e.rotation += (e.rotSpeed || 0.01) * delta
      e.sprite.rotation = e.rotation
      // Lewitacja — bujanie góra-dół przez sin
      const prevFloat = e._prevFloat || 0
      e.floatTime = (e.floatTime || 0) + 0.04 * delta
      e.y += (Math.sin(e.floatTime) - Math.sin(prevFloat)) * 12
      e._prevFloat = e.floatTime
      // Aktualizuj pozycję sprite'a (kamera + offset bujania)
      e.sprite.y = e.y + e.h / 2
    } else if (e.type === 'saw') {
      e.sawAngle += 0.06 * delta
      e.sprite.rotation = e.sawAngle
      // Lewitacja - tak jak meteoryty
      const prevFloat = e._prevFloat || 0
      e.floatTime = (e.floatTime || 0) + 0.04 * delta
      e.y += (Math.sin(e.floatTime) - Math.sin(prevFloat)) * 12
      e._prevFloat = e.floatTime
      e.sprite.y = e.y + e.h / 2
    } else if (e.type === 'walker4') {
      // UFO - hover + animowany beam + pulsujące lampki
      e.ufoTime = (e.ufoTime || 0) + 0.045 * delta
      const t = e.ufoTime
      const hover = Math.sin(t * 1.5) * 5  // 1:1 ze starego
      const cx = e.sprite.x
      const cy = e.y + e.h / 2 + hover

      e.sprite.y = cy

      // BEAM zielony - trapez z gradientem (animowany alpha)
      if (e.ufoBeam) {
        e.ufoBeam.clear()
        const beamAlpha = 0.15 + Math.sin(t * 3) * 0.1
        // Trapez: górny węższy (przy dysku), dolny szerszy
        const bw = e.w
        const bTopY = cy + e.h * 0.18
        const bBotY = cy + e.h * 0.9
        // Rysujemy gradient ręcznie - 3 nakładające się trapezy malejące alfą
        for (let i = 0; i < 6; i++) {
          const a = beamAlpha * (1 - i / 6) + 0.05
          const yPos = bTopY + (bBotY - bTopY) * (i / 6)
          const yPosNext = bTopY + (bBotY - bTopY) * ((i + 1) / 6)
          const wTop = bw * (0.22 + (0.5 - 0.22) * (i / 6)) * 2
          const wBot = bw * (0.22 + (0.5 - 0.22) * ((i + 1) / 6)) * 2
          e.ufoBeam.beginFill(0x64ff64, a)
          e.ufoBeam.drawPolygon([
            cx - wTop / 2, yPos,
            cx + wTop / 2, yPos,
            cx + wBot / 2, yPosNext,
            cx - wBot / 2, yPosNext
          ])
          e.ufoBeam.endFill()
        }
      }

      // LAMPKI - 5 pulsujących na dysku
      if (e.ufoLights) {
        e.ufoLights.clear()
        const lightOffsets = [-0.35, -0.18, 0, 0.18, 0.35]
        for (let i = 0; i < lightOffsets.length; i++) {
          const phase = (t * 4 + i * 1.2) % (Math.PI * 2)
          const on = Math.sin(phase) > 0
          const lx = cx + e.w * lightOffsets[i] * 1.7
          const ly = cy + e.h * 0.22 + hover * 0  // (już na cy)
          // Glow zewnętrzny gdy włączone
          if (on) {
            e.ufoLights.beginFill(0xffee00, 0.4)
            e.ufoLights.drawCircle(lx, ly, 7)
            e.ufoLights.endFill()
            e.ufoLights.beginFill(0xffee00, 0.7)
            e.ufoLights.drawCircle(lx, ly, 4.5)
            e.ufoLights.endFill()
            e.ufoLights.beginFill(0xffffaa, 1)
            e.ufoLights.drawCircle(lx, ly, 2.5)
            e.ufoLights.endFill()
          } else {
            e.ufoLights.beginFill(0x555544, 1)
            e.ufoLights.drawCircle(lx, ly, 3)
            e.ufoLights.endFill()
          }
        }
      }
    }
  }

  // Pociski — update + culling
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i]
    b.x += b.vx * delta
    b.sprite.x = b.x
    b.sprite.y = b.y

    // Poza ekranem?
    if (b.x > cameraX + CANVAS_WIDTH + 50) {
      bulletLayer.removeChild(b.sprite)
      bullets.splice(i, 1)
      continue
    }

    // Kolizja z wrogami
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j]
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        spawnExplosion(e.x + e.w/2, e.y + e.h/2)
        enemyLayer.removeChild(e.sprite)
        // UFO ma dodatkowe elementy (beam i lampki) - sprzątamy je też
        if (e.ufoBeam) enemyLayer.removeChild(e.ufoBeam)
        if (e.ufoLights) enemyLayer.removeChild(e.ufoLights)
        enemies.splice(j, 1)
        bulletLayer.removeChild(b.sprite)
        bullets.splice(i, 1)
        counters.score++
        break
      }
    }

    // Sprawdzamy czy pocisk dalej istnieje (mógł zostać usunięty przez kolizję z wrogiem)
    if (!bullets[i]) continue

    // Kolizja z blockGrid - iskry + pocisk znika
    for (const block of blocks) {
      if (block.typ !== 'blockGrid') continue
      if (b.x > block.x && b.x < block.x + block.w && b.y > block.y && b.y < block.y + block.h) {
        spawnSparks(b.x, b.y)
        bulletLayer.removeChild(b.sprite)
        bullets.splice(i, 1)
        break
      }
    }
  }

  // Bonusy — pulsowanie + kolizja z graczem
  for (let i = bonuses.length - 1; i >= 0; i--) {
    const b = bonuses[i]
    // Flaga mety NIE pulsuje (w starym też nie). Reszta tak.
    if (b.type !== 'key_win') {
      b.pulseTime = (b.pulseTime || 0) + 0.05 * delta
      b.sprite.scale.set(1 + Math.sin(b.pulseTime) * 0.1)
    }
    // Kolizja z graczem
    const dist = Math.hypot(player.x - b.x, player.y - b.y)
    if (dist < 25) {
      // === KEY_LEVEL — przejście do innego poziomu (z efektem Matrix) ===
      if (b.type === 'key_level') {
        const target = b.targetLevel || 0
        if (target >= levels.length) {
          console.warn('Klucz prowadzi do poziomu który nie istnieje:', target)
          bonusLayer.removeChild(b.sprite)
          bonuses.splice(i, 1)
          continue
        }
        // Najpierw usuń klucz z ekranu (żeby nie wisiał za matrixem),
        // potem uruchom transition — loadLevel wywołane PO 180 klatkach z updateLevelTransition()
        bonusLayer.removeChild(b.sprite)
        bonuses.splice(i, 1)
        startLevelTransition(target)
        return  // przerywamy pętlę bonusów — gameRunning=false do końca transition
      }
      // === KEY_WIN — koniec gry, ekran wygranej ===
      if (b.type === 'key_win') {
        bonusLayer.removeChild(b.sprite)
        bonuses.splice(i, 1)
        showResults(true)
        return
      }
      // === ZWYKŁY DIAMENT — punkty + bonus życia ===
      bonusLayer.removeChild(b.sprite)
      bonuses.splice(i, 1)
      counters.score += 10
      counters.diamonds++

      // Bonus życia co N diamentów (max 9 razy)
      const settings = (GAME_DATA && GAME_DATA.settings) || {}
      if (settings.useBonusLives && counters.bonusLivesGiven < 9) {
        const N = settings.livesPerDiamonds || 10
        if (counters.diamonds % N === 0) {
          counters.lives++
          counters.bonusLivesGiven++
          // Floating text "+1 ❤️" nad statkiem
          const bonusText = new PIXI.Text('+1 ❤️', {
            fontFamily: 'Arial', fontSize: 28, fontWeight: 'bold',
            fill: 0xff5577, stroke: 0xffffff, strokeThickness: 4,
            dropShadow: true, dropShadowColor: 0xff0000,
            dropShadowBlur: 12, dropShadowDistance: 0
          })
          bonusText.anchor.set(0.5)
          bonusText.x = player.x
          bonusText.y = player.y - 40
          bonusText._life = 60  // ~1 sekunda przy 60 fps
          bonusText._isLifeBonus = true
          fxLayer.addChild(bonusText)
        }
      }
    }
  }

  // Update floating bonus textów (fade out + ruch w górę)
  for (let i = fxLayer.children.length - 1; i >= 0; i--) {
    const t = fxLayer.children[i]
    if (!t._isLifeBonus) continue
    t._life -= delta
    t.y -= 1.5 * delta
    t.alpha = Math.max(0, t._life / 60)
    if (t._life <= 0) {
      fxLayer.removeChild(t)
    }
  }

  // Particle update — fizyka 1:1 ze starego: grawitacja, drag, rotacja, zmienny rozmiar
  if (fxLayer._particles) {
    for (let i = fxLayer._particles.length - 1; i >= 0; i--) {
      const p = fxLayer._particles[i]
      // Pozycja
      p.sprite.x += p.vx * delta
      p.sprite.y += p.vy * delta
      // Fizyka: grawitacja ciągnie w dół, drag spowalnia poziomy ruch
      p.vy += p.gravity * delta
      p.vx *= Math.pow(0.97, delta)   // delta-aware drag (przy delta=1 to zwykłe *=0.97)
      // Rotacja
      p.sprite.rotation += p.rotSpeed * delta
      // Życie i widoczność
      p.life -= p.decay * delta
      p.sprite.alpha = Math.max(0, p.life)
      // Rozmiar maleje wraz z życiem (size * life w starym → skalowanie sprite'a)
      const targetScale = (p.baseSize * p.life) / 12   // tekstura jest 12×12
      p.sprite.scale.set(Math.max(0, targetScale))
      // Usuwanie martwych
      if (p.life <= 0) {
        fxLayer.removeChild(p.sprite)
        fxLayer._particles.splice(i, 1)
      }
    }
  }

  // === WSPÓLNA LOGIKA EFFECTS.MOVE (bloki + wrogowie) — 1:1 ze starego ===
  // UWAGA: NIE używamy [...blocks, ...enemies] bo to alokuje tablicę co klatkę i morduje GC.
  // Każdy obiekt z effects.move lata po ścieżce: dx, dy, speed, distance, loop
  for (let i = 0; i < blocks.length; i++) applyMoveEffect(blocks[i], delta)
  for (let i = 0; i < enemies.length; i++) applyMoveEffect(enemies[i], delta)

  // Kolizje statku z wrogami
  for (const e of enemies) {
    if (player.x + player.r > e.x && player.x - player.r < e.x + e.w &&
        player.y + player.r > e.y && player.y - player.r < e.y + e.h) {
      counters.lives--
      spawnExplosion(player.x, player.y)
      // Reset pozycji
      player.x = cameraX + 100
      if (counters.lives <= 0) {
        // Game over — ekran przegranej
        showResults(false)
        return
      }
      break
    }
  }

  // Kolizje statku z blockGrid (zabójcze, jak wrogowie)
  for (const b of blocks) {
    if (b.typ !== 'blockGrid') continue
    if (player.x + player.r > b.x && player.x - player.r < b.x + b.w &&
        player.y + player.r > b.y && player.y - player.r < b.y + b.h) {
      counters.lives--
      spawnExplosion(player.x, player.y)
      player.x = cameraX + 100
      if (counters.lives <= 0) {
        showResults(false)
        return
      }
      break
    }
  }

  // Aktualizuj HUD
  document.getElementById('hud-lives').textContent = counters.lives
  document.getElementById('hud-score').textContent = counters.score
  // Wskaźnik aktualnej rundy (na canvasie, obok FPS)
  const badge = document.getElementById('levelBadge')
  if (badge && levels.length > 0) {
    const txt = `RUNDA ${currentLevel + 1}/${levels.length}`
    if (badge.textContent !== txt) badge.textContent = txt   // optymalizacja — zmiana tylko gdy potrzeba
  }
  // HUD: zamiast counters.ammo, pokazujemy magazynek serii lub "ładowanie..."
  const ammoEl = document.getElementById('hud-ammo')
  if (burstReload > 0) {
    const sec = (burstReload / 60).toFixed(1)
    ammoEl.textContent = `🔄 ${sec}s`
  } else {
    ammoEl.textContent = `${BURST_MAX - burstCount}/${BURST_MAX}`
  }
  document.getElementById('stat-enemies').textContent = enemies.length
  document.getElementById('stat-bullets').textContent = bullets.length
  document.getElementById('stat-drawn').textContent = enemies.length + blocks.length + bonuses.length + bullets.length

  // FPS counter
  frameCount++
  const now = performance.now()
  if (now - lastFpsTime >= 500) {
    const fps = Math.round((frameCount * 1000) / (now - lastFpsTime))
    fpsHistory.push(fps)
    if (fpsHistory.length > 5) fpsHistory.shift()
    const avgFps = Math.round(fpsHistory.reduce((a,b)=>a+b,0) / fpsHistory.length)
    const fpsEl = document.getElementById('fps-counter')
    fpsEl.textContent = `FPS: ${avgFps}`
    fpsEl.style.color = avgFps >= 50 ? '#0f0' : avgFps >= 30 ? '#ff0' : '#f00'
    frameCount = 0
    lastFpsTime = now
  }
}

// === RESTART ===
function restartGame() {
  counters = { lives: 3, score: 0, ammo: 100, diamonds: 0, bonusLivesGiven: 0 }
  loadLevel(0)
  showMenu()  // 📋 Po restarcie też pokaż menu
}

// === WCZYTYWANIE JSON Z PLIKU ===
function handleFileLoad(event) {
  const file = event.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = function(e) {
    try {
      const newData = JSON.parse(e.target.result)
      if (!newData.levels || newData.levels.length === 0) {
        alert('❌ Nieprawidłowy plik JSON — brak poziomów')
        return
      }
      // Wczytaj nową grę
      GAME_DATA = newData
      levels = GAME_DATA.levels
      counters = { lives: 3, score: 0, ammo: 100, diamonds: 0, bonusLivesGiven: 0 }
      loadControls()  // 🎮 wczytaj sterowanie z JSON

      // Zaktualizuj nazwę gry
      const gameName = (GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || file.name.replace('.json', '')
      document.getElementById('current-game').textContent = gameName

      loadLevel(0)
      showMenu()  // 📋 Pokaż menu z opisem gry
      console.log(`✅ Wczytano: ${gameName} (${levels.length} poziomów)`)
    } catch(err) {
      alert(`❌ Błąd wczytywania pliku: ${err.message}`)
      console.error(err)
    }
  }
  reader.onerror = () => alert('❌ Nie udało się odczytać pliku')
  reader.readAsText(file)
  // Reset input żeby można było wczytać ten sam plik ponownie
  event.target.value = ''
}

// === MENU STARTOWE ===
function showMenu() {
  if (!GAME_DATA) return
  gameRunning = false  // pauzujemy grę

  const s = GAME_DATA.settings || {}
  const title = s.nazwaGry || 'Bez tytułu'
  const author = s.autorGry || 'Nieznany'
  const description = s.opisGry || 'Brak opisu gry.'

  document.getElementById('menu-title').textContent = title
  document.getElementById('menu-author').textContent = `Autor: ${author}`
  document.getElementById('menu-description').textContent = description

  // Sterowanie z CONTROLS (już wczytane przez loadControls)
  const c = CONTROLS
  document.getElementById('menu-controls').innerHTML = `
    <strong>Sterowanie:</strong><br>
    <kbd>${keyLabel(c.lewo)}</kbd> <kbd>${keyLabel(c.prawo)}</kbd> ruch poziomy
    <kbd>${keyLabel(c.skok)}</kbd> <kbd>${keyLabel(c.dol)}</kbd> ruch pionowy
    <kbd>${keyLabel(c.strzal)}</kbd> strzał
  `

  document.getElementById('menu-overlay').classList.remove('hidden')
}

function startGameplay() {
  document.getElementById('menu-overlay').classList.add('hidden')
  gameRunning = true
}

// === WCZYTANIE WBUDOWANEJ GRY (KARTRIDŻ) ===
function loadDemo() {
  try {
    GAME_DATA = JSON.parse(GAME_DATA_INLINE)
    levels = GAME_DATA.levels || []
    counters = { lives: 3, score: 0, ammo: 100, diamonds: 0, bonusLivesGiven: 0 }
    loadControls()  // 🎮 wczytaj sterowanie z JSON
    const gameName = (GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || 'Demo'
    document.getElementById('current-game').textContent = gameName
    loadLevel(0)
    showMenu()  // 📋 Pokaż menu z opisem gry
    console.log(`✅ Wczytano demo: ${gameName}`)
  } catch(e) {
    alert(`❌ Błąd: ${e.message}`)
  }
}

// === START ===
function startGame() {
  try {
    GAME_DATA = JSON.parse(GAME_DATA_INLINE)
    levels = GAME_DATA.levels || []
    if (levels.length === 0) throw new Error('Brak poziomów')
    loadControls()  // 🎮 wczytaj sterowanie z JSON
    const gameName = (GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || 'Demo'
    document.getElementById('current-game').textContent = gameName
    loadLevel(0)
    showMenu()  // 📋 Pokaż menu z opisem gry przed startem
    app.ticker.add(update)
    console.log('✅ Gra uruchomiona — renderuje na', rendererType)
  } catch(e) {
    console.error('❌ Błąd:', e)
    document.getElementById('game-container').innerHTML = `<div style="color:red;padding:20px">Błąd: ${e.message}</div>`
  }
}
