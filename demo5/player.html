<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini-Klik PIXI Prototyp — Kosmiczna Gra na GPU</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: white;
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow: hidden;
  }
  h1 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff;
  }
  .info-bar {
    background: rgba(0, 247, 255, 0.1);
    border: 1px solid rgba(0, 247, 255, 0.3);
    padding: 8px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #88ddff;
  }
  #game-container {
    position: relative;
    border: 2px solid #00f7ff;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0, 247, 255, 0.5);
    background: #000;
  }
  #fps-counter {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #0f0;
    font-family: 'Consolas', monospace;
    font-weight: bold;
    font-size: 18px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(0, 255, 0, 0.5);
    z-index: 100;
    pointer-events: none;
  }
  #levelBadge {
    position: absolute;
    top: 10px;
    left: 110px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    color: #ffe97a;
    letter-spacing: 2px;
    padding: 6px 14px;
    background: linear-gradient(180deg, #2a1a4a, #120828);
    border: 2px solid #ff9e3d;
    border-radius: 10px;
    text-shadow: 0 0 8px #ff9e3d;
    box-shadow: 0 0 12px rgba(255, 158, 61, 0.45), inset 0 0 8px rgba(255, 200, 100, 0.2);
    white-space: nowrap;
    user-select: none;
    z-index: 100;
    pointer-events: none;
    animation: levelGlow 2.5s ease-in-out infinite alternate;
  }
  @keyframes levelGlow {
    from { box-shadow: 0 0 10px rgba(255,158,61,0.3), inset 0 0 6px rgba(255,200,100,0.15); }
    to   { box-shadow: 0 0 20px rgba(255,158,61,0.7), inset 0 0 12px rgba(255,200,100,0.3); }
  }
  #stats-panel {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #aaa;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    line-height: 1.6;
    z-index: 100;
    pointer-events: none;
  }
  #hud {
    position: absolute;
    top: 10px;
    right: 10px;
    color: white;
    font-family: 'Consolas', monospace;
    font-size: 14px;
    text-align: right;
    z-index: 100;
    text-shadow: 0 0 8px black;
    pointer-events: none;
  }
  .controls {
    margin-top: 12px;
    font-size: 12px;
    color: #888;
    text-align: center;
  }
  .controls kbd {
    background: #333;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid #555;
    font-family: monospace;
    margin: 0 2px;
  }

  /* === PANEL PRZYCISKÓW WCZYTYWANIA === */
  .button-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ctrl-btn {
    background: linear-gradient(180deg, #1a3a55 0%, #0a2a45 100%);
    border: 2px solid #00f7ff;
    color: white;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Arial', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
    box-shadow: 0 0 12px rgba(0, 247, 255, 0.3);
    user-select: none;
  }
  .ctrl-btn:hover {
    background: linear-gradient(180deg, #2a5a85 0%, #1a4a75 100%);
    box-shadow: 0 0 18px rgba(0, 247, 255, 0.6);
    transform: translateY(-1px);
  }
  .ctrl-btn:active {
    transform: translateY(1px);
    box-shadow: 0 0 8px rgba(0, 247, 255, 0.4);
  }
  .ctrl-btn.demo-btn {
    border-color: #00ff88;
    box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
  }
  .ctrl-btn.demo-btn:hover {
    box-shadow: 0 0 18px rgba(0, 255, 136, 0.6);
  }
  .ctrl-btn.restart-btn {
    border-color: #ffaa00;
    box-shadow: 0 0 12px rgba(255, 170, 0, 0.3);
  }
  .ctrl-btn.restart-btn:hover {
    box-shadow: 0 0 18px rgba(255, 170, 0, 0.6);
  }
  #file-input { display: none; }
  .game-name {
    color: #88ddff;
    font-size: 13px;
    margin-bottom: 8px;
    font-family: monospace;
  }

  /* === MENU STARTOWE (overlay) === */
  #menu-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(0,15,40,0.95), rgba(10,30,60,0.95));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 200;
    backdrop-filter: blur(4px);
    text-align: center;
  }
  #menu-overlay.hidden { display: none; }
  #menu-title {
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(90deg, #00f7ff, #88aaff, #ff88ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0, 247, 255, 0.5);
    letter-spacing: 2px;
  }
  #menu-author {
    font-size: 13px;
    color: #88ddff;
    margin-bottom: 20px;
    font-style: italic;
  }
  #menu-author::before { content: "✨ "; }
  #menu-description {
    font-size: 14px;
    color: #ddffff;
    max-width: 600px;
    line-height: 1.6;
    margin-bottom: 24px;
    padding: 12px 18px;
    background: rgba(0, 247, 255, 0.05);
    border-left: 3px solid #00f7ff;
    border-right: 3px solid #00f7ff;
    border-radius: 4px;
  }
  #menu-controls {
    font-size: 12px;
    color: #aaccdd;
    margin-bottom: 32px;
    text-align: center;
    line-height: 1.8;
    max-width: 720px;
  }
  #menu-controls strong {
    display: inline-block;
    margin-bottom: 14px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  #menu-controls kbd {
    background: rgba(0, 247, 255, 0.1);
    border: 1px solid rgba(0, 247, 255, 0.4);
    padding: 3px 8px;
    border-radius: 4px;
    margin: 0 3px;
    font-family: monospace;
  }
  #menu-start-btn {
    background: linear-gradient(180deg, #0a5a55 0%, #093a35 100%);
    border: 2px solid #00ff88;
    color: white;
    padding: 14px 50px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Arial', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    transition: all 0.15s;
    animation: pulse 2s infinite;
  }
  #menu-start-btn:hover {
    background: linear-gradient(180deg, #1a8a85 0%, #196a65 100%);
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
    transform: translateY(-2px);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
    50% { box-shadow: 0 0 35px rgba(0, 255, 136, 0.9); }
  }
  /* ════════════ MOBILE NAVIGATION (proste przyciski) ════════════ */
  .canvas-nav-group {
    position: absolute;
    bottom: 70px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 50;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .canvas-nav-group.left-group { left: 12px; }
  .canvas-nav-group.right-group { right: 12px; }

  .nav-arrow {
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(60, 80, 120, 0.35) 0%, rgba(30, 40, 70, 0.35) 100%);
    border: 1px solid rgba(120, 180, 255, 0.4);
    border-radius: 14px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 32px;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(80, 130, 200, 0.25);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .nav-arrow:active {
    background: linear-gradient(180deg, rgba(100, 140, 200, 0.7) 0%, rgba(60, 80, 130, 0.7) 100%);
    color: white;
  }

  /* Przycisk STRZAŁ — czerwony, w lewej grupie zamiast ▲ */
  .nav-arrow.nav-shoot-arrow {
    background: linear-gradient(180deg, rgba(200, 60, 60, 0.45) 0%, rgba(140, 30, 30, 0.45) 100%);
    border-color: rgba(255, 100, 100, 0.55);
    box-shadow: 0 0 10px rgba(220, 80, 80, 0.35);
    font-size: 36px;
  }
  .nav-arrow.nav-shoot-arrow:active {
    background: linear-gradient(180deg, rgba(240, 100, 100, 0.85) 0%, rgba(180, 50, 50, 0.85) 100%);
  }

  /* Domyślnie ukryte — pokazują się po kliknięciu "🕹 NAWIGACJA" */
  .hidden-nav { display: none !important; }

  /* Przycisk NAWIGACJA */
  .ctrl-btn.nav-btn {
    border-color: #66ddaa;
    box-shadow: 0 0 10px rgba(102, 221, 170, 0.3);
  }
  .ctrl-btn.nav-btn.active {
    background: linear-gradient(180deg, #338866 0%, #226644 100%);
    box-shadow: 0 0 15px rgba(102, 221, 170, 0.6);
  }

  /* ════════════════════════════════════════════════════════════════ */
  /* STYLE V2 — niebieski podwodny portal mini-klik */
  /* ════════════════════════════════════════════════════════════════ */

  /* Body — niebieski gradient podwodny */
  body {
    background: linear-gradient(180deg, #0a3550 0%, #134a6f 30%, #0d3050 70%, #061830 100%) !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: flex-start !important;
    min-height: 100vh !important;
    padding: 12px 20px 40px 20px !important;
    gap: 10px !important;
    position: relative !important;
    overflow: hidden !important;
  }
  html { overflow: hidden; }

  /* Promienie światła od góry */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 400px 800px at 20% -10%, rgba(120, 200, 255, 0.18), transparent 70%),
      radial-gradient(ellipse 500px 900px at 80% -20%, rgba(100, 180, 240, 0.12), transparent 70%),
      radial-gradient(ellipse 300px 600px at 50% 0%, rgba(150, 220, 255, 0.1), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Bąbelki — animowane */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(circle 3px at 10% 90%, rgba(180, 230, 255, 0.4), transparent 4px),
      radial-gradient(circle 5px at 25% 95%, rgba(200, 240, 255, 0.3), transparent 6px),
      radial-gradient(circle 4px at 45% 85%, rgba(180, 230, 255, 0.35), transparent 5px),
      radial-gradient(circle 6px at 65% 92%, rgba(200, 240, 255, 0.3), transparent 7px),
      radial-gradient(circle 3px at 80% 88%, rgba(180, 230, 255, 0.4), transparent 4px),
      radial-gradient(circle 4px at 95% 93%, rgba(200, 240, 255, 0.3), transparent 5px),
      radial-gradient(circle 3px at 15% 75%, rgba(180, 230, 255, 0.3), transparent 4px),
      radial-gradient(circle 5px at 55% 70%, rgba(200, 240, 255, 0.25), transparent 6px),
      radial-gradient(circle 3px at 85% 65%, rgba(180, 230, 255, 0.3), transparent 4px);
    animation: bubbleRise 15s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes bubbleRise {
    0% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }

  /* Kontent nad dekoracjami */
  #playerFrame, h1 { position: relative; z-index: 1; }

  /* RAMKA GRACZA */
  #playerFrame {
    background: linear-gradient(145deg, #0f2a44 0%, #1a3d5f 100%);
    border: 3px solid #2a6a9a;
    border-radius: 20px;
    padding: 14px 16px 12px 16px;
    box-shadow:
      0 0 40px rgba(0,0,0,0.6),
      0 0 80px rgba(80,180,255,0.2),
      inset 0 1px 0 rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-width: 840px;
    width: 100%;
  }

  /* TITLE BAR (nad grą) */
  #titleBar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 8px;
  }
  #gameTitle {
    font-size: 18px;
    font-weight: bold;
    color: #adf;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #4af;
  }

  /* STATUS BAR (pod grą) */
  #statusBar {
    font-size: 12px;
    color: #6a9dc0;
    text-align: center;
    padding: 2px 0;
    width: 100%;
  }

  /* OVERRIDE: button-bar w playerFrame ma być częścią title-bara, więc zniknie z domyślnej lokalizacji */
  #playerFrame .button-bar {
    margin: 0;
    padding: 0;
    background: none;
    box-shadow: none;
    border: none;
  }

  /* ════════════════════════════════════════════════════════════════ */
  /* RESPONSYWNOŚĆ — hybryda: desktop 800×450 ostro, mobile CSS scale */
  /* ════════════════════════════════════════════════════════════════ */

  /* game-container ZAWSZE max 800px szerokości, ale zwija się elastycznie */
  #game-container {
    width: 100%;
    max-width: 800px;
    /* aspect-ratio gwarantuje 800:450 (16:9) niezależnie od szerokości */
    aspect-ratio: 800 / 450;
  }

  /* Canvas wstrzyknięty przez PIXI — zostaje 800×450 wewnętrznie,
     ale CSS skaluje go do szerokości kontenera. PIXI antialias=false
     więc skalowanie nie psuje wyglądu (pixel-art friendly). */
  #game-container canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    /* Ostry pixel-art przy skalowaniu na mobile — nie rozmazuj */
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  /* === MOBILE / TABLET (≤ 860px LUB urządzenia dotykowe) === */
  @media (max-width: 860px), (hover: none) and (pointer: coarse) {
    /* Na mobile pozwalamy scrollować pionowo (button-bar może iść w 2 rzędy
       i zwiększyć wysokość) — blokujemy tylko niechciany scroll poziomy */
    html, body {
      overflow-x: hidden !important;
      overflow-y: auto !important;
    }
    body {
      padding: 8px 8px 12px 8px !important;
    }
    #playerFrame {
      padding: 8px 8px 8px 8px !important;
      border-width: 2px;
      border-radius: 12px;
      gap: 6px !important;
    }
    #titleBar {
      flex-direction: column;
      gap: 6px;
    }
    #gameTitle {
      font-size: 15px;
    }
    .button-bar {
      gap: 6px;
      flex-wrap: wrap;
    }
    .ctrl-btn {
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    /* Ukrywamy ręczny przełącznik nav — buttony są zawsze widoczne */
    #navToggleBtn {
      display: none !important;
    }
    /* Nav-buttony ZAWSZE widoczne na touch — nadpisuje .hidden-nav */
    .canvas-nav-group.hidden-nav {
      display: flex !important;
    }
    /* Mniejsze nav-arrowy żeby nie zasłaniały całej gry na małym ekranie */
    .nav-arrow {
      width: 56px;
      height: 56px;
      font-size: 26px;
      border-radius: 12px;
    }
    .nav-arrow.nav-shoot-arrow {
      font-size: 28px;
    }
    .canvas-nav-group {
      bottom: 8px;
      gap: 6px;
    }
    .canvas-nav-group.left-group { left: 6px; }
    .canvas-nav-group.right-group { right: 6px; }
    /* HUD i licznik FPS mniejsze, żeby nie zjadały przestrzeni gry */
    #hud {
      font-size: 11px;
      padding: 0;
    }
    #fps-counter {
      font-size: 12px;
      padding: 3px 6px;
    }
    #stats-panel {
      font-size: 9px;
      padding: 3px 6px;
    }
    #menu-title {
      font-size: 26px;
    }
    #menu-description {
      font-size: 12px;
      padding: 8px 12px;
    }
    #menu-start-btn {
      padding: 12px 36px;
      font-size: 16px;
    }
  }

  /* === BARDZO MAŁE TELEFONY (≤ 480px) === */
  @media (max-width: 480px) {
    .nav-arrow {
      width: 48px;
      height: 48px;
      font-size: 22px;
    }
    .canvas-nav-group {
      gap: 4px;
      bottom: 4px;
    }
    .ctrl-btn {
      padding: 6px 10px;
      font-size: 11px;
    }
  }
/* === EKRAN WYNIKÓW (wygrana / przegrana) === */
#resultsScreen.hidden { display: none !important; }
#resultsScreen {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: linear-gradient(135deg, #001122 0%, #000820 100%);
  background-image:
    linear-gradient(135deg, #001122 0%, #000820 100%),
    repeating-linear-gradient(0deg, transparent 0px, transparent 39px, rgba(0,255,136,0.04) 39px, rgba(0,255,136,0.04) 40px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 39px, rgba(0,255,136,0.04) 39px, rgba(0,255,136,0.04) 40px);
  background-blend-mode: normal, lighten, lighten;
  font-family: Arial, sans-serif;
  overflow: hidden;
  pointer-events: auto;
}
#resultsScreen.lose {
  background: linear-gradient(135deg, #110000 0%, #0d0008 100%);
  background-image:
    linear-gradient(135deg, #110000 0%, #0d0008 100%),
    repeating-linear-gradient(0deg, transparent 0px, transparent 39px, rgba(255,68,0,0.04) 39px, rgba(255,68,0,0.04) 40px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 39px, rgba(255,68,0,0.04) 39px, rgba(255,68,0,0.04) 40px);
}
#resultsContent {
  width: 100%;
  max-width: 600px;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}
#resultsBall {
  font-size: 60px;
  line-height: 1;
  margin: 0 auto 8px auto;
  filter: drop-shadow(0 0 20px #00ff88);
  animation: resultsBallPulse 1.5s ease-in-out infinite;
}
#resultsScreen.lose #resultsBall {
  filter: drop-shadow(0 0 20px #ff4400);
}
@keyframes resultsBallPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
#resultsTitle {
  font-size: 32px;
  font-weight: bold;
  color: #00ff88;
  text-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88;
  margin: 4px 0 2px 0;
}
#resultsScreen.lose #resultsTitle {
  color: #ff4400;
  text-shadow: 0 0 20px #ff4400, 0 0 30px #ff4400;
}
#resultsGameName {
  color: #888;
  font-size: 13px;
  margin-bottom: 16px;
}
#resultsTable {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: 10px;
  padding: 10px 14px;
  margin: 0 auto 14px auto;
  max-width: 360px;
}
#resultsScreen.lose #resultsTable {
  border-color: rgba(255,68,0,0.3);
}
#resultsTableHeader {
  color: #00ff88;
  font-size: 11px;
  font-weight: bold;
  text-align: left;
  margin-bottom: 6px;
}
#resultsScreen.lose #resultsTableHeader {
  color: #ff6644;
}
#resultsWarning {
  color: #886644;
  font-size: 10px;
  margin-bottom: 8px;
}
#resultsWarning:empty {
  display: none;
}
.results-row {
  display: flex;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
  font-weight: bold;
}
.results-row.is-me {
  background: rgba(0,255,136,0.12);
  border-radius: 6px;
  padding-left: 8px;
  padding-right: 8px;
}
.results-row .medal { font-size: 15px; margin-right: 10px; }
.results-row .name { color: #ddd; flex: 1; text-align: left; }
.results-row.is-me .name { color: #00ff88; }
.results-row .points { color: #ffcc00; margin-right: 8px; }
.results-row .win-mark { font-size: 13px; }
.results-row .win-mark.yes { color: #00cc66; }
.results-row .win-mark.no { color: #cc4444; }
#resultsEmptyMsg {
  color: #555;
  font-size: 12px;
  padding: 14px 0;
}
#resultsEmptyMsg:empty {
  display: none;
}
#resultsButtons {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 14px;
}
.results-btn {
  font-family: Arial, sans-serif;
  font-size: 13px;
  font-weight: bold;
  padding: 10px 18px;
  border-radius: 9px;
  border-width: 2px;
  border-style: solid;
  cursor: pointer;

}
.results-btn:hover { transform: translateY(-1px); }

.results-btn-green {

.results-enemy {

.results-enemy:nth-child(7) { animation-delay: -1.2s; }
.results-enemy:nth-child(8) { animation-delay: -1.4s; }
@keyframes resultsEnemyBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
/* Mniejsze ekrany — kompaktowy widok */
@media (max-width: 600px) {

}

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.0/dist/pixi.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// MINI-KLIK PIXI.js PROTOTYP
// Renderowanie WebGL (GPU) zamiast Canvas 2D (CPU)
// ═══════════════════════════════════════════════════════════════════

// === DANE GRY (wczytane z demo.json Kosmicznej Gry) ===
const GAME_DATA_PLACEHOLDER = "REPLACE_WITH_INLINE_JSON";

// === KONFIGURACJA ===
const CANVAS_WIDTH = 800
const CANVAS_HEIGHT = 450

// === INICJALIZACJA PIXI APP ===
const app = new PIXI.Application({
  width: CANVAS_WIDTH,
  height: CANVAS_HEIGHT,
  backgroundColor: 0x000814,
  antialias: false,
  // Sprawdza czy WebGL jest dostępne, jeśli nie spada na Canvas2D (ale mamy nadzieję że WebGL pójdzie)
})
document.getElementById('game-container').appendChild(app.view)

// Sprawdź który renderer jest aktywny
const rendererType = app.renderer.type === PIXI.RENDERER_TYPE.WEBGL ? 'WebGL (GPU) ✅' : 'Canvas 2D (CPU) ❌'
console.log('🎮 Renderer:', rendererType)
const statusEl = document.getElementById('statusBar')
if (statusEl) {
  statusEl.innerHTML = `✨ Renderowanie: <strong style="color:#0f0">${rendererType}</strong> — porównaj z Canvas 2D!`
}

// === KONTENERY (warstwy renderowania na GPU) ===
const stage = app.stage
const bgLayer = new PIXI.Container()           // Tło (gwiazdy)
const enemyLayer = new PIXI.Container()         // Wrogowie
const blockLayer = new PIXI.Container()         // Bloki
const bonusLayer = new PIXI.Container()         // Bonusy
const playerLayer = new PIXI.Container()        // Statek
const bulletLayer = new PIXI.Container()        // Pociski
const fxLayer = new PIXI.Container()            // Eksplozje, particle
const transitionLayer = new PIXI.Container()    // Efekt Matrix + NEXT LEVEL (na samym wierzchu)
stage.addChild(bgLayer, blockLayer, bonusLayer, enemyLayer, bulletLayer, playerLayer, fxLayer, transitionLayer)
transitionLayer.visible = false   // domyślnie ukryty

// === TWORZENIE TEKSTUR Z GRAFIKI (RAZ — potem GPU używa) ===
function createTexture(drawFn, w, h) {
  const g = new PIXI.Graphics()
  drawFn(g)
  const renderTexture = PIXI.RenderTexture.create({ width: w, height: h })
  app.renderer.render(g, { renderTexture })
  g.destroy()
  return renderTexture
}

const TEXTURES = {}

// Asteroida (rock1) — 60×60
TEXTURES.rock1 = createTexture((g) => {
  g.beginFill(0x808080)
  g.lineStyle(2, 0x404040)
  // Nieregularny kształt
  const points = []
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2
    const r = 25 + Math.random() * 5
    points.push(30 + Math.cos(a) * r, 30 + Math.sin(a) * r)
  }
  g.drawPolygon(points)
  g.endFill()
  // Kratery
  g.beginFill(0x303030, 0.6)
  g.drawCircle(20, 20, 4)
  g.drawCircle(40, 35, 3)
  g.drawCircle(28, 42, 2)
  g.endFill()
}, 60, 60)

TEXTURES.rock2 = createTexture((g) => {
  g.beginFill(0x806040)
  g.lineStyle(2, 0x402010)
  const points = []
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2
    const r = 25 + Math.random() * 5
    points.push(30 + Math.cos(a) * r, 30 + Math.sin(a) * r)
  }
  g.drawPolygon(points)
  g.endFill()
  g.beginFill(0x301810, 0.6)
  g.drawCircle(22, 22, 4)
  g.drawCircle(38, 30, 3)
  g.endFill()
}, 60, 60)

TEXTURES.rock3 = createTexture((g) => {
  g.beginFill(0x604030)
  g.lineStyle(2, 0x201008)
  const points = []
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2
    const r = 25 + Math.random() * 5
    points.push(30 + Math.cos(a) * r, 30 + Math.sin(a) * r)
  }
  g.drawPolygon(points)
  g.endFill()
  g.beginFill(0x100805, 0.7)
  g.drawCircle(20, 25, 5)
  g.drawCircle(40, 35, 3)
  g.drawCircle(28, 18, 2)
  g.endFill()
}, 60, 60)

// Kolce (spikes) — 40×40
TEXTURES.spikes = createTexture((g) => {
  for (let i = 0; i < 4; i++) {
    g.beginFill(0x8899bb)
    g.lineStyle(1, 0x445566)
    g.drawPolygon([
      i * 10 + 1, 40,
      i * 10 + 5, 4,
      i * 10 + 9, 40
    ])
    g.endFill()
  }
  // Baza
  g.beginFill(0x222233)
  g.drawRect(0, 35, 40, 5)
  g.endFill()
}, 40, 40)

// Piła (saw) — 56×56 (z miejscem na cień)
TEXTURES.saw = createTexture((g) => {
  const cx = 28, cy = 28, r = 20
  // Cień
  g.beginFill(0x000000, 0.4)
  g.drawCircle(cx + 2, cy + 2, r)
  g.endFill()
  // Tarcza
  g.beginFill(0xaaaaaa)
  g.lineStyle(1, 0x444444)
  g.drawCircle(cx, cy, r * 0.85)
  g.endFill()
  // Zęby
  g.beginFill(0xbbbbbb)
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2
    const an = ((i + 0.5) / 12) * Math.PI * 2
    const an2 = ((i + 1) / 12) * Math.PI * 2
    g.drawPolygon([
      cx + Math.cos(a) * r * 0.85, cy + Math.sin(a) * r * 0.85,
      cx + Math.cos(an) * r * 0.65, cy + Math.sin(an) * r * 0.65,
      cx + Math.cos(an2) * r * 0.85, cy + Math.sin(an2) * r * 0.85,
    ])
  }
  g.endFill()
  // Oś
  g.beginFill(0x666666)
  g.drawCircle(cx, cy, r * 0.18)
  g.endFill()
  g.beginFill(0x222222)
  g.drawCircle(cx, cy, r * 0.07)
  g.endFill()
}, 56, 56)

// Robot (walker) — 4 warianty kolorystyczne, 40×40
const ROBOT_COLORS = [
  { body: 0x3a5fb0, antenna: 0xffd066 },  // walker — niebieski
  { body: 0xb04080, antenna: 0xffff66 },  // walker2 — różowy
  { body: 0x4a6070, antenna: 0x00ffcc },  // walker3 — szary/cyjan
  { body: 0xb06030, antenna: 0x88ff44 },  // walker4 — pomarańczowy
]
ROBOT_COLORS.forEach((c, i) => {
  TEXTURES[`walker${i}`] = createTexture((g) => {
    // Cień
    g.beginFill(0x000000, 0.3)
    g.drawEllipse(20, 37, 14, 3)
    g.endFill()
    // Ciało
    g.beginFill(c.body)
    g.lineStyle(2, 0x111111)
    g.drawRoundedRect(7, 10, 26, 22, 4)
    g.endFill()
    // Głowa
    g.beginFill(c.body)
    g.lineStyle(2, 0x111111)
    g.drawRoundedRect(11, 4, 18, 10, 3)
    g.endFill()
    // Oczodół
    g.beginFill(0x1a1a2a)
    g.lineStyle(1, 0x111111)
    g.drawRoundedRect(14, 6, 12, 6, 2)
    g.endFill()
    // Oczko
    g.beginFill(0xffffff)
    g.lineStyle(0)
    g.drawCircle(20, 9, 2)
    g.beginFill(0x000000)
    g.drawCircle(20, 9, 1)
    g.endFill()
    // Antenka
    g.lineStyle(1.5, 0x111111)
    g.moveTo(20, 4); g.lineTo(20, -2)
    // Gałka
    g.beginFill(c.antenna)
    g.lineStyle(1.5, 0x111111)
    g.drawCircle(20, -3, 2.5)
    g.endFill()
    // Nóżki
    g.beginFill(0x222222)
    g.lineStyle(1, 0x111111)
    g.drawRoundedRect(11, 32, 5, 4, 1)
    g.drawRoundedRect(24, 32, 5, 4, 1)
    g.endFill()
  }, 40, 40)
})

// Statek (spaceship) — 40×40
// === STATEK — przepisany 1:1 z drawSpaceship() ze starego player (4) ===
// r = 30 (z JSON), pełna grafika mieści się w ~96×64, używamy anchor (centrum)
// Tekstura zawiera WSZYSTKO co statyczne: cień, skrzydła, kadłub, kokpit, dziób, "obudowy" silników.
// PŁOMIENIE i ŚWIECĄCE DIODY są osobno (animowane w pętli) — patrz TEXTURES.flame i engineGlow.
TEXTURES.spaceship = createTexture((g) => {
  const r = 30
  // Centrum tekstury — tłumaczymy współrzędne z drawSpaceship (które rysował od x,y)
  // Tekstura 96×64, centrum (48, 32). Wszystkie współrzędne z oryginału + (48, 32).
  const cx = 48, cy = 32

  // 1. Cień pod statkiem (eliptyczny)
  g.beginFill(0x0064ff, 0.12)  // rgba(0,100,255,0.12)
  g.drawEllipse(cx + 0, cy + r*0.7, r*0.7, 5)
  g.endFill()

  // 2. SKRZYDŁA — górne i dolne (trójkąty z konturem)
  // Górne skrzydło: M(-r*0.1,-r*0.18) L(-r*0.7,-r*0.78) L(-r*0.9,-r*0.48) L(-r*0.05,-r*0.18)
  g.lineStyle(1, 0x3366bb)
  g.beginFill(0x1a3a7a)
  g.drawPolygon([
    cx - r*0.1,  cy - r*0.18,
    cx - r*0.7,  cy - r*0.78,
    cx - r*0.9,  cy - r*0.48,
    cx - r*0.05, cy - r*0.18
  ])
  g.endFill()
  // Dolne skrzydło (lustro)
  g.beginFill(0x1a3a7a)
  g.drawPolygon([
    cx - r*0.1,  cy + r*0.18,
    cx - r*0.7,  cy + r*0.78,
    cx - r*0.9,  cy + r*0.48,
    cx - r*0.05, cy + r*0.18
  ])
  g.endFill()
  g.lineStyle(0)

  // 3. BOCZNE KLAPY (cieńszy ciemny niebieski)
  g.beginFill(0x2255aa)
  g.drawPolygon([
    cx - r*0.6,  cy - r*0.72,
    cx - r*0.8,  cy - r*0.78,
    cx - r*0.88, cy - r*0.5
  ])
  g.drawPolygon([
    cx - r*0.6,  cy + r*0.72,
    cx - r*0.8,  cy + r*0.78,
    cx - r*0.88, cy + r*0.5
  ])
  g.endFill()

  // 4. GŁÓWNY KADŁUB — gradient pionowy aaccee→6699cc→334477→112244 emulowany przez nakładanie elips
  // PIXI nie ma gradientów wbudowanych — symuluję 4 elipsami od najjaśniejszej do najciemniejszej
  // Górna jasna: aaccee
  g.beginFill(0xaaccee)
  g.drawEllipse(cx, cy - r*0.18, r*0.95, r*0.16)
  g.endFill()
  // Środkowa-góra: 6699cc
  g.beginFill(0x6699cc)
  g.drawEllipse(cx, cy - r*0.05, r*0.95, r*0.12)
  g.endFill()
  // Środkowa-dół: 334477
  g.beginFill(0x334477)
  g.drawEllipse(cx, cy + r*0.10, r*0.95, r*0.14)
  g.endFill()
  // Dolna ciemna: 112244
  g.beginFill(0x112244)
  g.drawEllipse(cx, cy + r*0.22, r*0.95, r*0.10)
  g.endFill()

  // 5. Linia środkowa (subtelna)
  g.lineStyle(1, 0x64a0dc, 0.5)  // rgba(100,160,220,0.5)
  g.moveTo(cx - r*0.8, cy)
  g.lineTo(cx + r*0.6, cy)
  g.lineStyle(0)

  // 6. OBUDOWY SILNIKÓW (czarne owale po obu stronach — tu NIE rysujemy diod, te są osobno)
  g.beginFill(0x223355)
  g.drawEllipse(cx - r*0.88, cy - r*0.28, 8, 6)
  g.drawEllipse(cx - r*0.88, cy + r*0.28, 8, 6)
  g.endFill()

  // 7. KOKPIT — kopuła z efektem 3D (gradient radialny aproksymowany 3 elipsami)
  // Najciemniejszy spód: rgba(20,60,140,0.4)
  g.beginFill(0x143c8c, 0.4)
  g.drawEllipse(cx + r*0.15, cy - r*0.14, r*0.28, r*0.22)
  g.endFill()
  // Środek: rgba(80,160,255,0.75)
  g.beginFill(0x50a0ff, 0.75)
  g.drawEllipse(cx + r*0.15, cy - r*0.16, r*0.22, r*0.17)
  g.endFill()
  // Najjaśniejszy "highlight": rgba(200,235,255,0.95)
  g.beginFill(0xc8ebff, 0.95)
  g.drawEllipse(cx + r*0.15, cy - r*0.18, r*0.14, r*0.10)
  g.endFill()
  // Kontur kopuły
  g.lineStyle(1, 0x96d2ff, 0.7)
  g.drawEllipse(cx + r*0.15, cy - r*0.14, r*0.28, r*0.22)
  g.lineStyle(0)
  // Mały odblask na kopule (rgba(255,255,255,0.3) elipsa pod kątem -0.4 rad)
  // PIXI Graphics nie wspiera rotacji elipsy, ale efekt jest mały i prawie niezauważalny — daję zwykłą
  g.beginFill(0xffffff, 0.3)
  g.drawEllipse(cx + r*0.05, cy - r*0.20, r*0.10, r*0.07)
  g.endFill()

  // 8. CZUBEK DZIOBU (gradient lin. 7799cc→aaccee, kształt łuku)
  // PIXI: aproksymujemy dwoma elipsami nachodzącymi
  g.beginFill(0x7799cc)
  g.drawEllipse(cx + r*1.0, cy, r*0.12, r*0.06)
  g.endFill()
  g.beginFill(0xaaccee)
  g.drawEllipse(cx + r*1.05, cy, r*0.07, r*0.04)
  g.endFill()

  // 9. Subtelny refleks na całym kadłubie (rgba(255,255,255,0.12))
  g.beginFill(0xffffff, 0.12)
  g.drawEllipse(cx - r*0.1, cy - r*0.15, r*0.4, r*0.10)
  g.endFill()
}, 96, 64)

// PŁOMIEŃ — owalny niebieski kształt, animowany skalą X (długością) w pętli
// Kolory: rgba(0,200,255,0.95) → rgba(0,120,255,0.7) → rgba(0,50,200,0) — środek jasny, brzeg ciemny
TEXTURES.flame = createTexture((g) => {
  // Tekstura 40×16, anchor będzie (1, 0.5) — prawa krawędź wyrównana do silnika
  // Najjaśniejszy środek po prawej (przy silniku), ciemniejący w lewo
  // 3 nakładki dla efektu gradientu
  g.beginFill(0x0032c8, 0.0)  // ledwo widoczny brzeg lewy
  g.drawEllipse(20, 8, 20, 5)

// FLAGA META (key_win) — przepisana 1:1 z drawFinishFlag(24) ze starego.
// Wave (falowanie) FIX = 0 (pozycja spoczynkowa), zgodnie z wyborem użytkownika.
// Oryginał: poleTop = -size*2.8 = -67.2. Maszt sięga od poleTop do size*0.85 = 20.4.
// Flaga jest po prawej masztu, do x = size*1.4 = 33.6.
// Wymiar: szerokość ~36 (0..36), wysokość ~95 (-67..28). Daję teksturę 48×104, anchor (0.5, 0.5)
// Ale anchor musi być na podstawie masztu (środek u dołu, x=center) — bo w grze sprite jest
// pozycjonowany na b.x, b.y a flaga "stoi" na ziemi. Robię translate w PIXI: rysuję od centrum tekstury.
TEXTURES.finishFlag = createTexture((g) => {
  const size = 24
  const wave = 0  // pozycja spoczynkowa — bez animacji
  const poleTop = -size * 2.8  // -67.2

  // Tekstura 48×104, lokalne (0,0) = lewy-górny róg.
  // Centrum X: 24 (środek). Centrum Y: oryginał miał (0,0) jako pkt zaczepienia, ale rysuje
  // od y=poleTop=-67.2 do y=size*0.85=20.4. Czyli wysokość rzeczywista 87.6.
  // Daję teksturę 48×104, środek X = 24, oraz przesunięcie Y żeby wszystko mieściło się.
  // Pkt referencyjny ze starego (0,0) → w teksturze: (24, 80). Używamy translate.
  const ox = 24, oy = 80   // (0,0) ze starego = ten punkt w teksturze

  // 1. CIEŃ U PODSTAWY — radial gradient zielony (PIXI brak gradientów, aproksymujemy 3 elipsami)
  // Oryginał: ellipse(0, size*0.85, size*0.7, size*0.22)
  // Najjaśniejszy środek: #4ade80
  g.beginFill(0x4ade80)
  g.drawEllipse(ox, oy + size * 0.85, size * 0.5, size * 0.16)
  g.endFill()
  // Średnia warstwa: #22a055
  g.beginFill(0x22a055)
  g.drawEllipse(ox, oy + size * 0.85, size * 0.62, size * 0.20)
  g.endFill()
  // Zewnętrzna ciemna: #0d6030 (rysujemy NAJPIERW jako podkład, ale bo jest największa)
  // Tu kolejność jest odwrotna - najpierw ciemne, potem jaśniejsze (już zrobione wyżej)
  // Faktycznie: trzeba narysować od ciemnego do jasnego = najciemniejsze najpierw
  // Cofam — trzeba przerysować w odwrotnej kolejności

  // Kontur cienia
  g.lineStyle(1.5, 0x0a4020)
  g.drawEllipse(ox, oy + size * 0.85, size * 0.7, size * 0.22)
  g.lineStyle(0)

  // 2. MASZT — gradient pionowy (PIXI: aproksymujemy 3 cienkimi prostokątami)
  // Oryginał: fillRect(-2, poleTop, 4, size*0.85 - poleTop) → 4×88
  // Gradient: lewy 0d6030 → środek 2a8050 → prawy 0a4020
  // Lewy ciemny pasek
  g.beginFill(0x0d6030)
  g.drawRect(ox - 2, oy + poleTop, 1.5, size * 0.85 - poleTop)
  g.endFill()
  // Środkowy jasny
  g.beginFill(0x2a8050)
  g.drawRect(ox - 0.5, oy + poleTop, 1, size * 0.85 - poleTop)
  g.endFill()
  // Prawy ciemny
  g.beginFill(0x0a4020)
  g.drawRect(ox + 0.5, oy + poleTop, 1.5, size * 0.85 - poleTop)
  g.endFill()

  // 3. ZŁOTA GAŁKA NA CZUBKU (był shadowBlur, w PIXI dajemy mniejsze + jasny środek)
  // Najpierw "glow" jako większa ciemniejsza
  g.beginFill(0xffcc00, 0.5)
  g.drawCircle(ox, oy + poleTop, 5)
  g.endFill()
  g.beginFill(0xffdd44)
  g.drawCircle(ox, oy + poleTop, 3)
  g.endFill()

  // 4. SAMA FLAGA — czerwona, kształt z quadraticCurveTo. Przy wave=0 krzywe są płaskie.
  // PIXI Graphics.quadraticCurveTo działa identycznie jak Canvas2D
  // Translate ze starego: ctx.translate(2, poleTop + size*0.05) → flaga rysowana od (2, poleTop+1.2)
  const fox = ox + 2
  const foy = oy + poleTop + size * 0.05  // (2, poleTop+1.2) lokalne

  // Gradient liniowy ff4444 → ee2222 → aa1111 — aproksymujemy przez nakładkę:
  // Bazowa najjaśniejsza, potem ciemniejsza warstwa po prawej
  g.beginFill(0xff4444)
  g.moveTo(fox + 0, foy + 0)
  g.quadraticCurveTo(fox + size * 0.7, foy + size * wave * 2, fox + size * 1.4, foy + size * 0.3 + wave * size * 0.3)
  g.lineTo(fox + size * 0.9, foy + size * 0.5)
  g.quadraticCurveTo(fox + size * 0.3, foy + size * 0.7 + wave * size * 0.2, fox + 0, foy + size * 0.7)
  g.closePath()
  g.endFill()
  // Ciemniejszy odcień na prawej części flagi (gradient feel)
  g.beginFill(0xaa1111, 0.4)
  g.moveTo(fox + size * 0.7, foy + size * 0.15)
  g.quadraticCurveTo(fox + size * 1.05, foy + size * 0.2, fox + size * 1.4, foy + size * 0.3)
  g.lineTo(fox + size * 0.9, foy + size * 0.5)
  g.quadraticCurveTo(fox + size * 0.85, foy + size * 0.4, fox + size * 0.7, foy + size * 0.5)
  g.closePath()
  g.endFill()
  // Kontur flagi (#880000)
  g.lineStyle(1.2, 0x880000)
  g.moveTo(fox + 0, foy + 0)
  g.quadraticCurveTo(fox + size * 0.7, foy + size * wave * 2, fox + size * 1.4, foy + size * 0.3 + wave * size * 0.3)
  g.lineTo(fox + size * 0.9, foy + size * 0.5)
  g.quadraticCurveTo(fox + size * 0.3, foy + size * 0.7 + wave * size * 0.2, fox + 0, foy + size * 0.7)
  g.closePath()
  g.lineStyle(0)

  // 5. CIEŃ FAŁDY (cienka krzywa rgba(0,0,0,0.2))
  g.lineStyle(1, 0x000000, 0.2)
  g.moveTo(fox + size * 0.2, foy + size * 0.1)
  g.quadraticCurveTo(fox + size * 0.4, foy + size * 0.3 + wave * size * 0.15, fox + size * 0.5, foy + size * 0.55)
  g.lineStyle(0)
}, 48, 104)

// W PIXI: pula stałych PIXI.Text (zamiast tworzyć co klatkę), aktualizacja co tick
let levelTransition = null   // { time, target, frame }  null = brak transition

// Półprzezroczysty czarny pasek tła (kontrast do zielonych cyfr)
const transitionBg = new PIXI.Graphics()

// Pula PIXI.Text dla deszczu cyfr (jedna kolumna = jedna PIXI.Text)
// Stary: i*14 wzdłuż X, 22px monospace. Liczba kolumn: canvas.width / 8 = 100 (taki był oryginał).
// Ale skoro tekst jest 14px szeroki i renderowany co 14px, optymalna liczba to canvas.width / 14 ≈ 57.
// Idziemy 57 — tyle co w starym wizualnie pokrywało ekran.
const matrixCols = []
const MATRIX_COL_COUNT = Math.ceil(CANVAS_WIDTH / 14)
for (let i = 0; i < MATRIX_COL_COUNT; i++) {
  const t = new PIXI.Text('0', {
    fontFamily: 'monospace',
    fontSize: 22,
    fill: 0x00ff00
  })
  t.x = i * 14
  t.y = 0
  transitionLayer.addChild(t)
  matrixCols.push({ sprite: t, y: Math.random() * 50 })  // y = pozycja w "wierszach", potem * 14 pikseli
}

// Napisy "NEXT" i "LEVEL" — turkusowe, animowane wjeżdżaniem z boków
// Stary: bold 40px monospace, fill #00ffcc, shadow #00ffcc blur 25
const TRANSITION_TEXT_STYLE = {
  fontFamily: 'monospace',
  fontSize: 40,
  fontWeight: 'bold',
  fill: 0x00ffcc,
  // PIXI.Text ma dropShadow zamiast shadowBlur
  dropShadow: true,
  dropShadowColor: 0x00ffcc,
  dropShadowBlur: 12,    // PIXI's dropShadowBlur ≈ Canvas2D shadowBlur/2
  dropShadowDistance: 0  // shadow w 0 odległości = czysty glow
}
const transitionNextText = new PIXI.Text('NEXT', TRANSITION_TEXT_STYLE)
transitionNextText.anchor.set(0.5)
transitionLayer.addChild(transitionNextText)

const transitionLevelText = new PIXI.Text('LEVEL', TRANSITION_TEXT_STYLE)
transitionLevelText.anchor.set(0.5)
transitionLayer.addChild(transitionLevelText)

// === FUNKCJA URUCHAMIANIA TRANSITION ===
function startLevelTransition(targetLevel) {
  levelTransition = { time: 180, target: targetLevel, frame: 0 }
  // Reset pozycji deszczu cyfr — losowe pozycje startowe (jak w starym)
  for (const col of matrixCols) col.y = Math.random() * 50
  transitionLayer.visible = true
  gameRunning = false  // pauzujemy logikę gry podczas przejścia
}

// === AKTUALIZACJA EFEKTU MATRIX (wywoływana co klatkę gdy levelTransition aktywny) ===
function updateLevelTransition() {
  if (!levelTransition) return false
  levelTransition.frame++
  levelTransition.time--

  // 1. Deszcz cyfr: co 4 klatkę nowa losowa cyfra, każda kolumna spada o 0.2 wiersza/klatkę
  const showDigits = levelTransition.frame % 4 === 0
  for (const col of matrixCols) {
    if (showDigits) {
      col.sprite.text = String.fromCharCode(48 + Math.floor(Math.random() * 10))  // '0'..'9'
    }
    col.sprite.y = col.y * 14
    // Spadanie + reset gdy spadnie poniżej ekranu (z małym losowym pominięciem żeby było natur.)
    if (col.y * 14 > CANVAS_HEIGHT && Math.random() > 0.975) col.y = 0
    col.y += 0.2
  }

  // 2. NEXT/LEVEL animacja — wjeżdżanie z boków, po 70% drogi się zatrzymują (jak w starym)
  let progress = 1 - (levelTransition.time / 180)
  progress = Math.min(progress / 0.7, 1)
  // NEXT wjeżdża z lewej (z -200) do środka (canvas.width/2)
  transitionNextText.x = -200 + progress * (CANVAS_WIDTH / 2 + 200)
  transitionNextText.y = CANVAS_HEIGHT / 2 - 20
  // LEVEL wjeżdża z prawej (z canvas.width+200) do środka
  transitionLevelText.x = CANVAS_WIDTH + 200 - progress * (CANVAS_WIDTH / 2 + 200)
  transitionLevelText.y = CANVAS_HEIGHT / 2 + 30

  // 3. Po 180 klatkach: ładujemy nowy level i kończymy transition
  if (levelTransition.time <= 0) {
    const target = levelTransition.target
    levelTransition = null
    transitionLayer.visible = false
    loadLevel(target)
    gameRunning = true  // wznawiamy grę po przejściu
    return true   // sygnał do pętli: wykonaliśmy zmianę levelu
  }
  return false
}

function toggleNav() {
  navVisible = !navVisible
  const btn = document.getElementById('navToggleBtn')

  const navR = document.getElementById('navRight')
  if (navVisible) {
    if (btn) btn.classList.add('active')

  gameRunning = false  // pauzujemy gameplay

  const screen = document.getElementById('resultsScreen')
  const nazwaGry = (GAME_DATA && GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || "Gra"

  // Tryb win/lose przez klasę CSS
  if (isWin) screen.classList.remove('lose')
  else screen.classList.add('lose')

  // Wypełnianie zawartości
  document.getElementById('resultsBall').textContent = isWin ? '🏆' : '💀'
  document.getElementById('resultsTitle').textContent = isWin ? '🏆 WYGRANA! 🏆' : '💀 KONIEC GRY 💀'
  document.getElementById('resultsGameName').textContent = nazwaGry

  // Header tabeli
  document.getElementById('resultsTableHeader').textContent =
    (isWin ? '🏅 HALL OF FAME — ' : '📊 NAJLEPSZE WYNIKI — ') + nazwaGry.toUpperCase()
  document.getElementById('resultsWarning').textContent =
    isWin ? '' : '⚠ Zapis tylko przy wygranej — dotknij flagi!'

  // Wiersze rankingu
  const board = getLeaderboard()
  const rowsContainer = document.getElementById('resultsRows')
  const emptyMsg = document.getElementById('resultsEmptyMsg')
  rowsContainer.innerHTML = ''
  if (board.length === 0) {
    emptyMsg.textContent = isWin ? 'Brak wyników — wygraj i zapisz!' : 'Brak wyników'
  } else {
    emptyMsg.textContent = ''
    const medals = ['🥇', '🥈']
    for (let i = 0; i < Math.min(board.length, 2); i++) {
      const entry = board[i]
      const isMe = isWin && resultsNameEntered && entry.name === resultsPlayerName && i === 0
      const row = document.createElement('div')
      row.className = 'results-row' + (isMe ? ' is-me' : '')
      row.innerHTML = `
        <span class="medal">${medals[i]}</span>
        <span class="name"></span>
        <span class="points">⭐ ${entry.points}</span>
        <span class="win-mark ${entry.win ? 'yes' : 'no'}">${entry.win ? '✔' : '✖'}</span>
      `
      // Nazwa przez textContent (bezpieczeństwo XSS)
      row.querySelector('.name').textContent = entry.name
      rowsContainer.appendChild(row)
    }
  }

  // Pokaż ekran
  screen.classList.remove('hidden')

  // Modal nazwy (tylko wygrana, opóźniony 300ms jak w starym)
  if (isWin && !resultsNameEntered) {
    setTimeout(() => showNameInput(), 300)
  }
}

function hideResults() {
  resultsActive = false
  document.getElementById('resultsScreen').classList.add('hidden')
}

function showNameInput() {
  document.getElementById('nameModalGP')?.remove()
  const isWin = resultsIsWin
  const modal = document.createElement('div')
  modal.id = 'nameModalGP'
  modal.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Arial;`
  modal.innerHTML = `
    <div style="background:linear-gradient(135deg,#1a0030,#0a0020);border:2px solid ${isWin ? '#00ff88' : '#ff4400'};border-radius:20px;padding:36px 44px;text-align:center;box-shadow:0 0 40px ${isWin ? 'rgba(0,255,136,0.4)' : 'rgba(255,68,0,0.4)'};min-width:300px;">
      <div style="font-size:50px;margin-bottom:8px;">${isWin ? '🏆' : '💀'}</div>
      <div style="color:${isWin ? '#00ff88' : '#ff4400'};font-size:26px;font-weight:bold;margin-bottom:6px;">${isWin ? 'WYGRANA!' : 'KONIEC GRY'}</div>
      <div style="color:#aaa;font-size:13px;margin-bottom:18px;">Punkty: <b style="color:#ffcc00">${counters.score}</b> &nbsp;|&nbsp; Życia: <b style="color:#ff6666">${counters.lives}</b></div>
      <div style="color:#ccc;font-size:14px;margin-bottom:10px;">Podaj swoje imię:</div>
      <input id="nameInputGP" maxlength="16" placeholder="Twoje imię..." style="width:100%;padding:11px 14px;font-size:17px;border-radius:10px;border:2px solid #444;background:#111;color:white;outline:none;text-align:center;box-sizing:border-box;">
      <button id="submitScoreBtn" style="margin-top:14px;width:100%;padding:13px;font-size:15px;font-weight:bold;background:linear-gradient(180deg,${isWin ? '#00cc66,#006633' : '#cc3300,#661100'});border:none;border-radius:10px;color:white;cursor:pointer;box-shadow:0 4px 0 ${isWin ? '#003322' : '#330000'};">✔ ZAPISZ WYNIK</button>
    </div>`
  document.body.appendChild(modal)
  setTimeout(() => document.getElementById('nameInputGP')?.focus(), 50)

  const submit = () => {
    const inputEl = document.getElementById('nameInputGP')
    const name = (inputEl?.value?.trim() || 'Gracz').substring(0, 16) || 'Gracz'
    resultsPlayerName = name
    resultsNameEntered = true
    const board = getLeaderboard()
    board.push({
      name, points: counters.score, lives: counters.lives,
      win: resultsIsWin,
      date: new Date().toLocaleDateString('pl-PL')
    })
    board.sort((a, b) => b.points - a.points)
    saveLeaderboard(board.slice(0, 2))
    document.getElementById('nameModalGP')?.remove()
    // Refresh ekranu — pokaż zaktualizowany ranking
    if (resultsActive) {
      hideResults()
      showResults(resultsIsWin)
    }
  }
  document.getElementById('submitScoreBtn')?.addEventListener('click', submit)
  document.getElementById('nameInputGP')?.addEventListener('keydown', e => { if (e.key === 'Enter') submit() })
}

// Podpięcie przycisków po załadowaniu DOM
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btnPlayAgain')?.addEventListener('click', () => {
    hideResults()
    counters.lives = (GAME_DATA && GAME_DATA.settings && GAME_DATA.settings.counters && GAME_DATA.settings.counters.lives) ?? 3
    counters.score = 0
    burstCount = 0       // reset serii pocisków
    burstReload = 0
    resultsNameEntered = false
    resultsPlayerName = ""
    loadLevel(0)
    gameRunning = true
  })
  document.getElementById('btnRestart')?.addEventListener('click', () => {
    location.reload()
  })
})

// === WCZYTYWANIE POZIOMU ===
function loadLevel(levelIndex) {
  currentLevel = levelIndex   // pamiętamy który level jest aktywny (dla key_level)

  // Wyczyść warstwy
  enemyLayer.removeChildren()
  blockLayer.removeChildren()
  bonusLayer.removeChildren()
  bulletLayer.removeChildren()
  fxLayer.removeChildren()
  playerLayer.removeChildren()

  enemies = []
  blocks = []
  bonuses = []
  bullets = []
  cameraX = 0

  const level = levels[levelIndex]
  if (!level) return

  // Settings — autoScroll może być na poziomie ALBO globalny
  worldWidth = (GAME_DATA.settings && GAME_DATA.settings.worldWidth) || 10000
  // Najpierw global, potem level może nadpisać
  if (GAME_DATA.settings) {
    autoScroll = !!GAME_DATA.settings.autoScroll
    autoScrollSpeed = Number(GAME_DATA.settings.autoScrollSpeed) || 2
  }
  if (level.autoScroll !== undefined) autoScroll = !!level.autoScroll
  if (level.autoScrollSpeed !== undefined) autoScrollSpeed = Number(level.autoScrollSpeed)

  // Statek
  const playerData = (level.players && level.players[0]) || { x: 100, y: 200 }

  // Kontener gracza — zawiera kadłub + płomienie + diody. To pozwala animować części osobno.
  const playerContainer = new PIXI.Container()
  playerContainer.x = playerData.x
  playerContainer.y = playerData.y

  // PŁOMIENIE — dwa, z anchor (1, 0.5) czyli prawa krawędź na pozycji silnika.
  // Pozycja silników w starym kodzie: (-r*0.9, side*r*0.28). Dla r=30: (-27, ±8.4).
  // Sprite flame ma 40px szerokości, anchor (1, 0.5) → renderowany od x do x-40.
  const flameTop = new PIXI.Sprite(TEXTURES.flame)
  flameTop.anchor.set(1, 0.5)
  flameTop.x = -27   // -r*0.9 dla r=30
  flameTop.y = -8.4  // -r*0.28
  playerContainer.addChild(flameTop)

  const flameBottom = new PIXI.Sprite(TEXTURES.flame)
  flameBottom.anchor.set(1, 0.5)
  flameBottom.x = -27
  flameBottom.y = 8.4
  playerContainer.addChild(flameBottom)

  // KADŁUB — statyczna tekstura 96×64 z anchor (0.5)
  const playerSprite = new PIXI.Sprite(TEXTURES.spaceship)
  playerSprite.anchor.set(0.5)
  playerContainer.addChild(playerSprite)

  // DIODY SILNIKÓW — dwie, na pozycji silników (taka sama co płomienie).
  // Anchor (0.5) — wyśrodkowane na obudowie silnika.
  const glowTop = new PIXI.Sprite(TEXTURES.engineGlow)
  glowTop.anchor.set(0.5)
  glowTop.x = -26.4   // -r*0.88
  glowTop.y = -8.4    // -r*0.28
  playerContainer.addChild(glowTop)

  const glowBottom = new PIXI.Sprite(TEXTURES.engineGlow)
  glowBottom.anchor.set(0.5)
  glowBottom.x = -26.4
  glowBottom.y = 8.4
  playerContainer.addChild(glowBottom)

  playerLayer.addChild(playerContainer)
  player = {
    sprite: playerContainer,   // kontener — to on będzie się ruszać
    flames: [flameTop, flameBottom],
    glows: [glowTop, glowBottom],
    x: playerData.x,
    y: playerData.y,
    vx: 0, vy: 0,
    r: 18,
    cooldown: 0
  }

  // Wrogowie
  for (const e of (level.enemies || [])) {
    let textureKey = e.type
    // Mapowanie walker* → walker0/1/2/3
    if (e.type === 'walker') textureKey = 'walker0'
    else if (e.type === 'walker2') textureKey = 'walker1'
    else if (e.type === 'walker3') textureKey = 'walker2'
    else if (e.type === 'walker4') textureKey = 'walker3'

    const tex = TEXTURES[textureKey]
    if (!tex) continue  // pomijam nieobsługiwane typy

    const sprite = new PIXI.Sprite(tex)
    sprite.anchor.set(0.5)
    const w = e.w || 40, h = e.h || 40
    sprite.x = e.x + w/2
    sprite.y = e.y + h/2
    if (textureKey.startsWith('rock')) {
      // Skala asteroidy
      sprite.scale.set(w / 60)
    } else if (textureKey === 'saw') {
      sprite.scale.set(w / 40)
    }
    enemyLayer.addChild(sprite)

    enemies.push({
      sprite, type: e.type, x: e.x, y: e.y, w, h,
      rotation: 0,
      sawAngle: 0
    })
  }

  // Bloki — uproszczone, kolorowe prostokąty
  for (const b of (level.blocks || [])) {
    const block = new PIXI.Graphics()
    let color = 0x666666
    if (b.typ === 'blockBomb') color = 0xff4444
    else if (b.typ === 'blockIce') color = 0x88ccff
    else if (b.typ === 'blockTall') color = 0x884400
    block.beginFill(color)
    block.lineStyle(2, 0x222222)
    block.drawRect(0, 0, b.w, b.h)
    block.endFill()
    block.x = b.x
    block.y = b.y
    blockLayer.addChild(block)
    blocks.push({ sprite: block, ...b })
  }

  // Bonusy
  for (const b of (level.bonuses || [])) {
    let tex = TEXTURES.diamond
    if (b.type === 'key_level') tex = TEXTURES.key
    else if (b.type === 'key_win') tex = TEXTURES.finishFlag
    const sprite = new PIXI.Sprite(tex)
    if (b.type === 'key_win') {
      // Flaga "stoi" na ziemi: pkt zaczepienia (b.x, b.y) to środek-podstawa, nie środek tekstury.
      // Tekstura 48×104 ma pkt referencyjny (24, 80) ze starego (środek X, blisko podstawy masztu).
      sprite.anchor.set(24/48, 80/104)  // = (0.5, ~0.77)
    } else {
      sprite.anchor.set(0.5)
    }
    sprite.x = b.x
    sprite.y = b.y
    bonusLayer.addChild(sprite)
    bonuses.push({ sprite, ...b, pulseTime: 0 })
  }

  generateBackground()
}

// === PASEK PRZEŁADOWANIA nad statkiem (1:1 ze starego, world coords) ===
// Stary kod: rysowany gdy burstReload>0, z napisem "ładowanie...", kolory zależne od pct.
// W PIXI: jeden Graphics tworzony raz, redrawany co klatkę gdy widoczny.
const reloadBar = new PIXI.Graphics()
const reloadText = new PIXI.Text('ładowanie...', {
  fontFamily: 'Arial', fontSize: 9, fill: 0xffffff, align: 'center'
})
reloadText.anchor.set(0.5, 0.5)
fxLayer.addChild(reloadBar, reloadText)
reloadBar.visible = false
reloadText.visible = false

function updateReloadBar() {
  if (!player) return
  if (burstReload <= 0) {
    reloadBar.visible = false
    reloadText.visible = false
    return
  }
  reloadBar.visible = true
  reloadText.visible = true
  // Pozycja: nad statkiem, sx = player.x, sy = player.y - r - 16 (jak w starym)
  const sx = player.x, sy = player.y - player.r - 16
  const barW = 50, barH = 5
  const pct = 1 - burstReload / BURST_RELOAD
  const barColor = pct < 0.5 ? 0xff4400 : 0xffcc00

  reloadBar.clear()
  // Tło paska (czarne pół-przezroczyste)
  reloadBar.beginFill(0x000000, 0.5)
  reloadBar.drawRect(sx - barW/2, sy, barW, barH)
  reloadBar.endFill()
  // Wypełnienie (kolor zależny od progresu)
  reloadBar.beginFill(barColor)
  reloadBar.drawRect(sx - barW/2, sy, barW * pct, barH)
  reloadBar.endFill()
  // Glow aproksymacja: większy prostokąt z mniejszą alpha
  reloadBar.beginFill(barColor, 0.3)
  reloadBar.drawRect(sx - barW/2 - 1, sy - 1, barW * pct + 2, barH + 2)
  reloadBar.endFill()

  // Tekst nad paskiem
  reloadText.x = sx
  reloadText.y = sy - 6
}

// === STRZAŁ ===
function shoot() {
  // Reload aktywny — nie strzelaj
  if (burstReload > 0) return
  if (player.cooldown > 0) return
  // Magazynek pełny? (nie powinno się zdarzyć — sprawdzamy poniżej, ale wczesny return safe)
  if (burstCount >= BURST_MAX) return

  const sprite = new PIXI.Sprite(TEXTURES.bullet)
  sprite.anchor.set(5/28, 0.5)
  sprite.x = player.x + 20
  sprite.y = player.y
  bulletLayer.addChild(sprite)
  bullets.push({ sprite, x: player.x + 20, y: player.y, vx: 12 })
  player.cooldown = 4
  burstCount++

  // Wystrzelałeś cały magazynek → uruchom reload
  if (burstCount >= BURST_MAX) {
    burstReload = BURST_RELOAD
    burstCount = 0
  }
}

// === EKSPLOZJA (PARTICLE) — 1:1 ze starego player (4) ===
// 22 cząstki, kąty rozłożone równomiernie + szum, grawitacja, rotacja, drag.
// W PIXI używamy Sprite + tint zamiast Graphics — szybsze (stała tekstura, zmienna tylko transformacja).
// Dwie tekstury: koło i kwadrat. Kolor ustawiamy przez tint.

// Tekstura cząstki KOŁO — biała, 12×12, rysujemy z lekką poświatą (aproksymacja Canvas2D shadowBlur:8)
TEXTURES.particleCircle = createTexture((g) => {
  // Zewnętrzna miękka poświata
  g.beginFill(0xffffff, 0.3)
  g.drawCircle(6, 6, 6)
  g.endFill()
  // Wnętrze — najjaśniejsze, krawędzie ostre
  g.beginFill(0xffffff, 1.0)
  g.drawCircle(6, 6, 4)
  g.endFill()
}, 12, 12)

// Tekstura cząstki KWADRAT — biała, 12×12, z lekką poświatą
TEXTURES.particleRect = createTexture((g) => {
  g.beginFill(0xffffff, 0.3)
  g.drawRect(0, 0, 12, 12)
  g.endFill()
  g.beginFill(0xffffff, 1.0)
  g.drawRect(2, 2, 8, 8)
  g.endFill()
}, 12, 12)

// 8 kolorów ze starego (jako liczby PIXI)
const EXPLOSION_COLORS = [
  0xff4400, 0xff8800, 0xffdd00, 0xff0055,
  0x00ffcc, 0xff00ff, 0xffffff, 0x44ff00
]

function spawnExplosion(x, y) {
  fxLayer['_particles'] = fxLayer['_particles'] || []
  for (let i = 0; i < 22; i++) {
    // Kąt: równomierne rozłożenie (żeby cząstki rozprysły się we wszystkie strony) + losowy szum
    const angle = (i / 22) * Math.PI * 2 + Math.random() * 0.4
    const speed = 2.5 + Math.random() * 5
    // Wybór tekstury 50/50 koło/kwadrat
    const isCircle = Math.random() > 0.5
    const tex = isCircle ? TEXTURES.particleCircle : TEXTURES.particleRect
    const color = EXPLOSION_COLORS[Math.floor(Math.random() * EXPLOSION_COLORS.length)]
    const sprite = new PIXI.Sprite(tex)
    sprite.anchor.set(0.5)
    sprite.tint = color           // PIXI tint — kolor wymnożony przez teksturę (biała → kolorowa)
    sprite.x = x
    sprite.y = y
    // baseSize to docelowy rozmiar (ze starego: 4 + Math.random() * 6 = 4..10)
    // Tekstura jest 12×12, więc skala = baseSize / 12
    const baseSize = 4 + Math.random() * 6
    sprite.rotation = Math.random() * Math.PI * 2
    fxLayer.addChild(sprite)
    fxLayer['_particles'].push({
      sprite,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,   // -1.5 = lekki wystrzał do góry (jak w starym)
      life: 1.0,                            // 0..1, jak w starym
      decay: 0.02 + Math.random() * 0.025,
      baseSize,
      gravity: 0.12 + Math.random() * 0.1,
      rotSpeed: (Math.random() - 0.5) * 0.25
    })
  }
}

// === GŁÓWNA PĘTLA — UPDATE + RENDER (PIXI render automatyczne!) ===
function update(delta) {
  // Efekt przejścia między poziomami — działa NIEZALEŻNIE od gameRunning
  // (gameRunning=false podczas transition, ale animacja Matrix musi lecieć)
  if (levelTransition) {
    updateLevelTransition()
    return  // przerywamy całą resztę logiki — gracz, wrogowie, kolizje wszystko stoi
  }
  if (!player) return
  if (!gameRunning) return  // 📋 Menu otwarte → pauza gameplay (renderowanie i tak działa)

  // === AUTO-SCROLL — statek płynie z kamerą + boost gdy lecisz w prawo ===
  if (autoScroll) {
    const cameraAtEnd = cameraX >= worldWidth - CANVAS_WIDTH - 0.5
    let currentScrollSpeed = autoScrollSpeed

    if (!cameraAtEnd) {
      // Boost — gdy gracz jest w prawej połowie ekranu, kamera przyspiesza
      const screenPos = (player.x - cameraX) / CANVAS_WIDTH
      const boostTarget = screenPos > 0.4
        ? 1 + Math.min((screenPos - 0.4) * 1.0, 0.6)
        : 1.0
      scrollBoost += (boostTarget - scrollBoost) * 0.05
      currentScrollSpeed = autoScrollSpeed * scrollBoost

      cameraX += currentScrollSpeed * delta
      // KLUCZOWE: statek "płynie razem z kamerą" — zachowuje pozycję względem ekranu
      player.x += currentScrollSpeed * delta
    } else {
      // Koniec planszy — zatrzymaj scroll, gracz steruje swobodnie
      scrollBoost = 1
    }

    cameraX = Math.max(0, Math.min(cameraX, worldWidth - CANVAS_WIDTH))
  }

  // Sterowanie statku — klawisze z JSON
  const speed = 4 * delta
  if (keys[CONTROLS.lewo])  player.vx = -speed
  else if (keys[CONTROLS.prawo]) player.vx = speed
  else player.vx *= 0.9
  if (keys[CONTROLS.skok])  player.vy = -speed
  else if (keys[CONTROLS.dol])  player.vy = speed
  else player.vy *= 0.9

  player.x += player.vx
  player.y += player.vy

  // Granice
  player.x = Math.max(cameraX + 20, Math.min(player.x, cameraX + CANVAS_WIDTH - 20))
  player.y = Math.max(20, Math.min(player.y, CANVAS_HEIGHT - 20))

  // === ANIMACJE STATKU (1:1 ze starego drawSpaceship) ===
  // Bazują na czasie w sekundach, dokładnie jak w oryginale: const t = time * 0.001
  const t = performance.now() * 0.001

  // Hover — statek faluje góra-dół: sin(t * 2.2) * 2.5
  // Wpływa TYLKO na pozycję sprite'a (kolizje używają czystego player.y)
  const hover = Math.sin(t * 2.2) * 2.5
  player.sprite.x = player.x
  player.sprite.y = player.y + hover

  // Płomienie — długość: 14 + sin(t*18 + side) * 6 → bazowa skala 1.0, oscyluje ±0.43
  // side = -1 (top), +1 (bottom). Tekstura ma 40px szerokości; bazowy "flameLen" w starym = 14+
  // Mapowanie: scale.x = (14 + sin(t*18 + side)*6) / 20  (gdzie 20 to bazowa szerokość tekstury widzialna)
  const flameLenTop    = (14 + Math.sin(t * 18 - 1) * 6) / 20
  const flameLenBottom = (14 + Math.sin(t * 18 + 1) * 6) / 20
  player.flames[0].scale.x = flameLenTop
  player.flames[1].scale.x = flameLenBottom

  // Diody silników — pulsowanie: sin(t*12 + side*1.5)*0.3 + 0.7 → zakres 0.4..1.0
  player.glows[0].alpha = Math.sin(t * 12 - 1.5) * 0.3 + 0.7
  player.glows[1].alpha = Math.sin(t * 12 + 1.5) * 0.3 + 0.7

  // Strzelanie — klawisz z JSON
  if (keys[CONTROLS.strzal]) shoot()
  if (player.cooldown > 0) player.cooldown--
  // Reload odlicza się co klatkę
  if (burstReload > 0) burstReload--
  // Aktualizuj wizualny pasek przeładowania nad statkiem
  updateReloadBar()

  // Update kontenerów wg kamery — przesuwamy CAŁE warstwy o cameraX
  enemyLayer.x = -cameraX
  blockLayer.x = -cameraX
  bonusLayer.x = -cameraX
  bulletLayer.x = -cameraX
  fxLayer.x = -cameraX
  playerLayer.x = -cameraX
  // Tło z parallax
  for (const star of stars) {
    star.x = star.x  // gwiazdy zostają na świecie
  }
  bgLayer.x = -cameraX * 0.3  // parallax tła

  // Asteroidy się obracają
  for (const e of enemies) {
    if (e.type.startsWith('rock')) {
      e.rotation += 0.01 * delta
      e.sprite.rotation = e.rotation
    } else if (e.type === 'saw') {
      e.sawAngle += 0.06 * delta
      e.sprite.rotation = e.sawAngle
    }
  }

  // Pociski — update + culling
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i]
    b.x += b.vx * delta
    b.sprite.x = b.x
    b.sprite.y = b.y

    // Poza ekranem?
    if (b.x > cameraX + CANVAS_WIDTH + 50) {
      bulletLayer.removeChild(b.sprite)
      bullets.splice(i, 1)
      continue
    }

    // Kolizja z wrogami
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j]
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        spawnExplosion(e.x + e.w/2, e.y + e.h/2)
        enemyLayer.removeChild(e.sprite)
        enemies.splice(j, 1)
        bulletLayer.removeChild(b.sprite)
        bullets.splice(i, 1)
        counters.score++
        break
      }
    }
  }

  // Bonusy — pulsowanie + kolizja z graczem
  for (let i = bonuses.length - 1; i >= 0; i--) {
    const b = bonuses[i]
    // Flaga mety NIE pulsuje (w starym też nie). Reszta tak.
    if (b.type !== 'key_win') {
      b.pulseTime = (b.pulseTime || 0) + 0.05 * delta
      b.sprite.scale.set(1 + Math.sin(b.pulseTime) * 0.1)
    }
    // Kolizja z graczem
    const dist = Math.hypot(player.x - b.x, player.y - b.y)
    if (dist < 25) {
      // === KEY_LEVEL — przejście do innego poziomu (z efektem Matrix) ===
      if (b.type === 'key_level') {
        const target = b.targetLevel || 0
        if (target >= levels.length) {
          console.warn('Klucz prowadzi do poziomu który nie istnieje:', target)
          bonusLayer.removeChild(b.sprite)
          bonuses.splice(i, 1)
          continue
        }
        // Najpierw usuń klucz z ekranu (żeby nie wisiał za matrixem),
        // potem uruchom transition — loadLevel wywołane PO 180 klatkach z updateLevelTransition()
        bonusLayer.removeChild(b.sprite)
        bonuses.splice(i, 1)
        startLevelTransition(target)
        return  // przerywamy pętlę bonusów — gameRunning=false do końca transition
      }
      // === KEY_WIN — koniec gry, ekran wygranej ===
      if (b.type === 'key_win') {
        bonusLayer.removeChild(b.sprite)
        bonuses.splice(i, 1)
        showResults(true)
        return
      }
      // === ZWYKŁY DIAMENT — punkty ===
      bonusLayer.removeChild(b.sprite)
      bonuses.splice(i, 1)
      counters.score += 10
    }
  }

  // Particle update — fizyka 1:1 ze starego: grawitacja, drag, rotacja, zmienny rozmiar
  if (fxLayer._particles) {
    for (let i = fxLayer._particles.length - 1; i >= 0; i--) {
      const p = fxLayer._particles[i]
      // Pozycja
      p.sprite.x += p.vx * delta
      p.sprite.y += p.vy * delta
      // Fizyka: grawitacja ciągnie w dół, drag spowalnia poziomy ruch
      p.vy += p.gravity * delta
      p.vx *= Math.pow(0.97, delta)   // delta-aware drag (przy delta=1 to zwykłe *=0.97)
      // Rotacja
      p.sprite.rotation += p.rotSpeed * delta
      // Życie i widoczność
      p.life -= p.decay * delta
      p.sprite.alpha = Math.max(0, p.life)
      // Rozmiar maleje wraz z życiem (size * life w starym → skalowanie sprite'a)
      const targetScale = (p.baseSize * p.life) / 12   // tekstura jest 12×12
      p.sprite.scale.set(Math.max(0, targetScale))
      // Usuwanie martwych
      if (p.life <= 0) {
        fxLayer.removeChild(p.sprite)
        fxLayer._particles.splice(i, 1)
      }
    }
  }

  // Kolizje statku z wrogami
  for (const e of enemies) {
    if (player.x + player.r > e.x && player.x - player.r < e.x + e.w &&
        player.y + player.r > e.y && player.y - player.r < e.y + e.h) {
      counters.lives--
      spawnExplosion(player.x, player.y)
      // Reset pozycji
      player.x = cameraX + 100
      if (counters.lives <= 0) {
        // Game over — ekran przegranej
        showResults(false)
        return
      }
      break
    }
  }

  // Aktualizuj HUD
  document.getElementById('hud-lives').textContent = counters.lives
  document.getElementById('hud-score').textContent = counters.score
  // Wskaźnik aktualnej rundy (na canvasie, obok FPS)
  const badge = document.getElementById('levelBadge')
  if (badge && levels.length > 0) {
    const txt = `RUNDA ${currentLevel + 1}/${levels.length}`
    if (badge.textContent !== txt) badge.textContent = txt   // optymalizacja — zmiana tylko gdy potrzeba
  }
  // HUD: zamiast counters.ammo, pokazujemy magazynek serii lub "ładowanie..."
  const ammoEl = document.getElementById('hud-ammo')
  if (burstReload > 0) {
    const sec = (burstReload / 60).toFixed(1)
    ammoEl.textContent = `🔄 ${sec}s`
  } else {
    ammoEl.textContent = `${BURST_MAX - burstCount}/${BURST_MAX}`
  }
  document.getElementById('stat-enemies').textContent = enemies.length
  document.getElementById('stat-bullets').textContent = bullets.length
  document.getElementById('stat-drawn').textContent = enemies.length + blocks.length + bonuses.length + bullets.length

  // FPS counter
  frameCount++
  const now = performance.now()
  if (now - lastFpsTime >= 500) {
    const fps = Math.round((frameCount * 1000) / (now - lastFpsTime))
    fpsHistory.push(fps)
    if (fpsHistory.length > 5) fpsHistory.shift()
    const avgFps = Math.round(fpsHistory.reduce((a,b)=>a+b,0) / fpsHistory.length)
    const fpsEl = document.getElementById('fps-counter')
    fpsEl.textContent = `FPS: ${avgFps}`
    fpsEl.style.color = avgFps >= 50 ? '#0f0' : avgFps >= 30 ? '#ff0' : '#f00'
    frameCount = 0
    lastFpsTime = now
  }
}

// === RESTART ===
function restartGame() {
  counters = { lives: 3, score: 0, ammo: 100 }
  loadLevel(0)
  showMenu()  // 📋 Po restarcie też pokaż menu
}

// === WCZYTYWANIE JSON Z PLIKU ===
function handleFileLoad(event) {
  const file = event.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = function(e) {
    try {
      const newData = JSON.parse(e.target.result)
      if (!newData.levels || newData.levels.length === 0) {
        alert('❌ Nieprawidłowy plik JSON — brak poziomów')
        return
      }
      // Wczytaj nową grę
      GAME_DATA = newData
      levels = GAME_DATA.levels
      counters = { lives: 3, score: 0, ammo: 100 }
      loadControls()  // 🎮 wczytaj sterowanie z JSON

      // Zaktualizuj nazwę gry
      const gameName = (GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || file.name.replace('.json', '')
      document.getElementById('current-game').textContent = gameName

      loadLevel(0)
      showMenu()  // 📋 Pokaż menu z opisem gry
      console.log(`✅ Wczytano: ${gameName} (${levels.length} poziomów)`)
    } catch(err) {
      alert(`❌ Błąd wczytywania pliku: ${err.message}`)
      console.error(err)
    }
  }
  reader.onerror = () => alert('❌ Nie udało się odczytać pliku')
  reader.readAsText(file)
  // Reset input żeby można było wczytać ten sam plik ponownie
  event.target.value = ''
}

// === MENU STARTOWE ===
function showMenu() {
  if (!GAME_DATA) return
  gameRunning = false  // pauzujemy grę

  const s = GAME_DATA.settings || {}
  const title = s.nazwaGry || 'Bez tytułu'
  const author = s.autorGry || 'Nieznany'
  const description = s.opisGry || 'Brak opisu gry.'

  document.getElementById('menu-title').textContent = title
  document.getElementById('menu-author').textContent = `Autor: ${author}`
  document.getElementById('menu-description').textContent = description

  // Sterowanie z CONTROLS (już wczytane przez loadControls)
  const c = CONTROLS
  document.getElementById('menu-controls').innerHTML = `
    <strong>Sterowanie:</strong><br>
    <kbd>${keyLabel(c.lewo)}</kbd> <kbd>${keyLabel(c.prawo)}</kbd> ruch poziomy
    <kbd>${keyLabel(c.skok)}</kbd> <kbd>${keyLabel(c.dol)}</kbd> ruch pionowy
    <kbd>${keyLabel(c.strzal)}</kbd> strzał
  `

  document.getElementById('menu-overlay').classList.remove('hidden')
}

function startGameplay() {
  document.getElementById('menu-overlay').classList.add('hidden')
  gameRunning = true
}

// === WCZYTANIE WBUDOWANEJ GRY (KARTRIDŻ) ===
function loadDemo() {
  try {
    GAME_DATA = JSON.parse(GAME_DATA_INLINE)
    levels = GAME_DATA.levels || []
    counters = { lives: 3, score: 0, ammo: 100 }
    loadControls()  // 🎮 wczytaj sterowanie z JSON
    const gameName = (GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || 'Demo'
    document.getElementById('current-game').textContent = gameName
    loadLevel(0)
    showMenu()  // 📋 Pokaż menu z opisem gry
    console.log(`✅ Wczytano demo: ${gameName}`)
  } catch(e) {
    alert(`❌ Błąd: ${e.message}`)
  }
}

// === START ===
function startGame() {
  try {
    GAME_DATA = JSON.parse(GAME_DATA_INLINE)
    levels = GAME_DATA.levels || []
    if (levels.length === 0) throw new Error('Brak poziomów')
    loadControls()  // 🎮 wczytaj sterowanie z JSON
    const gameName = (GAME_DATA.settings && GAME_DATA.settings.nazwaGry) || 'Demo'
    document.getElementById('current-game').textContent = gameName
    loadLevel(0)
    showMenu()  // 📋 Pokaż menu z opisem gry przed startem
    app.ticker.add(update)
    console.log('✅ Gra uruchomiona — renderuje na', rendererType)
  } catch(e) {
    console.error('❌ Błąd:', e)
    document.getElementById('game-container').innerHTML = `<div style="color:red;padding:20px">Błąd: ${e.message}</div>`
  }
}
