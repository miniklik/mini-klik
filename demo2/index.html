<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Edytor gier</title>
<style>
  body { margin:0; font-family:Arial; background:#111; color:white; display:flex; flex-direction:column; align-items:center; }
  #editor { width:1200px; max-width:95vw; }
  #topbar { background:#222; padding:10px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
  button {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: bold;
  background: linear-gradient(180deg, #555, #222);
  border: 2px solid #666;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: 0 4px 0 #111, 0 0 10px rgba(0,0,0,0.5);
}
button:hover {
  background: linear-gradient(180deg, #666, #333);
  transform: translateY(-2px);
  box-shadow: 0 6px 0 #111, 0 0 12px rgba(0,0,0,0.7);
}
button:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #111;
}
button.active {
  background: linear-gradient(180deg, #4CAF50, #2e7d32) !important;
  border-color: #1b5e20;
  box-shadow: 0 0 12px #4CAF50, 0 4px 0 #0a3d12;
}
  #deleteBtn.active { background:#c33 !important; border-color:#933; box-shadow:0 0 8px #c33; }
  #main { display:flex; gap:10px; }
#lewy button {
  width: 160px;
  height: 40px;
  box-sizing: border-box;
  margin-bottom: 10px;
  padding-left: 14px;
  display: flex;
  align-items: center;
}
#prawy button {
  height: 40px;
  box-sizing: border-box;
  margin-bottom: 8px;
}
  #prawy { width:220px; background:#222; padding:10px; }
  canvas { background:#87CEEB; display:block; }
  .selected { outline:3px solid red; }
  .item { cursor:pointer; text-align:center; margin:10px 0; }
  .keybox { border:1px solid #888; padding:6px; margin:3px 0; text-align:center; cursor:pointer; background:#333; }
  input[type="number"] { width:80px; }
  .fx-list { margin:10px 0; }
  .fx-row { background:#333; padding:8px; margin:6px 0; border-radius:4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .fx-name { font-weight:bold; min-width:90px; }
  .fx-params { color:#aaa; font-size:0.9em; flex:1; }
  .small { font-size:0.85em; padding:4px 8px; }
  .danger { background:#933; }
  .blink {
    animation: blinkAnim 1s infinite;
  }
  @keyframes blinkAnim {
    0%   { opacity: 1; }
    50%  { opacity: 0.2; }
    100% { opacity: 1; }
  }

  /* ===== DPAD W PANELU USTAWIEŃ ===== */
  .dpad-panel {
    position: relative;
    width: 150px;
    height: 150px;
    margin: 10px auto;
    user-select: none;
    -webkit-user-select: none;
  }

  .dpad-btn {
    position: absolute;
    width: 46px;
    height: 46px;
    background: linear-gradient(180deg, #444, #222);
    border: 2px solid #666;
    border-radius: 10px;
    color: white;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 5px 0 #000, inset 0 1px 0 rgba(255,255,255,0.1);
    transition: all 0.07s ease;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  .dpad-btn:active,
  .dpad-btn.pressed {
    background: linear-gradient(180deg, #3a8fff, #1a5fd4) !important;
    border-color: #2277ff;
    box-shadow: 0 2px 0 #000, 0 0 14px #3a8fff, inset 0 1px 0 rgba(255,255,255,0.15);
    transform: translateY(3px);
  }

  .dpad-up    { top:0;    left:50%; transform:translateX(-50%); border-radius:10px 10px 6px 6px; }
  .dpad-down  { bottom:0; left:50%; transform:translateX(-50%); border-radius:6px 6px 10px 10px; }
  .dpad-left  { left:0;  top:50%;  transform:translateY(-50%); border-radius:10px 6px 6px 10px; }
  .dpad-right { right:0; top:50%;  transform:translateY(-50%); border-radius:6px 10px 10px 6px; }

  .dpad-up:active    { transform: translateX(-50%) translateY(3px); }
  .dpad-down:active  { transform: translateX(-50%) translateY(3px); }
  .dpad-left:active  { transform: translateY(-50%) translateX(3px); }
  .dpad-right:active { transform: translateY(-50%) translateX(-3px); }

  .dpad-center-dot {
    position: absolute;
    width: 46px;
    height: 46px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1a1a1a;
    border-radius: 8px;
    border: 2px solid #333;
  }
</style>
</head>
<body>

<div id="editor">

<div id="topbar">
  <button id="runBtn" onclick="uruchom()">URUCHOM</button>
  <button id="editBtn" onclick="edytuj()">EDYTUJ</button>
  <button id="deleteBtn" onclick="trybUsun()">USUŃ OBIEKT</button>
  <button id="gridBtn" onclick="toggleGrid()">SIATKA</button>
  <button id="fxBtn" onclick="toggleFX()">FX</button>
  <button id="pauseFxBtn" onclick="togglePauseEffects()">FX - STOP</button>
  <button onclick="zapiszProjekt()">SAVE</button>
  <button onclick="wczytajProjekt()">LOAD</button>
  <button onclick="loadDemo(); event.stopPropagation()">🎮 DEMO</button>
</div>

<div id="main">
<div id="lewy">
  <h3>OBIEKTY</h3>
  <button onclick="pokazGraczy()">👤 GRACZ</button>
  <button onclick="pokazPlatformy()">🧱 PLATFORMA</button>
  <button onclick="pokazBloki()">⬛ BLOK</button>
  <button onclick="pokazPrzeciwniki()">👾 PRZECIWNIK</button>
  <button onclick="wlaczBonusy()">💎 BONUSY</button>
  <button onclick="pokazLiczniki()">📊 LICZNIKI</button>
  <button onclick="pokazKoniec()">🏁 POZIOMY ➜ GRY</button>
  <button onclick="dodajTekst()">✍ TEKST</button>
  <button onclick="pokazTloPanel()">🌄 TŁO</button>
  <button onclick="pokazUstawienia()">⚙ USTAWIENIA</button>
  <div id="sterowanie"></div>
</div>

  <div style="display:flex; flex-direction:column; align-items:center;">
    <canvas id="scena" width="800" height="450"></canvas>



    <input type="range" id="scrollX" min="0" value="0" step="1"
           style="width:800px; margin:8px 0; accent-color:#4CAF50; background:#333; height:12px; border-radius:6px;">

    <div id="levelsBar" style="
      width:800px;
      display:flex;
      align-items:center;
      gap:6px;
      background:#222;
      padding:6px;
      border-radius:6px;
      margin-bottom:10px;
    "></div>
  </div>

  <div id="prawy">
    <div id="panel">
      <h3>PANEL</h3>
      <div>Wybierz narzędzie z góry.</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("scena")
canvas.setAttribute("tabindex", "0")
const ctx = canvas.getContext("2d")

let trybGry = false
let trybHTML = false
let trybKasowania = false
let trybBonusy = false
let trybFX = false
let ustawianieStartu = false
let gridEnabled = false
let gridSize = 20
let gravity = 0.4

let players = []
let platforms = []
let blocks = []
let enemies = []
let texts = []
let selectedPlayerType = "ball"

let levels = []
let currentLevel = 0

function getLevel(){
  return levels[currentLevel]
}

function syncLevelData(){
  const lvl = levels[currentLevel]
  if (!lvl) return

  players   = lvl.players   || []
  platforms = lvl.platforms || []
  blocks    = lvl.blocks    || []
  enemies   = lvl.enemies   || []
  bonuses   = lvl.bonuses   || []
  texts     = lvl.texts     || []

  if (!Array.isArray(bonuses)) bonuses = []
}

if (levels.length === 0) {
  levels.push({
    players: [],
    platforms: [],
    blocks: [],
    enemies: [],
    bonuses: [],
    texts: [],
    backgroundType: "none",
    playerStartX: 100,
    playerStartY: 100
  })
}

let gameData = {
  stats: {}
}
let gameOver = false
let gameOverTriggered = false
let playerStartX = 100
let playerStartY = 100

let invulnerable = 0
let invulnerabilityTime = 80
let hitPause = 0
let fallTimer = 0
const FALL_TIME_LIMIT = 180
let hitPauseTime = 60
let pendingRespawn = false
let deathRespawnX = 300
let deathRespawnY = 300
let useLives = true
let hitEffect = null
let respawnMode = "death"
let diedByFalling = false
let warningText = null
let gameState = "game"
let bonuses = []
let fileHandle = null
let levelDelay = null
let matrixCols = []
let matrixFrame = 0
let levelTextAnim = null

let resultsBall = { x: 400, y: 220, r: 20 }
let resultsEnemies = []

let counters = {
  lives: 3,
  points: 0,
  time: 60
}
let startTime = counters.time
let useTimer = true
let autorGry = "Nieznany"
let nazwaGry = "Moja gra"
let opisGry = ""
let showIntro = false
let backgroundType = "none"

let lastTime = Date.now()
let fps = 70
let frameDelay = 1000 / fps
let lastFrame = 0

// ===== MOBILE DPAD (w panelu ustawień) =====
function navPress(dir) {
  const el = document.querySelector('.dpad-' + dir)
  if (el) el.classList.add('pressed')
  if (dir === 'left'  && sterowanie.lewo)  keys[sterowanie.lewo]  = true
  if (dir === 'right' && sterowanie.prawo) keys[sterowanie.prawo] = true
  if (dir === 'up'    && sterowanie.skok)  keys[sterowanie.skok]  = true
  if (dir === 'down'  && sterowanie.skok)  keys[sterowanie.skok]  = false
}

function navRelease(dir) {
  const el = document.querySelector('.dpad-' + dir)
  if (el) el.classList.remove('pressed')
  if (dir === 'left'  && sterowanie.lewo)  keys[sterowanie.lewo]  = false
  if (dir === 'right' && sterowanie.prawo) keys[sterowanie.prawo] = false
  if (dir === 'up'    && sterowanie.skok)  keys[sterowanie.skok]  = false
}

function renderLevelsBar(){
  let html = `<b style="margin-right:10px; color:#0f0;">POZIOMY →</b>`

  levels.forEach((lvl, i) => {
    const isActive = i === currentLevel
    html += `
      <div onclick="switchLevelUI(${i})"
           style="
             width:32px;
             height:32px;
             background:${isActive ? "#4CAF50" : "#444"};
             color:${isActive ? "white" : "#ccc"};
             display:flex;
             align-items:center;
             justify-content:center;
             cursor:pointer;
             border-radius:6px;
             font-weight:${isActive ? "bold" : "normal"};
             box-shadow:${isActive ? "0 0 10px #4CAF50" : "none"};
           ">
        ${i+1}
      </div>
    `
  })

  html += `
    <div onclick="addLevelUI()"
         style="
           width:32px;
           height:32px;
           background:#ff9800;
           color:white;
           display:flex;
           align-items:center;
           justify-content:center;
           cursor:pointer;
           border-radius:6px;
           font-size:20px;
           font-weight:bold;
         ">
      +
    </div>
  `

  document.getElementById("levelsBar").innerHTML = html
}

function addLevelUI(){
  levels.push({
    players: [],
    platforms: [],
    blocks: [],
    enemies: [],
    bonuses: [],
    texts: [],
    backgroundType: "none",
    playerStartX: 100,
    playerStartY: 100
  })

  currentLevel = levels.length - 1
  syncLevelData()

  const lvl = getLevel()
  playerStartX = lvl.playerStartX ?? 100
  playerStartY = lvl.playerStartY ?? 100

  if (players.length > 0) {
    players[0].x = playerStartX
    players[0].y = playerStartY
  }

  renderLevelsBar()
}

function switchLevelUI(i){
  if (i < 0 || i >= levels.length) return

  currentLevel = i
  syncLevelData()

  const lvl = getLevel()
  playerStartX = lvl.playerStartX ?? 100
  playerStartY = lvl.playerStartY ?? 100

  respawnPlayer()
  renderLevelsBar()
}

function pokazLiczniki(){
  document.getElementById("panel").innerHTML = `
    <h3>LICZNIKI</h3>

    ❤️ Życia:
    <input type="number" id="editLives" value="${counters.lives}" style="width:60px;">
    <br><br>

    <label>
      <input type="checkbox" id="useLives" ${useLives ? "checked" : ""}>
      Licz życia
    </label>
    <br><br>

    ⭐ Punkty: <span>${counters.points}</span><br><br>

    <button onclick="resetPoints()">🔄 Reset punktów</button>
    <br><br>

    ⏱ Czas:
    <input type="number" id="editTime" value="${Math.ceil(counters.time)}" style="width:60px;">
    <br><br>

    <label>
      <input type="checkbox" id="useTimer" ${useTimer ? "checked" : ""}>
      Licz czas
    </label>

    <br><br><br>

    <button onclick="zapiszLiczniki()">ZAPISZ</button>
  `
}

function resetPoints(){
  counters.points = 0
}

function zapiszZycia(){
  let val = Number(document.getElementById("editLives").value)
  if (isNaN(val) || val < 0) return
  counters.lives = val
}

let keys = {}
let copiedObject = null
let trybKopiowania = false

let sterowanie = { lewo:null, prawo:null, skok:null }
let aktywnePole = null

let dragging = null
let resizing = null
let dragOffsetX = 0
let dragOffsetY = 0

const floorY = 430

let editingFxIndex = -1
let effectsPaused = false

let cameraX = 0
let autoScroll = false
let autoScrollSpeed = 2

let worldWidth = 2000

const scrollX = document.getElementById("scrollX")
scrollX.max = worldWidth - canvas.width

function syncScrollbar() {
  scrollX.value = Math.max(0, Math.min(cameraX, worldWidth - canvas.width))
}

scrollX.addEventListener("input", () => {
  cameraX = Number(scrollX.value)
})

function updateButtonStates() {
  document.getElementById("runBtn").classList.toggle("active", trybGry)
  document.getElementById("editBtn").classList.toggle("active", !trybGry)
  document.getElementById("fxBtn").classList.toggle("active", trybFX)
  document.getElementById("gridBtn").classList.toggle("active", gridEnabled)
  document.getElementById("pauseFxBtn").classList.toggle("active", effectsPaused)
  document.getElementById("deleteBtn").classList.toggle("active", trybKasowania)
  document.getElementById("pauseFxBtn").textContent = effectsPaused ? "WZNÓW EFEKTY" : "ZATRZYMAJ EFEKTY"
}

function togglePauseEffects() {
  effectsPaused = !effectsPaused
  updateButtonStates()
}

function toggleGrid(){
  gridEnabled = !gridEnabled
  updateButtonStates()
  if (gridEnabled) snapAll()
}

function snap(v){
  return Math.round(v / gridSize) * gridSize
}

function snapAll(){
  for (let p of players) {
    p.x = snap(p.x); p.y = snap(p.y)
  }
  for (let pl of platforms) {
    pl.x = snap(pl.x); pl.y = snap(pl.y); pl.w = snap(pl.w)
  }
  for (let b of blocks) {
    b.x = snap(b.x); b.y = snap(b.y); b.w = snap(b.w); b.h = snap(b.h)
  }
}

function uruchom(){
  trybGry = true
  respawnPlayer()
  updateButtonStates()
}

function edytuj(){
  trybGry = false
  updateButtonStates()
}

function trybUsun(){
  trybKasowania = !trybKasowania
  trybFX = false
  updateButtonStates()
}

function wlaczBonusy(){
  trybBonusy = false

  document.getElementById("panel").innerHTML = `
    <h3>BONUSY</h3>
    <div class="item" onclick="dodajBonus()" style="font-size:40px;">💎</div>
    <p style="text-align:center;">Kliknij 💎 aby wstawić</p>
  `
}

function toggleFX(){
  trybFX = !trybFX
  trybKasowania = false
  updateButtonStates()
  if (trybFX) {
    document.getElementById("panel").innerHTML = "<h3>FX</h3>Kliknij obiekt na scenie aby edytować efekty"
  } else if (!selectedObject) {
    document.getElementById("panel").innerHTML = "<h3>PANEL</h3><div>Wybierz narzędzie z góry.</div>"
  }
}

let selectedObject = null

function showFxList(){
  if (!selectedObject) return

  if (selectedObject.r && !selectedObject.w) {
    document.getElementById("panel").innerHTML = `
      <h3>Gracz</h3>
      <p style="color:#aaa">Gracz nie obsługuje efektów</p>
      <p style="color:#888; font-size:0.9em; margin-top:12px;">
        Ruch gracza sterowany jest klawiaturą.
      </p>
    `
    return
  }

  trybFX = false
  updateButtonStates()

  let html = `<h3>Efekty</h3>`
  if (!selectedObject.effects || selectedObject.effects.length === 0) {
    html += `<p style="color:#888">Brak efektów</p>`
  } else {
    html += `<div class="fx-list">`
    selectedObject.effects.forEach((fx, i) => {
      let params = ""
      if (fx.type === "move") {
        let dir = fx.dx > 0 ? "→" : fx.dx < 0 ? "←" : fx.dy > 0 ? "↓" : "↑"
        params = `${dir} speed:${fx.speed} dist:${fx.distance} ${fx.loop?"loop":"jednoraz"}`
      }
      html += `
        <div class="fx-row">
          <input type="checkbox" ${fx.enabled!==false?"checked":""} onchange="toggleFx(${i})">
          <span class="fx-name">${fx.type.toUpperCase()}</span>
          <span class="fx-params">${params}</span>
          <button class="small" onclick="editFx(${i})">✏ edytuj</button>
          <button class="small danger" onclick="removeFx(${i})">🗑 usuń</button>
        </div>
      `
    })
    html += `</div>`
  }
  html += `
    <button onclick="showAddFxMenu()">+ DODAJ EFEKT</button>
    <br><br>
    <button onclick="kopiujObiekt()">📋 KOPIUJ</button>
  `
  document.getElementById("panel").innerHTML = html
}

function toggleFx(index){
  if (!selectedObject) return
  let fx = selectedObject.effects[index]
  fx.enabled = !(fx.enabled === false)
}

function removeFx(index){
  if (!selectedObject) return
  selectedObject.effects.splice(index, 1)
  showFxList()
}

function editFx(index){
  editingFxIndex = index
  showMove()
}

function showAddFxMenu(){
  editingFxIndex = -1
  document.getElementById("panel").innerHTML = `
    <h3>Dodaj efekt</h3>
    <button onclick="showMove()">RUCH (move)</button>
    <br><br>
    <button onclick="showFxList()">← powrót</button>
    <br><br>
    <button onclick="addNeonFx()">NEON</button>
  `
}

function addNeonFx(){
  if (!selectedObject) return
  if (!selectedObject.effects) selectedObject.effects = []

  if (selectedObject.effects.length >= 2) {
    alert("❌ Max 2 efekty")
    return
  }

  selectedObject.effects.push({
    type: "neon",
    enabled: true
  })

  showFxList()
}

function showMove(){
  let initial = {dx:1, dy:0, speed:2, distance:200, loop:true}
  if (editingFxIndex >= 0 && selectedObject.effects && selectedObject.effects[editingFxIndex]?.type === "move") {
    initial = {...selectedObject.effects[editingFxIndex]}
  }

  document.getElementById("panel").innerHTML = `
    <h3>${editingFxIndex >= 0 ? "Edytuj RUCH" : "Dodaj RUCH"}</h3>
    kierunek<br>
    <button onclick="setDir('left')">←</button>
    <button onclick="setDir('right')">→</button>
    <button onclick="setDir('up')">↑</button>
    <button onclick="setDir('down')">↓</button>
    <br><br>
    szybkość <input id="speed" type="number" value="${initial.speed}"><br>
    długość <input id="dist" type="number" value="${initial.distance}"><br>
    pętla <input type="checkbox" id="loop" ${initial.loop?"checked":""}><br><br>
    <button onclick="saveMove()">${editingFxIndex >= 0 ? "ZAPISZ ZMIANY" : "DODAJ FX"}</button>
    <button onclick="showFxList()">anuluj</button>
  `
  moveDir = {dx: initial.dx, dy: initial.dy}
}

let moveDir = {dx:1, dy:0}

function setDir(d){
  if (d=="right") moveDir={dx:1,dy:0}
  if (d=="left")  moveDir={dx:-1,dy:0}
  if (d=="down")  moveDir={dx:0,dy:1}
  if (d=="up")    moveDir={dx:0,dy:-1}
}

function saveMove(){
  if (!selectedObject) return
  if (!selectedObject.effects) selectedObject.effects = []

  if (editingFxIndex === -1 && selectedObject.effects.length >= 2) {
    alert("❌ Maksymalnie 2 efekty na obiekt")
    return
  }

  let speed = Number(document.getElementById("speed")?.value) || 2
  let dist  = Number(document.getElementById("dist")?.value)  || 200
  let loop  = document.getElementById("loop")?.checked ?? true

  let effect = {
    type: "move",
    dx: moveDir.dx,
    dy: moveDir.dy,
    speed, distance: dist, loop,
    travel: 0,
    enabled: true
  }

  if (editingFxIndex >= 0) {
    selectedObject.effects[editingFxIndex] = effect
  } else {
    selectedObject.effects.push(effect)
  }

  showFxList()
}

function pokazGraczy() {
  document.getElementById("panel").innerHTML = `
    <h4>DODAJ GRACZA</h4>
    <div style="text-align:center; color:#aaa; margin-bottom:10px;">
      kliknij i dodaj
    </div>

    <div style="display:flex; gap:25px; justify-content:center; margin:15px 0;">
      <div class="item"
        onclick="selectedPlayerType='ball'; dodajGracza()"
        style="width:40px;height:40px;background:red;border-radius:50%;">
      </div>
      <div class="item"
        onclick="selectedPlayerType='car'; dodajGracza()"
        style="font-size:40px; text-align:center;">
        🚗
      </div>
    </div>

    <h4>ODRADZANIE</h4>

    <div style="display:flex; gap:6px; margin-bottom:10px;">
      <button style="flex:1;" onclick="setRespawnMode('start')" id="respStart">
        Początek
      </button>
      <button style="flex:1;" onclick="setRespawnMode('death')" id="respDeath">
        Skucha
      </button>
    </div>

    <h4>STEROWANIE</h4>

    <div style="margin-bottom:6px;">
      <div class="keybox" onclick="wybierzPole('skok')" id="skok">?</div>
    </div>

    <div style="display:flex; gap:6px;">
      <div class="keybox" style="flex:1;" onclick="wybierzPole('lewo')" id="lewo">?</div>
      <div class="keybox" style="flex:1;" onclick="wybierzPole('prawo')" id="prawo">?</div>
    </div>

    <h4>RUCH ŚWIATA</h4>

    <label>
      <input type="checkbox" id="autoScrollToggle"

function drawPlatformPreview(canvasId, typ) {
  const previewCanvas = document.getElementById(canvasId)
  if (!previewCanvas) return
  const pctx = previewCanvas.getContext("2d")

  const w = previewCanvas.width
  const h = previewCanvas.height

  pctx.clearRect(0, 0, w, h)

  if (typ === "line") {
    const y = h / 2
    pctx.strokeStyle = "#00dddd"
    pctx.lineWidth = 4
    pctx.shadowColor = "#00ffff"
    pctx.shadowBlur = 12
    pctx.beginPath()
    pctx.moveTo(15, y)
    pctx.lineTo(w - 15, y)
    pctx.stroke()
    pctx.shadowBlur = 0
  } else {
    const padding = 12
    const ph = h - padding * 2

    pctx.fillStyle = "#8B5A2B"
    if (typ === "round") {
      pctx.beginPath()
      pctx.roundRect(padding, padding, w - padding*2, ph, 14)
      pctx.fill()
    } else {
      pctx.fillRect(padding, padding, w - padding*2, ph)
    }

    pctx.strokeStyle = "#3F2A1D"
    pctx.lineWidth = 3.5
    if (typ === "round") {
      pctx.beginPath()
      pctx.roundRect(padding + 2, padding + 2, w - padding*2 - 4, ph - 4, 12)
      pctx.stroke()
    } else {
      pctx.strokeRect(padding + 2, padding + 2, w - padding*2 - 4, ph - 4)
    }

    pctx.strokeStyle = "#A67C5D"
    pctx.lineWidth = 2.2

    const lineCount = 4
    for (let i = 1; i < lineCount; i++) {
      let py = padding + (ph * i / lineCount)
      pctx.beginPath()
      pctx.moveTo(padding + 10, py)
      pctx.quadraticCurveTo(w * 0.38, py + (i % 2 === 0 ? -1.5 : 1.5), w - padding - 10, py)
      pctx.stroke()
    }

    pctx.strokeStyle = "#6B4426"
    pctx.lineWidth = 1.4
    pctx.beginPath()
    pctx.moveTo(padding + 25, padding + 10)
    pctx.quadraticCurveTo(w * 0.6, padding + 22, padding + 40, padding + ph - 12)
    pctx.stroke()
  }
}

function drawCar(cx, cy, r, vx){
  const W = r * 3;
  const H = r * 1.4;

  ctx.save();
  ctx.translate(cx, cy);

  let tilt = -vx * 0.015
  ctx.rotate(tilt)

  ctx.fillStyle = "#3a86ff";
  ctx.beginPath();
  ctx.moveTo(-W/2, H/2);
  ctx.lineTo(-W/2, 0);
  ctx.quadraticCurveTo(-W/2, -H/2, -W/4, -H/2);
  ctx.lineTo(W/4, -H/2);
  ctx.quadraticCurveTo(W/2, -H/2, W/2, 0);
  ctx.lineTo(W/2, H/2);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#a5d8ff";
  ctx.fillRect(-W*0.15, -H*0.4, W*0.3, H*0.3);

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(-W*0.3, H/2, r*0.45, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W*0.3, H/2, r*0.45, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#ccc";
  ctx.beginPath();
  ctx.arc(-W*0.3, H/2, r*0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W*0.3, H/2, r*0.2, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#fff3b0";
  ctx.fillRect(W/2 - 4, 0, 4, 6);

  ctx.restore();
}

canvas.addEventListener("mousedown", e => {
  if (trybGry || trybHTML) return
  if (trybKopiowania && copiedObject) {
    const rect = canvas.getBoundingClientRect()
    const mx = e.clientX - rect.left + cameraX
    const my = e.clientY - rect.top

    let nowy = JSON.parse(JSON.stringify(copiedObject))

    if (nowy.r && !nowy.w) {
      nowy.x = mx
      nowy.y = my
      const lvl = getLevel()
      lvl.players.push(nowy)
      syncLevelData()
    } else if (nowy.typ === "block" || nowy.w && nowy.h && !nowy.type) {
      nowy.x = mx - (nowy.w || 80)/2
      nowy.y = my - (nowy.h || 80)/2
      const lvl = getLevel()
      lvl.blocks.push(nowy)
      syncLevelData()
    } else if (nowy.type !== undefined && nowy.w) {
      nowy.x = mx - (nowy.w || 40)/2
      nowy.y = my - (nowy.h || 40)/2
      const lvl = getLevel()
      lvl.enemies.push(nowy)
      syncLevelData()
    } else {
      nowy.x = mx - (nowy.w || 120)/2
      nowy.y = my - (nowy.h || 20)/2
      const lvl = getLevel()
      lvl.platforms.push(nowy)
      syncLevelData()
    }

    trybKopiowania = false
    selectedObject = nowy
    showFxList()
    return
  }

  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left + cameraX
  const my = e.clientY - rect.top

  dragging = null
  resizing = null

  if (trybKasowania) {
    for (const arr of [blocks, platforms, players, enemies, bonuses]) {
      for (let i = arr.length - 1; i >= 0; i--) {
        const o = arr[i]
        if (o.r && !o.w) {
          const dx = mx - o.x
          const dy = my - o.y
          if (Math.hypot(dx, dy) < o.r + 6) {
            arr.splice(i, 1)
            trybKasowania = false
            updateButtonStates()
            return
          }
        } else {
          if (
            mx >= o.x - 6 && mx <= o.x + (o.w||40) + 6 &&
            my >= o.y - 6 && my <= o.y + (o.h||40) + 6
          ) {
            arr.splice(i, 1)
            trybKasowania = false
            updateButtonStates()
            return
          }
        }
      }
    }
    return
  }

  if (trybFX) {
    selectedObject = null

    for (const p of players) {
      if (Math.hypot(mx - p.x, my - p.y) < p.r + 8) {
        selectedObject = p
        showFxList()
        return
      }
    }

    for (const arr of [platforms, blocks, enemies]) {
      for (const obj of arr) {
        if (
          mx >= obj.x && mx <= obj.x + obj.w &&
          my >= obj.y && my <= obj.y + obj.h
        ) {
          selectedObject = obj
          showFxList()
          return
        }
      }
    }
    return
  }

  selectedObject = null

  for (const bonus of bonuses) {
    let dx = mx - bonus.x
    let dy = my - bonus.y
    let dist = Math.sqrt(dx*dx + dy*dy)

    if (dist < (bonus.r || 12) + 10) {
      selectedObject = bonus
      dragging = bonus
      dragOffsetX = mx - bonus.x
      dragOffsetY = my - bonus.y

      if (bonus.type === "key_level") {
        pokazPanelKlucza(bonus)
      }
      return
    }
  }

  for (const b of blocks) {
    if (mx > b.x + b.w - 12 && mx < b.x + b.w + 12 && my > b.y && my < b.y + b.h) {
      resizing = b; resizing.resizeSide = "right"; selectedObject = b; return
    }
    if (mx > b.x - 12 && mx < b.x + 12 && my > b.y && my < b.y + b.h) {
      resizing = b; resizing.resizeSide = "left"; selectedObject = b; return
    }
  }

  for (const pl of platforms) {
    if (mx > pl.x + pl.w - 12 && mx < pl.x + pl.w + 12 && my > pl.y && my < pl.y + (pl.h||20)) {
      resizing = pl; resizing.resizeSide = "right"; selectedObject = pl; return
    }
  }

  for (const b of blocks) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      selectedObject = b
      dragging = b
      dragOffsetX = mx - b.x
      dragOffsetY = my - b.y
      return
    }
  }

  for (const t of texts) {
    if (
      mx >= t.x - 60 &&
      mx <= t.x + 60 &&
      my >= t.y - 30 &&
      my <= t.y + 30
    ) {
      selectedObject = t
      dragging = t
      dragOffsetX = mx - t.x
      dragOffsetY = my - t.y
      pokazPanelTekstu(t)
      return
    }
  }

  for (const en of enemies) {
    if (mx >= en.x && mx <= en.x + en.w && my >= en.y && my <= en.y + en.h) {
      selectedObject = en
      dragging = en
      dragOffsetX = mx - en.x
      dragOffsetY = my - en.y
      return
    }
  }

  for (const pl of platforms) {
    if (mx >= pl.x && mx <= pl.x + pl.w && my >= pl.y && my <= pl.y + (pl.h||20)) {
      selectedObject = pl
      dragging = pl
      dragOffsetX = mx - pl.x
      dragOffsetY = my - pl.y
      return
    }
  }

  for (const p of players) {
    if (Math.hypot(mx - p.x, my - p.y) < p.r + 8) {
      selectedObject = p
      dragging = p
      dragOffsetX = mx - p.x
      dragOffsetY = my - p.y
      return
    }
  }
})

canvas.addEventListener("mousemove", e => {
  if (trybGry || trybHTML) return
  const rect = canvas.getBoundingClientRect()
  const mouseScreenX = e.clientX - rect.left
  const mouseScreenY = e.clientY - rect.top

  const mx = mouseScreenX + cameraX
  const my = mouseScreenY

  if (dragging) {
    const EDGE = 60
    const SCROLL_SPEED = 9

    if (mouseScreenX < EDGE) {
      const factor = (EDGE - mouseScreenX) / EDGE
      cameraX -= SCROLL_SPEED * factor * factor
    } else if (mouseScreenX > canvas.width - EDGE) {
      const factor = (mouseScreenX - (canvas.width - EDGE)) / EDGE
      cameraX += SCROLL_SPEED * factor * factor
    }
  }

  if (resizing) {
    let obj = resizing

    if (obj.resizeSide === "right") {
      obj.w = mx - obj.x
      if (gridEnabled) obj.w = snap(obj.w)
      if (obj.w < 20) obj.w = 20
    } else if (obj.resizeSide === "bottom") {
      obj.h = my - obj.y
      if (gridEnabled) obj.h = snap(obj.h)
      if (obj.h < 20) obj.h = 20
    } else if (obj.resizeSide === "left") {
      const oldRight = obj.x + obj.w
      let newX = mx
      let newW = oldRight - newX
      if (newW < 20) { newW = 20; newX = oldRight - 20 }
      if (gridEnabled) newX = snap(newX)
      obj.x = newX
      obj.w = oldRight - newX
    } else if (obj.resizeSide === "top") {
      const oldBottom = obj.y + obj.h
      obj.y = my
      obj.h = oldBottom - my
      if (gridEnabled) { obj.y = snap(obj.y); obj.h = snap(obj.h) }
      if (obj.h < 20) { obj.h = 20; obj.y = oldBottom - 20 }
    }
    return
  }

  if (dragging) {
    dragging.x = mx - dragOffsetX
    dragging.y = my - dragOffsetY

    if (gridEnabled) {
      dragging.x = snap(dragging.x)
      dragging.y = snap(dragging.y)
    }
  }
})

canvas.addEventListener("mouseup", () => {
  dragging = null
  if (resizing) {
    delete resizing.resizeSide
    resizing = null
  }
})

canvas.addEventListener("click", (e) => {
  if (showIntro) {
    showIntro = false
    return
  }

  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left
  const my = e.clientY - rect.top

  if (gameState === "results" || gameState === "win") {
    if (mx > 250 && mx < 390 && my > 300 && my < 350) {
      wrocDoEdytora()
      return
    }
    if (mx > 410 && mx < 550 && my > 300 && my < 350) {
      wyjdzDoMenu()
      return
    }
  }
})

function update(){
  if (showIntro) return

  if (gameState === "results" || gameState === "win") {
    updateResults()
    return
  }

  if (levelDelay) {
    levelDelay.time--

    if (levelDelay.time <= 0) {
      let target = levelDelay.target
      currentLevel = target
      syncLevelData()

      const lvl = getLevel()
      playerStartX = lvl.playerStartX ?? 100
      playerStartY = lvl.playerStartY ?? 100

      renderLevelsBar()
      respawnPlayer()
      cameraX = 0

      levelDelay = null
      levelTextAnim = null
      trybGry = true
    }

    return
  }

  if (gameOver) return

  let now = Date.now()
  let delta = (now - lastTime) / 1000
  lastTime = now

  if ((trybGry || trybHTML) && useTimer) {
    if (counters.time > 0) {
      counters.time = Math.max(0, counters.time - delta)
    }

    if (counters.time <= 0 && !pendingRespawn && hitPause === 0) {
      if (useLives) counters.lives -= 1

      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true
        gameOver = true
        updateStats(false)
        gameState = "results"
        initResultsScene()
        return
      }

      hitEffect = {
        x: players[0]?.x || canvas.width/2,
        y: players[0]?.y || canvas.height/2,
        time: 60
      }

      hitPause = hitPauseTime
      pendingRespawn = true
      counters.time = startTime
    }
  }

  if (hitPause > 0) {
    hitPause--

    if (hitPause === 0 && pendingRespawn && players[0]) {
      const p = players[0]

      if (diedByFalling) {
        p.x = cameraX + 140
        p.y = 180
      } else if (respawnMode === "death") {
        p.x = deathRespawnX
        p.y = deathRespawnY
      } else {
        p.x = playerStartX
        p.y = playerStartY
      }

      p.vx = diedByFalling ? 4 : 0
      p.y = Math.max(p.y, 100)
      p.vy = -5
      invulnerable = invulnerabilityTime * 1.4

      pendingRespawn = false
      diedByFalling = false
    }
    return
  }

  if (!effectsPaused) {
    for (let obj of [...platforms, ...blocks, ...enemies]) {
      if (!obj.effects) obj.effects = []
      for (let fx of obj.effects) {
        if (fx.enabled === false) continue
        if (fx.type === "move") {
          obj.x += fx.dx * fx.speed
          obj.y += fx.dy * fx.speed
          fx.travel += fx.speed
          if (fx.travel >= fx.distance) {
            if (fx.loop) {
              fx.dx *= -1
              fx.dy *= -1
              fx.travel = 0
            } else {
              fx.speed = 0
            }
          }
        }
      }

      if (obj.type === "ghost") {
        if (dragging === obj) {
          obj.baseY = obj.y
          continue
        }
        if (!obj.baseY) obj.baseY = obj.y
        obj.floatTime = (obj.floatTime || 0) + 0.05
        obj.y = obj.baseY + Math.sin(obj.floatTime) * 15
      }

      if (obj.type === "walker" || obj.type === "walker2") {
        if (dragging === obj) continue
        obj.vy = (obj.vy || 0) + 0.5
        obj.y += obj.vy
        obj.x += obj.vx || 0

        if (obj.y > floorY - obj.h) {
          obj.y = floorY - obj.h
          obj.vy = 0
        }

        for (let pl of platforms) {
          if (
            obj.x + obj.w > pl.x &&
            obj.x < pl.x + pl.w &&
            obj.y + obj.h > pl.y &&
            obj.y + obj.h < pl.y + (pl.h||20) + 10
          ) {
            obj.y = pl.y - obj.h
            obj.vy = 0
          }
        }

        for (let b of blocks) {
          if (
            obj.x + obj.w > b.x &&
            obj.x < b.x + b.w &&
            obj.y + obj.h > b.y &&
            obj.y + obj.h < b.y + 10
          ) {
            obj.y = b.y - obj.h
            obj.vy = 0
          }
        }

        for (let b of blocks) {
          if (
            obj.x + obj.w > b.x &&
            obj.x < b.x + b.w &&
            obj.y + obj.h > b.y &&
            obj.y < b.y + b.h
          ) {
            obj.vx = -(obj.vx || 1)
            obj.x += obj.vx
            break
          }
        }

        for (let pl of platforms) {
          if (
            obj.x + obj.w > pl.x &&
            obj.x < pl.x + pl.w &&
            obj.y + obj.h > pl.y &&
            obj.y < pl.y + (pl.h||20)
          ) {
            obj.vx = -(obj.vx || 1)
            obj.x += obj.vx
            break
          }
        }

        if (obj.x < 0 || obj.x + obj.w > worldWidth) {
          obj.vx = -(obj.vx || 1)
        }
      }
    }
  }

  if (!trybGry && !trybHTML) return

  for (let p of players) {
    p.vx = 0
    if (keys[sterowanie.lewo]) p.vx = -4
    if (keys[sterowanie.prawo]) p.vx = 4

    if (keys[sterowanie.skok] && p.vy === 0) p.vy = -10

    p.vy += gravity
    p.x += p.vx
    p.y += p.vy

    if (p.y > floorY) {
      p.y = floorY
      p.vy = 0
    }

    for (let pl of platforms) {
      if (p.x > pl.x - p.r && p.x < pl.x + pl.w + p.r) {
        if (p.y + p.r > pl.y && p.y < pl.y + (pl.h||20)) {
          if (pl.solid === "top" && p.vy > 0) {
            p.y = pl.y - p.r
            p.vy = 0
          }
          if (pl.solid === "full") {
            if (p.vy > 0) { p.y = pl.y - p.r; p.vy = 0 }
            if (p.vy < 0) { p.y = pl.y + (pl.h||20) + p.r; p.vy = 0 }
          }
        }
      }
    }

    for (let b of blocks) {
      if (
        p.x + p.r > b.x &&
        p.x - p.r < b.x + b.w &&
        p.y + p.r > b.y &&
        p.y - p.r < b.y + b.h
      ) {
        if (p.vy > 0 && p.y < b.y) {
          p.y = b.y - p.r
          p.vy = 0
        } else if (p.vy < 0 && p.y > b.y + b.h) {
          p.y = b.y + b.h + p.r
          p.vy = 0
        } else if (p.vx > 0 && p.x < b.x) {
          p.x = b.x - p.r
          p.vx = 0
        } else if (p.vx < 0 && p.x > b.x + b.w) {
          p.x = b.x + b.w + p.r
          p.vx = 0
        }
      }
    }
  }

  checkEnemyCollision()

  if (players.length > 0 && trybGry) {
    const p = players[0]

    const pozaPlansza =
      p.y > floorY + 150 ||
      p.x < cameraX - 40 ||
      p.x > cameraX + canvas.width + 40

    if (pozaPlansza) {
      fallTimer++

      if (fallTimer === 25 && !warningText) {
        warningText = { time: 150 }
      }

      if (fallTimer >= FALL_TIME_LIMIT) {
        diedByFalling = true
        if (useLives) counters.lives -= 1

        hitEffect = { x: p.x, y: Math.min(p.y, floorY), time: 60 }
        hitPause = hitPauseTime
        pendingRespawn = true
        fallTimer = 0
        warningText = null

        if (useLives && counters.lives <= 0 && !gameOverTriggered) {
          gameOverTriggered = true
          gameOver = true
          updateStats(false)
          gameState = "results"
          initResultsScene()
          return
        }
      }
    } else {
      fallTimer = 0
      warningText = null
    }
  }

  for (let b of bonuses) {
    if (!b.pulseTime) b.pulseTime = 0
    if (!b.scale) b.scale = 1
    if (!b.angle) b.angle = 0
    b.pulseTime += 0.05
    b.scale = 1 + Math.sin(b.pulseTime) * 0.05
  }

  for (let i = bonuses.length - 1; i >= 0; i--) {
    let b = bonuses[i]
    let p = players[0]
    if (!p) continue

    let dx = p.x - b.x
    let dy = p.y - b.y
    let dist = Math.sqrt(dx*dx + dy*dy)

    if (dist < p.r + (b.r||12)) {
      if (b.type === "key_level") {
        let target = b.targetLevel || 0

        if (target >= levels.length) {
          alert("❌ Ten poziom nie istnieje")
          return
        }

        levelDelay = { time: 180, target: target }
        levelTextAnim = { time: 180 }

        matrixCols = []
        for (let j = 0; j < canvas.width / 8; j++) {
          matrixCols[j] = Math.random() * 50
        }

        trybGry = false
        return
      }

      if (b.type === "key_win") {
        gameOver = true
        gameOverTriggered = true
        updateStats(true)
        gameState = "win"
        initResultsScene()
        return
      }

      counters.points += 1
      bonuses.splice(i, 1)
      const lvl = getLevel()
      if (lvl) lvl.bonuses = bonuses
    }
  }

  if (players.length > 0 && (trybGry || trybHTML)) {
    const player = players[0]

    if (autoScroll) {
      cameraX += autoScrollSpeed
    } else {
      const targetX = player.x - canvas.width / 2 + player.r
      cameraX += (targetX - cameraX) * 0.12
    }

    cameraX = Math.max(0, Math.min(cameraX, worldWidth - canvas.width))
    syncScrollbar()
  }
}

function setBG(type){
  getLevel().backgroundType = type
}

function draw(){
  if (levelDelay) {
    drawMatrix()

    if (levelTextAnim) {
      let progress = 1 - (levelTextAnim.time / 180)
      progress = Math.min(progress / 0.7, 1)

      ctx.font = "bold 40px monospace"
      ctx.textAlign = "center"
      ctx.fillStyle = "#00ffcc"
      ctx.shadowColor = "#00ffcc"
      ctx.shadowBlur = 25

      let nextX = -200 + progress * (canvas.width / 2 + 200)
      ctx.fillText("NEXT", nextX, canvas.height / 2 - 20)

      let levelX = canvas.width + 200 - progress * (canvas.width / 2 + 200)
      ctx.fillText("LEVEL", levelX, canvas.height / 2 + 30)

      ctx.shadowBlur = 0
      levelTextAnim.time--

      if (levelTextAnim.time <= 0) levelTextAnim = null
    }

    return
  }

  if (showIntro) {
    const time = Date.now() * 0.001
    const cx = canvas.width / 2

    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
    grad.addColorStop(0, "#0a001f")
    grad.addColorStop(1, "#1a0033")
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    ctx.strokeStyle = "rgba(0, 255, 200, 0.08)"
    ctx.lineWidth = 1.5
    for (let i = -5; i < 25; i++) {
      const offset = (time * 40 + i * 80) % (canvas.height + 300) - 150
      ctx.beginPath()
      ctx.moveTo(0, offset)
      ctx.lineTo(canvas.width, offset + 80)
      ctx.stroke()
    }

    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    const titleY = 165
    const pulse = Math.sin(time * 3) * 4

    ctx.shadowColor = "#00ffff"
    ctx.shadowBlur = 35
    ctx.fillStyle = "#00ffff"
    ctx.font = "bold 88px Arial"
    ctx.fillText(nazwaGry || "Moja gra", cx, titleY + pulse)

    ctx.shadowBlur = 0
    ctx.font = "22px Arial"
    ctx.fillStyle = "#aaccff"
    ctx.fillText(opisGry || "gra sobie od Groka", cx, titleY + 75)

    ctx.font = "17px Arial"
    ctx.fillStyle = "#556677"
    ctx.fillText("by " + (autorGry || "ed"), cx, canvas.height - 28)

    return
  }

  if (gameState === "results" || gameState === "win") {
    drawResults()
    return
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height)
  drawBackground()

  ctx.save()
  ctx.translate(-cameraX, 0)

  if (gridEnabled) {
    ctx.strokeStyle = "#88a"
    for (let x = cameraX - 100; x < cameraX + canvas.width + 100; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke()
    }
    for (let y = 0; y < canvas.height; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(cameraX - 100, y); ctx.lineTo(cameraX + canvas.width + 100, y); ctx.stroke()
    }
  }

  for (let pl of platforms) {
    const x = pl.x
    const y = pl.y
    const w = pl.w
    const h = pl.h || 20

    let neon = pl.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) {
      let t = Date.now() * 0.001
      let pulse = 10 + Math.sin(t) * 10
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = pulse
    }

    if (pl.typ === "line") {
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = 20
      ctx.strokeStyle = "#00ffff"
      ctx.lineWidth = 3
      ctx.beginPath()
      ctx.moveTo(x, y + 10)
      ctx.lineTo(x + w, y + 10)
      ctx.stroke()

      ctx.shadowBlur = 0
      ctx.strokeStyle = "#ffffff"
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(x, y + 10)
      ctx.lineTo(x + w, y + 10)
      ctx.stroke()
      ctx.shadowBlur = 0
    } else if (pl.typ === "round") {
      ctx.fillStyle = "#8B5A2B"
      ctx.beginPath()
      ctx.roundRect(x, y, w, h, 14)
      ctx.fill()

      ctx.strokeStyle = "#3F2A1D"
      ctx.lineWidth = 3.5
      ctx.beginPath()
      ctx.roundRect(x + 2, y + 2, w - 4, h - 4, 12)
      ctx.stroke()

      ctx.strokeStyle = "#A67C5D"
      ctx.lineWidth = 2.2
      for (let i = 1; i < 5; i++) {
        let py = y + (h * i / 5)
        ctx.beginPath()
        ctx.moveTo(x + 12, py)
        ctx.quadraticCurveTo(x + w*0.4, py + (i%2 ? -2 : 2), x + w - 12, py)
        ctx.stroke()
      }
    } else {
      ctx.fillStyle = "#8B5A2B"
      ctx.fillRect(x, y, w, h)

      ctx.strokeStyle = "#3F2A1D"
      ctx.lineWidth = 3.5
      ctx.strokeRect(x + 2, y + 2, w - 4, h - 4)

      ctx.strokeStyle = "#A67C5D"
      ctx.lineWidth = 2.2
      for (let i = 1; i < 5; i++) {
        let py = y + (h * i / 5)
        ctx.beginPath()
        ctx.moveTo(x + 10, py)
        ctx.quadraticCurveTo(x + w*0.45, py + (i%2 ? 2 : -2), x + w - 10, py)
        ctx.stroke()
      }
    }

    ctx.shadowBlur = 0

    if (pl === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.setLineDash([4, 4])
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6)
      ctx.setLineDash([])
    }
  }

  for (let b of blocks) {
    const x = b.x
    const y = b.y
    const w = b.w
    const h = b.h

    let neon = b.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) {
      let t = Date.now() * 0.001
      let pulse = 10 + Math.sin(t) * 10
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = pulse
    }

    ctx.fillStyle = "#8B5A2B"
    ctx.fillRect(x, y, w, h)

    ctx.strokeStyle = "#3F2A1D"
    ctx.lineWidth = 3
    ctx.strokeRect(x + 1.5, y + 1.5, w - 3, h - 3)

    ctx.strokeStyle = "#A67C5D"
    ctx.lineWidth = 2.5

    for (let i = 1; i < 6; i++) {
      let py = y + (h * i / 6)
      ctx.beginPath()
      ctx.moveTo(x + 6, py)
      ctx.quadraticCurveTo(x + w * 0.35, py + (i % 2 === 0 ? -2 : 2), x + w - 6, py)
      ctx.stroke()
    }

    ctx.lineWidth = 1.8
    ctx.strokeStyle = "#6B4426"

    ctx.beginPath()
    ctx.moveTo(x + w*0.25, y + 8)
    ctx.quadraticCurveTo(x + w*0.55, y + h*0.45, x + w*0.22, y + h - 10)
    ctx.stroke()

    ctx.beginPath()
    ctx.moveTo(x + w*0.72, y + 12)
    ctx.quadraticCurveTo(x + w*0.45, y + h*0.6, x + w*0.78, y + h - 8)
    ctx.stroke()

    ctx.shadowBlur = 0

    if (b === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.setLineDash([4, 4])
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6)
      ctx.setLineDash([])
    }
  }

  for (let p of players) {
    if (invulnerable > 0 && Math.floor(invulnerable / 5) % 2 === 0) continue

    if (p.type === "ball") {
      drawPlayer(ctx, p.x, p.y, p.r, Date.now())
    } else {
      drawCar(p.x, p.y, p.r, p.vx)
    }

    if (p === selectedObject) {
      ctx.strokeStyle = "yellow"
      ctx.lineWidth = 3
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.r + 4, 0, Math.PI*2)
      ctx.stroke()
    }
  }

  for (let en of enemies) {
    ctx.globalAlpha = 1
    ctx.fillStyle = "white"

    const x = en.x
    const y = en.y
    const w = en.w || 40
    const h = en.h || 40

    if (en.type === "ghost") {
      let float = 0
      let moving = en.effects && en.effects.some(fx => fx.type === "move" && fx.enabled !== false)
      if (!moving && dragging !== en) {
        float = Math.sin(Date.now() * 0.003 + en.x) * 6
      }
      ctx.font = (h * 0.8) + "px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("👻", x + w/2, y + h/2 + float)
    } else if (en.type === "worm") {
      ctx.font = (h * 0.8) + "px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("👹", x + w/2, y + h/2)
    } else if (en.type === "enemy1") {
      let s = w / 8
      let t = Date.now() * 0.005
      let waveX = Math.sin(t + en.x * 0.05) * 2
      let waveY = Math.cos(t * 1.5) * 2
      let bx = x + waveX
      let by = y + waveY

      ctx.fillStyle = "#6a35d4"
      ctx.fillRect(bx + 1*s, by + 2*s, 6*s, 4*s)
      ctx.fillStyle = "#8a5cff"
      ctx.fillRect(bx + 2*s, by + 1*s, 4*s, 2*s)
      ctx.fillStyle = "white"
      ctx.fillRect(bx + 2*s + waveX*0.3, by + 2*s, s, s)
      ctx.fillRect(bx + 5*s + waveX*0.3, by + 2*s, s, s)
      ctx.fillStyle = "#6ecbff"
      ctx.fillRect(bx + 2*s + 0.25*s + waveX*0.5, by + 2*s + 0.25*s, 0.5*s, 0.5*s)
      ctx.fillRect(bx + 5*s + 0.25*s + waveX*0.5, by + 2*s + 0.25*s, 0.5*s, 0.5*s)
      ctx.fillStyle = "#00e5ff"
      ctx.fillRect(bx + 2*s, by + 6*s + Math.sin(t)*2, s, s)
      ctx.fillRect(bx + 5*s, by + 6*s - Math.sin(t)*2, s, s)
    } else if (en.type === "water") {
      let t = Date.now() * 0.003
      ctx.fillStyle = "#1e3a5f"
      ctx.fillRect(x, y, w, h)
      ctx.fillStyle = "#4fc3f7"
      for (let i = 0; i < w; i += 4) {
        let wave = Math.sin(t + i * 0.05) * 3
        ctx.fillRect(x + i, y + wave, 4, 3)
      }
      ctx.fillStyle = "#8fe9ff"
      for (let i = 0; i < w; i += 20) {
        let wave = Math.sin(t * 1.5 + i * 0.08) * 2
        ctx.fillRect(x + i, y + 6 + wave, 4, 1)
      }
    } else if (en.type === "fire") {
      let float = Math.sin(Date.now() * 0.004) * 2
      ctx.font = (h * 0.8) + "px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("🔥", x + w/2, y + h/2 + float)
    } else if (en.type === "spikes") {
      ctx.font = (h * 0.8) + "px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("🔺", x + w/2, y + h/2)
    } else if (en.type === "walker") {
      ctx.font = (h * 0.8) + "px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("👽", x + w/2, y + h/2)
    } else if (en.type === "walker2") {
      const size = w
      const t = Date.now() * 0.005
      const wave = Math.sin(t + en.x * 0.05) * 4
      const ecx = x + w/2 + wave
      const ecy = y + h/2

      ctx.fillStyle = "#2ecc71"
      ctx.fillRect(ecx - size/2, ecy - size/2 + Math.abs(wave)*0.2, size, size * (0.9 + Math.sin(t)*0.05))
      ctx.fillStyle = "white"
      ctx.fillRect(ecx - size*0.25 + wave*0.2, ecy - size*0.15, size*0.2, size*0.2)
      ctx.fillRect(ecx + size*0.05 + wave*0.2, ecy - size*0.15, size*0.2, size*0.2)
      ctx.fillStyle = "#000"
      ctx.fillRect(ecx - size*0.20 + wave*0.3, ecy - size*0.10, size*0.08, size*0.08)
      ctx.fillRect(ecx + size*0.10 + wave*0.3, ecy - size*0.10, size*0.08, size*0.08)
      ctx.fillStyle = "#27ae60"
      ctx.fillRect(ecx - size*0.25, ecy + size*0.25 + Math.sin(t)*2, size*0.15, size*0.2)
      ctx.fillRect(ecx + size*0.10, ecy + size*0.25 - Math.sin(t)*2, size*0.15, size*0.2)
    } else {
      ctx.fillStyle = "#7b3fe4"
      ctx.fillRect(x, y, w, h)
    }

    if (en === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.strokeRect(x, y, w, h)
    }
  }

  for (let b of bonuses) {
    ctx.save()
    ctx.translate(b.x, b.y)
    let scale = b.scale || 1
    ctx.scale(scale, scale)
    ctx.font = "22px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    let icon = "💎"
    if (b.type === "key_win") icon = "🏁"
    if (b.type === "key_level") icon = "🔑"
    ctx.fillText(icon, 0, 0)
    ctx.restore()
  }

  ctx.restore()

  if (hitEffect) {
    hitEffect.time--
    if (Math.floor(hitEffect.time / 5) % 2 === 0) {
      ctx.font = "50px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("💀", hitEffect.x - cameraX, hitEffect.y)
    }
    if (hitEffect.time <= 0) hitEffect = null
  }

  for (let t of texts) {
    const screenX = t.x - cameraX

    ctx.save()
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.font = t.size + "px " + (t.font || "Arial")

    if (t.neon === true) {
      ctx.shadowColor = t.neonColor || "#00ffff"
      ctx.shadowBlur = 15
      ctx.fillStyle = t.neonColor || "#00ffff"
      ctx.fillText(t.text, screenX, t.y)
      ctx.shadowBlur = 30
      ctx.fillText(t.text, screenX, t.y)
      ctx.shadowBlur = 50
      ctx.fillText(t.text, screenX, t.y)
    }

    ctx.shadowBlur = 0
    ctx.fillStyle = t.color || "white"
    ctx.fillText(t.text, screenX, t.y)

    if (t.outline === true) {
      ctx.strokeStyle = t.outlineColor || "#ffffff"
      ctx.lineWidth = t.outlineWidth || 4
      ctx.lineJoin = "round"
      ctx.strokeText(t.text, screenX, t.y)
    }

    if (t === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.setLineDash([4, 4])
      ctx.strokeRect(screenX - 60, t.y - 35, 120, 70)
      ctx.setLineDash([])
    }

    ctx.restore()
  }

  ctx.fillStyle = "white"
  ctx.font = "20px Arial"
  ctx.textAlign = "left"
  ctx.fillText("❤️ ".repeat(Math.max(0, counters.lives)), 20, 30)
  ctx.textAlign = "center"
  ctx.fillText("⭐ " + counters.points, canvas.width / 2, 30)
  ctx.textAlign = "right"
  ctx.fillText("⏱ " + Math.ceil(counters.time), canvas.width - 20, 30)

  if (warningText) {
    warningText.time--
    if (warningText.time <= 0) warningText = null

    const alpha = Math.sin(Date.now() * 0.008) * 0.3 + 0.7
    ctx.save()
    ctx.globalAlpha = alpha
    ctx.shadowColor = "#ff0000"
    ctx.shadowBlur = 30
    ctx.font = "bold 58px Arial"
    ctx.textAlign = "center"
    ctx.fillStyle = "#ff2222"
    ctx.fillText("WRACAJ SZYBKO!", canvas.width/2, canvas.height/2 - 40)
    ctx.font = "bold 26px Arial"
    ctx.fillStyle = "#ff8888"
    ctx.fillText("Spadniesz za chwilę!", canvas.width/2, canvas.height/2 + 30)
    ctx.restore()
  }

  ctx.fillStyle = "#444"
  ctx.fillRect(0, 450, 800, 50)
}

function checkEnemyCollision() {
  if (gameOver || players.length === 0) return
  if (invulnerable > 0) {
    invulnerable--
    return
  }

  const player = players[0]

  for (let enemy of enemies) {
    let ex = enemy.x, ey = enemy.y
    let ew = enemy.w || 40, eh = enemy.h || 40

    const margin = 0
    if (
      ex + ew < cameraX - margin ||
      ex > cameraX + canvas.width + margin
    ) continue

    let px = player.x - player.r, py = player.y - player.r
    let pw = player.r * 2, ph = player.r * 2

    if (px < ex + ew && px + pw > ex && py < ey + eh && py + ph > ey) {
      deathRespawnX = player.x
      deathRespawnY = player.y

      if (useLives) counters.lives--

      hitEffect = { x: player.x, y: player.y, time: 60 }

      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true
        gameOver = true
        updateStats(false)
        gameState = "results"
        initResultsScene()
        return
      }

      hitPause = hitPauseTime
      pendingRespawn = true
      invulnerable = invulnerabilityTime
      return
    }
  }
}

function initResultsScene(){
  resultsEnemies = []
  for (let i = 0; i < 6; i++) {
    resultsEnemies.push({
      angle: i * (Math.PI * 2 / 6),
      dist: 120,
      speed: 0.02 + Math.random() * 0.02
    })
  }
}

function drawResults(){
  ctx.fillStyle = "black"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  ctx.fillStyle = "red"
  ctx.beginPath()
  ctx.arc(resultsBall.x, resultsBall.y, resultsBall.r, 0, Math.PI*2)
  ctx.fill()

  let count = resultsEnemies.length

  for (let i = 0; i < count; i++) {
    let en = resultsEnemies[i]
    let slowAngle = en.angle * 0.25
    let baseAngle = (i / count) * Math.PI * 2
    let finalAngle = slowAngle + baseAngle
    let x = resultsBall.x + Math.cos(finalAngle) * en.dist
    let y = resultsBall.y + Math.sin(finalAngle) * en.dist

    ctx.font = "32px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.fillText("👻", x, y)
  }

  ctx.fillStyle = "white"
  ctx.textAlign = "center"
  ctx.font = "40px Arial"
  let isWin = (gameState === "win")
  ctx.fillStyle = isWin ? "#00ff88" : "white"
  ctx.fillText(isWin ? "GRATULACJE!!!" : "KONIEC GRY", canvas.width/2, 80)
  ctx.font = "22px Arial"
  ctx.fillStyle = "white"
  ctx.fillText("Punkty: " + counters.points, canvas.width/2, 300)
  ctx.fillText("Życia: " + counters.lives, canvas.width/2, 330)
  ctx.fillText("Czas: " + Math.ceil(counters.time), canvas.width/2, 360)
  ctx.fillText("Kliknij aby zrestartować", canvas.width/2, 420)

  ctx.fillStyle = "#333"
  ctx.fillRect(250, 300, 140, 50)
  ctx.fillRect(410, 300, 140, 50)

  ctx.fillStyle = "white"
  ctx.font = "16px Arial"
  ctx.textAlign = "center"
  ctx.fillText("WRÓĆ", 320, 330)
  ctx.fillText("WYJDŹ", 480, 330)
}

}

function wczytajProjekt(){
  const input = document.createElement("input")
  input.type = "file"

  input.onchange = e => {
    const file = e.target.files[0]
    if (!file) return

    projectName = file.name.replace(".json", "")
    loadedFromFile = true

    const reader = new FileReader()

    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result)

        gameData = data || {}
        gameData.stats = gameData.stats || {}

        levels = gameData.levels || []
        if (levels.length === 0) {
          levels.push({
            players: [], platforms: [], blocks: [], enemies: [], bonuses: [], texts: [],
            backgroundType: "none",
            playerStartX: 100,
            playerStartY: 100
          })
        }

        currentLevel = 0
        syncLevelData()
        bonuses = levels[0]?.bonuses || []
        renderLevelsBar()

        const lvl = getLevel()
        playerStartX = lvl.playerStartX ?? 100
        playerStartY = lvl.playerStartY ?? 100

        let s = gameData.settings || {}

        nazwaGry   = s.nazwaGry   || "Moja gra"
        autorGry   = s.autorGry   || projectName
        opisGry    = s.opisGry    || "gra sobie od Groka"

        backgroundType = s.backgroundType || "none"

        respawnMode     = s.respawnMode     || "death"
        autoScroll      = !!s.autoScroll
        autoScrollSpeed = Number(s.autoScrollSpeed) || 2
        worldWidth      = Number(s.worldWidth) || 6000

        scrollX.max = worldWidth - canvas.width

        sterowanie = s.sterowanie || {lewo: null, prawo: null, skok: null}

        counters = {
          lives: s.counters?.lives ?? 3,
          points: s.counters?.points ?? 0,
          time: s.counters?.time ?? 60
        }

        startTime = s.startTime ?? counters.time
        useTimer  = !!s.useTimer

        showIntro = true
        lastTime = Date.now()
        selectedObject = null
        trybKopiowania = false

        updateButtonStates()
        initAfterLoad()

      } catch (err) {
        alert("Błąd podczas wczytywania pliku JSON")
        console.error(err)
      }
    }

    reader.readAsText(file)
  }

  input.click()
}

function drawBackground(){
  let bgType = getLevel()?.backgroundType || "none"

  if (bgType === "none") return

  if (bgType === "forest"){
    drawForest()
    return
  }

  if (bgType === "snow"){
    ctx.fillStyle = "#0f1a2b"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.fillStyle = "#ffffff"
    for (let i = 0; i < 120; i++){
      let x = (i * 97 - cameraX * 0.1) % 2000
      let y = (i * 53 + Date.now() * 0.2) % canvas.height
      ctx.beginPath()
      ctx.arc(x, y, 2, 0, Math.PI * 2)
      ctx.fill()
    }
  }

  if (bgType === "space") {
    drawNewStars()

    for (let i = 0; i < 18; i++) {
      let x = (i * 220 - cameraX * 0.15) % (canvas.width + 300)
      let h = 95 + (i * 53 % 95)
      ctx.fillStyle = "#1e2f52"
      ctx.beginPath()
      ctx.moveTo(x - 20, canvas.height)
      ctx.lineTo(x + 80, canvas.height - h)
      ctx.lineTo(x + 190, canvas.height)
      ctx.fill()
    }
  }

  if (bgType === "rain"){
    ctx.fillStyle = "#0b0f1a"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.strokeStyle = "#88aaff"
    ctx.lineWidth = 1
    for (let i = 0; i < 120; i++){
      let x = (i * 97 - cameraX * 0.2) % 2000
      let y = (i * 53 + Date.now() * 0.5) % canvas.height
      ctx.beginPath()
      ctx.moveTo(x, y)
      ctx.lineTo(x + 3, y + 10)
      ctx.stroke()
    }
  }

  if (bgType === "west") {
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7)
    skyGrad.addColorStop(0, "#ff4d00")
    skyGrad.addColorStop(0.4, "#ff8c33")
    skyGrad.addColorStop(0.7, "#ffbb77")
    skyGrad.addColorStop(1, "#ffe0b3")
    ctx.fillStyle = skyGrad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    let groundGrad = ctx.createLinearGradient(0, canvas.height - 130, 0, canvas.height)
    groundGrad.addColorStop(0, "#e8b57c")
    groundGrad.addColorStop(1, "#c17f3f")
    ctx.fillStyle = groundGrad
    ctx.fillRect(0, canvas.height - 130, canvas.width, 130)
  }

  if (bgType === "city"){
    drawNewStars()

    for (let i = 0; i < 20; i++){
      let x = (i * 160 - cameraX * 0.3) % (canvas.width + 200)
      let h = 120 + (i*37 % 200)
      let w = 100

      ctx.fillStyle = "#1e2a3a"
      ctx.fillRect(x, canvas.height - h, w, h)

      for (let wy = 0; wy < h; wy += 30){
        for (let wx = 0; wx < w; wx += 25){
          if ((wx + wy + i) % 3 !== 0) continue
          ctx.fillStyle = ((wx + wy + i) % 5 === 0) ? "#333" : "#ffd966"
          ctx.fillRect(x + wx + 5, canvas.height - h + wy + 5, 8, 12)
        }
      }
    }
  }

  if (bgType === "stars" || bgType === "neon") {
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
    grad.addColorStop(0, "#0a001f")
    grad.addColorStop(1, "#1a0033")
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    if (!window.bgParticles) {
      window.bgParticles = []
      for (let i = 0; i < 90; i++) {
        window.bgParticles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2.2 + 0.7,
          speed: Math.random() * 0.3 + 0.1
        })
      }
    }

    ctx.fillStyle = "#ffffff"
    window.bgParticles.forEach(p => {
      p.y += p.speed
      if (p.y > canvas.height) p.y = -5
      ctx.globalAlpha = 0.6 + Math.sin(Date.now()/500 + p.x) * 0.3
      ctx.fillRect(p.x, p.y, p.size, p.size)
    })
    ctx.globalAlpha = 1
  }
}

function drawForest() {
  ctx.fillStyle = "#0b1a2f"
  ctx.fillRect(0, 0, canvas.width, canvas.height)
  drawNewStars()

  for (let i = 0; i < 20; i++) {
    let x = (i * 120 - cameraX * 0.4) % (canvas.width + 200)
    let h = 120 + (i * 47 % 100)
    let w = 50 + (i * 31 % 40)
    ctx.fillStyle = "#123524"
    ctx.fillRect(x + w/2 - 3, canvas.height - h, 6, h)
    ctx.beginPath()
    ctx.moveTo(x, canvas.height - h + 30)
    ctx.lineTo(x + w/2, canvas.height - h - 40)
    ctx.lineTo(x + w, canvas.height - h + 30)
    ctx.fill()
  }

  ctx.fillStyle = "#0a1a12"
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40)
}

function setRespawnMode(mode, showAlert = true){
  respawnMode = mode

  if (showAlert) {
    alert("Tryb respawn: " + (mode === "death" ? "miejsce śmierci" : "punkt startowy"))
  }

  document.getElementById("respDeath")?.classList.toggle("active", mode === "death")
  document.getElementById("respStart")?.classList.toggle("active", mode === "start")
}

function updateRespawnLock(){
  const checkbox = document.getElementById("autoScrollToggle")
  const btnStart = document.getElementById("respStart")

  if (!checkbox || !btnStart) return

  if (checkbox.checked) {
    setRespawnMode("death", false)
    btnStart.disabled = true
    btnStart.style.opacity = 0.4
    btnStart.style.pointerEvents = "none"
  } else {
    btnStart.disabled = false
    btnStart.style.opacity = 1
    btnStart.style.pointerEvents = "auto"
  }
}

  worldWidth = val
  scrollX.max = worldWidth - canvas.width
  alert("✅ Długość świata: " + worldWidth)

function drawMatrix(){
  matrixFrame++

  ctx.fillStyle = "rgba(0,0,0,0.2)"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  ctx.fillStyle = "#0f0"
  ctx.font = "22px monospace"

  for (let i = 0; i < matrixCols.length; i++) {
    let text
    if (matrixFrame % 4 === 0) {
      text = String.fromCharCode(48 + Math.floor(Math.random() * 10))
    } else {
      text = " "
    }

    let x = i * 14
    let y = matrixCols[i] * 14

    ctx.fillText(text, x, y)

    if (y > canvas.height && Math.random() > 0.975) matrixCols[i] = 0
    matrixCols[i] += 0.2
  }
}

function drawPlayer(ctx, x, y, r, time){
  let pulse = Math.sin(time * 0.005) * 2.5

  let grad = ctx.createRadialGradient(
    x - r*0.35, y - r*0.35, r*0.25,
    x, y, r + pulse
  )
  grad.addColorStop(0, "#ffeb3b")
  grad.addColorStop(1, "#ff5722")

  ctx.shadowColor = "#ff9800"
  ctx.shadowBlur = 25
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.arc(x, y, r + pulse, 0, Math.PI * 2)
  ctx.fill()
  ctx.shadowBlur = 0

  ctx.fillStyle = "#111"
  ctx.beginPath()
  ctx.arc(x - r*0.32, y - r*0.22, r*0.13, 0, Math.PI * 2)
  ctx.fill()
  ctx.beginPath()
  ctx.arc(x + r*0.32, y - r*0.22, r*0.13, 0, Math.PI * 2)
  ctx.fill()

  ctx.fillStyle = "white"
  ctx.beginPath()
  ctx.arc(x - r*0.35, y - r*0.27, r*0.04, 0, Math.PI * 2)
  ctx.fill()
  ctx.beginPath()
  ctx.arc(x + r*0.29, y - r*0.27, r*0.04, 0, Math.PI * 2)
  ctx.fill()

  ctx.strokeStyle = "#111"
  ctx.lineWidth = 2.5
  ctx.beginPath()
  ctx.arc(x, y + r*0.15, r*0.35, 0.2, Math.PI - 0.2)
  ctx.stroke()
}

function drawNewStars(){
  let grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
  grad.addColorStop(0, "#0a001f")
  grad.addColorStop(1, "#1a0033")
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  if (!window.bgParticles) {
    window.bgParticles = []
    for (let i = 0; i < 90; i++) {
      window.bgParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.2 + 0.7,
        speed: Math.random() * 0.9 + 0.4
      })
    }
  }

  ctx.fillStyle = "#99ffff"
  window.bgParticles.forEach(p => {
    p.y += p.speed
    if (p.y > canvas.height) p.y = -5
    ctx.globalAlpha = 0.75 + Math.sin(Date.now()/300 + p.x) * 0.25
    ctx.fillRect(p.x, p.y, p.size, p.size)
  })
  ctx.globalAlpha = 1
}

function loop(time){
  if (time - lastFrame < frameDelay) {
    requestAnimationFrame(loop)
    return
  }
  lastFrame = time
  update()
  draw()
  requestAnimationFrame(loop)
}

requestAnimationFrame(loop)
