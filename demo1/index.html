<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Edytor gier</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:Arial; background:#111; color:white; display:flex; flex-direction:column; align-items:center; }
  #editor { width:1200px; max-width:95vw; }

  /* ===== PRZYCISKI GLOBALNE ===== */
  button {
    padding: 8px 12px;
    font-size: 13px;
    font-weight: bold;
    background: linear-gradient(180deg, #555, #222);
    border: 2px solid #666;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: all 0.12s ease;
    box-shadow: 0 3px 0 #111;
  }
  button:hover {
    background: linear-gradient(180deg, #666, #333);
    transform: translateY(-1px);
    box-shadow: 0 5px 0 #111;
  }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 #111; }
  button.active {
    background: linear-gradient(180deg, #4CAF50, #2e7d32) !important;
    border-color: #1b5e20;
    box-shadow: 0 0 10px #4CAF50, 0 3px 0 #0a3d12;
  }
  #deleteBtn.active { background:#c33 !important; border-color:#933; box-shadow:0 0 8px #c33; }

  /* ===== GŁÓWNY LAYOUT ===== */
  #main { display:flex; gap:8px; align-items:flex-start; }

  /* ===== LEWY PANEL — kontrolki ===== */
  #lewy {
    width: 170px;
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px 8px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #lewy .panel-section {
    border-bottom: 1px solid #333;
    padding-bottom: 6px;
    margin-bottom: 4px;
  }
  #lewy .section-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    padding-left: 2px;
  }
  #lewy button {
    width: 100%;
    height: 36px;
    margin-bottom: 3px;
    padding-left: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }

  /* ===== ŚRODEK — canvas + toolbar obiektów ===== */
  #srodek {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    min-width: 0;
  }

  /* PASEK OBIEKTÓW nad canvasem */
  #objectsBar {
    width: 800px;
    background: #1a1a1a;
    border-radius: 10px 10px 0 0;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    border-bottom: 2px solid #333;
  }
  #objectsBar .obj-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
    margin-right: 2px;
  }
  #objectsBar .obj-sep {
    width: 1px;
    height: 30px;
    background: #333;
    margin: 0 4px;
    flex-shrink: 0;
  }
  .obj-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #252525;
    border: 1.5px solid #3a3a3a;
    border-radius: 8px;
    cursor: pointer;
    padding: 5px 10px;
    transition: all 0.12s;
    flex-shrink: 0;
    min-width: 54px;
    gap: 3px;
  }
  .obj-btn:hover {
    background: #333;
    border-color: #4CAF50;
    box-shadow: 0 0 8px rgba(76,175,80,0.4);
    transform: translateY(-2px);
  }
  .obj-btn .obj-icon { font-size: 26px; line-height: 1; }
  .obj-btn .obj-name { font-size: 10px; color: #888; white-space: nowrap; }

  /* Canvas */
  canvas { background:#87CEEB; display:block; }

  /* Scrollbar */
  #scrollX {
    width: 800px;
    margin: 6px 0;
    accent-color: #4CAF50;
    background: #333;
    height: 10px;
    border-radius: 6px;
  }

  /* Levels bar */
  #levelsBar {
    width: 800px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1a1a1a;
    padding: 6px;
    border-radius: 0 0 8px 8px;
    margin-bottom: 6px;
  }

  /* ===== PRAWY PANEL — edycja ===== */
  #prawy { width:220px; background:#1a1a1a; padding:10px; border-radius:10px; flex-shrink:0; }
  #prawy button { height: 36px; margin-bottom: 6px; width: 100%; }

  /* Misc */
  .item { cursor:pointer; text-align:center; margin:8px 0; }
  .keybox { border:1px solid #888; padding:6px; margin:3px 0; text-align:center; cursor:pointer; background:#333; border-radius:4px; }
  input[type="number"] { width:70px; }
  .fx-list { margin:8px 0; }
  .fx-row { background:#2a2a2a; padding:6px; margin:4px 0; border-radius:4px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .fx-name { font-weight:bold; min-width:80px; font-size:12px; }
  .fx-params { color:#aaa; font-size:0.85em; flex:1; }
  .small { font-size:0.8em; padding:3px 6px; }
  .danger { background:#933; }
  .blink { animation: blinkAnim 1s infinite; }
  @keyframes blinkAnim { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .platform-preview { cursor:pointer; transition:transform 0.15s; }
  .platform-preview:hover { transform:scale(1.05); }
  .platform-preview canvas { border:2px solid #555; border-radius:8px; background:#1e1e1e; box-shadow:0 4px 8px rgba(0,0,0,0.4); }
  .preview-label { margin-top:6px; font-size:13px; color:#ccc; text-align:center; }
</style>
</head>
<body>

<div id="main">

<!-- ===== LEWY PANEL ===== -->
<div id="lewy">

  <div class="panel-section">

<!-- ===== ŚRODEK — canvas ===== -->
<div id="srodek">

  <!-- PASEK OBIEKTÓW -->
  <div id="objectsBar">
    <span class="obj-label">dodaj</span>

  <!-- CANVAS -->

<script>
const canvas = document.getElementById("scena")
canvas.setAttribute("tabindex", "0")
const ctx = canvas.getContext("2d")

let trybGry = false
let trybHTML = false
let trybKasowania = false
let trybBonusy = false
let trybFX = false
let ustawianieStartu = false
let gridEnabled = false
let gridSize = 20
let gravity = 0.4

// === DYM I KOŁA SAMOCHODU ===
let exhaustParticles = []
let carWheelAngle = 0

// === SYSTEM CZĄSTECZEK EKSPLOZJI ===
let shotParticles = []  // efekt pudła
let explosions = []     // eksplozja wroga

// === SYSTEM POCISKÓW STATKU ===
let bullets = []           // aktywne pociski
let bulletCooldown = 0     // klatki do następnego strzału
let burstCount = 0         // ile strzałów w serii
let burstReload = 0        // odliczanie przeładowania (2s = 120 klatek)
const BURST_MAX = 20       // max strzałów w serii
const BURST_RELOAD = 120   // klatki przeładowania
const BULLET_COOLDOWN = 4  // klatki między strzałami w serii

// Małe iskry przy trafieniu w blok/platformę
let hitSparks = []

function spawnHitSpark(x, y) {
  const colors = ["#00ffcc","#ffffff","#88ffee","#ffff00","#00aaff"]
  const count = 8
  for (let i = 0; i < count; i++) {
    const angle = (Math.random() - 0.5) * Math.PI  // wachlarz w lewo (odbicie)
    const speed = 1.5 + Math.random() * 3
    hitSparks.push({
      x, y,
      vx: -Math.abs(Math.cos(angle) * speed),  // lecą w lewo (odbicie od bloku)
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.06 + Math.random() * 0.06,
      size: 1.5 + Math.random() * 2.5,
      color: colors[Math.floor(Math.random() * colors.length)]
    })
  }
}

function spawnExplosion(x, y) {
  const colors = ["#ff4400","#ff8800","#ffdd00","#ff0055","#00ffcc","#ff00ff","#ffffff","#44ff00"]
  const count = 22
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4
    const speed = 2.5 + Math.random() * 5
    explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 1.0,
      decay: 0.02 + Math.random() * 0.025,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      gravity: 0.12 + Math.random() * 0.1,
      shape: Math.random() > 0.5 ? "circle" : "rect",
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.25
    })
  }
}

let players = []
let platforms = []
let blocks = []
let enemies = []
let texts = []
let selectedPlayerType = "ball"
let mousePosX = 0
let mousePosY = 0

let levels = []
let currentLevel = 0

function getLevel(){
  return levels[currentLevel]
}

function syncLevelData(){
  const lvl = levels[currentLevel]
  if (!lvl) return

  players   = lvl.players   || []
  platforms = lvl.platforms || []
  blocks    = lvl.blocks    || []
  enemies   = lvl.enemies   || []
  bonuses   = lvl.bonuses   || []
  texts     = lvl.texts     || []

  if (!Array.isArray(bonuses)) bonuses = []
}

if (levels.length === 0) {
  levels.push({
    players: [],
    platforms: [],
    blocks: [],
    enemies: [],
    bonuses: [],
    texts: [],
    backgroundType: "none",
    playerStartX: 100,
    playerStartY: 100
  })
}

let gameData = {
  stats: {}
}
let gameOver = false
let gameOverTriggered = false
let playerStartX = 100
let playerStartY = 100

// === SYSTEM ŻYĆ I RESPAWN ===
let invulnerable = 0
let invulnerabilityTime = 80
let hitPause = 0
let fallTimer = 0
const FALL_TIME_LIMIT = 180
let hitPauseTime = 60
let pendingRespawn = false
let deathRespawnX = 300
let deathRespawnY = 300
let useLives = true
let hitEffect = null
let respawnMode = "death"
let diedByFalling = false
let warningText = null
let gameState = "game"
let bonuses = []
let fileHandle = null
let levelDelay = null
let matrixCols = []
let matrixFrame = 0
let levelTextAnim = null

let resultsBall = { x: 400, y: 220, r: 20 }
let resultsEnemies = []

let counters = {
  lives: 3,
  points: 0,
  time: 60
}
let startTime = counters.time
let useTimer = true
let autorGry = "Nieznany"
let nazwaGry = "Moja gra"
let opisGry = ""
let showIntro = false
let backgroundType = "none"

let lastTime = Date.now()
let fps = 70
let frameDelay = 1000 / fps
let lastFrame = 0

function renderLevelsBar(){
  let html = `<b style="margin-right:10px; color:#0f0;">POZIOMY →</b>`

  levels.forEach((lvl, i) => {
    const isActive = i === currentLevel
    html += `
      <div onclick="switchLevelUI(${i})"
           style="
             width:32px;
             height:32px;
             background:${isActive ? "#4CAF50" : "#444"};
             color:${isActive ? "white" : "#ccc"};
             display:flex;
             align-items:center;
             justify-content:center;
             cursor:pointer;
             border-radius:6px;
             font-weight:${isActive ? "bold" : "normal"};
             box-shadow:${isActive ? "0 0 10px #4CAF50" : "none"};
           ">
        ${i+1}
      </div>
    `
  })

  html += `
    <div onclick="addLevelUI()"
         style="
           width:32px;
           height:32px;
           background:#ff9800;
           color:white;
           display:flex;
           align-items:center;
           justify-content:center;
           cursor:pointer;
           border-radius:6px;
           font-size:20px;
           font-weight:bold;
         ">
      +
    </div>
  `

  document.getElementById("levelsBar").innerHTML = html
}

function addLevelUI(){
  levels.push({
    players: [],
    platforms: [],
    blocks: [],
    enemies: [],
    bonuses: [],
    texts: [],
    backgroundType: "none",
    playerStartX: 100,
    playerStartY: 100
  })

  currentLevel = levels.length - 1
  syncLevelData()

  const lvl = getLevel()
  playerStartX = lvl.playerStartX ?? 100
  playerStartY = lvl.playerStartY ?? 100

  if (players.length > 0) {
    players[0].x = playerStartX
    players[0].y = playerStartY
  }

  renderLevelsBar()
}

function switchLevelUI(i){
  if (i < 0 || i >= levels.length) return

  currentLevel = i
  syncLevelData()

  const lvl = getLevel()
  playerStartX = lvl.playerStartX ?? 100
  playerStartY = lvl.playerStartY ?? 100

  respawnPlayer()
  renderLevelsBar()
}

function pokazLiczniki(){
  document.getElementById("panel").innerHTML = `
    <h3>LICZNIKI</h3>

    ❤️ Życia:
    <input type="number" id="editLives" value="${counters.lives}" style="width:60px;">
    <br><br>

    <label>
      <input type="checkbox" id="useLives" ${useLives ? "checked" : ""}>
      Licz życia
    </label>
    <br><br>

    ⭐ Punkty: <span>${counters.points}</span><br><br>

    <button onclick="resetPoints()">🔄 Reset punktów</button>
    <br><br>

    ⏱ Czas:
    <input type="number" id="editTime" value="${Math.ceil(counters.time)}" style="width:60px;">
    <br><br>

    <label>
      <input type="checkbox" id="useTimer" ${useTimer ? "checked" : ""}>
      Licz czas
    </label>

    <br><br><br>

    <button onclick="zapiszLiczniki()">ZAPISZ</button>
  `
}

function resetPoints(){
  counters.points = 0
}

function zapiszZycia(){
  let val = Number(document.getElementById("editLives").value)
  if (isNaN(val) || val < 0) return
  counters.lives = val
}

let keys = {}
let copiedObject = null
let trybKopiowania = false

let sterowanie = { lewo:null, prawo:null, skok:null, dol:null, strzal:null }
let aktywnePole = null

let dragging = null
let resizing = null
let dragOffsetX = 0
let dragOffsetY = 0

const floorY = 430

let editingFxIndex = -1
let effectsPaused = false

// KAMERA
let cameraX = 0
let autoScroll = false
let autoScrollSpeed = 2

let worldWidth = 2000

const scrollX = document.getElementById("scrollX")
scrollX.max = worldWidth - canvas.width

function syncScrollbar() {
  scrollX.value = Math.max(0, Math.min(cameraX, worldWidth - canvas.width))
}

scrollX.addEventListener("input", () => {
  cameraX = Number(scrollX.value)
})

function updateButtonStates() {
  document.getElementById("runBtn").classList.toggle("active", trybGry)
  document.getElementById("editBtn").classList.toggle("active", !trybGry)
  document.getElementById("fxBtn").classList.toggle("active", trybFX)
  document.getElementById("gridBtn").classList.toggle("active", gridEnabled)
  document.getElementById("pauseFxBtn").classList.toggle("active", effectsPaused)
  document.getElementById("deleteBtn").classList.toggle("active", trybKasowania)
  document.getElementById("pauseFxBtn").textContent = effectsPaused ? "WZNÓW EFEKTY" : "ZATRZYMAJ EFEKTY"
}

function togglePauseEffects() {
  effectsPaused = !effectsPaused
  updateButtonStates()
}

function toggleGrid(){
  gridEnabled = !gridEnabled
  updateButtonStates()
  if (gridEnabled) snapAll()
}

function snap(v){
  return Math.round(v / gridSize) * gridSize
}

function snapAll(){
  for (let p of players) {
    p.x = snap(p.x); p.y = snap(p.y)
  }
  for (let pl of platforms) {
    pl.x = snap(pl.x); pl.y = snap(pl.y); pl.w = snap(pl.w)
  }
  for (let b of blocks) {
    b.x = snap(b.x); b.y = snap(b.y); b.w = snap(b.w); b.h = snap(b.h)
  }
}

    html += `<p style="color:#888">Brak efektów</p>`
  } else {
    html += `<div class="fx-list">`
    selectedObject.effects.forEach((fx, i) => {
      let params = ""

        let dir = fx.dx > 0 ? "→" : fx.dx < 0 ? "←" : fx.dy > 0 ? "↓" : "↑"

function addGravityFx(){
  if (!selectedObject) return
  if (!selectedObject.effects) selectedObject.effects = []

  if (selectedObject.effects.length >= 3) {
    alert("❌ Max 3 efekty")
    return
  }

  // Tylko wrogowie mogą mieć grawitację
  if (selectedObject.type === undefined) {
    alert("❌ Grawitację można dodać tylko do wrogów")
    return
  }

  selectedObject.effects.push({
    type: "gravity",
    enabled: true
  })

  // Reset Y/X baseowych żeby pierwsze wejście w update było świeże
  selectedObject.baseY = null
  selectedObject._prevFloat = null
  selectedObject.vy = 0

  showFxList()
}

function addNeonFx(){
  if (!selectedObject) return
  if (!selectedObject.effects) selectedObject.effects = []

  if (selectedObject.effects.length >= 2) {
    alert("❌ Max 2 efekty")
    return
  }

  selectedObject.effects.push({
    type: "neon",
    enabled: true
  })

  showFxList()
}

function showMove(){
  let initial = {dx:1, dy:0, speed:2, distance:200, loop:true}
  if (editingFxIndex >= 0 && selectedObject.effects && selectedObject.effects[editingFxIndex]?.type === "move") {
    initial = {...selectedObject.effects[editingFxIndex]}
  }

  document.getElementById("panel").innerHTML = `
    <h3>${editingFxIndex >= 0 ? "Edytuj RUCH" : "Dodaj RUCH"}</h3>
    kierunek<br>
    <button onclick="setDir('left')">←</button>
    <button onclick="setDir('right')">→</button>
    <button onclick="setDir('up')">↑</button>
    <button onclick="setDir('down')">↓</button>
    <br><br>
    szybkość <input id="speed" type="number" value="${initial.speed}"><br>
    długość <input id="dist" type="number" value="${initial.distance}"><br>
    pętla <input type="checkbox" id="loop" ${initial.loop?"checked":""}><br><br>
    <button onclick="saveMove()">${editingFxIndex >= 0 ? "ZAPISZ ZMIANY" : "DODAJ FX"}</button>
    <button onclick="showFxList()">anuluj</button>
  `
  moveDir = {dx: initial.dx, dy: initial.dy}
}

let moveDir = {dx:1, dy:0}

function setDir(d){
  if (d=="right") moveDir={dx:1,dy:0}
  if (d=="left")  moveDir={dx:-1,dy:0}
  if (d=="down")  moveDir={dx:0,dy:1}
  if (d=="up")    moveDir={dx:0,dy:-1}
}

function saveMove(){
  if (!selectedObject) return
  if (!selectedObject.effects) selectedObject.effects = []

  if (editingFxIndex === -1 && selectedObject.effects.length >= 2) {
    alert("❌ Maksymalnie 2 efekty na obiekt")
    return
  }

  let speed = Number(document.getElementById("speed")?.value) || 2
  let dist  = Number(document.getElementById("dist")?.value)  || 200
  let loop  = document.getElementById("loop")?.checked ?? true

  let effect = {
    type: "move",
    dx: moveDir.dx,
    dy: moveDir.dy,
    speed, distance: dist, loop,
    travel: 0,
    enabled: true
  }

  if (editingFxIndex >= 0) {
    selectedObject.effects[editingFxIndex] = effect
  } else {
    selectedObject.effects.push(effect)
  }

  showFxList()
}

function drawPlatformPreview(canvasId, typ) {
  const previewCanvas = document.getElementById(canvasId)
  if (!previewCanvas) return
  const p = previewCanvas.getContext("2d")
  const w = previewCanvas.width, h = previewCanvas.height
  p.clearRect(0, 0, w, h)

  if (typ === "line") {
    const ly = h / 2
    // Energetyczna belka
    p.shadowColor = "#44aaff"; p.shadowBlur = 10
    p.strokeStyle = "#5599ff"; p.lineWidth = 4
    p.beginPath(); p.moveTo(14, ly); p.lineTo(w-14, ly); p.stroke()
    p.shadowBlur = 0
    // Biały połysk
    p.strokeStyle = "rgba(255,255,255,0.6)"; p.lineWidth = 1.5
    p.beginPath(); p.moveTo(20, ly); p.lineTo(w-20, ly); p.stroke()

  } else if (typ === "round") {
    const pad=10, pw=w-pad*2, ph=h-pad*2
    // Gradient metaliczny
    const grad = p.createLinearGradient(pad, pad, pad, pad+ph)
    grad.addColorStop(0, "#6aaadd"); grad.addColorStop(0.3, "#4477bb"); grad.addColorStop(1, "#223366")
    p.fillStyle = grad
    p.beginPath(); p.roundRect(pad, pad, pw, ph, 8); p.fill()
    // Obwódka
    p.strokeStyle = "#88ccff"; p.lineWidth = 1.5
    p.beginPath(); p.roundRect(pad+1, pad+1, pw-2, ph-2, 7); p.stroke()
    // Połysk górny
    const shine = p.createLinearGradient(pad, pad, pad, pad+ph*0.5)
    shine.addColorStop(0, "rgba(255,255,255,0.25)"); shine.addColorStop(1, "rgba(255,255,255,0)")
    p.fillStyle = shine
    p.beginPath(); p.roundRect(pad+2, pad+2, pw-4, ph*0.5, 6); p.fill()
    // Śruby
    for (const [sx, sy] of [[pad+7, h/2], [w-pad-7, h/2]]) {
      p.fillStyle="#1a3355"; p.beginPath(); p.arc(sx,sy,3,0,Math.PI*2); p.fill()
      p.strokeStyle="#99ccff"; p.lineWidth=0.8; p.beginPath(); p.arc(sx,sy,3,0,Math.PI*2); p.stroke()
      p.beginPath(); p.moveTo(sx-2,sy); p.lineTo(sx+2,sy); p.stroke()
      p.beginPath(); p.moveTo(sx,sy-2); p.lineTo(sx,sy+2); p.stroke()
    }

  } else {
    const pad=10, pw=w-pad*2, ph=h-pad*2
    // Gradient metaliczny
    const grad = p.createLinearGradient(pad, pad, pad, pad+ph)
    grad.addColorStop(0, "#5a8fcc"); grad.addColorStop(0.4, "#3a6499"); grad.addColorStop(1, "#1e3d66")
    p.fillStyle = grad; p.fillRect(pad, pad, pw, ph)
    // Obwódka
    p.strokeStyle = "#6699cc"; p.lineWidth = 1.5
    p.strokeRect(pad+0.5, pad+0.5, pw-1, ph-1)
    // Połysk górny
    const shine = p.createLinearGradient(pad, pad, pad, pad+ph*0.5)
    shine.addColorStop(0, "rgba(255,255,255,0.22)"); shine.addColorStop(1, "rgba(255,255,255,0)")
    p.fillStyle = shine; p.fillRect(pad+1, pad+1, pw-2, ph*0.5)
    // Ciemna dolna krawędź
    p.fillStyle = "rgba(0,0,0,0.3)"; p.fillRect(pad, pad+ph-3, pw, 3)
    // Nity
    const nitCount = Math.max(2, Math.floor(pw/28))
    for (let i=0; i<nitCount; i++) {
      const nx = pad+8+i*((pw-16)/(nitCount-1||1)), ny=h/2
      p.fillStyle="#1a3355"; p.beginPath(); p.arc(nx,ny,2,0,Math.PI*2); p.fill()
      p.strokeStyle="#aaddff"; p.lineWidth=0.7; p.beginPath(); p.arc(nx,ny,2,0,Math.PI*2); p.stroke()
    }
    // Krawędź światła
    p.strokeStyle="rgba(150,200,255,0.35)"; p.lineWidth=1.5
    p.beginPath(); p.moveTo(pad,pad+ph); p.lineTo(pad,pad); p.lineTo(pad+pw,pad); p.stroke()
  }
}

// === EXHAUST / DYM ===
function spawnExhaust(x, y, vx) {
  const dir = vx >= 0 ? -1 : 1;
  exhaustParticles.push({
    x: x,
    y: y,
    vx: dir * (0.5 + Math.random() * 1.2) - vx * 0.1,
    vy: -0.3 - Math.random() * 0.6,
    life: 1.0,
    decay: 0.012 + Math.random() * 0.012,
    size: 3 + Math.random() * 4,
    gray: Math.floor(160 + Math.random() * 80)
  })
}

function updateExhaust() {
  for (let i = exhaustParticles.length - 1; i >= 0; i--) {
    const p = exhaustParticles[i]
    p.x += p.vx
    p.y += p.vy
    p.size += 0.18
    p.life -= p.decay
    if (p.life <= 0) exhaustParticles.splice(i, 1)
  }
}

function drawExhaust(offsetX = 0) {
  for (let p of exhaustParticles) {
    ctx.save()
    ctx.globalAlpha = p.life * 0.55
    ctx.fillStyle = `rgb(${p.gray},${p.gray},${p.gray})`
    ctx.beginPath()
    ctx.arc(p.x - offsetX, p.y, p.size, 0, Math.PI * 2)
    ctx.fill()
    ctx.restore()
  }
}

function drawCar(cx, cy, r, vx = 0) {
  // Aktualizuj kąt obrotu kół
  const wheelRadius = r * 0.32
  carWheelAngle += vx / wheelRadius

  // Generuj dym z rury wydechowej (w trybie gry)
  if (trybGry) {
    if (Math.random() < 0.4) {
      spawnExhaust(cx - r * 1.18, cy + r * 0.145, vx)
    }
    updateExhaust()
  }

  ctx.save()
  ctx.translate(cx, cy)  // ctx już ma translate(-cameraX, 0)

  // === RURA WYDECHOWA ===
  ctx.fillStyle = '#555'
  ctx.fillRect(-r * 1.18, r * 0.08, r * 0.22, r * 0.13)
  ctx.fillStyle = '#333'
  ctx.beginPath()
  ctx.arc(-r * 1.18, r * 0.145, r * 0.065, 0, Math.PI * 2)
  ctx.fill()
  ctx.fillStyle = '#888'
  ctx.fillRect(-r * 1.12, r * 0.095, r * 0.1, r * 0.04)

  // === KAROSERIA ===
  ctx.fillStyle = '#ee2222'
  ctx.fillRect(-r, -r * 0.5, r * 2, r)

  // === DACH ===
  ctx.fillStyle = '#cc1111'
  ctx.fillRect(-r * 0.5, -r, r, r * 0.6)

  // === SZYBY ===
  ctx.fillStyle = '#88ccff'
  ctx.fillRect(-r * 0.4, -r * 0.9, r * 0.35, r * 0.4)
  ctx.fillRect(r * 0.05, -r * 0.9, r * 0.35, r * 0.4)

  // === REFLEKTOR ===
  ctx.fillStyle = '#ffff88'
  ctx.fillRect(r * 0.85, -r * 0.15, r * 0.2, r * 0.2)
  ctx.shadowColor = '#ffff00'
  ctx.shadowBlur = 12
  ctx.fillStyle = 'rgba(255,255,200,0.6)'
  ctx.fillRect(r * 0.87, -r * 0.13, r * 0.14, r * 0.14)
  ctx.shadowBlur = 0

  ctx.restore()

  // === KOŁA (z kręceniem) — ctx jest już translate(-cameraX,0) ===
  drawWheel(cx - r * 0.55, cy + r * 0.5, wheelRadius, carWheelAngle)
  drawWheel(cx + r * 0.55, cy + r * 0.5, wheelRadius, carWheelAngle)
}

// Pomocnicza funkcja do rysowania kół
function drawWheel(x, y, radius, angle) {
  ctx.save()
  ctx.translate(x, y)
  ctx.rotate(angle)

  // Opona
  ctx.fillStyle = '#1a1a1a'
  ctx.beginPath()
  ctx.arc(0, 0, radius, 0, Math.PI * 2)
  ctx.fill()

  // Obwódka opony
  ctx.strokeStyle = '#333'
  ctx.lineWidth = 2
  ctx.beginPath()
  ctx.arc(0, 0, radius - 1, 0, Math.PI * 2)
  ctx.stroke()

  // Felga
  ctx.fillStyle = '#bbbbbb'
  ctx.beginPath()
  ctx.arc(0, 0, radius * 0.65, 0, Math.PI * 2)
  ctx.fill()

  // Szprychy
  ctx.strokeStyle = '#888'
  ctx.lineWidth = radius * 0.12
  for (let i = 0; i < 5; i++) {
    const a = (i * Math.PI * 2) / 5
    ctx.beginPath()
    ctx.moveTo(Math.cos(a) * radius * 0.22, Math.sin(a) * radius * 0.22)
    ctx.lineTo(Math.cos(a) * radius * 0.82, Math.sin(a) * radius * 0.82)
    ctx.stroke()
  }

  // Środek felgi
  ctx.fillStyle = '#555555'
  ctx.beginPath()
  ctx.arc(0, 0, radius * 0.22, 0, Math.PI * 2)
  ctx.fill()

  // Śruba środkowa
  ctx.fillStyle = '#333'
  ctx.beginPath()
  ctx.arc(0, 0, radius * 0.09, 0, Math.PI * 2)
  ctx.fill()

  ctx.restore()
}

function rysujPreviewBlok(id, cw, ch, typ) {
  const c = document.getElementById(id)
  if (!c) return
  const p = c.getContext("2d")

  if (typ === "block") {
    const x=8, y=8, w=74, h=74
    const g = p.createLinearGradient(x, y, x, y+h)
    g.addColorStop(0,"#445566"); g.addColorStop(0.5,"#2a3a4a"); g.addColorStop(1,"#1a2530")
    p.fillStyle = g; p.fillRect(x,y,w,h)
    p.strokeStyle="rgba(0,0,0,0.5)"; p.lineWidth=1.5
    const bH=14, bW=w/2
    for(let row=0; row*bH<h; row++){
      const by=y+row*bH
      p.beginPath(); p.moveTo(x,by); p.lineTo(x+w,by); p.stroke()
      const off = row%2===0 ? 0 : bW/2
      for(let col=off; col<w; col+=bW){ p.beginPath(); p.moveTo(x+col,by); p.lineTo(x+col,by+bH); p.stroke() }
    }
    p.strokeStyle="rgba(150,200,255,0.35)"; p.lineWidth=1.5
    p.beginPath(); p.moveTo(x,y+h); p.lineTo(x,y); p.lineTo(x+w,y); p.stroke()

  } else if (typ === "blockTall") {
    const x=28, y=4, w=34, h=82
    const g = p.createLinearGradient(x, y, x+w, y)
    g.addColorStop(0,"#553322"); g.addColorStop(0.5,"#8b4a2e"); g.addColorStop(1,"#3d2010")
    p.fillStyle = g; p.fillRect(x,y,w,h)
    p.strokeStyle="rgba(0,0,0,0.5)"; p.lineWidth=1.5
    const bH=12
    for(let row=0; row*bH<h; row++){
      const by=y+row*bH
      p.beginPath(); p.moveTo(x,by); p.lineTo(x+w,by); p.stroke()
      p.beginPath(); p.moveTo(x+w/2, by); p.lineTo(x+w/2, by+bH); p.stroke()
    }
    p.strokeStyle="rgba(200,150,100,0.4)"; p.lineWidth=1.5
    p.beginPath(); p.moveTo(x,y+h); p.lineTo(x,y); p.lineTo(x+w,y); p.stroke()

  } else if (typ === "blockGrid") {
    const x=4, y=4, w=82, h=82
    // Tło — ciemny grafit
    const bg = p.createLinearGradient(x, y, x, y+h)
    bg.addColorStop(0, "#1a1a2e")
    bg.addColorStop(1, "#0d0d1a")
    p.fillStyle = bg; p.fillRect(x, y, w, h)

    // Świecące linie energetyczne poziome
    const lineColors = ["#00ffff","#0088ff","#00ffcc"]
    for(let i=0; i<3; i++){
      const ly = y + 16 + i*18
      const lg = p.createLinearGradient(x, ly, x+w, ly)
      lg.addColorStop(0,   "rgba(0,0,0,0)")
      lg.addColorStop(0.2, lineColors[i])
      lg.addColorStop(0.5, "#ffffff")
      lg.addColorStop(0.8, lineColors[i])
      lg.addColorStop(1,   "rgba(0,0,0,0)")
      p.strokeStyle = lg; p.lineWidth = 2
      p.beginPath(); p.moveTo(x, ly); p.lineTo(x+w, ly); p.stroke()
    }

    // Ramka z narożnikami
    p.strokeStyle = "#00ffff"; p.lineWidth = 1.5
    p.strokeRect(x+2, y+2, w-4, h-4)
    // Narożniki
    const cs = 10
    p.strokeStyle = "#ffffff"; p.lineWidth = 2.5
    for(const [cx,cy,dx,dy] of [[x+2,y+2,1,1],[x+w-2,y+2,-1,1],[x+2,y+h-2,1,-1],[x+w-2,y+h-2,-1,-1]]){
      p.beginPath(); p.moveTo(cx+dx*cs,cy); p.lineTo(cx,cy); p.lineTo(cx,cy+dy*cs); p.stroke()
    }

    // Centralny kryształ
    const cx=x+w/2, cy=y+h/2
    const rg = p.createRadialGradient(cx,cy,2, cx,cy,16)
    rg.addColorStop(0,"#ffffff")
    rg.addColorStop(0.3,"#00ffff")
    rg.addColorStop(1,"rgba(0,100,255,0)")
    p.fillStyle = rg
    p.beginPath()
    p.moveTo(cx, cy-14); p.lineTo(cx+8,cy); p.lineTo(cx,cy+14); p.lineTo(cx-8,cy)
    p.closePath(); p.fill()
    p.strokeStyle="rgba(255,255,255,0.8)"; p.lineWidth=1
    p.beginPath()
    p.moveTo(cx, cy-14); p.lineTo(cx+8,cy); p.lineTo(cx,cy+14); p.lineTo(cx-8,cy)
    p.closePath(); p.stroke()

  } else if (typ === "blockIce") {
    const x=4, y=4, w=82, h=82
    const g = p.createLinearGradient(x, y, x+w, y+h)
    g.addColorStop(0, "rgba(160,230,255,0.85)")
    g.addColorStop(0.4, "rgba(210,245,255,0.9)")
    g.addColorStop(1, "rgba(110,200,245,0.8)")
    p.fillStyle = g; p.beginPath(); p.roundRect(x, y, w, h, 10); p.fill()
    // Połysk górny
    const sh = p.createLinearGradient(x, y, x, y+h*0.5)
    sh.addColorStop(0,"rgba(255,255,255,0.6)"); sh.addColorStop(1,"rgba(255,255,255,0)")
    p.fillStyle = sh; p.beginPath(); p.roundRect(x+2, y+2, w-4, h*0.45, 8); p.fill()
    // Obwódka
    p.strokeStyle="rgba(180,235,255,1)"; p.lineWidth=2
    p.beginPath(); p.roundRect(x+1, y+1, w-2, h-2, 9); p.stroke()
    p.strokeStyle="rgba(255,255,255,0.4)"; p.lineWidth=1
    p.beginPath(); p.roundRect(x+4, y+4, w-8, h-8, 7); p.stroke()
    // Kryształki
    p.strokeStyle="rgba(255,255,255,0.85)"; p.lineWidth=1.5
    for(const [cx2,cy2,cr] of [[25,55,7],[55,45,5],[68,65,6],[38,68,5],[18,40,4]]){
      p.save(); p.translate(x+cx2, y+cy2); p.rotate(Math.PI/6)
      p.beginPath(); p.moveTo(0,-cr); p.lineTo(cr*0.5,0); p.lineTo(0,cr); p.lineTo(-cr*0.5,0); p.closePath()
      p.fillStyle="rgba(220,245,255,0.5)"; p.fill(); p.stroke()
      p.restore()
    }
    // Dolny odblask
    p.fillStyle="rgba(80,160,220,0.25)"
    p.fillRect(x+2, y+h-8, w-4, 6)
  }
}

function zapiszKluczLevel(){
  let input = document.getElementById("targetLevelInput")
  let val = Number(input.value)

  if (isNaN(val) || val < 1) {
    pokazMsg("❌ Podaj poprawny numer poziomu (min 1)")
    return
  }

  const maxPoziom = levels.length

  if (val > maxPoziom) {
    pokazMsg(`❌ Nie ma poziomu ${val} → ustawiono ${maxPoziom}`)
    val = maxPoziom
    input.value = val
  }

  if (selectedObject && selectedObject.type === "key_level") {
    selectedObject.targetLevel = val - 1
    pokazMsg(`✅ Teleport → poziom ${val}`)
  }
}
