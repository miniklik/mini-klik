canvas.addEventListener("mousedown", e => {
  if (trybGry || trybHTML) return
  if (trybKopiowania && copiedObject) {
    const rect = canvas.getBoundingClientRect()
    const mx = e.clientX - rect.left + cameraX
    const my = e.clientY - rect.top

    let nowy = JSON.parse(JSON.stringify(copiedObject))

    if (nowy.r && !nowy.w) {
      // GRACZ — ma promień r, nie ma szerokości w
      nowy.x = mx
      nowy.y = my
      const lvl = getLevel()
      lvl.players.push(nowy)
      syncLevelData()
    } else if (nowy.type !== undefined && nowy.w) {
      // WRÓG — ma pole type (enemy1, ghost, walker itp.)
      nowy.x = mx - (nowy.w || 40)/2
      nowy.y = my - (nowy.h || 40)/2
      const lvl = getLevel()
      lvl.enemies.push(nowy)
      syncLevelData()
    } else if (nowy.typ === "block" || nowy.typ === "blockTall" || nowy.typ === "blockGrid" || nowy.typ === "blockIce" || nowy.typ === "blockBomb") {
      // BLOK — ma typ === "block"
      nowy.x = mx - (nowy.w || 60)/2
      nowy.y = my - (nowy.h || 60)/2
      const lvl = getLevel()
      lvl.blocks.push(nowy)
      syncLevelData()
    } else if (nowy.typ === "round" || nowy.typ === "rect" || nowy.typ === "line") {
      // PLATFORMA — ma typ round/rect/line
      nowy.x = mx - (nowy.w || 120)/2
      nowy.y = my - (nowy.h || 20)/2
      const lvl = getLevel()
      lvl.platforms.push(nowy)
      syncLevelData()
    } else {
      // FALLBACK — traktuj jako platformę
      nowy.x = mx - (nowy.w || 120)/2
      nowy.y = my - (nowy.h || 20)/2
      const lvl = getLevel()
      lvl.platforms.push(nowy)
      syncLevelData()
    }

    trybKopiowania = false
    selectedObject = nowy
    showFxList()
    return
  }

  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left + cameraX
  const my = e.clientY - rect.top

  dragging = null
  resizing = null

  if (trybKasowania) {
    for (const arr of [blocks, platforms, players, enemies, bonuses]) {
      for (let i = arr.length - 1; i >= 0; i--) {
        const o = arr[i]
        if (o.r && !o.w) {
          if (Math.hypot(mx - o.x, my - o.y) < o.r + 8) {
            arr.splice(i, 1); trybKasowania = false; updateButtonStates(); return
          }
        } else {
          const ow = o.w || 40
          const oh = Math.max(o.h || 40, 20) // minimum 20px strefa w pionie
          const pad = 10
          if (mx >= o.x - pad && mx <= o.x + ow + pad &&
              my >= o.y - pad && my <= o.y + oh + pad) {
            arr.splice(i, 1); trybKasowania = false; updateButtonStates(); return
          }
        }
      }
    }
    return
  }

  if (trybFX) {
    selectedObject = null

    for (const p of players) {
      if (Math.hypot(mx - p.x, my - p.y) < p.r + 8) {
        selectedObject = p
        showFxList()
        return
      }
    }

    for (const arr of [platforms, blocks, enemies]) {
      for (const obj of arr) {
        if (
          mx >= obj.x && mx <= obj.x + obj.w &&
          my >= obj.y && my <= obj.y + obj.h
        ) {
          selectedObject = obj
          showFxList()
          return
        }
      }
    }
    return
  }

  selectedObject = null

  // BONUSY
  for (const bonus of bonuses) {
    let dx = mx - bonus.x
    let dy = my - bonus.y
    let dist = Math.sqrt(dx*dx + dy*dy)

    if (dist < (bonus.r || 12) + 10) {
      selectedObject = bonus
      dragging = bonus
      dragOffsetX = mx - bonus.x
      dragOffsetY = my - bonus.y

      if (bonus.type === "key_level") {
        pokazPanelKlucza(bonus)
      }
      return
    }
  }

  // Pomocnik — czy kursor jest blisko punktu uchwytu (±10px)
  function nearHandle(mx, my, hx, hy) {
    return Math.abs(mx - hx) < 10 && Math.abs(my - hy) < 10
  }

  // === BLOKI — resize tylko na uchwytach, drag po całej powierzchni ===
  for (const b of blocks) {
    const bx = b.x, by = b.y, bw = b.w, bh = b.h
    const hMid = by + bh/2   // środek w pionie
    const wMid = bx + bw/2   // środek w poziomie

    // Uchwyty — środki krawędzi
    if (nearHandle(mx, my, bx + bw, hMid)) { resizing = b; b.resizeSide = "right";  selectedObject = b; return }
    if (nearHandle(mx, my, bx,      hMid)) { resizing = b; b.resizeSide = "left";   selectedObject = b; return }
    if (nearHandle(mx, my, wMid, by + bh)) { resizing = b; b.resizeSide = "bottom"; selectedObject = b; return }
    if (nearHandle(mx, my, wMid, by     )) { resizing = b; b.resizeSide = "top";    selectedObject = b; return }

    // Drag — cała powierzchnia z małą tolerancją
    if (mx >= bx - 6 && mx <= bx + bw + 6 && my >= by - 6 && my <= by + bh + 6) {
      selectedObject = b; dragging = b
      dragOffsetX = mx - bx; dragOffsetY = my - by
      return
    }
  }

  // === PLATFORMY — resize tylko na uchwytach, drag po całej powierzchni ===
  for (const pl of platforms) {
    const ph = Math.max(pl.h || 20, 20)
    const px = pl.x, py = pl.y, pw = pl.w
    const hMid = py + ph/2
    const wMid = px + pw/2

    // Uchwyty — środki krawędzi
    if (nearHandle(mx, my, px + pw, hMid)) { resizing = pl; pl.resizeSide = "right";  selectedObject = pl; return }
    if (nearHandle(mx, my, px,      hMid)) { resizing = pl; pl.resizeSide = "left";   selectedObject = pl; return }
    if (nearHandle(mx, my, wMid, py + ph)) { resizing = pl; pl.resizeSide = "bottom"; selectedObject = pl; return }
    if (nearHandle(mx, my, wMid, py     )) { resizing = pl; pl.resizeSide = "top";    selectedObject = pl; return }

    // Drag — cała powierzchnia z tolerancją (ważne dla cienkich linii)
    if (mx >= px - 8 && mx <= px + pw + 8 && my >= py - 10 && my <= py + ph + 10) {
      selectedObject = pl; dragging = pl
      dragOffsetX = mx - px; dragOffsetY = my - py
      return
    }
  }

  // texty
  for (const t of texts) {
    if (
      mx >= t.x - 60 &&
      mx <= t.x + 60 &&
      my >= t.y - 30 &&
      my <= t.y + 30
    ) {
      selectedObject = t
      dragging = t
      dragOffsetX = mx - t.x
      dragOffsetY = my - t.y
      pokazPanelTekstu(t)
      return
    }
  }

  for (const en of enemies) {
    const PAD = 8
    if (mx >= en.x - PAD && mx <= en.x + en.w + PAD && my >= en.y - PAD && my <= en.y + en.h + PAD) {
      selectedObject = en
      dragging = en
      dragOffsetX = mx - en.x
      dragOffsetY = my - en.y
      return
    }
  }

  for (const p of players) {
    if (Math.hypot(mx - p.x, my - p.y) < p.r + 8) {
      selectedObject = p
      dragging = p
      dragOffsetX = mx - p.x
      dragOffsetY = my - p.y
      return
    }
  }
})

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect()
  const mouseScreenX = e.clientX - rect.left
  const mouseScreenY = e.clientY - rect.top

  // Zawsze aktualizuj pozycję myszy (potrzebne dla celownika w grze)
  mousePosX = mouseScreenX
  mousePosY = mouseScreenY

  if (trybGry || trybHTML) return  // reszta tylko w edytorze

  const mx = mouseScreenX + cameraX
  const my = mouseScreenY

  const hasCrosshair = players.some(p => p.type === "spaceship" || p.type === "crosshair")
  if (hasCrosshair) {
    canvas.style.cursor = "default"
  } else {
    canvas.style.cursor = "default"
  }

  if (dragging) {
    const EDGE = 60
    const SCROLL_SPEED = 9

    if (mouseScreenX < EDGE) {
      const factor = (EDGE - mouseScreenX) / EDGE
      cameraX -= SCROLL_SPEED * factor * factor
    } else if (mouseScreenX > canvas.width - EDGE) {
      const factor = (mouseScreenX - (canvas.width - EDGE)) / EDGE
      cameraX += SCROLL_SPEED * factor * factor
    }
  }

  if (resizing) {
    let obj = resizing

    if (obj.resizeSide === "right") {
      obj.w = mx - obj.x
      if (gridEnabled) obj.w = snap(obj.w)
      if (obj.w < 20) obj.w = 20
    } else if (obj.resizeSide === "bottom") {
      obj.h = my - obj.y
      if (gridEnabled) obj.h = snap(obj.h)
      if (obj.h < 20) obj.h = 20
    } else if (obj.resizeSide === "left") {
      const oldRight = obj.x + obj.w
      let newX = mx
      let newW = oldRight - newX
      if (newW < 20) { newW = 20; newX = oldRight - 20 }
      if (gridEnabled) newX = snap(newX)
      obj.x = newX
      obj.w = oldRight - newX
    } else if (obj.resizeSide === "top") {
      const oldBottom = obj.y + obj.h
      obj.y = my
      obj.h = oldBottom - my
      if (gridEnabled) { obj.y = snap(obj.y); obj.h = snap(obj.h) }
      if (obj.h < 20) { obj.h = 20; obj.y = oldBottom - 20 }
    }
    return
  }

  if (dragging) {
    dragging.x = mx - dragOffsetX
    dragging.y = my - dragOffsetY

    if (gridEnabled) {
      dragging.x = snap(dragging.x)
      dragging.y = snap(dragging.y)
    }
  }
})

canvas.addEventListener("mouseup", () => {
  dragging = null
  if (resizing) {
    delete resizing.resizeSide
    resizing = null
  }
})

canvas.addEventListener("click", (e) => {
  if (showIntro) {
    showIntro = false
    return
  }

  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left
  const my = e.clientY - rect.top

  if (gameState === "results" || gameState === "win") {
    if (mx > 250 && mx < 390 && my > 300 && my < 350) {
      wrocDoEdytora()
      return
    }
    if (mx > 410 && mx < 550 && my > 300 && my < 350) {
      wyjdzDoMenu()
      return
    }
    // Nowe dynamiczne przyciski
    if (resultsBtn1 && mx > resultsBtn1.x && mx < resultsBtn1.x+resultsBtn1.w && my > resultsBtn1.y && my < resultsBtn1.y+resultsBtn1.h) {
      wyjdzDoMenu(); return
    }
    if (resultsBtn2 && mx > resultsBtn2.x && mx < resultsBtn2.x+resultsBtn2.w && my > resultsBtn2.y && my < resultsBtn2.y+resultsBtn2.h) {
      wrocDoEdytora(); return
    }
  }

  // === STRZAŁ CELOWNIKIEM ===
  if (trybGry && players.some(p => p.type === "crosshair")) {
    // Pozycja strzału w układzie świata
    const shotX = mx + cameraX
    const shotY = my

    // Sprawdź trafienie w każdego wroga
    let hit = false
    for (let i = enemies.length - 1; i >= 0; i--) {
      const en = enemies[i]
      const ew = en.w || 40, eh = en.h || 40
      const enScreenX = en.x - cameraX
      if (mx > enScreenX && mx < enScreenX + ew &&
          my > en.y && my < en.y + eh) {
        // Eksplozja w centrum wroga (screen coords)
        spawnExplosion(enScreenX + ew/2, en.y + eh/2)
        enemies.splice(i, 1)
        counters.points++
        const lvl = getLevel()
        if (lvl) lvl.enemies = enemies
        hit = true
        break
      }
    }
    // Efekt pudła (mały błysk)
    if (!hit) shotParticles.push({ x: mx, y: my, time: 18 })
  }
})

// ================= UPDATE =================
function update(){
  if (showIntro) return

  if (gameState === "results" || gameState === "win") {
    updateResults()
    return
  }

  if (levelDelay) {
    levelDelay.time--

    if (levelDelay.time <= 0) {
      let target = levelDelay.target
      currentLevel = target
      syncLevelData()

      const lvl = getLevel()
      playerStartX = lvl.playerStartX ?? 100
      playerStartY = lvl.playerStartY ?? 100

      renderLevelsBar()
      respawnPlayer()
      cameraX = 0

      levelDelay = null
      levelTextAnim = null
      trybGry = true
    }

    return
  }

  if (gameOver) return

  // === CZAS ===
  let now = Date.now()
  let delta = (now - lastTime) / 1000
  lastTime = now

  if ((trybGry || trybHTML) && useTimer) {
    if (counters.time > 0) {
      counters.time = Math.max(0, counters.time - delta)
    }

    if (counters.time <= 0 && !pendingRespawn && hitPause === 0) {
      if (useLives) counters.lives -= 1

      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true
        gameOver = true
        updateStats(false)
        gameState = "results"
        initResultsScene()
        return
      }

      hitEffect = {
        x: players[0]?.x || canvas.width/2,
        y: players[0]?.y || canvas.height/2,
        time: 60
      }

      hitPause = hitPauseTime
      pendingRespawn = true
      // BŁĄD POPRAWIONY: było `respawnPlayer = players[0]` (nadpisanie funkcji), teraz tylko flaga
      counters.time = startTime
    }
  }

  if (hitPause > 0) {
    hitPause--

    if (hitPause === 0 && pendingRespawn && players[0]) {
      const p = players[0]

      if (diedByFalling) {
        p.x = cameraX + 140
        p.y = 180
      } else if (respawnMode === "death") {
        p.x = deathRespawnX
        p.y = deathRespawnY
      } else {
        p.x = playerStartX
        p.y = playerStartY
      }

      p.vx = diedByFalling ? 4 : 0
      p.y = Math.max(p.y, 100)
      p.vy = -5
      invulnerable = invulnerabilityTime * 1.4

      pendingRespawn = false
      diedByFalling = false
    }
    return
  }

  if (!effectsPaused) {
    for (let obj of [...platforms, ...blocks, ...enemies]) {
      if (!obj.effects) obj.effects = []
      for (let fx of obj.effects) {
        if (fx.enabled === false) continue
        if (fx.type === "move") {
          obj.x += fx.dx * fx.speed
          obj.y += fx.dy * fx.speed
          fx.travel += fx.speed
          if (fx.travel >= fx.distance) {
            if (fx.loop) {
              fx.dx *= -1
              fx.dy *= -1
              fx.travel = 0
            } else {
              fx.speed = 0
            }
          }
        }
      }

      if (obj.type === "ghost") {
        if (dragging === obj) {
          obj.baseY = obj.y
          continue
        }
        if (!obj.baseY) obj.baseY = obj.y
        obj.floatTime = (obj.floatTime || 0) + 0.05
        obj.y = obj.baseY + Math.sin(obj.floatTime) * 15
      }

      // Obrót piły — zawsze (edytor i gra)
      if (obj.type === "saw") {
        obj.sawAngle = (obj.sawAngle || 0) + 0.06
      }

      // Sprawdź czy wróg ma FX grawitacji (włączony)
      const hasGravity = obj.effects && obj.effects.some(fx => fx.type === "gravity" && fx.enabled !== false)

      if (obj.type === "walker" || obj.type === "walker2" || obj.type === "walker3" || obj.type === "walker4") {
        if (dragging === obj) continue

        if (hasGravity) {
          // GRAWITACJA — opada i odbija się od przeszkód
          obj.vy = (obj.vy || 0) + 0.5
          obj.y += obj.vy
          obj.x += obj.vx || 0
          if (obj.y > floorY - obj.h) { obj.y = floorY - obj.h; obj.vy = 0 }
          for (let pl of platforms) {
            if (obj.x + obj.w > pl.x && obj.x < pl.x + pl.w &&
                obj.y + obj.h > pl.y && obj.y + obj.h < pl.y + (pl.h||20) + 10 && obj.vy > 0) {
              obj.y = pl.y - obj.h; obj.vy = 0
            }
          }
          for (let b of blocks) {
            if (b.typ === "blockBomb" && b.exploded) continue
            if (obj.x + obj.w > b.x && obj.x < b.x + b.w &&
                obj.y + obj.h > b.y && obj.y + obj.h < b.y + 10 && obj.vy > 0) {
              obj.y = b.y - obj.h; obj.vy = 0
            }
          }
          // Odbijanie od bloków (pion)
          for (let b of blocks) {
            if (b.typ === "blockBomb" && b.exploded) continue
            if (obj.x + obj.w > b.x && obj.x < b.x + b.w &&
                obj.y + obj.h > b.y + 5 && obj.y < b.y + b.h) {
              obj.vx = -(obj.vx || 1); obj.x += obj.vx; break
            }
          }
          if (obj.x < 0 || obj.x + obj.w > worldWidth) obj.vx = -(obj.vx || 1)
        } else {
          // FIZYKA DUCHA — unosi się góra/dół
          obj.floatTime = (obj.floatTime || 0) + 0.05
          const prevFloat = obj._prevFloat || 0
          obj.y += (Math.sin(obj.floatTime) - Math.sin(prevFloat)) * 15
          obj._prevFloat = obj.floatTime
        }
      }

      if (obj.type === "saw") {
        if (dragging === obj) continue
        obj.sawAngle = (obj.sawAngle || 0) + 0.06

        if (hasGravity) {
          // Piła z grawitacją — opada i odbija się
          obj.vy = (obj.vy || 0) + 0.5
          obj.y += obj.vy
          obj.x += obj.vx || 1.5
          if (obj.y + obj.h > floorY) {
            obj.y = floorY - obj.h; obj.vy = -obj.vy * 0.5
            if (Math.abs(obj.vy) < 1) obj.vy = 0
          }
          for (let pl of platforms) {
            if (obj.x + obj.w > pl.x && obj.x < pl.x + pl.w &&
                obj.y + obj.h > pl.y && obj.y + obj.h < pl.y + 20 && obj.vy > 0) {
              obj.y = pl.y - obj.h; obj.vy = -obj.vy * 0.4
              if (Math.abs(obj.vy) < 1) obj.vy = 0
            }
          }
          for (let bl of blocks) {
            if (bl.typ === "blockBomb" && bl.exploded) continue
            if (obj.x + obj.w > bl.x && obj.x < bl.x + bl.w &&
                obj.y + obj.h > bl.y && obj.y < bl.y + bl.h) {
              if (obj.vy > 0) { obj.y = bl.y - obj.h; obj.vy = -obj.vy * 0.4 }
              else if (obj.vy < 0) { obj.y = bl.y + bl.h; obj.vy = 0 }
              obj.vx = -obj.vx
            }
          }
          if (obj.x < 0) { obj.x = 0; obj.vx = Math.abs(obj.vx) }
          if (obj.x + obj.w > worldWidth) { obj.x = worldWidth - obj.w; obj.vx = -Math.abs(obj.vx) }
        } else {
          // FIZYKA DUCHA
          obj.floatTime = (obj.floatTime || 0) + 0.05
          const prevFloat = obj._prevFloat || 0
          obj.y += (Math.sin(obj.floatTime) - Math.sin(prevFloat)) * 15
          obj._prevFloat = obj.floatTime
        }
      }
    }
  }

  if (!trybGry && !trybHTML) return

  for (let p of players) {
    // Celownik — nie rusza się klawiaturą, stoi w miejscu startu
    if (p.type === "crosshair") {
      p.vx = 0
      p.vy = 0
      continue
    }

    const wasOnIce = p.onIce === true
    p.onIce = false

    // Statek kosmiczny — lewituje, 4-kierunkowe sterowanie, brak grawitacji
    if (p.type === "spaceship") {
      p.vx = 0; p.vy = 0
      if (keys[sterowanie.lewo])  p.vx = -4
      if (keys[sterowanie.prawo]) p.vx = 4
      if (keys[sterowanie.skok])  p.vy = -4
      if (keys[sterowanie.dol])   p.vy = 4
      p.x += p.vx
      p.y += p.vy
      if (p.y < p.r) p.y = p.r
      if (p.y > floorY) p.y = floorY

      // === STRZELANIE ===
      if (burstReload > 0) {
        burstReload--  // przeładowanie — czekamy
      } else if (sterowanie.strzal && keys[sterowanie.strzal]) {
        if (bulletCooldown <= 0 && burstCount < BURST_MAX) {
          // Wystrzał!
          bullets.push({
            x: p.x + p.r,  // dziób statku
            y: p.y,
            vx: 12,
            vy: 0,
            life: 1.0,
            w: 18, h: 5
          })
          burstCount++
          bulletCooldown = BULLET_COOLDOWN
          // Koniec serii — start przeładowania
          if (burstCount >= BURST_MAX) {
            burstReload = BURST_RELOAD
            burstCount = 0
          }
        }
        if (bulletCooldown > 0) bulletCooldown--
      } else {
        // Klawisz puszczony — reset cooldown, ale zachowaj licznik serii
        bulletCooldown = 0
      }

      // === KOLIZJA STATKU Z BLOKAMI I PLATFORMAMI ===
      if (trybGry && invulnerable === 0 && !gameOver) {
        let crashed = false
        for (const b of blocks) {
          if (b.typ === "blockBomb" && b.exploded) continue
          if (p.x + p.r > b.x && p.x - p.r < b.x + b.w &&
              p.y + p.r > b.y && p.y - p.r < b.y + b.h) {
            crashed = true; break
          }
        }
        if (!crashed) {
          for (const pl of platforms) {
            if (p.x + p.r > pl.x && p.x - p.r < pl.x + pl.w &&
                p.y + p.r > pl.y && p.y - p.r < pl.y + (pl.h||20)) {
              crashed = true; break
            }
          }
        }
        if (crashed) {
          if (useLives) counters.lives--
          deathRespawnX = p.x; deathRespawnY = p.y
          hitEffect = { x: p.x, y: p.y, time: 60 }
          hitPause = hitPauseTime; pendingRespawn = true
          invulnerable = invulnerabilityTime
          spawnExplosion(p.x - cameraX, p.y)
          if (useLives && counters.lives <= 0 && !gameOverTriggered) {
            gameOverTriggered = true; gameOver = true
            updateStats(false); gameState = "results"; initResultsScene()
          }
        }
      }

      continue
    }  // reset — zostanie ustawione ponownie w kolizji bloków

    if (wasOnIce) {
      // Na lodzie — zachowuj pęd, klawiatura tylko delikatnie przyspiesza/hamuje
      if (keys[sterowanie.lewo])  p.vx -= 0.5
      if (keys[sterowanie.prawo]) p.vx += 0.5
      p.vx *= 0.992  // prawie brak tarcia
      p.vx = Math.max(-6, Math.min(6, p.vx))
    } else {
      p.vx = 0
      if (keys[sterowanie.lewo]) p.vx = -4
      if (keys[sterowanie.prawo]) p.vx = 4
    }

    if (keys[sterowanie.skok] && p.vy === 0) p.vy = -10

    p.vy += gravity
    p.x += p.vx
    p.y += p.vy

    if (p.y > floorY) {
      p.y = floorY
      p.vy = 0
    }

    for (let pl of platforms) {
      if (p.x > pl.x - p.r && p.x < pl.x + pl.w + p.r) {
        if (p.y + p.r > pl.y && p.y < pl.y + (pl.h||20)) {
          if (pl.solid === "top" && p.vy > 0) {
            p.y = pl.y - p.r
            p.vy = 0
          }
          if (pl.solid === "full") {
            if (p.vy > 0) { p.y = pl.y - p.r; p.vy = 0 }
            if (p.vy < 0) { p.y = pl.y + (pl.h||20) + p.r; p.vy = 1 }
          }
        }
      }
    }

    for (let b of blocks) {
      if (b.typ === "blockBomb" && b.exploded) continue  // pominij eksplodowane

      if (
        p.x + p.r > b.x &&
        p.x - p.r < b.x + b.w &&
        p.y + p.r > b.y &&
        p.y - p.r < b.y + b.h
      ) {
        // Dotknięcie bomby — uruchamia timer
        if (b.typ === "blockBomb" && trybGry) {
          if (!b.bombTimer) b.bombTimer = 1
        }

        if (p.vy > 0 && p.y < b.y) {
          p.y = b.y - p.r
          p.vy = 0
          if (b.typ === "blockIce") {
            p.vx *= 0.995
            p.onIce = true
          }
        } else if (p.vy < 0 && p.y > b.y + b.h) {
          p.y = b.y + b.h + p.r
          p.vy = 1
        } else if (p.vx > 0 && p.x < b.x) {
          p.x = b.x - p.r
          p.vx = 0
        } else if (p.vx < 0 && p.x > b.x + b.w) {
          p.x = b.x + b.w + p.r
          p.vx = 0
        }
      }
    }
  }

  checkEnemyCollision()

  // Spadnięcie poza planszę — tylko dla zwykłych graczy (nie celownika)
  if (players.length > 0 && trybGry && players[0].type !== "crosshair") {
    const p = players[0]

    const isSpaceship = p.type === "spaceship"
    const pozaPlansza = isSpaceship
      ? (p.x < cameraX - 40 || p.x > cameraX + canvas.width + 40)  // tylko poziomo
      : (p.y > floorY + 150 || p.x < cameraX - 40 || p.x > cameraX + canvas.width + 40)

    if (pozaPlansza) {
      fallTimer++

      if (fallTimer === 25 && !warningText) {
        warningText = { time: 150 }
      }

      if (fallTimer >= FALL_TIME_LIMIT) {
        diedByFalling = true
        if (useLives) counters.lives -= 1

        hitEffect = { x: p.x, y: Math.min(p.y, floorY), time: 60 }
        hitPause = hitPauseTime
        pendingRespawn = true
        fallTimer = 0
        warningText = null

        if (useLives && counters.lives <= 0 && !gameOverTriggered) {
          gameOverTriggered = true
          gameOver = true
          updateStats(false)
          gameState = "results"
          initResultsScene()
          return
        }
      }
    } else {
      fallTimer = 0
      warningText = null
    }
  }

  // === UPDATE POCISKÓW ===
  if (trybGry) {
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i]
      b.x += b.vx
      b.life -= 0.012  // zanikanie w czasie

      // Wyjście poza świat
      if (b.x > cameraX + canvas.width + 100 || b.life <= 0) {
        bullets.splice(i, 1); continue
      }

      // Kolizja z wrogami
      let hit = false
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const en = enemies[ei]
        if (b.x + b.w > en.x && b.x < en.x + (en.w||40) &&
            b.y > en.y && b.y < en.y + (en.h||40)) {
          // Trafienie!
          spawnExplosion(en.x - cameraX + (en.w||40)/2, en.y + (en.h||40)/2)
          enemies.splice(ei, 1)
          counters.points++
          const lvl = getLevel(); if (lvl) lvl.enemies = enemies
          bullets.splice(i, 1)
          hit = true; break
        }
      }
      if (hit) continue

      // Kolizja z blokami
      for (const bl of blocks) {
        if (bl.typ === "blockBomb" && bl.exploded) continue
        if (b.x + b.w > bl.x && b.x < bl.x + bl.w &&
            b.y > bl.y && b.y < bl.y + bl.h) {
          if (bl.typ === "blockBomb" && !bl.bombTimer) bl.bombTimer = 1
          spawnHitSpark(b.x + b.w - cameraX, b.y)
          bullets.splice(i, 1); hit = true; break
        }
      }
      if (hit) continue

      // Kolizja z platformami
      for (const pl of platforms) {
        if (b.x + b.w > pl.x && b.x < pl.x + pl.w &&
            b.y + b.h/2 > pl.y && b.y - b.h/2 < pl.y + (pl.h||20)) {
          spawnHitSpark(b.x + b.w - cameraX, b.y)
          bullets.splice(i, 1); hit = true; break
        }
      }
    }
  }

  // === UPDATE BOMB BLOKÓW ===
  if (trybGry) {
    for (let i = blocks.length - 1; i >= 0; i--) {
      const b = blocks[i]
      if (b.typ !== "blockBomb") continue
      if (b.exploded) {
        // Respawn po 180 klatkach
        b.respawnTimer = (b.respawnTimer || 0) + 1
        if (b.respawnTimer > 180) {
          b.exploded = false
          b.bombTimer = 0
          b.respawnTimer = 0
        }
        continue
      }
      if (b.bombTimer > 0) {
        b.bombTimer++
        // Eksplozja po 90 klatkach (~1.5s)
        if (b.bombTimer > 90) {
          // Spawn eksplozji
          spawnExplosion(b.x - cameraX + b.w/2, b.y + b.h/2)
          spawnExplosion(b.x - cameraX + b.w/4, b.y + b.h/3)
          spawnExplosion(b.x - cameraX + b.w*0.75, b.y + b.h*0.6)
          b.exploded = true
          b.respawnTimer = 0

          const bombCX = b.x + b.w/2
          const bombCY = b.y + b.h/2
          const bombR = 120  // stały zasięg wybuchu

          // Zabij wrogów w zasięgu wybuchu
          for (let ei = enemies.length - 1; ei >= 0; ei--) {
            const en = enemies[ei]
            const enCX = en.x + (en.w||40)/2
            const enCY = en.y + (en.h||40)/2
            const dist = Math.hypot(enCX - bombCX, enCY - bombCY)
            if (dist < bombR) {
              // Efektowne rozerwanie wroga — dużo cząsteczek w miejscu wroga
              spawnExplosion(en.x - cameraX + (en.w||40)/2, en.y + (en.h||40)/2)
              spawnExplosion(en.x - cameraX + (en.w||40)/2, en.y + (en.h||40)/2)
              enemies.splice(ei, 1)
              counters.points++
              const lvl = getLevel()
              if (lvl) lvl.enemies = enemies
            }
          }

          // Zabij gracza jeśli blisko
          if (players[0] && !gameOver) {
            const p = players[0]
            const dist = Math.hypot(p.x - (b.x + b.w/2), p.y - (b.y + b.h/2))
            if (dist < 100 && invulnerable === 0) {
              if (useLives) counters.lives--
              deathRespawnX = p.x
              deathRespawnY = p.y
              hitEffect = { x: p.x, y: p.y, time: 60 }
              hitPause = hitPauseTime
              pendingRespawn = true
              invulnerable = invulnerabilityTime
              if (useLives && counters.lives <= 0 && !gameOverTriggered) {
                gameOverTriggered = true; gameOver = true
                updateStats(false); gameState = "results"; initResultsScene()
              }
            }
          }
        }
      }
    }
  }

  // Animacja bonusów
  for (let b of bonuses) {
    if (!b.pulseTime) b.pulseTime = 0
    if (!b.scale) b.scale = 1
    if (!b.angle) b.angle = 0
    b.pulseTime += 0.05
    b.scale = 1 + Math.sin(b.pulseTime) * 0.05
  }

  // Zbieranie bonusów
  for (let i = bonuses.length - 1; i >= 0; i--) {
    let b = bonuses[i]
    let p = players[0]
    if (!p) continue

    let dx = p.x - b.x
    let dy = p.y - b.y
    let dist = Math.sqrt(dx*dx + dy*dy)

    if (dist < p.r + (b.r||12)) {
      if (b.type === "key_level") {
        let target = b.targetLevel || 0

        if (target >= levels.length) {
          alert("❌ Ten poziom nie istnieje")
          return
        }

        levelDelay = { time: 180, target: target }
        levelTextAnim = { time: 180 }

        matrixCols = []
        for (let j = 0; j < canvas.width / 8; j++) {
          matrixCols[j] = Math.random() * 50
        }

        trybGry = false
        return
      }

      if (b.type === "key_win") {
        gameOver = true
        gameOverTriggered = true
        updateStats(true)
        gameState = "win"
        initResultsScene()
        return
      }

      counters.points += 1
      bonuses.splice(i, 1)
      // Synchronizuj z poziomem
      const lvl = getLevel()
      if (lvl) lvl.bonuses = bonuses
    }
  }

  // KAMERA
  if (players.length > 0 && (trybGry || trybHTML)) {
    const player = players[0]

    if (autoScroll) {
      cameraX += autoScrollSpeed
    } else {
      const targetX = player.x - canvas.width / 2 + player.r
      cameraX += (targetX - cameraX) * 0.12
    }

    cameraX = Math.max(0, Math.min(cameraX, worldWidth - canvas.width))
    syncScrollbar()
  }
}

// ================= DRAW =================
function setBG(type){
  getLevel().backgroundType = type
  window.waterBubbles = null  // reset bąbelków przy zmianie tła
}

function draw(){
  if (levelDelay) {
    drawMatrix()

    if (levelTextAnim) {
      let progress = 1 - (levelTextAnim.time / 180)
      progress = Math.min(progress / 0.7, 1)

      ctx.font = "bold 40px monospace"
      ctx.textAlign = "center"
      ctx.fillStyle = "#00ffcc"
      ctx.shadowColor = "#00ffcc"
      ctx.shadowBlur = 25

      let nextX = -200 + progress * (canvas.width / 2 + 200)
      ctx.fillText("NEXT", nextX, canvas.height / 2 - 20)

      let levelX = canvas.width + 200 - progress * (canvas.width / 2 + 200)
      ctx.fillText("LEVEL", levelX, canvas.height / 2 + 30)

      ctx.shadowBlur = 0
      levelTextAnim.time--

      if (levelTextAnim.time <= 0) levelTextAnim = null
    }

    return
  }

  if (showIntro) {
    const time = Date.now() * 0.001
    const cx = canvas.width / 2

    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
    grad.addColorStop(0, "#0a001f")
    grad.addColorStop(1, "#1a0033")
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    ctx.strokeStyle = "rgba(0, 255, 200, 0.08)"
    ctx.lineWidth = 1.5
    for (let i = -5; i < 25; i++) {
      const offset = (time * 40 + i * 80) % (canvas.height + 300) - 150
      ctx.beginPath()
      ctx.moveTo(0, offset)
      ctx.lineTo(canvas.width, offset + 80)
      ctx.stroke()
    }

    ctx.strokeStyle = "rgba(100, 255, 220, 0.25)"
    for (let i = 0; i < 35; i++) {
      const x = ((i * 47) + Math.sin(time + i) * 30) % (canvas.width + 100)
      const speed = 80 + (i % 40)
      const y1 = (time * speed + i * 60) % (canvas.height + 400) - 200
      ctx.beginPath()
      ctx.moveTo(x, y1)
      ctx.lineTo(x + Math.sin(time + i) * 8, y1 + 90)
      ctx.stroke()
    }

    ctx.fillStyle = "#00ffcc"
    for (let i = 0; i < 45; i++) {
      const px = (i * 73 + time * 15) % (canvas.width + 80) - 40
      const py = (i * 51 + Math.sin(time * 0.6 + i) * 80) % (canvas.height + 100)
      const size = 1.8 + Math.sin(time * 2 + i) * 0.8
      ctx.globalAlpha = 0.4 + Math.sin(time * 3 + i) * 0.3
      ctx.fillRect(px, py, size, size)
    }
    ctx.globalAlpha = 1

    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    const titleY = 165
    const pulse = Math.sin(time * 3) * 4

    ctx.shadowColor = "#00ffff"
    ctx.shadowBlur = 35
    ctx.fillStyle = "#00ffff"
    ctx.font = "bold 88px Arial"
    ctx.fillText(nazwaGry || "Moja gra", cx, titleY + pulse)

    ctx.shadowBlur = 65
    ctx.fillText(nazwaGry || "Moja gra", cx, titleY + pulse)

    ctx.shadowBlur = 25
    ctx.fillStyle = "#ffffff"
    ctx.fillText(nazwaGry || "Moja gra", cx, titleY + pulse)

    ctx.shadowBlur = 0
    ctx.font = "22px Arial"
    ctx.fillStyle = "#aaccff"

    // Łamanie opisu po słowach, max 60 znaków na linię, max 3 linie
    const opisTekst = opisGry || "gra sobie od Groka"
    const slowa = opisTekst.split(" ")
    const opisLinie = []
    let aktLinia = ""
    for (const slowo of slowa) {
      if (opisLinie.length >= 3) break
      const proba = aktLinia ? aktLinia + " " + slowo : slowo
      if (proba.length <= 60) {
        aktLinia = proba
      } else {
        if (aktLinia) opisLinie.push(aktLinia)
        aktLinia = slowo.length > 60 ? slowo.substring(0, 60) : slowo
      }
    }
    if (aktLinia && opisLinie.length < 3) opisLinie.push(aktLinia)
    opisLinie.forEach((linia, i) => {
      ctx.fillText(linia, cx, titleY + 75 + i * 26)
    })

    ctx.font = "17px Arial"
    ctx.fillStyle = "#556677"
    ctx.fillText("by " + (autorGry || "ed"), cx, canvas.height - 28)

    return
  }

  if (gameState === "results" || gameState === "win") {
    drawResults()
    return
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height)
  drawBackground()

  ctx.save()
  ctx.translate(-cameraX, 0)

  if (gridEnabled) {
    ctx.strokeStyle = "#88a"
    for (let x = cameraX - 100; x < cameraX + canvas.width + 100; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke()
    }
    for (let y = 0; y < canvas.height; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(cameraX - 100, y); ctx.lineTo(cameraX + canvas.width + 100, y); ctx.stroke()
    }
  }

  for (let pl of platforms) {
    const x = pl.x
    const y = pl.y
    const w = pl.w
    const h = pl.h || 20

    let neon = pl.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) {
      let t = Date.now() * 0.001
      let pulse = 10 + Math.sin(t) * 10
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = pulse
    }

    if (pl.typ === "line") {
      // Linia — nowoczesna energetyczna belka
      const ly = y + 10
      ctx.shadowColor = neon ? "#00ffff" : "#44aaff"
      ctx.shadowBlur = neon ? 20 : 10
      ctx.strokeStyle = neon ? "#00ffff" : "#5599ff"
      ctx.lineWidth = 4
      ctx.beginPath()
      ctx.moveTo(x, ly)
      ctx.lineTo(x + w, ly)
      ctx.stroke()
      // Biały połysk na środku
      ctx.shadowBlur = 0
      ctx.strokeStyle = "rgba(255,255,255,0.6)"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.moveTo(x + 6, ly)
      ctx.lineTo(x + w - 6, ly)
      ctx.stroke()
      ctx.shadowBlur = 0

    } else if (pl.typ === "round") {
      // Zaokrąglona — metaliczna płyta z gradientem
      const grad = ctx.createLinearGradient(x, y, x, y + h)
      grad.addColorStop(0, "#6aaadd")
      grad.addColorStop(0.3, "#4477bb")
      grad.addColorStop(1, "#223366")
      ctx.fillStyle = grad
      ctx.beginPath()
      ctx.roundRect(x, y, w, h, 10)
      ctx.fill()

      // Obwódka
      ctx.strokeStyle = "#88ccff"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.roundRect(x + 1, y + 1, w - 2, h - 2, 9)
      ctx.stroke()

      // Połysk górny
      const shine = ctx.createLinearGradient(x, y, x, y + h * 0.5)
      shine.addColorStop(0, "rgba(255,255,255,0.25)")
      shine.addColorStop(1, "rgba(255,255,255,0)")
      ctx.fillStyle = shine
      ctx.beginPath()
      ctx.roundRect(x + 2, y + 2, w - 4, h * 0.5, 8)
      ctx.fill()

      // Śruby w rogach
      const screwPositions = [[x+7, y+h/2], [x+w-7, y+h/2]]
      for (let [sx, sy] of screwPositions) {
        ctx.fillStyle = "#1a3355"
        ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI*2); ctx.fill()
        ctx.strokeStyle = "#99ccff"; ctx.lineWidth = 1
        ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI*2); ctx.stroke()
        // Nacięcie śruby
        ctx.strokeStyle = "#99ccff"; ctx.lineWidth = 1
        ctx.beginPath(); ctx.moveTo(sx-2, sy); ctx.lineTo(sx+2, sy); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(sx, sy-2); ctx.lineTo(sx, sy+2); ctx.stroke()
      }

    } else {
      // Prostokąt — stalowa płyta z nitami
      const grad = ctx.createLinearGradient(x, y, x, y + h)
      grad.addColorStop(0, "#5a8fcc")
      grad.addColorStop(0.4, "#3a6499")
      grad.addColorStop(1, "#1e3d66")
      ctx.fillStyle = grad
      ctx.fillRect(x, y, w, h)

      // Obwódka
      ctx.strokeStyle = "#6699cc"
      ctx.lineWidth = 1.5
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1)

      // Ciemna dolna krawędź (głębia)
      ctx.fillStyle = "rgba(0,0,0,0.3)"
      ctx.fillRect(x, y + h - 3, w, 3)

      // Połysk górny
      const shine = ctx.createLinearGradient(x, y, x, y + h * 0.5)
      shine.addColorStop(0, "rgba(255,255,255,0.22)")
      shine.addColorStop(1, "rgba(255,255,255,0)")
      ctx.fillStyle = shine
      ctx.fillRect(x + 1, y + 1, w - 2, h * 0.5)

      // Nity równomiernie rozłożone
      const nitCount = Math.max(2, Math.floor(w / 28))
      for (let i = 0; i < nitCount; i++) {
        const nx = x + 8 + i * ((w - 16) / (nitCount - 1 || 1))
        const ny = y + h / 2
        ctx.fillStyle = "#1a3355"
        ctx.beginPath(); ctx.arc(nx, ny, 2.5, 0, Math.PI*2); ctx.fill()
        ctx.strokeStyle = "#aaddff"; ctx.lineWidth = 0.8
        ctx.beginPath(); ctx.arc(nx, ny, 2.5, 0, Math.PI*2); ctx.stroke()
      }
    }

    ctx.shadowBlur = 0

    if (pl === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 2
      ctx.setLineDash([4, 4])
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6)
      ctx.setLineDash([])
      // Uchwyty resize — środek każdej krawędzi
      ctx.fillStyle = "#ff4444"
      ctx.strokeStyle = "#ffffff"
      ctx.lineWidth = 1.5
      const handles = [
        [x + w/2, y - 3],       // góra
        [x + w/2, y + h + 3],   // dół
        [x - 3,   y + h/2],     // lewo
        [x + w + 3, y + h/2],   // prawo
      ]
      for (const [hx, hy] of handles) {
        ctx.fillRect(hx - 5, hy - 5, 10, 10)
        ctx.strokeRect(hx - 5, hy - 5, 10, 10)
      }
    }
  }

  for (let b of blocks) {
    const x = b.x
    const y = b.y
    const w = b.w
    const h = b.h

    let neon = b.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) {
      let t = Date.now() * 0.001
      let pulse = 10 + Math.sin(t) * 10
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = pulse
    }

    if (b.typ === "blockTall") {
      // Pionowy klocek — ciepły brąz/ceglasty
      const g = ctx.createLinearGradient(x, y, x+w, y)
      g.addColorStop(0, "#553322")
      g.addColorStop(0.5, "#8b4a2e")
      g.addColorStop(1, "#3d2010")
      ctx.fillStyle = g
      ctx.fillRect(x, y, w, h)
      // Fugi poziome
      const bH = 12
      ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1.5
      for (let row = 0; row * bH < h; row++) {
        const by2 = y + row * bH
        ctx.beginPath(); ctx.moveTo(x, by2); ctx.lineTo(x+w, by2); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(x+w/2, by2); ctx.lineTo(x+w/2, by2+bH); ctx.stroke()
      }
      // Połysk
      ctx.strokeStyle = "rgba(200,140,80,0.4)"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.moveTo(x, y+h); ctx.lineTo(x, y); ctx.lineTo(x+w, y); ctx.stroke()
      ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.moveTo(x+w, y); ctx.lineTo(x+w, y+h); ctx.lineTo(x, y+h); ctx.stroke()

    } else if (b.typ === "blockGrid") {
      // Energetyczny blok sci-fi — pulsujący kryształ z liniami
      const t = Date.now() * 0.002
      const pulse = Math.sin(t) * 0.5 + 0.5  // 0..1

      // Tło — ciemny grafit
      const bg = ctx.createLinearGradient(x, y, x, y+h)
      bg.addColorStop(0, "#1a1a2e")
      bg.addColorStop(1, "#0d0d1a")
      ctx.fillStyle = bg
      ctx.fillRect(x, y, w, h)

      // Poziome linie energii — animowane przesunięcie
      const lineColors = ["#00ffff","#0088ff","#00ffcc","#4400ff","#00ffff"]
      const lineCount = Math.max(2, Math.floor(h / 18))
      for (let i = 0; i < lineCount; i++) {
        const ly = y + (i + 0.5) * (h / lineCount)
        const shift = ((t * 0.4 + i * 0.3) % 1)
        const lg = ctx.createLinearGradient(x, ly, x+w, ly)
        const c = lineColors[i % lineColors.length]
        lg.addColorStop(0, "rgba(0,0,0,0)")
        lg.addColorStop(Math.max(0, shift - 0.25), "rgba(0,0,0,0)")
        lg.addColorStop(shift, "#ffffff")
        lg.addColorStop(Math.min(1, shift + 0.25), c)
        lg.addColorStop(1, "rgba(0,0,0,0)")
        ctx.strokeStyle = lg; ctx.lineWidth = 1.5
        ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x+w, ly); ctx.stroke()
      }

      // Ramka cyjanowa
      ctx.strokeStyle = `rgba(0,255,255,${0.5 + pulse * 0.5})`
      ctx.lineWidth = 1.5
      ctx.strokeRect(x+2, y+2, w-2, h-2)

      // Narożniki białe
      const cs = Math.min(12, w * 0.18)
      ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2.5
      for (const [cx2,cy2,dx,dy] of [[x+2,y+2,1,1],[x+w-2,y+2,-1,1],[x+2,y+h-2,1,-1],[x+w-2,y+h-2,-1,-1]]) {
        ctx.beginPath(); ctx.moveTo(cx2+dx*cs, cy2); ctx.lineTo(cx2, cy2); ctx.lineTo(cx2, cy2+dy*cs); ctx.stroke()
      }

      // Centralny kryształ — pulsujący
      const kcx = x + w/2, kcy = y + h/2
      const kr = Math.min(w, h) * 0.22 * (0.88 + pulse * 0.12)
      // Poświata
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = 12 + pulse * 14
      const rg = ctx.createRadialGradient(kcx, kcy, 1, kcx, kcy, kr*1.6)
      rg.addColorStop(0, "rgba(0,255,255,0.3)")
      rg.addColorStop(1, "rgba(0,100,255,0)")
      ctx.fillStyle = rg
      ctx.beginPath(); ctx.arc(kcx, kcy, kr*1.6, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Kryształ (romb)
      const krg = ctx.createLinearGradient(kcx-kr, kcy, kcx+kr, kcy)
      krg.addColorStop(0, "#0044ff")
      krg.addColorStop(0.5, "#ffffff")
      krg.addColorStop(1, "#00ccff")
      ctx.fillStyle = krg
      ctx.beginPath()
      ctx.moveTo(kcx, kcy - kr)
      ctx.lineTo(kcx + kr*0.6, kcy)
      ctx.lineTo(kcx, kcy + kr)
      ctx.lineTo(kcx - kr*0.6, kcy)
      ctx.closePath(); ctx.fill()
      // Linia środkowa kryształu
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1
      ctx.beginPath(); ctx.moveTo(kcx - kr*0.6, kcy); ctx.lineTo(kcx + kr*0.6, kcy); ctx.stroke()

    } else if (b.typ === "blockIce") {
      // Lodowy blok — przezroczysty z kryształami i połyskiem
      const t = Date.now() * 0.001
      const shimmer = Math.sin(t * 1.5) * 0.08 + 0.08

      // Tło — lodowy błękit z przezroczystością
      const iceGrad = ctx.createLinearGradient(x, y, x + w, y + h)
      iceGrad.addColorStop(0, "rgba(140,220,255,0.55)")
      iceGrad.addColorStop(0.4, "rgba(200,240,255,0.65)")
      iceGrad.addColorStop(1, "rgba(100,190,240,0.5)")
      ctx.fillStyle = iceGrad
      ctx.beginPath(); ctx.roundRect(x, y, w, h, 6); ctx.fill()

      // Połysk górny
      const shineGrad = ctx.createLinearGradient(x, y, x, y + h * 0.45)
      shineGrad.addColorStop(0, `rgba(255,255,255,${0.45 + shimmer})`)
      shineGrad.addColorStop(1, "rgba(255,255,255,0)")
      ctx.fillStyle = shineGrad
      ctx.beginPath(); ctx.roundRect(x + 2, y + 2, w - 4, h * 0.45, 5); ctx.fill()

      // Obwódka lodowa
      ctx.strokeStyle = `rgba(180,235,255,0.9)`
      ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.roundRect(x + 0.5, y + 0.5, w - 1, h - 1, 6); ctx.stroke()

      // Wewnętrzna obwódka subtelna
      ctx.strokeStyle = "rgba(255,255,255,0.3)"
      ctx.lineWidth = 1
      ctx.beginPath(); ctx.roundRect(x + 3, y + 3, w - 6, h - 6, 4); ctx.stroke()

      // Kryształki — losowe ale stabilne (seed z pozycji)
      const crystalCount = Math.floor(w / 22)
      for (let i = 0; i < crystalCount; i++) {
        const seed = (x * 7 + i * 137) % 1
        const cx2 = x + 12 + i * ((w - 24) / Math.max(crystalCount - 1, 1))
        const cy2 = y + h * (0.35 + ((x * 3 + i * 51) % 100) / 400)
        const cr = 3 + ((x + i * 23) % 4)
        const angle = t * (0.4 + i * 0.15)

        ctx.save()
        ctx.translate(cx2, cy2)
        ctx.rotate(angle)
        // Kryształ — romb
        ctx.strokeStyle = "rgba(255,255,255,0.7)"
        ctx.lineWidth = 1
        ctx.beginPath()
        ctx.moveTo(0, -cr); ctx.lineTo(cr * 0.5, 0)
        ctx.lineTo(0, cr); ctx.lineTo(-cr * 0.5, 0)
        ctx.closePath(); ctx.stroke()
        // Blask kryształu
        ctx.fillStyle = "rgba(220,245,255,0.4)"
        ctx.fill()
        ctx.restore()
      }

      // Odblaski boczne (cienie wgłębień)
      ctx.fillStyle = "rgba(80,160,220,0.2)"
      ctx.fillRect(x + 1, y + h - 5, w - 2, 4)

    } else if (b.typ === "blockBomb") {
      if (b.exploded) continue

      const t = Date.now() * 0.001
      const armed = b.bombTimer > 0
      const shake = armed ? (Math.random() - 0.5) * (b.bombTimer / 15) : 0
      const bx2 = x + shake, by2 = y + shake * 0.5
      const progress = armed ? b.bombTimer / 90 : 0
      const flashFast = armed && b.bombTimer > 60

      // Tło
      const bg = ctx.createLinearGradient(bx2, by2, bx2+w, by2+h)
      bg.addColorStop(0, "#3a0000"); bg.addColorStop(0.5, "#660000"); bg.addColorStop(1, "#220000")
      ctx.fillStyle = bg
      ctx.beginPath(); ctx.roundRect(bx2, by2, w, h, 8); ctx.fill()

      // Poświata
      if (armed) {
        const glow = flashFast ? (Math.sin(t*20)*0.5+0.5) : (Math.sin(t*6)*0.3+0.5)
        ctx.shadowColor = "#ff2200"; ctx.shadowBlur = 20 + glow * 20
      }

      // Obwódka
      ctx.strokeStyle = armed ? `rgba(255,${flashFast?0:80},0,0.9)` : "#884444"
      ctx.lineWidth = 2
      ctx.beginPath(); ctx.roundRect(bx2+1, by2+1, w-2, h-2, 7); ctx.stroke()
      ctx.shadowBlur = 0

      // Ikona bomby
      ctx.font = `${Math.round(h*0.5)}px Arial`
      ctx.textAlign = "center"; ctx.textBaseline = "middle"
      ctx.fillText("💣", bx2+w/2+shake, by2+h/2+shake*0.5)

      // Pasek odliczania
      if (armed) {
        ctx.fillStyle = "rgba(0,0,0,0.5)"
        ctx.fillRect(bx2+4, by2+h-10, w-8, 6)
        const barColor = progress > 0.7 ? "#ff2200" : progress > 0.4 ? "#ff8800" : "#ffcc00"
        ctx.fillStyle = barColor
        ctx.fillRect(bx2+4, by2+h-10, (w-8)*progress, 6)
      }

    } else {
    const bGrad = ctx.createLinearGradient(x, y, x, y + h)
    bGrad.addColorStop(0, "#445566")
    bGrad.addColorStop(0.5, "#2a3a4a")
    bGrad.addColorStop(1, "#1a2530")
    ctx.fillStyle = bGrad
    ctx.fillRect(x, y, w, h)

    // Fugi cegieł (poziome)
    const brickH = 14
    const brickW = w / 2
    ctx.strokeStyle = "rgba(0,0,0,0.5)"
    ctx.lineWidth = 1.5
    for (let row = 0; row * brickH < h; row++) {
      const by2 = y + row * brickH
      // Pozioma fuga
      ctx.beginPath(); ctx.moveTo(x, by2); ctx.lineTo(x + w, by2); ctx.stroke()
      // Pionowe fugi (co drugi rząd przesunięte)
      const offset = row % 2 === 0 ? 0 : brickW / 2
      for (let col = offset; col < w; col += brickW) {
        ctx.beginPath(); ctx.moveTo(x + col, by2); ctx.lineTo(x + col, by2 + brickH); ctx.stroke()
      }
    }

    // Połysk górny
    const bShine = ctx.createLinearGradient(x, y, x, y + h * 0.4)
    bShine.addColorStop(0, "rgba(255,255,255,0.12)")
    bShine.addColorStop(1, "rgba(255,255,255,0)")
    ctx.fillStyle = bShine
    ctx.fillRect(x, y, w, h * 0.4)

    // Jasna krawędź góra/lewo (światło)
    ctx.strokeStyle = "rgba(150,200,255,0.35)"
    ctx.lineWidth = 1.5
    ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x, y); ctx.lineTo(x + w, y); ctx.stroke()

    // Ciemna krawędź dół/prawo (cień)
    ctx.strokeStyle = "rgba(0,0,0,0.5)"
    ctx.lineWidth = 1.5
    ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.stroke()

    } // koniec else (block)

    ctx.shadowBlur = 0

    if (b === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 2
      ctx.setLineDash([4, 4])
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6)
      ctx.setLineDash([])
      // Uchwyty resize — środek każdej krawędzi
      ctx.fillStyle = "#ff4444"
      ctx.strokeStyle = "#ffffff"
      ctx.lineWidth = 1.5
      const handles = [
        [x + w/2, y - 3],       // góra
        [x + w/2, y + h + 3],   // dół
        [x - 3,   y + h/2],     // lewo
        [x + w + 3, y + h/2],   // prawo
      ]
      for (const [hx, hy] of handles) {
        ctx.fillRect(hx - 5, hy - 5, 10, 10)
        ctx.strokeRect(hx - 5, hy - 5, 10, 10)
      }
    }
  }

  for (let p of players) {
    if (invulnerable > 0 && Math.floor(invulnerable / 5) % 2 === 0) continue

    if (p.type === "ball") {
      drawPlayer(ctx, p.x, p.y, p.r, Date.now())
    } else if (p.type === "spaceship") {
      drawSpaceship(p.x, p.y, p.r, Date.now())
    } else if (p.type === "crosshair") {
      if (!trybGry) drawCrosshairPlayer(p.x, p.y, p.r, Date.now())
    } else {
      drawCar(p.x, p.y, p.r, p.vx || 0)
    }

    if (p === selectedObject) {
      ctx.strokeStyle = "yellow"
      ctx.lineWidth = 3
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.r + 4, 0, Math.PI*2)
      ctx.stroke()
    }
  }

  // === POCISKI STATKU — world coords (ctx ma translate(-cameraX)) ===
  for (const b of bullets) {
    const alpha = b.life
    ctx.save()
    ctx.globalAlpha = alpha
    // Poświata zewnętrzna
    ctx.shadowColor = "#00ffcc"
    ctx.shadowBlur = 16
    ctx.fillStyle = "rgba(0,255,200,0.25)"
    ctx.fillRect(b.x - 2, b.y - b.h/2 - 3, b.w + 4, b.h + 6)
    // Rdzeń pocisku — jasny neon
    const grad = ctx.createLinearGradient(b.x, b.y - b.h/2, b.x, b.y + b.h/2)
    grad.addColorStop(0, "#ffffff")
    grad.addColorStop(0.3, "#00ffee")
    grad.addColorStop(0.7, "#00ccaa")
    grad.addColorStop(1, "#007755")
    ctx.fillStyle = grad
    ctx.shadowBlur = 10
    ctx.beginPath()
    ctx.roundRect(b.x, b.y - b.h/2, b.w, b.h, 2)
    ctx.fill()
    // Iskra na czubku
    ctx.fillStyle = "#ffffff"
    ctx.shadowColor = "#ffffff"
    ctx.shadowBlur = 12
    ctx.fillRect(b.x + b.w - 3, b.y - 1.5, 5, 3)
    ctx.shadowBlur = 0
    ctx.restore()
  }

  // Pasek przeładowania — world coords (ctx ma translate(-cameraX))
  if (trybGry && players.some(p => p.type === "spaceship")) {
    const sp = players.find(p => p.type === "spaceship")
    if (burstReload > 0 && sp) {
      const sx = sp.x   // world coords — ctx już przesunięty
      const sy = sp.y - sp.r - 16
      const barW = 50, barH = 5
      ctx.save()
      ctx.fillStyle = "rgba(0,0,0,0.5)"
      ctx.fillRect(sx - barW/2, sy, barW, barH)
      const pct = 1 - burstReload / BURST_RELOAD
      const barColor = pct < 0.5 ? "#ff4400" : "#ffcc00"
      ctx.fillStyle = barColor
      ctx.shadowColor = barColor; ctx.shadowBlur = 6
      ctx.fillRect(sx - barW/2, sy, barW * pct, barH)
      ctx.shadowBlur = 0
      ctx.fillStyle = "#fff"; ctx.font = "9px Arial"
      ctx.textAlign = "center"; ctx.textBaseline = "middle"
      ctx.fillText("ładowanie...", sx, sy - 6)
      ctx.restore()
    }
  }

  const spaceshipActive = trybGry && players.some(p => p.type === "spaceship")

  for (let en of enemies) {
    ctx.globalAlpha = 1
    ctx.fillStyle = "white"

    const x = en.x
    const y = en.y
    const w = en.w || 40
    const h = en.h || 40

    // Efekt lewitowania — poświata + lekka transparentność
    const isLevitating = spaceshipActive && (
      en.type === "walker" || en.type === "walker2" ||
      en.type === "walker3" || en.type === "walker4" || en.type === "saw"
    )
    if (isLevitating) {
      const t = Date.now() * 0.003
      // Aura lewitowania
      ctx.save()
      ctx.globalAlpha = 0.25 + Math.sin(t + x * 0.01) * 0.12
      ctx.shadowColor = "#aa44ff"
      ctx.shadowBlur = 20
      ctx.fillStyle = "#cc66ff"
      ctx.beginPath()
      ctx.ellipse(x + w/2, y + h/2, w * 0.65, h * 0.65, 0, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
      ctx.globalAlpha = 0.82  // lekko przezroczysty
    }

    if (en.type === "ghost") {
      // Duch — rysowany canvas, unosi się
      let float = 0
      let moving = en.effects && en.effects.some(fx => fx.type === "move" && fx.enabled !== false)
      if (!moving && dragging !== en) {
        float = Math.sin(Date.now() * 0.003 + en.x) * 6
      }
      const t = Date.now() * 0.002
      const gx = x + w/2, gy = y + h/2 + float
      const gr = w * 0.45

      ctx.save()
      // Poświata
      ctx.shadowColor = "#aaaaff"
      ctx.shadowBlur = 18
      // Ciało
      ctx.fillStyle = "rgba(200,200,255,0.82)"
      ctx.beginPath()
      ctx.arc(gx, gy - gr*0.2, gr, Math.PI, 0)
      // Falisty dół
      const steps = 5
      for (let i = steps; i >= 0; i--) {
        const wx = gx - gr + i * (gr*2/steps)
        const wy = gy + gr*0.8 + (i%2===0 ? Math.sin(t)*5 : -Math.sin(t)*5)
        ctx.lineTo(wx, wy)
      }
      ctx.closePath()
      ctx.fill()
      ctx.shadowBlur = 0
      // Oczy — czerwone świecące
      ctx.shadowColor = "#ff4444"; ctx.shadowBlur = 8
      ctx.fillStyle = "#ff2222"
      ctx.beginPath(); ctx.ellipse(gx - gr*0.28, gy - gr*0.18, gr*0.14, gr*0.18, 0, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.ellipse(gx + gr*0.28, gy - gr*0.18, gr*0.14, gr*0.18, 0, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Źrenice
      ctx.fillStyle = "#000"
      ctx.beginPath(); ctx.arc(gx - gr*0.28, gy - gr*0.15, gr*0.07, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(gx + gr*0.28, gy - gr*0.15, gr*0.07, 0, Math.PI*2); ctx.fill()
      ctx.restore()

    } else if (en.type === "worm") {
      // Robak — segmenty z głową i oczami
      const t = Date.now() * 0.004
      const seg = 4
      const segR = w / (seg * 2 + 1)
      ctx.save()
      // Segmenty ciała (od tyłu do przodu)
      for (let i = seg - 1; i >= 0; i--) {
        const sx = x + segR + i * (w - segR*2) / seg + Math.sin(t + i*1.2) * 3
        const sy = y + h/2 + Math.sin(t*1.5 + i) * 4
        const shade = Math.floor(80 + i * 20)
        ctx.fillStyle = `rgb(${shade+60},${shade+140},${shade})`
        ctx.shadowColor = "#44ff00"; ctx.shadowBlur = i===0 ? 10 : 4
        ctx.beginPath(); ctx.arc(sx, sy, segR * (i===0 ? 1.3 : 1.0), 0, Math.PI*2); ctx.fill()
        // Brzuszek
        ctx.fillStyle = `rgba(180,255,120,0.5)`
        ctx.beginPath(); ctx.ellipse(sx, sy + segR*0.3, segR*0.5, segR*0.35, 0, 0, Math.PI*2); ctx.fill()
      }
      ctx.shadowBlur = 0
      // Oczy na głowie (i===0)
      const hx = x + segR + Math.sin(t) * 3
      const hy = y + h/2 + Math.sin(t*1.5) * 4
      ctx.fillStyle = "#fff"
      ctx.beginPath(); ctx.arc(hx - segR*0.4, hy - segR*0.4, segR*0.3, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(hx + segR*0.4, hy - segR*0.4, segR*0.3, 0, Math.PI*2); ctx.fill()
      ctx.fillStyle = "#000"
      ctx.beginPath(); ctx.arc(hx - segR*0.38, hy - segR*0.42, segR*0.15, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(hx + segR*0.42, hy - segR*0.42, segR*0.15, 0, Math.PI*2); ctx.fill()
      // Czułki
      ctx.strokeStyle = "#44cc00"; ctx.lineWidth = 2
      ctx.beginPath(); ctx.moveTo(hx - segR*0.3, hy - segR); ctx.lineTo(hx - segR*0.5, hy - segR*1.8); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(hx + segR*0.3, hy - segR); ctx.lineTo(hx + segR*0.5, hy - segR*1.8); ctx.stroke()
      ctx.restore()

    } else if (en.type === "enemy1") {
      let s = w / 8
      let t = Date.now() * 0.005
      let waveX = Math.sin(t + en.x * 0.05) * 2
      let waveY = Math.cos(t * 1.5) * 2
      let bx = x + waveX
      let by = y + waveY

      ctx.fillStyle = "#6a35d4"
      ctx.fillRect(bx + 1*s, by + 2*s, 6*s, 4*s)
      ctx.fillStyle = "#8a5cff"
      ctx.fillRect(bx + 2*s, by + 1*s, 4*s, 2*s)
      ctx.fillStyle = "white"
      ctx.fillRect(bx + 2*s + waveX*0.3, by + 2*s, s, s)
      ctx.fillRect(bx + 5*s + waveX*0.3, by + 2*s, s, s)
      ctx.fillStyle = "#6ecbff"
      ctx.fillRect(bx + 2*s + 0.25*s + waveX*0.5, by + 2*s + 0.25*s, 0.5*s, 0.5*s)
      ctx.fillRect(bx + 5*s + 0.25*s + waveX*0.5, by + 2*s + 0.25*s, 0.5*s, 0.5*s)
      ctx.fillStyle = "#00e5ff"
      ctx.fillRect(bx + 2*s, by + 6*s + Math.sin(t)*2, s, s)
      ctx.fillRect(bx + 5*s, by + 6*s - Math.sin(t)*2, s, s)
    } else if (en.type === "water") {
      let t = Date.now() * 0.003
      ctx.fillStyle = "#1e3a5f"
      ctx.fillRect(x, y, w, h)
      ctx.fillStyle = "#4fc3f7"
      for (let i = 0; i < w; i += 4) {
        let wave = Math.sin(t + i * 0.05) * 3
        ctx.fillRect(x + i, y + wave, 4, 3)
      }
      ctx.fillStyle = "#8fe9ff"
      for (let i = 0; i < w; i += 20) {
        let wave = Math.sin(t * 1.5 + i * 0.08) * 2
        ctx.fillRect(x + i, y + 6 + wave, 4, 1)
      }

    } else if (en.type === "fire") {
      // Ogień — animowane języki płomienia
      const t = Date.now() * 0.005
      const fx = x + w/2, fbase = y + h
      ctx.save()
      const flameCount = 3
      for (let f = 0; f < flameCount; f++) {
        const offset = (f - 1) * w * 0.28
        const flicker = Math.sin(t * 1.3 + f * 2.1) * 4
        const fh = h * (0.6 + Math.sin(t + f) * 0.2)
        // Zewnętrzny płomień (pomarańcz)
        const grad = ctx.createRadialGradient(fx + offset, fbase - fh*0.3, 2, fx + offset, fbase, fh*0.5)
        grad.addColorStop(0, "rgba(255,220,50,0.95)")
        grad.addColorStop(0.4, "rgba(255,100,0,0.85)")
        grad.addColorStop(1, "rgba(200,0,0,0)")
        ctx.fillStyle = grad
        ctx.beginPath()
        ctx.moveTo(fx + offset - w*0.18, fbase)
        ctx.quadraticCurveTo(fx + offset - w*0.12 + flicker, fbase - fh*0.5, fx + offset, fbase - fh)
        ctx.quadraticCurveTo(fx + offset + w*0.12 - flicker, fbase - fh*0.5, fx + offset + w*0.18, fbase)
        ctx.closePath()
        ctx.fill()
      }
      // Rdzeń (żółty)
      const core = ctx.createRadialGradient(fx, fbase - h*0.25, 1, fx, fbase - h*0.2, w*0.2)
      core.addColorStop(0, "rgba(255,255,180,1)")
      core.addColorStop(1, "rgba(255,200,0,0)")
      ctx.fillStyle = core
      ctx.beginPath(); ctx.arc(fx, fbase - h*0.22, w*0.2, 0, Math.PI*2); ctx.fill()
      ctx.restore()

    } else if (en.type === "spikes") {
      // Kolce — ostre metaliczne trójkąty z połyskiem
      const spikeCount = 4
      const sw = w / spikeCount
      const base = y + h
      ctx.save()
      for (let i = 0; i < spikeCount; i++) {
        const sx = x + i * sw
        const tip = y + 4
        // Gradient — ciemny metal z blaskiem
        const sGrad = ctx.createLinearGradient(sx, base, sx + sw/2, tip)
        sGrad.addColorStop(0, "#2a2a3a")
        sGrad.addColorStop(0.5, "#8899bb")
        sGrad.addColorStop(1, "#ddeeff")
        ctx.fillStyle = sGrad
        ctx.beginPath()
        ctx.moveTo(sx + 1, base)
        ctx.lineTo(sx + sw/2, tip)
        ctx.lineTo(sx + sw - 1, base)
        ctx.closePath()
        ctx.fill()
        // Połysk na lewej krawędzi
        ctx.strokeStyle = "rgba(200,230,255,0.7)"
        ctx.lineWidth = 1.5
        ctx.beginPath(); ctx.moveTo(sx + 2, base - 2); ctx.lineTo(sx + sw/2, tip + 1); ctx.stroke()
      }
      // Podstawa
      const baseGrad = ctx.createLinearGradient(x, base - 5, x, base)
      baseGrad.addColorStop(0, "#333344")
      baseGrad.addColorStop(1, "#111122")
      ctx.fillStyle = baseGrad
      ctx.fillRect(x, base - 5, w, 5)
      ctx.restore()

    } else if (en.type === "walker") {
      // Walker — robot z anteną i świecącymi oczami
      const t = Date.now() * 0.004
      const cx2 = x + w/2, cy2 = y + h/2
      const legBob = Math.sin(t * 2) * 4
      ctx.save()
      // Nogi
      ctx.strokeStyle = "#66aadd"; ctx.lineWidth = 3
      ctx.lineCap = "round"
      ctx.beginPath(); ctx.moveTo(cx2 - w*0.2, cy2 + h*0.2); ctx.lineTo(cx2 - w*0.25, cy2 + h*0.5 + legBob); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(cx2 + w*0.2, cy2 + h*0.2); ctx.lineTo(cx2 + w*0.25, cy2 + h*0.5 - legBob); ctx.stroke()
      // Stopy
      ctx.fillStyle = "#4488bb"
      ctx.fillRect(cx2 - w*0.38, cy2 + h*0.5 + legBob - 2, w*0.26, 5)
      ctx.fillRect(cx2 + w*0.12, cy2 + h*0.5 - legBob - 2, w*0.26, 5)
      // Tułów
      const bodyGrad = ctx.createLinearGradient(cx2 - w*0.35, cy2 - h*0.25, cx2 + w*0.35, cy2 + h*0.25)
      bodyGrad.addColorStop(0, "#5599ee")
      bodyGrad.addColorStop(1, "#224488")
      ctx.fillStyle = bodyGrad
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.35, cy2 - h*0.28, w*0.7, h*0.55, 5); ctx.fill()
      ctx.strokeStyle = "#88ccff"; ctx.lineWidth = 1
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.35, cy2 - h*0.28, w*0.7, h*0.55, 5); ctx.stroke()
      // Głowa
      ctx.fillStyle = "#4477cc"
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.28, cy2 - h*0.52, w*0.56, h*0.28, 4); ctx.fill()
      // Antena
      ctx.strokeStyle = "#88ccff"; ctx.lineWidth = 2
      ctx.beginPath(); ctx.moveTo(cx2, cy2 - h*0.52); ctx.lineTo(cx2, cy2 - h*0.75); ctx.stroke()
      ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 8
      ctx.fillStyle = "#00ffee"
      ctx.beginPath(); ctx.arc(cx2, cy2 - h*0.78, 3.5, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Oczy świecące
      ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 10
      ctx.fillStyle = "#00ffff"
      ctx.beginPath(); ctx.arc(cx2 - w*0.12, cy2 - h*0.4, 4, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.12, cy2 - h*0.4, 4, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      ctx.restore()
    } else if (en.type === "walker2") {
      // Fioletowy stworek — wiernie jak w Mini Przygoda Eda
      const t = Date.now() * 0.01
      const cx2 = x + w/2
      const legAnim = Math.sin(t) * 8
      ctx.save()
      // Tułów prostokątny
      ctx.fillStyle = "#aa3399"
      ctx.fillRect(x, y + h*0.45, w, h*0.55)
      // Głowa — półkole na górze tułowia
      ctx.fillStyle = "#cc55bb"
      ctx.beginPath()
      ctx.arc(cx2, y + h*0.45, w*0.5, Math.PI, 0)
      ctx.fill()
      // Oczy żółte
      ctx.fillStyle = "#ffff00"
      ctx.beginPath(); ctx.arc(cx2 - w*0.18, y + h*0.32, 5.5, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.18, y + h*0.32, 5.5, 0, Math.PI*2); ctx.fill()
      // Źrenice
      ctx.fillStyle = "#000"
      ctx.beginPath(); ctx.arc(cx2 - w*0.18, y + h*0.32, 2.5, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.18, y + h*0.32, 2.5, 0, Math.PI*2); ctx.fill()
      // Nogi — tupają na przemian
      ctx.strokeStyle = "#882277"; ctx.lineWidth = 6; ctx.lineCap = "round"
      ctx.beginPath(); ctx.moveTo(cx2 - w*0.22, y + h); ctx.lineTo(cx2 - w*0.22 + legAnim, y + h + 10); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(cx2 + w*0.22, y + h); ctx.lineTo(cx2 + w*0.22 - legAnim, y + h + 10); ctx.stroke()
      ctx.restore()

    } else if (en.type === "walker3") {
      // Pancerny robot — stalowy z czerwonymi oczami i anteną
      const t = Date.now() * 0.003
      const cx2 = x + w/2, cy2 = y + h/2
      const legAnim = Math.sin(Date.now() * 0.009) * 6
      ctx.save()
      // Nogi
      ctx.strokeStyle = "#445566"; ctx.lineWidth = 5; ctx.lineCap = "round"
      ctx.beginPath(); ctx.moveTo(cx2 - w*0.22, cy2 + h*0.38); ctx.lineTo(cx2 - w*0.28 + legAnim, cy2 + h*0.58); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(cx2 + w*0.22, cy2 + h*0.38); ctx.lineTo(cx2 + w*0.28 - legAnim, cy2 + h*0.58); ctx.stroke()
      // Stopy
      ctx.fillStyle = "#334455"
      ctx.fillRect(cx2 - w*0.42 + legAnim, cy2 + h*0.55, w*0.28, 6)
      ctx.fillRect(cx2 + w*0.14 - legAnim, cy2 + h*0.55, w*0.28, 6)
      // Tułów pancerny
      const bGrad = ctx.createLinearGradient(cx2 - w*0.4, cy2, cx2 + w*0.4, cy2)
      bGrad.addColorStop(0, "#334455")
      bGrad.addColorStop(0.5, "#5577aa")
      bGrad.addColorStop(1, "#334455")
      ctx.fillStyle = bGrad
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.42, cy2 - h*0.12, w*0.84, h*0.52, 4); ctx.fill()
      ctx.strokeStyle = "#7799cc"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.42, cy2 - h*0.12, w*0.84, h*0.52, 4); ctx.stroke()
      // Głowa
      const hGrad = ctx.createLinearGradient(cx2 - w*0.32, cy2 - h*0.5, cx2 + w*0.32, cy2 - h*0.1)
      hGrad.addColorStop(0, "#445566")
      hGrad.addColorStop(1, "#223344")
      ctx.fillStyle = hGrad
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.32, cy2 - h*0.52, w*0.64, h*0.42, 5); ctx.fill()
      ctx.strokeStyle = "#6688aa"; ctx.lineWidth = 1
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.32, cy2 - h*0.52, w*0.64, h*0.42, 5); ctx.stroke()
      // Oczy czerwone świecące
      ctx.shadowColor = "#ff2200"; ctx.shadowBlur = 10
      ctx.fillStyle = "#ff3300"
      ctx.beginPath(); ctx.arc(cx2 - w*0.14, cy2 - h*0.34, 5, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.14, cy2 - h*0.34, 5, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Antena
      ctx.strokeStyle = "#7799cc"; ctx.lineWidth = 2
      ctx.beginPath(); ctx.moveTo(cx2, cy2 - h*0.52); ctx.lineTo(cx2 + w*0.1, cy2 - h*0.72); ctx.stroke()
      ctx.fillStyle = "#ff4400"
      ctx.shadowColor = "#ff4400"; ctx.shadowBlur = 6
      ctx.beginPath(); ctx.arc(cx2 + w*0.1, cy2 - h*0.74, 3, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      ctx.restore()

    } else if (en.type === "walker4") {
      // UFO — latający spodek z wiązką i migającymi światłami
      const t = Date.now() * 0.003
      const cx2 = x + w/2
      const hover = Math.sin(t * 1.5) * 5  // unoszenie w górę i dół
      const cy2 = y + h/2 + hover
      ctx.save()

      // Wiązka traktora (trójkąt w dół)
      const beamAlpha = 0.15 + Math.sin(t * 3) * 0.1
      const beamGrad = ctx.createLinearGradient(cx2, cy2 + h*0.18, cx2, cy2 + h*0.9)
      beamGrad.addColorStop(0, `rgba(100,255,100,${beamAlpha + 0.2})`)
      beamGrad.addColorStop(1, `rgba(100,255,100,0)`)
      ctx.fillStyle = beamGrad
      ctx.beginPath()
      ctx.moveTo(cx2 - w*0.22, cy2 + h*0.18)
      ctx.lineTo(cx2 - w*0.5, cy2 + h*0.9)
      ctx.lineTo(cx2 + w*0.5, cy2 + h*0.9)
      ctx.lineTo(cx2 + w*0.22, cy2 + h*0.18)
      ctx.closePath()
      ctx.fill()

      // Dolna kopuła — metaliczny spodek
      const diskGrad = ctx.createLinearGradient(cx2 - w*0.5, cy2, cx2 + w*0.5, cy2 + h*0.25)
      diskGrad.addColorStop(0, "#888899")
      diskGrad.addColorStop(0.4, "#ccccdd")
      diskGrad.addColorStop(1, "#556677")
      ctx.fillStyle = diskGrad
      ctx.beginPath()
      ctx.ellipse(cx2, cy2 + h*0.12, w*0.5, h*0.18, 0, 0, Math.PI*2)
      ctx.fill()
      // Obwódka spodka
      ctx.strokeStyle = "#aabbcc"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.ellipse(cx2, cy2 + h*0.12, w*0.5, h*0.18, 0, 0, Math.PI*2)
      ctx.stroke()

      // Górna kopuła — szklana
      const domeGrad = ctx.createRadialGradient(cx2 - w*0.1, cy2 - h*0.15, 2, cx2, cy2, w*0.32)
      domeGrad.addColorStop(0, "rgba(180,255,180,0.9)")
      domeGrad.addColorStop(0.5, "rgba(80,200,120,0.7)")
      domeGrad.addColorStop(1, "rgba(20,100,60,0.5)")
      ctx.fillStyle = domeGrad
      ctx.beginPath()
      ctx.ellipse(cx2, cy2, w*0.3, h*0.28, 0, Math.PI, 0)
      ctx.fill()
      // Obwódka kopuły
      ctx.strokeStyle = "rgba(150,255,180,0.8)"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.ellipse(cx2, cy2, w*0.3, h*0.28, 0, Math.PI, 0)
      ctx.stroke()

      // Migające światła na spodku
      const lights = [-0.35, -0.18, 0, 0.18, 0.35]
      lights.forEach((offset, i) => {
        const phase = (t * 4 + i * 1.2) % (Math.PI * 2)
        const on = Math.sin(phase) > 0
        ctx.shadowColor = on ? "#ffff00" : "transparent"
        ctx.shadowBlur = on ? 8 : 0
        ctx.fillStyle = on ? "#ffee00" : "#555544"
        ctx.beginPath()
        ctx.arc(cx2 + w * offset, cy2 + h*0.22, 3.5, 0, Math.PI*2)
        ctx.fill()
      })
      ctx.shadowBlur = 0

      // Połysk na kopule
      ctx.fillStyle = "rgba(255,255,255,0.25)"
      ctx.beginPath()
      ctx.ellipse(cx2 - w*0.1, cy2 - h*0.1, w*0.1, h*0.08, -0.4, 0, Math.PI*2)
      ctx.fill()

      ctx.restore()
    } else if (en.type === "saw") {
      const cx2 = x + w/2, cy2 = y + h/2
      const r = w/2
      const angle = en.sawAngle || 0
      const teeth = 12

      ctx.save()
      ctx.translate(cx2, cy2)
      ctx.rotate(angle)

      // Cień piły
      ctx.shadowColor = "rgba(0,0,0,0.5)"
      ctx.shadowBlur = 8
      ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3

      // Tarcza piły — metaliczny gradient
      const diskGrad = ctx.createRadialGradient(-r*0.2, -r*0.2, 1, 0, 0, r*0.85)
      diskGrad.addColorStop(0, "#e8e8e8")
      diskGrad.addColorStop(0.4, "#aaaaaa")
      diskGrad.addColorStop(0.8, "#666666")
      diskGrad.addColorStop(1, "#333333")
      ctx.fillStyle = diskGrad
      ctx.beginPath(); ctx.arc(0, 0, r*0.82, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0

      // Zęby piły
      ctx.fillStyle = "#bbbbbb"
      ctx.strokeStyle = "#444"
      ctx.lineWidth = 0.8
      for (let i = 0; i < teeth; i++) {
        const a = (i / teeth) * Math.PI * 2
        const an = ((i + 0.5) / teeth) * Math.PI * 2
        ctx.save()
        ctx.beginPath()
        ctx.moveTo(Math.cos(a)*r*0.82, Math.sin(a)*r*0.82)
        ctx.lineTo(Math.cos(an)*r*0.62, Math.sin(an)*r*0.62)
        ctx.lineTo(Math.cos(a + Math.PI*2/teeth)*r*0.82, Math.sin(a + Math.PI*2/teeth)*r*0.82)
        ctx.closePath()
        ctx.fill(); ctx.stroke()
        ctx.restore()
      }

      // Zewnętrzna obwódka ostrza
      ctx.strokeStyle = "#888"
      ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.arc(0, 0, r*0.82, 0, Math.PI*2); ctx.stroke()

      // Nakładki metaliczne — 3 pasy jak piła tarczowa
      ctx.strokeStyle = "rgba(255,255,255,0.15)"
      ctx.lineWidth = 2
      for (const fr of [0.55, 0.65, 0.75]) {
        ctx.beginPath(); ctx.arc(0, 0, r*fr, 0, Math.PI*2); ctx.stroke()
      }

      // Otwory wentylacyjne
      ctx.fillStyle = "rgba(0,0,0,0.35)"
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2
        ctx.beginPath()
        ctx.ellipse(Math.cos(a)*r*0.48, Math.sin(a)*r*0.48, r*0.1, r*0.06, a, 0, Math.PI*2)
        ctx.fill()
      }

      // Środkowy hub
      const hubGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, r*0.18)
      hubGrad.addColorStop(0, "#ffffff")
      hubGrad.addColorStop(0.4, "#cccccc")
      hubGrad.addColorStop(1, "#666666")
      ctx.fillStyle = hubGrad
      ctx.beginPath(); ctx.arc(0, 0, r*0.18, 0, Math.PI*2); ctx.fill()
      ctx.strokeStyle = "#444"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.arc(0, 0, r*0.18, 0, Math.PI*2); ctx.stroke()

      // Centralny śrubka
      ctx.fillStyle = "#333"
      ctx.beginPath(); ctx.arc(0, 0, r*0.07, 0, Math.PI*2); ctx.fill()

      ctx.restore()
    } else {
      ctx.fillStyle = "#7b3fe4"
      ctx.fillRect(x, y, w, h)
    }

    if (en === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.strokeRect(x, y, w, h)
    }
    ctx.globalAlpha = 1  // reset
  }

  for (let b of bonuses) {
    ctx.save()
    ctx.translate(b.x, b.y)
    let scale = b.scale || 1
    ctx.scale(scale, scale)
    ctx.font = "22px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    let icon = "💎"
    if (b.type === "key_win") icon = "🏁"
    if (b.type === "key_level") icon = "🔑"
    ctx.fillText(icon, 0, 0)
    ctx.restore()
  }

  // === DYM SAMOCHODU (w układzie świata) ===
  if (trybGry && exhaustParticles.length > 0) {
    for (let p of exhaustParticles) {
      ctx.save()
      ctx.globalAlpha = p.life * 0.55
      ctx.fillStyle = `rgb(${p.gray},${p.gray},${p.gray})`
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    }
  }

  ctx.restore()

  // === CELOWNIK — w miejscu myszy (screen coords) ===
  if (players.some(p => p.type === "crosshair")) {
    const cp = players.find(p => p.type === "crosshair")
    drawCrosshairScreen(mousePosX, mousePosY, cp ? cp.r : 20, Date.now())
  }

  // === EKSPLOZJE WROGÓW ===
  for (let i = explosions.length - 1; i >= 0; i--) {
    const p = explosions[i]
    ctx.save()
    ctx.globalAlpha = p.life
    ctx.translate(p.x, p.y)
    ctx.rotate(p.rot)
    ctx.fillStyle = p.color
    ctx.shadowColor = p.color
    ctx.shadowBlur = 8
    if (p.shape === "circle") {
      ctx.beginPath()
      ctx.arc(0, 0, p.size * p.life, 0, Math.PI * 2)
      ctx.fill()
    } else {
      const s = p.size * p.life
      ctx.fillRect(-s/2, -s/2, s, s)
    }
    ctx.restore()
    // Fizyka
    p.x += p.vx; p.y += p.vy
    p.vy += p.gravity
    p.vx *= 0.97
    p.rot += p.rotSpeed
    p.life -= p.decay
    if (p.life <= 0) explosions.splice(i, 1)
  }

  // === EFEKT PUDŁA (mały błysk) ===
  for (let i = shotParticles.length - 1; i >= 0; i--) {
    const sp = shotParticles[i]
    const alpha = sp.time / 18
    ctx.save()
    ctx.globalAlpha = alpha * 0.7
    ctx.strokeStyle = "#ffffff"
    ctx.lineWidth = 1.5
    for (let r = 0; r < 4; r++) {
      const a = (r / 4) * Math.PI * 2
      const len = (1 - alpha) * 12
      ctx.beginPath()
      ctx.moveTo(sp.x + Math.cos(a)*2, sp.y + Math.sin(a)*2)
      ctx.lineTo(sp.x + Math.cos(a)*len, sp.y + Math.sin(a)*len)
      ctx.stroke()
    }
    ctx.restore()
    sp.time--
    if (sp.time <= 0) shotParticles.splice(i, 1)
  }

  // === ISKRY TRAFIENIA W BLOK/PLATFORMĘ ===
  for (let i = hitSparks.length - 1; i >= 0; i--) {
    const s = hitSparks[i]
    ctx.save()
    ctx.globalAlpha = s.life
    ctx.fillStyle = s.color
    ctx.shadowColor = s.color; ctx.shadowBlur = 6
    ctx.beginPath()
    ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2)
    ctx.fill()
    ctx.restore()
    s.x += s.vx; s.y += s.vy
    s.vy += 0.15  // lekka grawitacja
    s.life -= s.decay
    if (s.life <= 0) hitSparks.splice(i, 1)
  }

  // efekt trafienia
  if (hitEffect) {
    hitEffect.time--
    if (Math.floor(hitEffect.time / 5) % 2 === 0) {
      ctx.font = "50px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("💀", hitEffect.x - cameraX, hitEffect.y)
    }
    if (hitEffect.time <= 0) hitEffect = null
  }

  for (let t of texts) {
    const screenX = t.x - cameraX

    ctx.save()
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.font = t.size + "px " + (t.font || "Arial")

    if (t.neon === true) {
      ctx.shadowColor = t.neonColor || "#00ffff"
      ctx.shadowBlur = 15
      ctx.fillStyle = t.neonColor || "#00ffff"
      ctx.fillText(t.text, screenX, t.y)
      ctx.shadowBlur = 30
      ctx.fillText(t.text, screenX, t.y)
      ctx.shadowBlur = 50
      ctx.fillText(t.text, screenX, t.y)
    }

    ctx.shadowBlur = 0
    ctx.fillStyle = t.color || "white"
    ctx.fillText(t.text, screenX, t.y)

    if (t.outline === true) {
      ctx.strokeStyle = t.outlineColor || "#ffffff"
      ctx.lineWidth = t.outlineWidth || 4
      ctx.lineJoin = "round"
      ctx.strokeText(t.text, screenX, t.y)
    }

    if (t === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.setLineDash([4, 4])
      ctx.strokeRect(screenX - 60, t.y - 35, 120, 70)
      ctx.setLineDash([])
    }

    ctx.restore()
  }

  // HUD
  ctx.fillStyle = "white"
  ctx.font = "20px Arial"
  ctx.textAlign = "left"
  ctx.fillText("❤️ ".repeat(Math.max(0, counters.lives)), 20, 30)
  ctx.textAlign = "center"
  ctx.fillText("⭐ " + counters.points, canvas.width / 2, 30)
  ctx.textAlign = "right"
  ctx.fillText("⏱ " + Math.ceil(counters.time), canvas.width - 20, 30)

  if (warningText) {
    warningText.time--
    if (warningText.time <= 0) warningText = null

    const alpha = Math.sin(Date.now() * 0.008) * 0.3 + 0.7
    ctx.save()
    ctx.globalAlpha = alpha
    ctx.shadowColor = "#ff0000"
    ctx.shadowBlur = 30
    ctx.font = "bold 58px Arial"
    ctx.textAlign = "center"
    ctx.fillStyle = "#ff2222"
    ctx.fillText("WRACAJ SZYBKO!", canvas.width/2, canvas.height/2 - 40)
    ctx.font = "bold 26px Arial"
    ctx.fillStyle = "#ff8888"
    ctx.fillText("Spadniesz za chwilę!", canvas.width/2, canvas.height/2 + 30)
    ctx.restore()
  }

  // podłoga
  ctx.fillStyle = "#444"
  ctx.fillRect(0, 450, 800, 50)
}

// ================= ZAPIS / WCZYTANIE =================
let folderHandle = null
let projectName = "projekt"
let loadedFromFile = false

async function zapiszProjekt(){
  // Zsynchronizuj dane bieżącego poziomu przed zapisem
  const lvl = getLevel()
  if (lvl) {
    lvl.players = players
    lvl.platforms = platforms
    lvl.blocks = blocks
    lvl.enemies = enemies
    lvl.bonuses = bonuses
    lvl.texts = texts
  }

  const data = {
    levels: levels,
    settings: {
      nazwaGry,
      autorGry,
      opisGry,
      sterowanie,
      counters,
      startTime,
      useTimer,
      backgroundType,
      playerStartX,
      playerStartY,
      respawnMode,
      autoScroll,
      autoScrollSpeed,
      worldWidth
    },
    stats: gameData.stats || {}
  }

  try {
    if (!fileHandle) {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: (nazwaGry || "projekt") + ".json",
        types: [{
          description: "JSON",
          accept: { "application/json": [".json"] }
        }]
      })
    }

    const writable = await fileHandle.createWritable()
    await writable.write(JSON.stringify(data, null, 2))
    await writable.close()
    alert("Gra zapisana ✔️")
  } catch (err) {
    if (err.name !== "AbortError") {
      console.error(err)
      alert("Błąd zapisu: " + err.message)
    }
  }
}

function checkEnemyCollision() {
  if (gameOver || players.length === 0) return
  if (invulnerable > 0) { invulnerable--; return }

  const player = players[0]

  // Celownik jest niezniszczalny — wrogowie go nie zabijają
  if (player.type === "crosshair") return

  for (let enemy of enemies) {
    let ex = enemy.x, ey = enemy.y
    let ew = enemy.w || 40, eh = enemy.h || 40

    if (ex + ew < cameraX || ex > cameraX + canvas.width) continue

    let px = player.x - player.r, py = player.y - player.r
    let pw = player.r * 2, ph = player.r * 2

    if (px < ex + ew && px + pw > ex && py < ey + eh && py + ph > ey) {
      deathRespawnX = player.x
      deathRespawnY = player.y
      if (useLives) counters.lives--
      hitEffect = { x: player.x, y: player.y, time: 60 }
      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true
        gameOver = true
        updateStats(false)
        gameState = "results"
        initResultsScene()
        return
      }
      hitPause = hitPauseTime
      pendingRespawn = true
      invulnerable = invulnerabilityTime
      return
    }
  }
}
