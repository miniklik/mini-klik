canvas.addEventListener("mousedown", e => {
  if (trybGry || trybHTML) return
  if (trybKopiowania && copiedObject) {
    const rect = canvas.getBoundingClientRect()
    const mx = e.clientX - rect.left + cameraX
    const my = e.clientY - rect.top

    let nowy = JSON.parse(JSON.stringify(copiedObject))

    if (nowy.r && !nowy.w) {
      // GRACZ — ma promień r, nie ma szerokości w
      nowy.x = mx
      nowy.y = my
      const lvl = getLevel()
      lvl.players.push(nowy)
      syncLevelData()
    } else if (nowy.type !== undefined && nowy.w) {
      // WRÓG — ma pole type (enemy1, ghost, walker itp.)
      nowy.x = mx - (nowy.w || 40)/2
      nowy.y = my - (nowy.h || 40)/2
      const lvl = getLevel()
      lvl.enemies.push(nowy)
      syncLevelData()
    } else if (nowy.typ === "block" || nowy.typ === "blockTall" || nowy.typ === "blockGrid") {
      // BLOK — ma typ === "block"
      nowy.x = mx - (nowy.w || 60)/2
      nowy.y = my - (nowy.h || 60)/2
      const lvl = getLevel()
      lvl.blocks.push(nowy)
      syncLevelData()
    } else if (nowy.typ === "round" || nowy.typ === "rect" || nowy.typ === "line") {
      // PLATFORMA — ma typ round/rect/line
      nowy.x = mx - (nowy.w || 120)/2
      nowy.y = my - (nowy.h || 20)/2
      const lvl = getLevel()
      lvl.platforms.push(nowy)
      syncLevelData()
    } else {
      // FALLBACK — traktuj jako platformę
      nowy.x = mx - (nowy.w || 120)/2
      nowy.y = my - (nowy.h || 20)/2
      const lvl = getLevel()
      lvl.platforms.push(nowy)
      syncLevelData()
    }

    trybKopiowania = false
    selectedObject = nowy
    showFxList()
    return
  }

  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left + cameraX
  const my = e.clientY - rect.top

  dragging = null
  resizing = null

  if (trybKasowania) {
    for (const arr of [blocks, platforms, players, enemies, bonuses]) {
      for (let i = arr.length - 1; i >= 0; i--) {
        const o = arr[i]
        if (o.r && !o.w) {
          const dx = mx - o.x
          const dy = my - o.y
          if (Math.hypot(dx, dy) < o.r + 6) {
            arr.splice(i, 1)
            trybKasowania = false
            updateButtonStates()
            return
          }
        } else {
          if (
            mx >= o.x - 6 && mx <= o.x + (o.w||40) + 6 &&
            my >= o.y - 6 && my <= o.y + (o.h||40) + 6
          ) {
            arr.splice(i, 1)
            trybKasowania = false
            updateButtonStates()
            return
          }
        }
      }
    }
    return
  }

  if (trybFX) {
    selectedObject = null

    for (const p of players) {
      if (Math.hypot(mx - p.x, my - p.y) < p.r + 8) {
        selectedObject = p
        showFxList()
        return
      }
    }

    for (const arr of [platforms, blocks, enemies]) {
      for (const obj of arr) {
        if (
          mx >= obj.x && mx <= obj.x + obj.w &&
          my >= obj.y && my <= obj.y + obj.h
        ) {
          selectedObject = obj
          showFxList()
          return
        }
      }
    }
    return
  }

  selectedObject = null

  // BONUSY
  for (const bonus of bonuses) {
    let dx = mx - bonus.x
    let dy = my - bonus.y
    let dist = Math.sqrt(dx*dx + dy*dy)

    if (dist < (bonus.r || 12) + 10) {
      selectedObject = bonus
      dragging = bonus
      dragOffsetX = mx - bonus.x
      dragOffsetY = my - bonus.y

      if (bonus.type === "key_level") {
        pokazPanelKlucza(bonus)
      }
      return
    }
  }

  // resize bloki — wszystkie 4 strony
  for (const b of blocks) {
    const bx = b.x, by = b.y, bw = b.w, bh = b.h
    // prawo
    if (mx > bx+bw-12 && mx < bx+bw+12 && my > by+8 && my < by+bh-8) {
      resizing = b; resizing.resizeSide = "right"; selectedObject = b; return
    }
    // lewo
    if (mx > bx-12 && mx < bx+12 && my > by+8 && my < by+bh-8) {
      resizing = b; resizing.resizeSide = "left"; selectedObject = b; return
    }
    // dół
    if (mx > bx+8 && mx < bx+bw-8 && my > by+bh-12 && my < by+bh+12) {
      resizing = b; resizing.resizeSide = "bottom"; selectedObject = b; return
    }
    // góra
    if (mx > bx+8 && mx < bx+bw-8 && my > by-12 && my < by+12) {
      resizing = b; resizing.resizeSide = "top"; selectedObject = b; return
    }
  }

  for (const pl of platforms) {
    const ph = pl.h || 20
    // prawo
    if (mx > pl.x+pl.w-12 && mx < pl.x+pl.w+12 && my > pl.y-6 && my < pl.y+ph+6) {
      resizing = pl; resizing.resizeSide = "right"; selectedObject = pl; return
    }
    // lewo
    if (mx > pl.x-12 && mx < pl.x+12 && my > pl.y-6 && my < pl.y+ph+6) {
      resizing = pl; resizing.resizeSide = "left"; selectedObject = pl; return
    }
    // dół
    if (mx > pl.x+8 && mx < pl.x+pl.w-8 && my > pl.y+ph-12 && my < pl.y+ph+12) {
      resizing = pl; resizing.resizeSide = "bottom"; selectedObject = pl; return
    }
    // góra
    if (mx > pl.x+8 && mx < pl.x+pl.w-8 && my > pl.y-12 && my < pl.y+12) {
      resizing = pl; resizing.resizeSide = "top"; selectedObject = pl; return
    }
  }

  // drag bloki
  for (const b of blocks) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      selectedObject = b
      dragging = b
      dragOffsetX = mx - b.x
      dragOffsetY = my - b.y
      return
    }
  }

  // texty
  for (const t of texts) {
    if (
      mx >= t.x - 60 &&
      mx <= t.x + 60 &&
      my >= t.y - 30 &&
      my <= t.y + 30
    ) {
      selectedObject = t
      dragging = t
      dragOffsetX = mx - t.x
      dragOffsetY = my - t.y
      pokazPanelTekstu(t)
      return
    }
  }

  for (const en of enemies) {
    if (mx >= en.x && mx <= en.x + en.w && my >= en.y && my <= en.y + en.h) {
      selectedObject = en
      dragging = en
      dragOffsetX = mx - en.x
      dragOffsetY = my - en.y
      return
    }
  }

  for (const pl of platforms) {
    if (mx >= pl.x && mx <= pl.x + pl.w && my >= pl.y && my <= pl.y + (pl.h||20)) {
      selectedObject = pl
      dragging = pl
      dragOffsetX = mx - pl.x
      dragOffsetY = my - pl.y
      return
    }
  }

  for (const p of players) {
    if (Math.hypot(mx - p.x, my - p.y) < p.r + 8) {
      selectedObject = p
      dragging = p
      dragOffsetX = mx - p.x
      dragOffsetY = my - p.y
      return
    }
  }
})

canvas.addEventListener("mousemove", e => {
  if (trybGry || trybHTML) return
  const rect = canvas.getBoundingClientRect()
  const mouseScreenX = e.clientX - rect.left
  const mouseScreenY = e.clientY - rect.top

  const mx = mouseScreenX + cameraX
  const my = mouseScreenY

  if (dragging) {
    const EDGE = 60
    const SCROLL_SPEED = 9

    if (mouseScreenX < EDGE) {
      const factor = (EDGE - mouseScreenX) / EDGE
      cameraX -= SCROLL_SPEED * factor * factor
    } else if (mouseScreenX > canvas.width - EDGE) {
      const factor = (mouseScreenX - (canvas.width - EDGE)) / EDGE
      cameraX += SCROLL_SPEED * factor * factor
    }
  }

  if (resizing) {
    let obj = resizing

    if (obj.resizeSide === "right") {
      obj.w = mx - obj.x
      if (gridEnabled) obj.w = snap(obj.w)
      if (obj.w < 20) obj.w = 20
    } else if (obj.resizeSide === "bottom") {
      obj.h = my - obj.y
      if (gridEnabled) obj.h = snap(obj.h)
      if (obj.h < 20) obj.h = 20
    } else if (obj.resizeSide === "left") {
      const oldRight = obj.x + obj.w
      let newX = mx
      let newW = oldRight - newX
      if (newW < 20) { newW = 20; newX = oldRight - 20 }
      if (gridEnabled) newX = snap(newX)
      obj.x = newX
      obj.w = oldRight - newX
    } else if (obj.resizeSide === "top") {
      const oldBottom = obj.y + obj.h
      obj.y = my
      obj.h = oldBottom - my
      if (gridEnabled) { obj.y = snap(obj.y); obj.h = snap(obj.h) }
      if (obj.h < 20) { obj.h = 20; obj.y = oldBottom - 20 }
    }
    return
  }

  if (dragging) {
    dragging.x = mx - dragOffsetX
    dragging.y = my - dragOffsetY

    if (gridEnabled) {
      dragging.x = snap(dragging.x)
      dragging.y = snap(dragging.y)
    }
  }
})

canvas.addEventListener("mouseup", () => {
  dragging = null
  if (resizing) {
    delete resizing.resizeSide
    resizing = null
  }
})

canvas.addEventListener("click", (e) => {
  if (showIntro) {
    showIntro = false
    return
  }

  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left
  const my = e.clientY - rect.top

  if (gameState === "results" || gameState === "win") {
    if (mx > 250 && mx < 390 && my > 300 && my < 350) {
      wrocDoEdytora()
      return
    }
    if (mx > 410 && mx < 550 && my > 300 && my < 350) {
      wyjdzDoMenu()
      return
    }
  }
})

// ================= UPDATE =================
function update(){
  if (showIntro) return

  if (gameState === "results" || gameState === "win") {
    updateResults()
    return
  }

  if (levelDelay) {
    levelDelay.time--

    if (levelDelay.time <= 0) {
      let target = levelDelay.target
      currentLevel = target
      syncLevelData()

      const lvl = getLevel()
      playerStartX = lvl.playerStartX ?? 100
      playerStartY = lvl.playerStartY ?? 100

      renderLevelsBar()
      respawnPlayer()
      cameraX = 0

      levelDelay = null
      levelTextAnim = null
      trybGry = true
    }

    return
  }

  if (gameOver) return

  // === CZAS ===
  let now = Date.now()
  let delta = (now - lastTime) / 1000
  lastTime = now

  if ((trybGry || trybHTML) && useTimer) {
    if (counters.time > 0) {
      counters.time = Math.max(0, counters.time - delta)
    }

    if (counters.time <= 0 && !pendingRespawn && hitPause === 0) {
      if (useLives) counters.lives -= 1

      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true
        gameOver = true
        updateStats(false)
        gameState = "results"
        initResultsScene()
        return
      }

      hitEffect = {
        x: players[0]?.x || canvas.width/2,
        y: players[0]?.y || canvas.height/2,
        time: 60
      }

      hitPause = hitPauseTime
      pendingRespawn = true
      // BŁĄD POPRAWIONY: było `respawnPlayer = players[0]` (nadpisanie funkcji), teraz tylko flaga
      counters.time = startTime
    }
  }

  if (hitPause > 0) {
    hitPause--

    if (hitPause === 0 && pendingRespawn && players[0]) {
      const p = players[0]

      if (diedByFalling) {
        p.x = cameraX + 140
        p.y = 180
      } else if (respawnMode === "death") {
        p.x = deathRespawnX
        p.y = deathRespawnY
      } else {
        p.x = playerStartX
        p.y = playerStartY
      }

      p.vx = diedByFalling ? 4 : 0
      p.y = Math.max(p.y, 100)
      p.vy = -5
      invulnerable = invulnerabilityTime * 1.4

      pendingRespawn = false
      diedByFalling = false
    }
    return
  }

  if (!effectsPaused) {
    for (let obj of [...platforms, ...blocks, ...enemies]) {
      if (!obj.effects) obj.effects = []
      for (let fx of obj.effects) {
        if (fx.enabled === false) continue
        if (fx.type === "move") {
          obj.x += fx.dx * fx.speed
          obj.y += fx.dy * fx.speed
          fx.travel += fx.speed
          if (fx.travel >= fx.distance) {
            if (fx.loop) {
              fx.dx *= -1
              fx.dy *= -1
              fx.travel = 0
            } else {
              fx.speed = 0
            }
          }
        }
      }

      if (obj.type === "ghost") {
        if (dragging === obj) {
          obj.baseY = obj.y
          // Użyj continue zamiast return, żeby nie przerywać całej pętli
          continue
        }
        if (!obj.baseY) obj.baseY = obj.y
        obj.floatTime = (obj.floatTime || 0) + 0.05
        obj.y = obj.baseY + Math.sin(obj.floatTime) * 15
      }

      if (obj.type === "walker" || obj.type === "walker2" || obj.type === "walker3" || obj.type === "walker4") {
        if (dragging === obj) continue  // BŁĄD POPRAWIONY: było return, przerywało całą pętlę
        obj.vy = (obj.vy || 0) + 0.5
        obj.y += obj.vy
        obj.x += obj.vx || 0

        if (obj.y > floorY - obj.h) {
          obj.y = floorY - obj.h
          obj.vy = 0
        }

        for (let pl of platforms) {
          if (
            obj.x + obj.w > pl.x &&
            obj.x < pl.x + pl.w &&
            obj.y + obj.h > pl.y &&
            obj.y + obj.h < pl.y + (pl.h||20) + 10
          ) {
            obj.y = pl.y - obj.h
            obj.vy = 0
          }
        }

        for (let b of blocks) {
          if (
            obj.x + obj.w > b.x &&
            obj.x < b.x + b.w &&
            obj.y + obj.h > b.y &&
            obj.y + obj.h < b.y + 10
          ) {
            obj.y = b.y - obj.h
            obj.vy = 0
          }
        }

        for (let b of blocks) {
          if (
            obj.x + obj.w > b.x &&
            obj.x < b.x + b.w &&
            obj.y + obj.h > b.y &&
            obj.y < b.y + b.h
          ) {
            obj.vx = -(obj.vx || 1)
            obj.x += obj.vx
            break
          }
        }

        for (let pl of platforms) {
          if (
            obj.x + obj.w > pl.x &&
            obj.x < pl.x + pl.w &&
            obj.y + obj.h > pl.y &&
            obj.y < pl.y + (pl.h||20)
          ) {
            obj.vx = -(obj.vx || 1)
            obj.x += obj.vx
            break
          }
        }

        if (obj.x < 0 || obj.x + obj.w > worldWidth) {
          obj.vx = -(obj.vx || 1)
        }
      }
    }
  }

  if (!trybGry && !trybHTML) return

  for (let p of players) {
    p.vx = 0
    if (keys[sterowanie.lewo]) p.vx = -4
    if (keys[sterowanie.prawo]) p.vx = 4

    if (keys[sterowanie.skok] && p.vy === 0) p.vy = -10

    p.vy += gravity
    p.x += p.vx
    p.y += p.vy

    if (p.y > floorY) {
      p.y = floorY
      p.vy = 0
    }

    for (let pl of platforms) {
      if (p.x > pl.x - p.r && p.x < pl.x + pl.w + p.r) {
        if (p.y + p.r > pl.y && p.y < pl.y + (pl.h||20)) {
          if (pl.solid === "top" && p.vy > 0) {
            p.y = pl.y - p.r
            p.vy = 0
          }
          if (pl.solid === "full") {
            if (p.vy > 0) { p.y = pl.y - p.r; p.vy = 0 }
            if (p.vy < 0) { p.y = pl.y + (pl.h||20) + p.r; p.vy = 0 }
          }
        }
      }
    }

    for (let b of blocks) {
      if (
        p.x + p.r > b.x &&
        p.x - p.r < b.x + b.w &&
        p.y + p.r > b.y &&
        p.y - p.r < b.y + b.h
      ) {
        if (p.vy > 0 && p.y < b.y) {
          p.y = b.y - p.r
          p.vy = 0
        } else if (p.vy < 0 && p.y > b.y + b.h) {
          p.y = b.y + b.h + p.r
          p.vy = 0
        } else if (p.vx > 0 && p.x < b.x) {
          p.x = b.x - p.r
          p.vx = 0
        } else if (p.vx < 0 && p.x > b.x + b.w) {
          p.x = b.x + b.w + p.r
          p.vx = 0
        }
      }
    }
  }

  checkEnemyCollision()

  // Spadnięcie poza planszę
  if (players.length > 0 && trybGry) {
    const p = players[0]

    const pozaPlansza =
      p.y > floorY + 150 ||
      p.x < cameraX - 40 ||
      p.x > cameraX + canvas.width + 40

    if (pozaPlansza) {
      fallTimer++

      if (fallTimer === 25 && !warningText) {
        warningText = { time: 150 }
      }

      if (fallTimer >= FALL_TIME_LIMIT) {
        diedByFalling = true
        if (useLives) counters.lives -= 1

        hitEffect = { x: p.x, y: Math.min(p.y, floorY), time: 60 }
        hitPause = hitPauseTime
        pendingRespawn = true
        fallTimer = 0
        warningText = null

        if (useLives && counters.lives <= 0 && !gameOverTriggered) {
          gameOverTriggered = true
          gameOver = true
          updateStats(false)
          gameState = "results"
          initResultsScene()
          return
        }
      }
    } else {
      fallTimer = 0
      warningText = null
    }
  }

  // Animacja bonusów
  for (let b of bonuses) {
    if (!b.pulseTime) b.pulseTime = 0
    if (!b.scale) b.scale = 1
    if (!b.angle) b.angle = 0
    b.pulseTime += 0.05
    b.scale = 1 + Math.sin(b.pulseTime) * 0.05
  }

  // Zbieranie bonusów
  for (let i = bonuses.length - 1; i >= 0; i--) {
    let b = bonuses[i]
    let p = players[0]
    if (!p) continue

    let dx = p.x - b.x
    let dy = p.y - b.y
    let dist = Math.sqrt(dx*dx + dy*dy)

    if (dist < p.r + (b.r||12)) {
      if (b.type === "key_level") {
        let target = b.targetLevel || 0

        if (target >= levels.length) {
          alert("❌ Ten poziom nie istnieje")
          return
        }

        levelDelay = { time: 180, target: target }
        levelTextAnim = { time: 180 }

        matrixCols = []
        for (let j = 0; j < canvas.width / 8; j++) {
          matrixCols[j] = Math.random() * 50
        }

        trybGry = false
        return
      }

      if (b.type === "key_win") {
        gameOver = true
        gameOverTriggered = true
        updateStats(true)
        gameState = "win"
        initResultsScene()
        return
      }

      counters.points += 1
      bonuses.splice(i, 1)
      // Synchronizuj z poziomem
      const lvl = getLevel()
      if (lvl) lvl.bonuses = bonuses
    }
  }

  // KAMERA
  if (players.length > 0 && (trybGry || trybHTML)) {
    const player = players[0]

    if (autoScroll) {
      cameraX += autoScrollSpeed
    } else {
      const targetX = player.x - canvas.width / 2 + player.r
      cameraX += (targetX - cameraX) * 0.12
    }

    cameraX = Math.max(0, Math.min(cameraX, worldWidth - canvas.width))
    syncScrollbar()
  }
}

// ================= DRAW =================
function setBG(type){
  getLevel().backgroundType = type
}

function draw(){
  if (levelDelay) {
    drawMatrix()

    if (levelTextAnim) {
      let progress = 1 - (levelTextAnim.time / 180)
      progress = Math.min(progress / 0.7, 1)

      ctx.font = "bold 40px monospace"
      ctx.textAlign = "center"
      ctx.fillStyle = "#00ffcc"
      ctx.shadowColor = "#00ffcc"
      ctx.shadowBlur = 25

      let nextX = -200 + progress * (canvas.width / 2 + 200)
      ctx.fillText("NEXT", nextX, canvas.height / 2 - 20)

      let levelX = canvas.width + 200 - progress * (canvas.width / 2 + 200)
      ctx.fillText("LEVEL", levelX, canvas.height / 2 + 30)

      ctx.shadowBlur = 0
      levelTextAnim.time--

      if (levelTextAnim.time <= 0) levelTextAnim = null
    }

    return
  }

  if (showIntro) {
    const time = Date.now() * 0.001
    const cx = canvas.width / 2

    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
    grad.addColorStop(0, "#0a001f")
    grad.addColorStop(1, "#1a0033")
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    ctx.strokeStyle = "rgba(0, 255, 200, 0.08)"
    ctx.lineWidth = 1.5
    for (let i = -5; i < 25; i++) {
      const offset = (time * 40 + i * 80) % (canvas.height + 300) - 150
      ctx.beginPath()
      ctx.moveTo(0, offset)
      ctx.lineTo(canvas.width, offset + 80)
      ctx.stroke()
    }

    ctx.strokeStyle = "rgba(100, 255, 220, 0.25)"
    for (let i = 0; i < 35; i++) {
      const x = ((i * 47) + Math.sin(time + i) * 30) % (canvas.width + 100)
      const speed = 80 + (i % 40)
      const y1 = (time * speed + i * 60) % (canvas.height + 400) - 200
      ctx.beginPath()
      ctx.moveTo(x, y1)
      ctx.lineTo(x + Math.sin(time + i) * 8, y1 + 90)
      ctx.stroke()
    }

    ctx.fillStyle = "#00ffcc"
    for (let i = 0; i < 45; i++) {
      const px = (i * 73 + time * 15) % (canvas.width + 80) - 40
      const py = (i * 51 + Math.sin(time * 0.6 + i) * 80) % (canvas.height + 100)
      const size = 1.8 + Math.sin(time * 2 + i) * 0.8
      ctx.globalAlpha = 0.4 + Math.sin(time * 3 + i) * 0.3
      ctx.fillRect(px, py, size, size)
    }
    ctx.globalAlpha = 1

    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    const titleY = 165
    const pulse = Math.sin(time * 3) * 4

    ctx.shadowColor = "#00ffff"
    ctx.shadowBlur = 35
    ctx.fillStyle = "#00ffff"
    ctx.font = "bold 88px Arial"
    ctx.fillText(nazwaGry || "Moja gra", cx, titleY + pulse)

    ctx.shadowBlur = 65
    ctx.fillText(nazwaGry || "Moja gra", cx, titleY + pulse)

    ctx.shadowBlur = 25
    ctx.fillStyle = "#ffffff"
    ctx.fillText(nazwaGry || "Moja gra", cx, titleY + pulse)

    ctx.shadowBlur = 0
    ctx.font = "22px Arial"
    ctx.fillStyle = "#aaccff"
    ctx.fillText(opisGry || "gra sobie od Groka", cx, titleY + 75)

    ctx.font = "17px Arial"
    ctx.fillStyle = "#556677"
    ctx.fillText("by " + (autorGry || "ed"), cx, canvas.height - 28)

    return
  }

  if (gameState === "results" || gameState === "win") {
    drawResults()
    return
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height)
  drawBackground()

  ctx.save()
  ctx.translate(-cameraX, 0)

  if (gridEnabled) {
    ctx.strokeStyle = "#88a"
    for (let x = cameraX - 100; x < cameraX + canvas.width + 100; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke()
    }
    for (let y = 0; y < canvas.height; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(cameraX - 100, y); ctx.lineTo(cameraX + canvas.width + 100, y); ctx.stroke()
    }
  }

  for (let pl of platforms) {
    const x = pl.x
    const y = pl.y
    const w = pl.w
    const h = pl.h || 20

    let neon = pl.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) {
      let t = Date.now() * 0.001
      let pulse = 10 + Math.sin(t) * 10
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = pulse
    }

    if (pl.typ === "line") {
      // Linia — nowoczesna energetyczna belka
      const ly = y + 10
      ctx.shadowColor = neon ? "#00ffff" : "#44aaff"
      ctx.shadowBlur = neon ? 20 : 10
      ctx.strokeStyle = neon ? "#00ffff" : "#5599ff"
      ctx.lineWidth = 4
      ctx.beginPath()
      ctx.moveTo(x, ly)
      ctx.lineTo(x + w, ly)
      ctx.stroke()
      // Biały połysk na środku
      ctx.shadowBlur = 0
      ctx.strokeStyle = "rgba(255,255,255,0.6)"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.moveTo(x + 6, ly)
      ctx.lineTo(x + w - 6, ly)
      ctx.stroke()
      ctx.shadowBlur = 0

    } else if (pl.typ === "round") {
      // Zaokrąglona — metaliczna płyta z gradientem
      const grad = ctx.createLinearGradient(x, y, x, y + h)
      grad.addColorStop(0, "#6aaadd")
      grad.addColorStop(0.3, "#4477bb")
      grad.addColorStop(1, "#223366")
      ctx.fillStyle = grad
      ctx.beginPath()
      ctx.roundRect(x, y, w, h, 10)
      ctx.fill()

      // Obwódka
      ctx.strokeStyle = "#88ccff"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.roundRect(x + 1, y + 1, w - 2, h - 2, 9)
      ctx.stroke()

      // Połysk górny
      const shine = ctx.createLinearGradient(x, y, x, y + h * 0.5)
      shine.addColorStop(0, "rgba(255,255,255,0.25)")
      shine.addColorStop(1, "rgba(255,255,255,0)")
      ctx.fillStyle = shine
      ctx.beginPath()
      ctx.roundRect(x + 2, y + 2, w - 4, h * 0.5, 8)
      ctx.fill()

      // Śruby w rogach
      const screwPositions = [[x+7, y+h/2], [x+w-7, y+h/2]]
      for (let [sx, sy] of screwPositions) {
        ctx.fillStyle = "#1a3355"
        ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI*2); ctx.fill()
        ctx.strokeStyle = "#99ccff"; ctx.lineWidth = 1
        ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI*2); ctx.stroke()
        // Nacięcie śruby
        ctx.strokeStyle = "#99ccff"; ctx.lineWidth = 1
        ctx.beginPath(); ctx.moveTo(sx-2, sy); ctx.lineTo(sx+2, sy); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(sx, sy-2); ctx.lineTo(sx, sy+2); ctx.stroke()
      }

    } else {
      // Prostokąt — stalowa płyta z nitami
      const grad = ctx.createLinearGradient(x, y, x, y + h)
      grad.addColorStop(0, "#5a8fcc")
      grad.addColorStop(0.4, "#3a6499")
      grad.addColorStop(1, "#1e3d66")
      ctx.fillStyle = grad
      ctx.fillRect(x, y, w, h)

      // Obwódka
      ctx.strokeStyle = "#6699cc"
      ctx.lineWidth = 1.5
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1)

      // Ciemna dolna krawędź (głębia)
      ctx.fillStyle = "rgba(0,0,0,0.3)"
      ctx.fillRect(x, y + h - 3, w, 3)

      // Połysk górny
      const shine = ctx.createLinearGradient(x, y, x, y + h * 0.5)
      shine.addColorStop(0, "rgba(255,255,255,0.22)")
      shine.addColorStop(1, "rgba(255,255,255,0)")
      ctx.fillStyle = shine
      ctx.fillRect(x + 1, y + 1, w - 2, h * 0.5)

      // Nity równomiernie rozłożone
      const nitCount = Math.max(2, Math.floor(w / 28))
      for (let i = 0; i < nitCount; i++) {
        const nx = x + 8 + i * ((w - 16) / (nitCount - 1 || 1))
        const ny = y + h / 2
        ctx.fillStyle = "#1a3355"
        ctx.beginPath(); ctx.arc(nx, ny, 2.5, 0, Math.PI*2); ctx.fill()
        ctx.strokeStyle = "#aaddff"; ctx.lineWidth = 0.8
        ctx.beginPath(); ctx.arc(nx, ny, 2.5, 0, Math.PI*2); ctx.stroke()
      }
    }

    ctx.shadowBlur = 0

    if (pl === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 2
      ctx.setLineDash([4, 4])
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6)
      ctx.setLineDash([])
      // Uchwyty resize — środek każdej krawędzi
      ctx.fillStyle = "#ff4444"
      ctx.strokeStyle = "#ffffff"
      ctx.lineWidth = 1.5
      const handles = [
        [x + w/2, y - 3],       // góra
        [x + w/2, y + h + 3],   // dół
        [x - 3,   y + h/2],     // lewo
        [x + w + 3, y + h/2],   // prawo
      ]
      for (const [hx, hy] of handles) {
        ctx.fillRect(hx - 5, hy - 5, 10, 10)
        ctx.strokeRect(hx - 5, hy - 5, 10, 10)
      }
    }
  }

  for (let b of blocks) {
    const x = b.x
    const y = b.y
    const w = b.w
    const h = b.h

    let neon = b.effects?.some(fx => fx.type === "neon" && fx.enabled !== false)
    if (neon) {
      let t = Date.now() * 0.001
      let pulse = 10 + Math.sin(t) * 10
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = pulse
    }

    if (b.typ === "blockTall") {
      // Pionowy klocek — ciepły brąz/ceglasty
      const g = ctx.createLinearGradient(x, y, x+w, y)
      g.addColorStop(0, "#553322")
      g.addColorStop(0.5, "#8b4a2e")
      g.addColorStop(1, "#3d2010")
      ctx.fillStyle = g
      ctx.fillRect(x, y, w, h)
      // Fugi poziome
      const bH = 12
      ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1.5
      for (let row = 0; row * bH < h; row++) {
        const by2 = y + row * bH
        ctx.beginPath(); ctx.moveTo(x, by2); ctx.lineTo(x+w, by2); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(x+w/2, by2); ctx.lineTo(x+w/2, by2+bH); ctx.stroke()
      }
      // Połysk
      ctx.strokeStyle = "rgba(200,140,80,0.4)"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.moveTo(x, y+h); ctx.lineTo(x, y); ctx.lineTo(x+w, y); ctx.stroke()
      ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.moveTo(x+w, y); ctx.lineTo(x+w, y+h); ctx.lineTo(x, y+h); ctx.stroke()

    } else if (b.typ === "blockGrid") {
      // Energetyczny blok sci-fi — pulsujący kryształ z liniami
      const t = Date.now() * 0.002
      const pulse = Math.sin(t) * 0.5 + 0.5  // 0..1

      // Tło — ciemny grafit
      const bg = ctx.createLinearGradient(x, y, x, y+h)
      bg.addColorStop(0, "#1a1a2e")
      bg.addColorStop(1, "#0d0d1a")
      ctx.fillStyle = bg
      ctx.fillRect(x, y, w, h)

      // Poziome linie energii — animowane przesunięcie
      const lineColors = ["#00ffff","#0088ff","#00ffcc","#4400ff","#00ffff"]
      const lineCount = Math.max(2, Math.floor(h / 18))
      for (let i = 0; i < lineCount; i++) {
        const ly = y + (i + 0.5) * (h / lineCount)
        const shift = ((t * 0.4 + i * 0.3) % 1)
        const lg = ctx.createLinearGradient(x, ly, x+w, ly)
        const c = lineColors[i % lineColors.length]
        lg.addColorStop(0, "rgba(0,0,0,0)")
        lg.addColorStop(Math.max(0, shift - 0.25), "rgba(0,0,0,0)")
        lg.addColorStop(shift, "#ffffff")
        lg.addColorStop(Math.min(1, shift + 0.25), c)
        lg.addColorStop(1, "rgba(0,0,0,0)")
        ctx.strokeStyle = lg; ctx.lineWidth = 1.5
        ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x+w, ly); ctx.stroke()
      }

      // Ramka cyjanowa
      ctx.strokeStyle = `rgba(0,255,255,${0.5 + pulse * 0.5})`
      ctx.lineWidth = 1.5
      ctx.strokeRect(x+2, y+2, w-2, h-2)

      // Narożniki białe
      const cs = Math.min(12, w * 0.18)
      ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2.5
      for (const [cx2,cy2,dx,dy] of [[x+2,y+2,1,1],[x+w-2,y+2,-1,1],[x+2,y+h-2,1,-1],[x+w-2,y+h-2,-1,-1]]) {
        ctx.beginPath(); ctx.moveTo(cx2+dx*cs, cy2); ctx.lineTo(cx2, cy2); ctx.lineTo(cx2, cy2+dy*cs); ctx.stroke()
      }

      // Centralny kryształ — pulsujący
      const kcx = x + w/2, kcy = y + h/2
      const kr = Math.min(w, h) * 0.22 * (0.88 + pulse * 0.12)
      // Poświata
      ctx.shadowColor = "#00ffff"
      ctx.shadowBlur = 12 + pulse * 14
      const rg = ctx.createRadialGradient(kcx, kcy, 1, kcx, kcy, kr*1.6)
      rg.addColorStop(0, "rgba(0,255,255,0.3)")
      rg.addColorStop(1, "rgba(0,100,255,0)")
      ctx.fillStyle = rg
      ctx.beginPath(); ctx.arc(kcx, kcy, kr*1.6, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Kryształ (romb)
      const krg = ctx.createLinearGradient(kcx-kr, kcy, kcx+kr, kcy)
      krg.addColorStop(0, "#0044ff")
      krg.addColorStop(0.5, "#ffffff")
      krg.addColorStop(1, "#00ccff")
      ctx.fillStyle = krg
      ctx.beginPath()
      ctx.moveTo(kcx, kcy - kr)
      ctx.lineTo(kcx + kr*0.6, kcy)
      ctx.lineTo(kcx, kcy + kr)
      ctx.lineTo(kcx - kr*0.6, kcy)
      ctx.closePath(); ctx.fill()
      // Linia środkowa kryształu
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1
      ctx.beginPath(); ctx.moveTo(kcx - kr*0.6, kcy); ctx.lineTo(kcx + kr*0.6, kcy); ctx.stroke()

    } else {
    const bGrad = ctx.createLinearGradient(x, y, x, y + h)
    bGrad.addColorStop(0, "#445566")
    bGrad.addColorStop(0.5, "#2a3a4a")
    bGrad.addColorStop(1, "#1a2530")
    ctx.fillStyle = bGrad
    ctx.fillRect(x, y, w, h)

    // Fugi cegieł (poziome)
    const brickH = 14
    const brickW = w / 2
    ctx.strokeStyle = "rgba(0,0,0,0.5)"
    ctx.lineWidth = 1.5
    for (let row = 0; row * brickH < h; row++) {
      const by2 = y + row * brickH
      // Pozioma fuga
      ctx.beginPath(); ctx.moveTo(x, by2); ctx.lineTo(x + w, by2); ctx.stroke()
      // Pionowe fugi (co drugi rząd przesunięte)
      const offset = row % 2 === 0 ? 0 : brickW / 2
      for (let col = offset; col < w; col += brickW) {
        ctx.beginPath(); ctx.moveTo(x + col, by2); ctx.lineTo(x + col, by2 + brickH); ctx.stroke()
      }
    }

    // Połysk górny
    const bShine = ctx.createLinearGradient(x, y, x, y + h * 0.4)
    bShine.addColorStop(0, "rgba(255,255,255,0.12)")
    bShine.addColorStop(1, "rgba(255,255,255,0)")
    ctx.fillStyle = bShine
    ctx.fillRect(x, y, w, h * 0.4)

    // Jasna krawędź góra/lewo (światło)
    ctx.strokeStyle = "rgba(150,200,255,0.35)"
    ctx.lineWidth = 1.5
    ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x, y); ctx.lineTo(x + w, y); ctx.stroke()

    // Ciemna krawędź dół/prawo (cień)
    ctx.strokeStyle = "rgba(0,0,0,0.5)"
    ctx.lineWidth = 1.5
    ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.stroke()

    } // koniec else (block)

    ctx.shadowBlur = 0

    if (b === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 2
      ctx.setLineDash([4, 4])
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6)
      ctx.setLineDash([])
      // Uchwyty resize — środek każdej krawędzi
      ctx.fillStyle = "#ff4444"
      ctx.strokeStyle = "#ffffff"
      ctx.lineWidth = 1.5
      const handles = [
        [x + w/2, y - 3],       // góra
        [x + w/2, y + h + 3],   // dół
        [x - 3,   y + h/2],     // lewo
        [x + w + 3, y + h/2],   // prawo
      ]
      for (const [hx, hy] of handles) {
        ctx.fillRect(hx - 5, hy - 5, 10, 10)
        ctx.strokeRect(hx - 5, hy - 5, 10, 10)
      }
    }
  }

  for (let p of players) {
    if (invulnerable > 0 && Math.floor(invulnerable / 5) % 2 === 0) continue

    if (p.type === "ball") {
      drawPlayer(ctx, p.x, p.y, p.r, Date.now())
    } else {
      drawCar(p.x, p.y, p.r, p.vx || 0);
    }

    if (p === selectedObject) {
      ctx.strokeStyle = "yellow"
      ctx.lineWidth = 3
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.r + 4, 0, Math.PI*2)
      ctx.stroke()
    }
  }

  for (let en of enemies) {
    ctx.globalAlpha = 1
    ctx.fillStyle = "white"

    const x = en.x
    const y = en.y
    const w = en.w || 40
    const h = en.h || 40

    if (en.type === "ghost") {
      // Duch — rysowany canvas, unosi się
      let float = 0
      let moving = en.effects && en.effects.some(fx => fx.type === "move" && fx.enabled !== false)
      if (!moving && dragging !== en) {
        float = Math.sin(Date.now() * 0.003 + en.x) * 6
      }
      const t = Date.now() * 0.002
      const gx = x + w/2, gy = y + h/2 + float
      const gr = w * 0.45

      ctx.save()
      // Poświata
      ctx.shadowColor = "#aaaaff"
      ctx.shadowBlur = 18
      // Ciało
      ctx.fillStyle = "rgba(200,200,255,0.82)"
      ctx.beginPath()
      ctx.arc(gx, gy - gr*0.2, gr, Math.PI, 0)
      // Falisty dół
      const steps = 5
      for (let i = steps; i >= 0; i--) {
        const wx = gx - gr + i * (gr*2/steps)
        const wy = gy + gr*0.8 + (i%2===0 ? Math.sin(t)*5 : -Math.sin(t)*5)
        ctx.lineTo(wx, wy)
      }
      ctx.closePath()
      ctx.fill()
      ctx.shadowBlur = 0
      // Oczy — czerwone świecące
      ctx.shadowColor = "#ff4444"; ctx.shadowBlur = 8
      ctx.fillStyle = "#ff2222"
      ctx.beginPath(); ctx.ellipse(gx - gr*0.28, gy - gr*0.18, gr*0.14, gr*0.18, 0, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.ellipse(gx + gr*0.28, gy - gr*0.18, gr*0.14, gr*0.18, 0, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Źrenice
      ctx.fillStyle = "#000"
      ctx.beginPath(); ctx.arc(gx - gr*0.28, gy - gr*0.15, gr*0.07, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(gx + gr*0.28, gy - gr*0.15, gr*0.07, 0, Math.PI*2); ctx.fill()
      ctx.restore()

    } else if (en.type === "worm") {
      // Robak — segmenty z głową i oczami
      const t = Date.now() * 0.004
      const seg = 4
      const segR = w / (seg * 2 + 1)
      ctx.save()
      // Segmenty ciała (od tyłu do przodu)
      for (let i = seg - 1; i >= 0; i--) {
        const sx = x + segR + i * (w - segR*2) / seg + Math.sin(t + i*1.2) * 3
        const sy = y + h/2 + Math.sin(t*1.5 + i) * 4
        const shade = Math.floor(80 + i * 20)
        ctx.fillStyle = `rgb(${shade+60},${shade+140},${shade})`
        ctx.shadowColor = "#44ff00"; ctx.shadowBlur = i===0 ? 10 : 4
        ctx.beginPath(); ctx.arc(sx, sy, segR * (i===0 ? 1.3 : 1.0), 0, Math.PI*2); ctx.fill()
        // Brzuszek
        ctx.fillStyle = `rgba(180,255,120,0.5)`
        ctx.beginPath(); ctx.ellipse(sx, sy + segR*0.3, segR*0.5, segR*0.35, 0, 0, Math.PI*2); ctx.fill()
      }
      ctx.shadowBlur = 0
      // Oczy na głowie (i===0)
      const hx = x + segR + Math.sin(t) * 3
      const hy = y + h/2 + Math.sin(t*1.5) * 4
      ctx.fillStyle = "#fff"
      ctx.beginPath(); ctx.arc(hx - segR*0.4, hy - segR*0.4, segR*0.3, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(hx + segR*0.4, hy - segR*0.4, segR*0.3, 0, Math.PI*2); ctx.fill()
      ctx.fillStyle = "#000"
      ctx.beginPath(); ctx.arc(hx - segR*0.38, hy - segR*0.42, segR*0.15, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(hx + segR*0.42, hy - segR*0.42, segR*0.15, 0, Math.PI*2); ctx.fill()
      // Czułki
      ctx.strokeStyle = "#44cc00"; ctx.lineWidth = 2
      ctx.beginPath(); ctx.moveTo(hx - segR*0.3, hy - segR); ctx.lineTo(hx - segR*0.5, hy - segR*1.8); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(hx + segR*0.3, hy - segR); ctx.lineTo(hx + segR*0.5, hy - segR*1.8); ctx.stroke()
      ctx.restore()

    } else if (en.type === "enemy1") {
      let s = w / 8
      let t = Date.now() * 0.005
      let waveX = Math.sin(t + en.x * 0.05) * 2
      let waveY = Math.cos(t * 1.5) * 2
      let bx = x + waveX
      let by = y + waveY

      ctx.fillStyle = "#6a35d4"
      ctx.fillRect(bx + 1*s, by + 2*s, 6*s, 4*s)
      ctx.fillStyle = "#8a5cff"
      ctx.fillRect(bx + 2*s, by + 1*s, 4*s, 2*s)
      ctx.fillStyle = "white"
      ctx.fillRect(bx + 2*s + waveX*0.3, by + 2*s, s, s)
      ctx.fillRect(bx + 5*s + waveX*0.3, by + 2*s, s, s)
      ctx.fillStyle = "#6ecbff"
      ctx.fillRect(bx + 2*s + 0.25*s + waveX*0.5, by + 2*s + 0.25*s, 0.5*s, 0.5*s)
      ctx.fillRect(bx + 5*s + 0.25*s + waveX*0.5, by + 2*s + 0.25*s, 0.5*s, 0.5*s)
      ctx.fillStyle = "#00e5ff"
      ctx.fillRect(bx + 2*s, by + 6*s + Math.sin(t)*2, s, s)
      ctx.fillRect(bx + 5*s, by + 6*s - Math.sin(t)*2, s, s)
    } else if (en.type === "water") {
      let t = Date.now() * 0.003
      ctx.fillStyle = "#1e3a5f"
      ctx.fillRect(x, y, w, h)
      ctx.fillStyle = "#4fc3f7"
      for (let i = 0; i < w; i += 4) {
        let wave = Math.sin(t + i * 0.05) * 3
        ctx.fillRect(x + i, y + wave, 4, 3)
      }
      ctx.fillStyle = "#8fe9ff"
      for (let i = 0; i < w; i += 20) {
        let wave = Math.sin(t * 1.5 + i * 0.08) * 2
        ctx.fillRect(x + i, y + 6 + wave, 4, 1)
      }

    } else if (en.type === "fire") {
      // Ogień — animowane języki płomienia
      const t = Date.now() * 0.005
      const fx = x + w/2, fbase = y + h
      ctx.save()
      const flameCount = 3
      for (let f = 0; f < flameCount; f++) {
        const offset = (f - 1) * w * 0.28
        const flicker = Math.sin(t * 1.3 + f * 2.1) * 4
        const fh = h * (0.6 + Math.sin(t + f) * 0.2)
        // Zewnętrzny płomień (pomarańcz)
        const grad = ctx.createRadialGradient(fx + offset, fbase - fh*0.3, 2, fx + offset, fbase, fh*0.5)
        grad.addColorStop(0, "rgba(255,220,50,0.95)")
        grad.addColorStop(0.4, "rgba(255,100,0,0.85)")
        grad.addColorStop(1, "rgba(200,0,0,0)")
        ctx.fillStyle = grad
        ctx.beginPath()
        ctx.moveTo(fx + offset - w*0.18, fbase)
        ctx.quadraticCurveTo(fx + offset - w*0.12 + flicker, fbase - fh*0.5, fx + offset, fbase - fh)
        ctx.quadraticCurveTo(fx + offset + w*0.12 - flicker, fbase - fh*0.5, fx + offset + w*0.18, fbase)
        ctx.closePath()
        ctx.fill()
      }
      // Rdzeń (żółty)
      const core = ctx.createRadialGradient(fx, fbase - h*0.25, 1, fx, fbase - h*0.2, w*0.2)
      core.addColorStop(0, "rgba(255,255,180,1)")
      core.addColorStop(1, "rgba(255,200,0,0)")
      ctx.fillStyle = core
      ctx.beginPath(); ctx.arc(fx, fbase - h*0.22, w*0.2, 0, Math.PI*2); ctx.fill()
      ctx.restore()

    } else if (en.type === "spikes") {
      // Kolce — ostre metaliczne trójkąty z połyskiem
      const spikeCount = 4
      const sw = w / spikeCount
      const base = y + h
      ctx.save()
      for (let i = 0; i < spikeCount; i++) {
        const sx = x + i * sw
        const tip = y + 4
        // Gradient — ciemny metal z blaskiem
        const sGrad = ctx.createLinearGradient(sx, base, sx + sw/2, tip)
        sGrad.addColorStop(0, "#2a2a3a")
        sGrad.addColorStop(0.5, "#8899bb")
        sGrad.addColorStop(1, "#ddeeff")
        ctx.fillStyle = sGrad
        ctx.beginPath()
        ctx.moveTo(sx + 1, base)
        ctx.lineTo(sx + sw/2, tip)
        ctx.lineTo(sx + sw - 1, base)
        ctx.closePath()
        ctx.fill()
        // Połysk na lewej krawędzi
        ctx.strokeStyle = "rgba(200,230,255,0.7)"
        ctx.lineWidth = 1.5
        ctx.beginPath(); ctx.moveTo(sx + 2, base - 2); ctx.lineTo(sx + sw/2, tip + 1); ctx.stroke()
      }
      // Podstawa
      const baseGrad = ctx.createLinearGradient(x, base - 5, x, base)
      baseGrad.addColorStop(0, "#333344")
      baseGrad.addColorStop(1, "#111122")
      ctx.fillStyle = baseGrad
      ctx.fillRect(x, base - 5, w, 5)
      ctx.restore()

    } else if (en.type === "walker") {
      // Walker — robot z anteną i świecącymi oczami
      const t = Date.now() * 0.004
      const cx2 = x + w/2, cy2 = y + h/2
      const legBob = Math.sin(t * 2) * 4
      ctx.save()
      // Nogi
      ctx.strokeStyle = "#66aadd"; ctx.lineWidth = 3
      ctx.lineCap = "round"
      ctx.beginPath(); ctx.moveTo(cx2 - w*0.2, cy2 + h*0.2); ctx.lineTo(cx2 - w*0.25, cy2 + h*0.5 + legBob); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(cx2 + w*0.2, cy2 + h*0.2); ctx.lineTo(cx2 + w*0.25, cy2 + h*0.5 - legBob); ctx.stroke()
      // Stopy
      ctx.fillStyle = "#4488bb"
      ctx.fillRect(cx2 - w*0.38, cy2 + h*0.5 + legBob - 2, w*0.26, 5)
      ctx.fillRect(cx2 + w*0.12, cy2 + h*0.5 - legBob - 2, w*0.26, 5)
      // Tułów
      const bodyGrad = ctx.createLinearGradient(cx2 - w*0.35, cy2 - h*0.25, cx2 + w*0.35, cy2 + h*0.25)
      bodyGrad.addColorStop(0, "#5599ee")
      bodyGrad.addColorStop(1, "#224488")
      ctx.fillStyle = bodyGrad
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.35, cy2 - h*0.28, w*0.7, h*0.55, 5); ctx.fill()
      ctx.strokeStyle = "#88ccff"; ctx.lineWidth = 1
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.35, cy2 - h*0.28, w*0.7, h*0.55, 5); ctx.stroke()
      // Głowa
      ctx.fillStyle = "#4477cc"
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.28, cy2 - h*0.52, w*0.56, h*0.28, 4); ctx.fill()
      // Antena
      ctx.strokeStyle = "#88ccff"; ctx.lineWidth = 2
      ctx.beginPath(); ctx.moveTo(cx2, cy2 - h*0.52); ctx.lineTo(cx2, cy2 - h*0.75); ctx.stroke()
      ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 8
      ctx.fillStyle = "#00ffee"
      ctx.beginPath(); ctx.arc(cx2, cy2 - h*0.78, 3.5, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Oczy świecące
      ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 10
      ctx.fillStyle = "#00ffff"
      ctx.beginPath(); ctx.arc(cx2 - w*0.12, cy2 - h*0.4, 4, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.12, cy2 - h*0.4, 4, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      ctx.restore()
    } else if (en.type === "walker2") {
      // Fioletowy stworek — wiernie jak w Mini Przygoda Eda
      const t = Date.now() * 0.01
      const cx2 = x + w/2
      const legAnim = Math.sin(t) * 8
      ctx.save()
      // Tułów prostokątny
      ctx.fillStyle = "#aa3399"
      ctx.fillRect(x, y + h*0.45, w, h*0.55)
      // Głowa — półkole na górze tułowia
      ctx.fillStyle = "#cc55bb"
      ctx.beginPath()
      ctx.arc(cx2, y + h*0.45, w*0.5, Math.PI, 0)
      ctx.fill()
      // Oczy żółte
      ctx.fillStyle = "#ffff00"
      ctx.beginPath(); ctx.arc(cx2 - w*0.18, y + h*0.32, 5.5, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.18, y + h*0.32, 5.5, 0, Math.PI*2); ctx.fill()
      // Źrenice
      ctx.fillStyle = "#000"
      ctx.beginPath(); ctx.arc(cx2 - w*0.18, y + h*0.32, 2.5, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.18, y + h*0.32, 2.5, 0, Math.PI*2); ctx.fill()
      // Nogi — tupają na przemian
      ctx.strokeStyle = "#882277"; ctx.lineWidth = 6; ctx.lineCap = "round"
      ctx.beginPath(); ctx.moveTo(cx2 - w*0.22, y + h); ctx.lineTo(cx2 - w*0.22 + legAnim, y + h + 10); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(cx2 + w*0.22, y + h); ctx.lineTo(cx2 + w*0.22 - legAnim, y + h + 10); ctx.stroke()
      ctx.restore()

    } else if (en.type === "walker3") {
      // Pancerny robot — stalowy z czerwonymi oczami i anteną
      const t = Date.now() * 0.003
      const cx2 = x + w/2, cy2 = y + h/2
      const legAnim = Math.sin(Date.now() * 0.009) * 6
      ctx.save()
      // Nogi
      ctx.strokeStyle = "#445566"; ctx.lineWidth = 5; ctx.lineCap = "round"
      ctx.beginPath(); ctx.moveTo(cx2 - w*0.22, cy2 + h*0.38); ctx.lineTo(cx2 - w*0.28 + legAnim, cy2 + h*0.58); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(cx2 + w*0.22, cy2 + h*0.38); ctx.lineTo(cx2 + w*0.28 - legAnim, cy2 + h*0.58); ctx.stroke()
      // Stopy
      ctx.fillStyle = "#334455"
      ctx.fillRect(cx2 - w*0.42 + legAnim, cy2 + h*0.55, w*0.28, 6)
      ctx.fillRect(cx2 + w*0.14 - legAnim, cy2 + h*0.55, w*0.28, 6)
      // Tułów pancerny
      const bGrad = ctx.createLinearGradient(cx2 - w*0.4, cy2, cx2 + w*0.4, cy2)
      bGrad.addColorStop(0, "#334455")
      bGrad.addColorStop(0.5, "#5577aa")
      bGrad.addColorStop(1, "#334455")
      ctx.fillStyle = bGrad
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.42, cy2 - h*0.12, w*0.84, h*0.52, 4); ctx.fill()
      ctx.strokeStyle = "#7799cc"; ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.42, cy2 - h*0.12, w*0.84, h*0.52, 4); ctx.stroke()
      // Głowa
      const hGrad = ctx.createLinearGradient(cx2 - w*0.32, cy2 - h*0.5, cx2 + w*0.32, cy2 - h*0.1)
      hGrad.addColorStop(0, "#445566")
      hGrad.addColorStop(1, "#223344")
      ctx.fillStyle = hGrad
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.32, cy2 - h*0.52, w*0.64, h*0.42, 5); ctx.fill()
      ctx.strokeStyle = "#6688aa"; ctx.lineWidth = 1
      ctx.beginPath(); ctx.roundRect(cx2 - w*0.32, cy2 - h*0.52, w*0.64, h*0.42, 5); ctx.stroke()
      // Oczy czerwone świecące
      ctx.shadowColor = "#ff2200"; ctx.shadowBlur = 10
      ctx.fillStyle = "#ff3300"
      ctx.beginPath(); ctx.arc(cx2 - w*0.14, cy2 - h*0.34, 5, 0, Math.PI*2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx2 + w*0.14, cy2 - h*0.34, 5, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      // Antena
      ctx.strokeStyle = "#7799cc"; ctx.lineWidth = 2
      ctx.beginPath(); ctx.moveTo(cx2, cy2 - h*0.52); ctx.lineTo(cx2 + w*0.1, cy2 - h*0.72); ctx.stroke()
      ctx.fillStyle = "#ff4400"
      ctx.shadowColor = "#ff4400"; ctx.shadowBlur = 6
      ctx.beginPath(); ctx.arc(cx2 + w*0.1, cy2 - h*0.74, 3, 0, Math.PI*2); ctx.fill()
      ctx.shadowBlur = 0
      ctx.restore()

    } else if (en.type === "walker4") {
      // UFO — latający spodek z wiązką i migającymi światłami
      const t = Date.now() * 0.003
      const cx2 = x + w/2
      const hover = Math.sin(t * 1.5) * 5  // unoszenie w górę i dół
      const cy2 = y + h/2 + hover
      ctx.save()

      // Wiązka traktora (trójkąt w dół)
      const beamAlpha = 0.15 + Math.sin(t * 3) * 0.1
      const beamGrad = ctx.createLinearGradient(cx2, cy2 + h*0.18, cx2, cy2 + h*0.9)
      beamGrad.addColorStop(0, `rgba(100,255,100,${beamAlpha + 0.2})`)
      beamGrad.addColorStop(1, `rgba(100,255,100,0)`)
      ctx.fillStyle = beamGrad
      ctx.beginPath()
      ctx.moveTo(cx2 - w*0.22, cy2 + h*0.18)
      ctx.lineTo(cx2 - w*0.5, cy2 + h*0.9)
      ctx.lineTo(cx2 + w*0.5, cy2 + h*0.9)
      ctx.lineTo(cx2 + w*0.22, cy2 + h*0.18)
      ctx.closePath()
      ctx.fill()

      // Dolna kopuła — metaliczny spodek
      const diskGrad = ctx.createLinearGradient(cx2 - w*0.5, cy2, cx2 + w*0.5, cy2 + h*0.25)
      diskGrad.addColorStop(0, "#888899")
      diskGrad.addColorStop(0.4, "#ccccdd")
      diskGrad.addColorStop(1, "#556677")
      ctx.fillStyle = diskGrad
      ctx.beginPath()
      ctx.ellipse(cx2, cy2 + h*0.12, w*0.5, h*0.18, 0, 0, Math.PI*2)
      ctx.fill()
      // Obwódka spodka
      ctx.strokeStyle = "#aabbcc"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.ellipse(cx2, cy2 + h*0.12, w*0.5, h*0.18, 0, 0, Math.PI*2)
      ctx.stroke()

      // Górna kopuła — szklana
      const domeGrad = ctx.createRadialGradient(cx2 - w*0.1, cy2 - h*0.15, 2, cx2, cy2, w*0.32)
      domeGrad.addColorStop(0, "rgba(180,255,180,0.9)")
      domeGrad.addColorStop(0.5, "rgba(80,200,120,0.7)")
      domeGrad.addColorStop(1, "rgba(20,100,60,0.5)")
      ctx.fillStyle = domeGrad
      ctx.beginPath()
      ctx.ellipse(cx2, cy2, w*0.3, h*0.28, 0, Math.PI, 0)
      ctx.fill()
      // Obwódka kopuły
      ctx.strokeStyle = "rgba(150,255,180,0.8)"
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.ellipse(cx2, cy2, w*0.3, h*0.28, 0, Math.PI, 0)
      ctx.stroke()

      // Migające światła na spodku
      const lights = [-0.35, -0.18, 0, 0.18, 0.35]
      lights.forEach((offset, i) => {
        const phase = (t * 4 + i * 1.2) % (Math.PI * 2)
        const on = Math.sin(phase) > 0
        ctx.shadowColor = on ? "#ffff00" : "transparent"
        ctx.shadowBlur = on ? 8 : 0
        ctx.fillStyle = on ? "#ffee00" : "#555544"
        ctx.beginPath()
        ctx.arc(cx2 + w * offset, cy2 + h*0.22, 3.5, 0, Math.PI*2)
        ctx.fill()
      })
      ctx.shadowBlur = 0

      // Połysk na kopule
      ctx.fillStyle = "rgba(255,255,255,0.25)"
      ctx.beginPath()
      ctx.ellipse(cx2 - w*0.1, cy2 - h*0.1, w*0.1, h*0.08, -0.4, 0, Math.PI*2)
      ctx.fill()

      ctx.restore()
    } else {
      ctx.fillStyle = "#7b3fe4"
      ctx.fillRect(x, y, w, h)
    }

    if (en === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.strokeRect(x, y, w, h)
    }
  }

  for (let b of bonuses) {
    ctx.save()
    ctx.translate(b.x, b.y)
    let scale = b.scale || 1
    ctx.scale(scale, scale)
    ctx.font = "22px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    let icon = "💎"
    if (b.type === "key_win") icon = "🏁"
    if (b.type === "key_level") icon = "🔑"
    ctx.fillText(icon, 0, 0)
    ctx.restore()
  }

  // === DYM SAMOCHODU (w układzie świata) ===
  if (trybGry && exhaustParticles.length > 0) {
    for (let p of exhaustParticles) {
      ctx.save()
      ctx.globalAlpha = p.life * 0.55
      ctx.fillStyle = `rgb(${p.gray},${p.gray},${p.gray})`
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    }
  }

  ctx.restore()

  // efekt trafienia
  if (hitEffect) {
    hitEffect.time--
    if (Math.floor(hitEffect.time / 5) % 2 === 0) {
      ctx.font = "50px Arial"
      ctx.textAlign = "center"
      ctx.textBaseline = "middle"
      ctx.fillText("💀", hitEffect.x - cameraX, hitEffect.y)
    }
    if (hitEffect.time <= 0) hitEffect = null
  }

  for (let t of texts) {
    const screenX = t.x - cameraX

    ctx.save()
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.font = t.size + "px " + (t.font || "Arial")

    if (t.neon === true) {
      ctx.shadowColor = t.neonColor || "#00ffff"
      ctx.shadowBlur = 15
      ctx.fillStyle = t.neonColor || "#00ffff"
      ctx.fillText(t.text, screenX, t.y)
      ctx.shadowBlur = 30
      ctx.fillText(t.text, screenX, t.y)
      ctx.shadowBlur = 50
      ctx.fillText(t.text, screenX, t.y)
    }

    ctx.shadowBlur = 0
    ctx.fillStyle = t.color || "white"
    ctx.fillText(t.text, screenX, t.y)

    if (t.outline === true) {
      ctx.strokeStyle = t.outlineColor || "#ffffff"
      ctx.lineWidth = t.outlineWidth || 4
      ctx.lineJoin = "round"
      ctx.strokeText(t.text, screenX, t.y)
    }

    if (t === selectedObject) {
      ctx.strokeStyle = "red"
      ctx.lineWidth = 3
      ctx.setLineDash([4, 4])
      ctx.strokeRect(screenX - 60, t.y - 35, 120, 70)
      ctx.setLineDash([])
    }

    ctx.restore()
  }

  // HUD
  ctx.fillStyle = "white"
  ctx.font = "20px Arial"
  ctx.textAlign = "left"
  ctx.fillText("❤️ ".repeat(Math.max(0, counters.lives)), 20, 30)
  ctx.textAlign = "center"
  ctx.fillText("⭐ " + counters.points, canvas.width / 2, 30)
  ctx.textAlign = "right"
  ctx.fillText("⏱ " + Math.ceil(counters.time), canvas.width - 20, 30)

  if (warningText) {
    warningText.time--
    if (warningText.time <= 0) warningText = null

    const alpha = Math.sin(Date.now() * 0.008) * 0.3 + 0.7
    ctx.save()
    ctx.globalAlpha = alpha
    ctx.shadowColor = "#ff0000"
    ctx.shadowBlur = 30
    ctx.font = "bold 58px Arial"
    ctx.textAlign = "center"
    ctx.fillStyle = "#ff2222"
    ctx.fillText("WRACAJ SZYBKO!", canvas.width/2, canvas.height/2 - 40)
    ctx.font = "bold 26px Arial"
    ctx.fillStyle = "#ff8888"
    ctx.fillText("Spadniesz za chwilę!", canvas.width/2, canvas.height/2 + 30)
    ctx.restore()
  }

  // podłoga
  ctx.fillStyle = "#444"
  ctx.fillRect(0, 450, 800, 50)
}

// ================= ZAPIS / WCZYTANIE =================
let folderHandle = null
let projectName = "projekt"
let loadedFromFile = false

async function zapiszProjekt(){
  // Zsynchronizuj dane bieżącego poziomu przed zapisem
  const lvl = getLevel()
  if (lvl) {
    lvl.players = players
    lvl.platforms = platforms
    lvl.blocks = blocks
    lvl.enemies = enemies
    lvl.bonuses = bonuses
    lvl.texts = texts
  }

  const data = {
    levels: levels,
    settings: {
      nazwaGry,
      autorGry,
      opisGry,
      sterowanie,
      counters,
      startTime,
      useTimer,
      backgroundType,
      playerStartX,
      playerStartY,
      respawnMode,
      autoScroll,
      autoScrollSpeed,
      worldWidth
    },
    stats: gameData.stats || {}
  }

  try {
    if (!fileHandle) {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: (nazwaGry || "projekt") + ".json",
        types: [{
          description: "JSON",
          accept: { "application/json": [".json"] }
        }]
      })
    }

    const writable = await fileHandle.createWritable()
    await writable.write(JSON.stringify(data, null, 2))
    await writable.close()
    alert("Gra zapisana ✔️")
  } catch (err) {
    if (err.name !== "AbortError") {
      console.error(err)
      alert("Błąd zapisu: " + err.message)
    }
  }
}

function checkEnemyCollision() {
  if (gameOver || players.length === 0) return
  if (invulnerable > 0) {
    invulnerable--
    return
  }

  const player = players[0]

  for (let enemy of enemies) {
    let ex = enemy.x, ey = enemy.y
    let ew = enemy.w || 40, eh = enemy.h || 40

    const margin = 0
    if (
      ex + ew < cameraX - margin ||
      ex > cameraX + canvas.width + margin
    ) continue

    let px = player.x - player.r, py = player.y - player.r
    let pw = player.r * 2, ph = player.r * 2

    if (px < ex + ew && px + pw > ex && py < ey + eh && py + ph > ey) {
      deathRespawnX = player.x
      deathRespawnY = player.y

      if (useLives) counters.lives--

      hitEffect = { x: player.x, y: player.y, time: 60 }

      if (useLives && counters.lives <= 0 && !gameOverTriggered) {
        gameOverTriggered = true
        gameOver = true
        updateStats(false)
        gameState = "results"
        initResultsScene()
        return
      }

      hitPause = hitPauseTime
      pendingRespawn = true
      invulnerable = invulnerabilityTime
      return
    }
  }
}

function initResultsScene(){
  resultsEnemies = []
  for (let i = 0; i < 6; i++) {
    resultsEnemies.push({
      angle: i * (Math.PI * 2 / 6),
      dist: 120,
      speed: 0.02 + Math.random() * 0.02
    })
  }
}

function drawResults(){
  ctx.fillStyle = "black"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  ctx.fillStyle = "red"
  ctx.beginPath()
  ctx.arc(resultsBall.x, resultsBall.y, resultsBall.r, 0, Math.PI*2)
  ctx.fill()

  let count = resultsEnemies.length

  for (let i = 0; i < count; i++) {
    let en = resultsEnemies[i]
    let slowAngle = en.angle * 0.25
    let baseAngle = (i / count) * Math.PI * 2
    let finalAngle = slowAngle + baseAngle
    let x = resultsBall.x + Math.cos(finalAngle) * en.dist
    let y = resultsBall.y + Math.sin(finalAngle) * en.dist

    ctx.font = "32px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.fillText("👻", x, y)
  }

  ctx.fillStyle = "white"
  ctx.textAlign = "center"
  ctx.font = "40px Arial"
  let isWin = (gameState === "win")
  ctx.fillStyle = isWin ? "#00ff88" : "white"
  ctx.fillText(isWin ? "GRATULACJE!!!" : "KONIEC GRY", canvas.width/2, 80)
  ctx.font = "22px Arial"
  ctx.fillStyle = "white"
  ctx.fillText("Punkty: " + counters.points, canvas.width/2, 300)
  ctx.fillText("Życia: " + counters.lives, canvas.width/2, 330)
  ctx.fillText("Czas: " + Math.ceil(counters.time), canvas.width/2, 360)
  ctx.fillText("Kliknij aby zrestartować", canvas.width/2, 420)

  ctx.fillStyle = "#333"
  ctx.fillRect(250, 300, 140, 50)
  ctx.fillRect(410, 300, 140, 50)

  ctx.fillStyle = "white"
  ctx.font = "16px Arial"
  ctx.textAlign = "center"
  ctx.fillText("WRÓĆ", 320, 330)
  ctx.fillText("WYJDŹ", 480, 330)
}

function wczytajProjekt(){
  const input = document.createElement("input")
  input.type = "file"

  input.onchange = e => {
    const file = e.target.files[0]
    if (!file) return

    projectName = file.name.replace(".json", "")
    loadedFromFile = true

    const reader = new FileReader()

    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result)

        gameData = data || {}
        gameData.stats = gameData.stats || {}

        levels = gameData.levels || []
        if (levels.length === 0) {
          levels.push({
            players: [], platforms: [], blocks: [], enemies: [], bonuses: [], texts: [],
            backgroundType: "none",
            playerStartX: 100,
            playerStartY: 100
          })
        }

        currentLevel = 0
        syncLevelData()
        bonuses = levels[0]?.bonuses || []
        renderLevelsBar()

        const lvl = getLevel()
        playerStartX = lvl.playerStartX ?? 100
        playerStartY = lvl.playerStartY ?? 100

        let s = gameData.settings || {}

        nazwaGry   = s.nazwaGry   || "Moja gra"
        autorGry   = s.autorGry   || projectName
        opisGry    = s.opisGry    || "gra sobie od Groka"

        backgroundType = s.backgroundType || "none"

        respawnMode     = s.respawnMode     || "death"
        autoScroll      = !!s.autoScroll
        autoScrollSpeed = Number(s.autoScrollSpeed) || 2
        worldWidth      = Number(s.worldWidth) || 6000

        scrollX.max = worldWidth - canvas.width

        sterowanie = s.sterowanie || {lewo: null, prawo: null, skok: null}

        counters = {
          lives: s.counters?.lives ?? 3,
          points: s.counters?.points ?? 0,
          time: s.counters?.time ?? 60
        }

        startTime = s.startTime ?? counters.time
        useTimer  = !!s.useTimer

        showIntro = true
        lastTime = Date.now()
        selectedObject = null
        trybKopiowania = false

        updateButtonStates()
        initAfterLoad()

        console.log(`Wczytano grę: "${nazwaGry}" by ${autorGry}`)

      } catch (err) {
        alert("Błąd podczas wczytywania pliku JSON")
        console.error(err)
      }
    }

    reader.readAsText(file)
  }

  input.click()
}

      return res.json()
    })
    .then(data => {

      gameData.stats = gameData.stats || {}

      if (levels.length === 0) {
        levels.push({ players: [], platforms: [], blocks: [], enemies: [], bonuses: [], texts: [], backgroundType: "none", playerStartX: 100, playerStartY: 100 })

      opisGry    = s.opisGry    || ""

        points: s.counters?.points ?? 0,
        time: s.counters?.time ?? 60
      }
      startTime = s.startTime ?? counters.time
      useTimer  = !!s.useTimer

      respawnMode     = s.respawnMode     || "death"
      autoScroll      = !!s.autoScroll
      autoScrollSpeed = Number(s.autoScrollSpeed) || 2
      worldWidth      = Number(s.worldWidth) || 2000
      scrollX.max = worldWidth - canvas.width

  if (!gameData.stats[today]) gameData.stats[today] = { wins: 0, losses: 0 }

  else gameData.stats[today].losses++
}

function drawBackground(){
  let bgType = getLevel()?.backgroundType || "none"

  if (bgType === "none") return

  if (bgType === "forest"){
    drawForest()
    return
  }

  if (bgType === "snow"){
    ctx.fillStyle = "#0f1a2b"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.fillStyle = "#ffffff"
    for (let i = 0; i < 120; i++){
      let x = (i * 97 - cameraX * 0.1) % 2000
      let y = (i * 53 + Date.now() * 0.2) % canvas.height
      ctx.beginPath()
      ctx.arc(x, y, 2, 0, Math.PI * 2)
      ctx.fill()
    }
  }

  if (bgType === "space") {
    drawNewStars()

    for (let i = 0; i < 18; i++) {
      let x = (i * 220 - cameraX * 0.15) % (canvas.width + 300)
      let h = 95 + (i * 53 % 95)
      ctx.fillStyle = "#1e2f52"
      ctx.beginPath()
      ctx.moveTo(x - 20, canvas.height)
      ctx.lineTo(x + 80, canvas.height - h)
      ctx.lineTo(x + 190, canvas.height)
      ctx.fill()
      ctx.beginPath()
      ctx.moveTo(x + 70, canvas.height)
      ctx.lineTo(x + 130, canvas.height - h * 0.65)
      ctx.lineTo(x + 220, canvas.height)
      ctx.fill()
    }

    for (let i = 0; i < 16; i++) {
      let x = (i * 260 - cameraX * 0.3) % (canvas.width + 350)
      let h = 140 + (i * 67 % 140)
      ctx.fillStyle = "#16243f"
      ctx.beginPath()
      ctx.moveTo(x, canvas.height)
      ctx.lineTo(x + 95, canvas.height - h)
      ctx.lineTo(x + 240, canvas.height)
      ctx.fill()
      ctx.beginPath()
      ctx.moveTo(x + 110, canvas.height)
      ctx.lineTo(x + 175, canvas.height - h * 0.7)
      ctx.lineTo(x + 260, canvas.height)
      ctx.fill()
    }

    for (let i = 0; i < 12; i++) {
      let x = (i * 320 - cameraX * 0.5) % (canvas.width + 400)
      let h = 175 + (i * 81 % 160)
      ctx.fillStyle = "#0f1a2e"
      ctx.beginPath()
      ctx.moveTo(x - 30, canvas.height)
      ctx.lineTo(x + 110, canvas.height - h)
      ctx.lineTo(x + 280, canvas.height)
      ctx.fill()
      ctx.beginPath()
      ctx.moveTo(x + 130, canvas.height)
      ctx.lineTo(x + 215, canvas.height - h * 0.75)
      ctx.lineTo(x + 310, canvas.height)
      ctx.fill()
    }

    ctx.fillStyle = "#0a1324"
    for (let i = 0; i < 10; i++) {
      let x = (i * 380 - cameraX * 0.65) % (canvas.width + 450)
      let h = 80 + (i * 40 % 70)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height)
      ctx.lineTo(x + 140, canvas.height - h)
      ctx.lineTo(x + 320, canvas.height)
      ctx.fill()
    }
  }

  if (bgType === "rain"){
    ctx.fillStyle = "#0b0f1a"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.strokeStyle = "#88aaff"
    ctx.lineWidth = 1
    for (let i = 0; i < 120; i++){
      let x = (i * 97 - cameraX * 0.2) % 2000
      let y = (i * 53 + Date.now() * 0.5) % canvas.height
      ctx.beginPath()
      ctx.moveTo(x, y)
      ctx.lineTo(x + 3, y + 10)
      ctx.stroke()
    }
    if (Math.random() < 0.005){
      ctx.fillStyle = "rgba(255,255,255,0.2)"
      ctx.fillRect(0, 0, canvas.width, canvas.height)
    }
  }

  if (bgType === "west") {
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7)
    skyGrad.addColorStop(0, "#ff4d00")
    skyGrad.addColorStop(0.4, "#ff8c33")
    skyGrad.addColorStop(0.7, "#ffbb77")
    skyGrad.addColorStop(1, "#ffe0b3")
    ctx.fillStyle = skyGrad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    let purpleGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.35)
    purpleGrad.addColorStop(0, "rgba(120, 40, 140, 0.25)")
    purpleGrad.addColorStop(1, "rgba(120, 40, 140, 0)")
    ctx.fillStyle = purpleGrad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    let sunX = canvas.width - 140
    let sunY = 110
    ctx.fillStyle = "rgba(255, 220, 100, 0.35)"
    ctx.beginPath(); ctx.arc(sunX, sunY, 75, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = "rgba(255, 200, 80, 0.25)"
    ctx.beginPath(); ctx.arc(sunX, sunY, 110, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = "#ffdd77"
    ctx.beginPath(); ctx.arc(sunX, sunY, 48, 0, Math.PI * 2); ctx.fill()

    ctx.fillStyle = "#c46a2e"
    for (let i = 0; i < 8; i++) {
      let x = (i * 280 - cameraX * 0.1) % (canvas.width + 400) - 100
      let h = 95 + (i * 37 % 70)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height - 100)
      ctx.lineTo(x + 140, canvas.height - 100 - h)
      ctx.lineTo(x + 290, canvas.height - 100)
      ctx.fill()
    }

    ctx.fillStyle = "#a04d1f"
    for (let i = 0; i < 7; i++) {
      let x = (i * 340 - cameraX * 0.25) % (canvas.width + 500) - 80
      let h = 135 + (i * 51 % 110)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height - 100)
      ctx.lineTo(x + 160, canvas.height - 100 - h)
      ctx.lineTo(x + 340, canvas.height - 100)
      ctx.fill()
    }

    let groundGrad = ctx.createLinearGradient(0, canvas.height - 130, 0, canvas.height)
    groundGrad.addColorStop(0, "#e8b57c")
    groundGrad.addColorStop(1, "#c17f3f")
    ctx.fillStyle = groundGrad
    ctx.fillRect(0, canvas.height - 130, canvas.width, 130)
    ctx.fillStyle = "#9f5f2a"
    ctx.fillRect(0, canvas.height - 55, canvas.width, 55)

    ctx.fillStyle = "#2a8c4a"
    for (let i = 0; i < 12; i++) {
      let x = (i * 190 - cameraX * 0.7) % (canvas.width + 300) - 30
      let baseY = canvas.height - 95
      ctx.fillRect(x + 8, baseY - 65, 18, 70)
      ctx.fillRect(x - 6, baseY - 48, 16, 22)
      ctx.fillRect(x + 24, baseY - 38, 14, 18)
    }

    ctx.fillStyle = "#b36d38"
    for (let i = 0; i < 15; i++) {
      let x = (i * 85 - cameraX * 0.85) % (canvas.width + 150)
      let size = 18 + (i % 5) * 7
      ctx.beginPath()
      ctx.ellipse(x, canvas.height - 48, size, size * 0.45, 0, 0, Math.PI * 2)
      ctx.fill()
    }
  }

  if (bgType === "city"){
    drawNewStars()

    for (let i = 0; i < 20; i++){
      let x = (i * 160 - cameraX * 0.3) % (canvas.width + 200)
      let h = 120 + (i*37 % 200)
      let w = 100

      ctx.fillStyle = "#1e2a3a"
      ctx.fillRect(x, canvas.height - h, w, h)

      for (let wy = 0; wy < h; wy += 30){
        for (let wx = 0; wx < w; wx += 25){
          if ((wx + wy + i) % 3 !== 0) continue
          ctx.fillStyle = ((wx + wy + i) % 5 === 0) ? "#333" : "#ffd966"
          ctx.fillRect(x + wx + 5, canvas.height - h + wy + 5, 8, 12)
        }
      }
    }
  }

  if (bgType === "stars" || bgType === "neon") {
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
    grad.addColorStop(0, "#0a001f")
    grad.addColorStop(1, "#1a0033")
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    if (!window.bgParticles) {
      window.bgParticles = []
      for (let i = 0; i < 90; i++) {
        window.bgParticles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2.2 + 0.7,
          speed: Math.random() * 0.3 + 0.1
        })
      }
    }

    ctx.fillStyle = "#ffffff"
    window.bgParticles.forEach(p => {
      p.y += p.speed
      if (p.y > canvas.height) p.y = -5
      ctx.globalAlpha = 0.6 + Math.sin(Date.now()/500 + p.x) * 0.3
      ctx.fillRect(p.x, p.y, p.size, p.size)
    })
    ctx.globalAlpha = 1
  }
}

function drawForest() {
  ctx.fillStyle = "#0b1a2f"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  drawNewStars()
  drawRealFog()

  for (let i = 0; i < 40; i++) {
    if (i % 3 === 0) continue
    let x = (i * 90 - cameraX * 0.2) % (canvas.width + 200)
    let h = 80 + (i * 37 % 60)
    let w = 40 + (i * 23 % 30)
    ctx.fillStyle = "#0a1f16"
    ctx.beginPath()
    ctx.moveTo(x, canvas.height)
    ctx.lineTo(x + w/2, canvas.height - h)
    ctx.lineTo(x + w, canvas.height)
    ctx.fill()
  }

  for (let i = 0; i < 30; i++) {
    if (i % 3 === 0) continue
    let x = (i * 120 - cameraX * 0.4) % (canvas.width + 200)
    let h = 120 + (i * 47 % 100)
    let w = 50 + (i * 31 % 40)
    ctx.fillStyle = "#123524"
    ctx.fillRect(x + w/2 - 3, canvas.height - h, 6, h)
    ctx.beginPath()
    ctx.moveTo(x, canvas.height - h + 30)
    ctx.lineTo(x + w/2, canvas.height - h - 40)
    ctx.lineTo(x + w, canvas.height - h + 30)
    ctx.fill()
  }

  for (let i = 0; i < 20; i++) {
    if (i % 3 !== 0) continue
    let x = (i * 160 - cameraX * 0.7) % (canvas.width + 200)
    let h = 160 + (i * 63 % 120)
    let w = 60 + (i * 27 % 40)
    ctx.fillStyle = "#1f5f2e"
    ctx.fillRect(x + w/2 - 4, canvas.height - h, 8, h)
    ctx.beginPath()
    ctx.moveTo(x, canvas.height - h + 60)
    ctx.lineTo(x + w/2, canvas.height - h - 60)
    ctx.lineTo(x + w, canvas.height - h + 60)
    ctx.fill()
    ctx.beginPath()
    ctx.moveTo(x + 10, canvas.height - h + 90)
    ctx.lineTo(x + w/2, canvas.height - h - 20)
    ctx.lineTo(x + w - 10, canvas.height - h + 90)
    ctx.fill()
  }

  ctx.fillStyle = "#0a1a12"
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40)
}

function drawRealFog() {
  const w = canvas.width
  const h = canvas.height

  ctx.fillStyle = "rgba(20, 45, 55, 0.25)"
  ctx.fillRect(0, 0, w, h)

  const fogGradient = ctx.createLinearGradient(0, h * 0.4, 0, h)
  fogGradient.addColorStop(0, "rgba(25, 55, 65, 0.0)")
  fogGradient.addColorStop(0.4, "rgba(25, 55, 65, 0.35)")
  fogGradient.addColorStop(0.7, "rgba(18, 48, 55, 0.55)")
  fogGradient.addColorStop(1, "rgba(10, 35, 40, 0.65)")
  ctx.fillStyle = fogGradient
  ctx.fillRect(0, 0, w, h)

  ctx.globalAlpha = 0.25
  for (let i = 0; i < 5; i++) {
    const y = h * 0.45 + i * 45
    const alpha = 0.12 - i * 0.015
    ctx.fillStyle = `rgba(30, 70, 75, ${alpha})`
    ctx.fillRect(0, y, w, 90)
  }
  ctx.globalAlpha = 1.0

  ctx.fillStyle = "rgba(40, 80, 90, 0.08)"
  ctx.fillRect(0, 0, w, h * 0.35)
}

function setRespawnMode(mode, showAlert = true){

    alert("Tryb respawn: " + (mode === "death" ? "miejsce śmierci" : "punkt startowy"))
  }

  document.getElementById("respDeath")?.classList.toggle("active", mode === "death")
  document.getElementById("respStart")?.classList.toggle("active", mode === "start")
}

function updateRespawnLock(){
  const checkbox = document.getElementById("autoScrollToggle")
  const btnStart = document.getElementById("respStart")

  if (!checkbox || !btnStart) return

  if (checkbox.checked) {
    setRespawnMode("death", false)
    btnStart.disabled = true
    btnStart.style.opacity = 0.4
    btnStart.style.pointerEvents = "none"
  } else {
    btnStart.disabled = false
    btnStart.style.opacity = 1
    btnStart.style.pointerEvents = "auto"
  }
}

function drawMatrix(){
  matrixFrame++

  ctx.fillStyle = "rgba(0,0,0,0.2)"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  ctx.fillStyle = "#0f0"
  ctx.font = "22px monospace"

  for (let i = 0; i < matrixCols.length; i++) {
    let text
    if (matrixFrame % 4 === 0) {
      text = String.fromCharCode(48 + Math.floor(Math.random() * 10))
    } else {
      text = " "
    }

    let x = i * 14
    let y = matrixCols[i] * 14

    ctx.fillText(text, x, y)

    if (y > canvas.height && Math.random() > 0.975) matrixCols[i] = 0
    matrixCols[i] += 0.2
  }
}

function drawPlayer(ctx, x, y, r, time){
  let pulse = Math.sin(time * 0.005) * 2.5

  let grad = ctx.createRadialGradient(
    x - r*0.35, y - r*0.35, r*0.25,
    x, y, r + pulse
  )
  grad.addColorStop(0, "#ffeb3b")
  grad.addColorStop(1, "#ff5722")

  ctx.shadowColor = "#ff9800"
  ctx.shadowBlur = 25
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.arc(x, y, r + pulse, 0, Math.PI * 2)
  ctx.fill()
  ctx.shadowBlur = 0

  ctx.fillStyle = "#111"
  ctx.beginPath()
  ctx.arc(x - r*0.32, y - r*0.22, r*0.13, 0, Math.PI * 2)
  ctx.fill()
  ctx.beginPath()
  ctx.arc(x + r*0.32, y - r*0.22, r*0.13, 0, Math.PI * 2)
  ctx.fill()

  ctx.fillStyle = "white"
  ctx.beginPath()
  ctx.arc(x - r*0.35, y - r*0.27, r*0.04, 0, Math.PI * 2)
  ctx.fill()
  ctx.beginPath()
  ctx.arc(x + r*0.29, y - r*0.27, r*0.04, 0, Math.PI * 2)
  ctx.fill()

  ctx.strokeStyle = "#111"
  ctx.lineWidth = 2.5
  ctx.beginPath()
  ctx.arc(x, y + r*0.15, r*0.35, 0.2, Math.PI - 0.2)
  ctx.stroke()
}

function drawNewStars(){
  let grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
  grad.addColorStop(0, "#0a001f")
  grad.addColorStop(1, "#1a0033")
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  if (!window.bgParticles) {
    window.bgParticles = []
    for (let i = 0; i < 90; i++) {
      window.bgParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.2 + 0.7,
        speed: Math.random() * 0.9 + 0.4
      })
    }
  }

  ctx.fillStyle = "#99ffff"
  window.bgParticles.forEach(p => {
    p.y += p.speed
    if (p.y > canvas.height) p.y = -5
    ctx.globalAlpha = 0.75 + Math.sin(Date.now()/300 + p.x) * 0.25
    ctx.fillRect(p.x, p.y, p.size, p.size)
  })
  ctx.globalAlpha = 1
}

renderLevelsBar()

playerStartY = initLvl.playerStartY ?? 100

function loop(time){
  if (time - lastFrame < frameDelay) {
    requestAnimationFrame(loop)
    return
  }
  lastFrame = time
  update()
  draw()
  requestAnimationFrame(loop)
}

requestAnimationFrame(loop)
