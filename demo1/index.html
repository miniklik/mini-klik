<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1e293b">
<title>Gra Słówek</title>
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg-1:#3b4373;
  --bg-2:#2a3160;
  --shell-bg:#1a2040;
  --card-bg:#3d4578;
  --card-bg-2:#4a528a;
  --text:#f8fafc;
  --text-muted:#cbd5e1;
  --accent:#a78bfa;
  --accent-2:#c4b5fd;
  --accent-glow:rgba(167,139,250,.5);
  --success:#4ade80;
  --danger:#f87171;
  --warn:#fbbf24;
  --chip-border:#5b6499;
  --chip-on-bg:#5d4ea8;
  --chip-on-border:#c4b5fd;
  --shadow-sm:0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 14px rgba(0,0,0,.25);
  --shadow-lg:0 10px 40px rgba(0,0,0,.4);
  --app-w:420px;
  --app-h:820px;
}
[data-theme="dark"]{
  --bg-1:#2a3160;
  --bg-2:#1a2040;
  --shell-bg:#0f1428;
  --card-bg:#2a3160;
  --card-bg-2:#363d70;
  --text:#f1f5f9;
  --text-muted:#94a3b8;
  --accent:#a78bfa;
  --accent-2:#c4b5fd;
  --chip-border:#3b4775;
  --chip-on-bg:#4a3f8a;
  --chip-on-border:#a78bfa;
  --shadow-md:0 4px 14px rgba(0,0,0,.4);
  --shadow-lg:0 10px 40px rgba(0,0,0,.6);
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:var(--text)}
body{
  display:flex;align-items:center;justify-content:center;
  background:#1a2040;
  background:radial-gradient(ellipse at center, #2a3160 0%, #1a2040 60%, #0f1428 100%);
  position:relative;
}

/* === GWIAZDY W TLE === */
#starfield{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.star{
  position:absolute;
  background:#fff;
  border-radius:50%;
  opacity:0;
  animation:twinkle var(--dur,3s) ease-in-out var(--delay,0s) infinite;
  box-shadow:0 0 var(--glow,4px) #fff;
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(.6)}
  50%{opacity:var(--max-opacity,.9);transform:scale(1)}
}
/* Spadające gwiazdy (rzadko) */
.shooting-star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 6px #fff, 0 0 12px #a78bfa;
  opacity:0;
  animation:shoot var(--shoot-dur,3s) linear var(--shoot-delay,0s) infinite;
}
.shooting-star::after{
  content:"";
  position:absolute;
  top:50%;left:0;
  width:80px;height:1px;
  background:linear-gradient(to left, #fff, transparent);
  transform:translateY(-50%);
}
@keyframes shoot{
  0%{opacity:0;transform:translate(0,0)}
  5%{opacity:1}
  60%{opacity:1}
  70%{opacity:0;transform:translate(-220px,140px)}
  100%{opacity:0;transform:translate(-220px,140px)}
}

#shell{
  width:100%;max-width:var(--app-w);height:100vh;max-height:var(--app-h);
  margin:auto;overflow:hidden;position:relative;
  background:
    radial-gradient(ellipse at top, rgba(167,139,250,.25) 0%, transparent 55%),
    radial-gradient(ellipse at bottom right, rgba(244,114,182,.12) 0%, transparent 50%),
    linear-gradient(165deg, #3b4373 0%, #2a3160 50%, #1a2040 100%);
  border-radius:16px;
  box-shadow:0 0 60px rgba(167,139,250,.25), 0 0 120px rgba(0,0,0,.4);
  z-index:1;
  transition:background .3s ease;
}
[data-theme="dark"] #shell{
  background:
    radial-gradient(ellipse at top, rgba(167,139,250,.18) 0%, transparent 55%),
    radial-gradient(ellipse at bottom right, rgba(244,114,182,.08) 0%, transparent 50%),
    linear-gradient(165deg, #2a3160 0%, #1a2040 50%, #0f1428 100%);
  box-shadow:0 0 60px rgba(167,139,250,.18), 0 0 120px rgba(0,0,0,.6);
}

#categoryScreen,#menu,#resultsScreen,#hofScreen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px}
#categoryScreen{display:flex}

.card{
  background:var(--card-bg);
  padding:28px 24px;
  border-radius:22px;
  box-shadow:var(--shadow-lg);
  text-align:center;
  font-weight:900;
  max-width:340px;
  width:100%;
  animation:fadeUp .4s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

h1{margin:0 0 16px;font-size:26px;letter-spacing:-.5px}
.subtitle{margin:0 0 18px;font-size:14px;color:var(--text-muted);font-weight:600}

.menuBtns{display:flex;flex-direction:column;gap:10px;margin-top:14px}

.btnFlat{
  width:100%;
  padding:13px 18px;
  border-radius:14px;
  border:none;
  background:var(--card-bg);
  color:var(--text);
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.08),var(--shadow-sm);
  transition:transform .16s ease, background .16s ease, box-shadow .16s ease;
  font-family:inherit;
}
[data-theme="dark"] .btnFlat{box-shadow:inset 0 0 0 1px rgba(255,255,255,.1),var(--shadow-sm)}
.btnFlat:hover{transform:translateY(-1px);box-shadow:inset 0 0 0 1px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.1)}
.btnFlat:active{transform:translateY(0)}
.btnFlat.small{font-size:14px;padding:11px 16px}
.btnFlat.danger{color:var(--danger)}
.btnFlat.primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}

.copyTip{font-size:12px;color:var(--text-muted);margin-top:10px;font-weight:600;line-height:1.4}

#app{display:none;flex-direction:column;height:100%}

header{
  padding:12px 12px 8px;
  margin-top:env(safe-area-inset-top);
  display:flex;flex-direction:column;gap:8px;
}
#topBar{display:flex;justify-content:space-between;align-items:center;padding:0 4px;font-weight:900;font-size:14px}
#scoreBox{display:flex;gap:14px;align-items:center}
#scoreBox .stat{display:flex;flex-direction:column;align-items:center;line-height:1}
#scoreBox .stat .label{font-size:10px;color:var(--text-muted);font-weight:700;letter-spacing:.5px}
#scoreBox .stat .val{font-size:18px;color:var(--accent)}

#words{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:10px 12px;background:var(--card-bg);border-radius:14px;box-shadow:var(--shadow-md)}
.word{
  padding:6px 12px;
  border-radius:999px;
  border:2px solid var(--chip-border);
  background:var(--card-bg);
  font-weight:900;
  font-size:15px;
  cursor:pointer;
  transition:all .2s ease;
}
.word.off{opacity:.35;text-decoration:line-through}
.word.on{background:var(--chip-on-bg);border-color:var(--chip-on-border)}
.word.found{background:rgba(34,197,94,.3);border-color:var(--success);animation:foundPop .5s ease-out}
@keyframes foundPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

#board{
  flex:1;
  display:grid;
  gap:7px;
  padding:18px 12px;
  touch-action:none;
  position:relative;
}
.cell{
  background:linear-gradient(145deg, var(--card-bg-2), var(--card-bg));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:23px;
  font-weight:900;
  user-select:none;
  position:relative;
  color:var(--text);
  transition:transform .9s ease-in-out, background .4s, box-shadow .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), var(--shadow-sm);
  border:1px solid rgba(255,255,255,.04);
}
.cell.sel{
  background:linear-gradient(145deg, #4c3a8c, #2d2761);
  box-shadow:0 0 0 2px var(--accent), 0 0 16px var(--accent-glow);
  transform:scale(1.05);
  z-index:2;
  color:#fff;
}
.cell.hit{background:linear-gradient(145deg, #16a34a, #15803d);color:#fff}
.cell.hint{animation:hintPulse 1.6s ease-in-out infinite}
@keyframes hintPulse{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.06), var(--shadow-sm)}50%{box-shadow:0 0 0 3px var(--warn), 0 0 20px rgba(245,158,11,.7)}}

footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
  gap:8px;
}
#timer{
  width:60px;height:60px;border-radius:50%;
  background:conic-gradient(var(--accent) var(--p),rgba(0,0,0,.15) 0);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .3s;
}
#timer.warn{background:conic-gradient(var(--danger) var(--p),rgba(0,0,0,.15) 0)}
#timer span{
  background:var(--card-bg);
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;
}

.btn{
  padding:10px 14px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;font-weight:900;cursor:pointer;
  font-family:inherit;font-size:14px;
  box-shadow:0 4px 12px rgba(37,99,235,.3);
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn:active{transform:translateY(2px);box-shadow:0 2px 6px rgba(37,99,235,.3)}
.btn.danger{background:var(--danger);box-shadow:0 4px 12px rgba(239,68,68,.3)}
.btn.warn{background:var(--warn);box-shadow:0 4px 12px rgba(245,158,11,.3)}

.iconBtn{
  width:42px;height:42px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;font-weight:900;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 10px rgba(37,99,235,.25);
  transition:transform .15s ease;
}
.iconBtn:active{transform:translateY(2px)}
.iconBtn.off{background:var(--text-muted);box-shadow:0 4px 10px rgba(107,114,128,.2)}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
#modal{
  background:var(--card-bg);
  padding:28px 24px;border-radius:22px;text-align:center;font-weight:900;
  max-width:320px;width:100%;
  animation:modalIn .35s ease-out;
}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

#modalScore{font-size:14px;color:var(--text-muted);margin-top:10px;font-weight:700}
#modalScore strong{color:var(--accent);font-size:18px}

#resultsScreen,#hofScreen{
  display:none;flex-direction:column;padding:20px 20px 40px;
  overflow-y:auto;text-align:center;
  background:var(--card-bg);border-radius:20px;margin:10px;
  height:calc(100% - 20px);
}
#resultsScreen h1,#hofScreen h1{font-size:26px;margin:0 0 24px}
#resultsScreen h2{font-size:18px;margin:24px 0 8px;color:var(--accent)}
#resultsScreen p{font-size:16px;margin:6px 0;font-weight:900}
#resultsScreen .statRow{display:flex;justify-content:space-between;padding:8px 14px;background:var(--bg-1);border-radius:10px;margin:4px 0;font-size:14px}

#hofList{display:flex;flex-direction:column;gap:8px;margin:12px 0 20px}
.hofRow{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--bg-1);border-radius:12px;
  font-weight:800;font-size:14px;
}
.hofRow .rank{font-size:18px;color:var(--accent);min-width:28px;text-align:left}
.hofRow .name{flex:1;text-align:left}
.hofRow .pts{color:var(--success)}
.hofRow.empty{opacity:.5;justify-content:center;font-size:13px}

.audioBtn{background:none!important;border:none!important;box-shadow:none!important;padding:4px!important;margin:0 2px;font-size:20px;line-height:1;cursor:pointer}
.audioBtn:hover,.audioBtn:active{background:none!important;transform:none!important}
.audioBtn.off{opacity:.35}

.resultsCongrats{text-align:center;font-weight:800;margin-top:24px;font-size:14px;color:var(--text-muted)}

@keyframes spin180{0%{transform:rotateY(0)}50%{transform:rotateY(180deg)}100%{transform:rotateY(360deg)}}
.cell.flip{animation:spin180 .9s ease-in-out}

@keyframes pulse{0%,100%{transform:scale(1);border-color:var(--chip-border)}50%{transform:scale(1.15);border-color:var(--danger);box-shadow:0 0 15px rgba(239,68,68,.5)}}
.word.pulse{animation:pulse 1.2s infinite}

@keyframes shake{10%,90%{transform:translate3d(-4px,0,0)}20%,80%{transform:translate3d(8px,0,0)}30%,70%{transform:translate3d(-10px,0,0)}40%,60%{transform:translate3d(10px,0,0)}50%{transform:translate3d(-4px,0,0)}}
#board.shake{animation:shake .6s ease-in-out}

.cell.reveal{background:var(--success)!important;color:white;font-weight:900;box-shadow:0 0 15px rgba(34,197,94,.8)}

/* Floating "+pts" particles */
.floatPts{
  position:absolute;pointer-events:none;
  font-weight:900;font-size:22px;color:var(--success);
  text-shadow:0 2px 8px rgba(0,0,0,.3);
  animation:floatUp 1s ease-out forwards;
  z-index:5;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(.8)}
  100%{opacity:0;transform:translateY(-50px) scale(1.2)}
}

/* Confetti */
.confetti{
  position:fixed;width:8px;height:14px;
  top:-20px;
  pointer-events:none;
  animation:confettiFall 2.5s linear forwards;
  z-index:60;
}
@keyframes confettiFall{
  to{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* Theme toggle in corner */
#themeToggle{
  position:absolute;top:14px;right:14px;
  background:var(--card-bg);border:none;
  width:38px;height:38px;border-radius:10px;
  cursor:pointer;font-size:18px;
  box-shadow:var(--shadow-md);z-index:10;
  font-family:inherit;
}

/* Categories grid */
.catGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.catGrid .btnFlat{padding:18px 10px;font-size:14px}

/* Difficulty pills */
.diffPills{display:flex;gap:6px;justify-content:center;margin:8px 0 12px;flex-wrap:wrap}
.diffPill{
  padding:6px 12px;border-radius:999px;
  background:var(--bg-1);color:var(--text-muted);
  font-size:12px;font-weight:800;cursor:pointer;
  border:2px solid transparent;
  transition:all .2s;
}
.diffPill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<div id="starfield"></div>
<div id="shell">
  <button id="themeToggle" title="Motyw">🌙</button>

  <!-- WYBÓR KATEGORII -->
  <div id="categoryScreen">
    <div class="card">
      <h1>🇵🇱 Gra Słówek</h1>
      <p class="subtitle">Wybierz kategorię słówek</p>
      <div class="catGrid">
        <button class="btnFlat" data-cat="religia">✝️ Religia</button>
        <button class="btnFlat" data-cat="przyroda">🌿 Przyroda</button>
        <button class="btnFlat" data-cat="zwierzeta">🐾 Zwierzęta</button>
        <button class="btnFlat" data-cat="gwiazdy">⭐ Kosmos</button>
        <button class="btnFlat" data-cat="kuchnia">🍽️ Kuchnia</button>
        <button class="btnFlat" data-cat="sport">⚽ Sport</button>
        <button class="btnFlat" data-cat="muzyka">🎵 Muzyka</button>
        <button class="btnFlat" data-cat="zawody">💼 Zawody</button>
      </div>
      <div class="menuBtns" style="margin-top:14px">
        <button class="btnFlat small danger" id="backToDW">⬅️ Powrót na stronę</button>
      </div>
    </div>
  </div>

  <!-- MENU WYBORU PLANSZY -->
  <div id="menu">
    <div class="card">
      <h1>🇵🇱 <span id="catTitle">Gra Słówek</span></h1>
      <p class="subtitle">Wybierz tryb gry</p>
      <div class="menuBtns">
        <button class="btnFlat" data-mode="classic">🎯 Klasyczny 5×6</button>
        <button class="btnFlat" data-mode="big">🎲 Duża plansza 6×7</button>
        <button class="btnFlat" data-mode="xl">🏆 XL 8×10 (3–6 liter)</button>
        <button class="btnFlat small" id="dailyChallengeBtn">📅 Wyzwanie dnia</button>
        <button class="btnFlat small" id="showResults">📊 Statystyki</button>
        <button class="btnFlat small" id="showHof">🏅 Najlepsze wyniki</button>
        <button class="btnFlat small" id="copyLinkBtn">📋 Skopiuj adres gry</button>
        <button class="btnFlat small danger" id="exitBtn">⬅️ Zmień kategorię</button>
        <div class="copyTip">
          🎮 Wyślij link znajomym i zobacz, kto zdobędzie więcej punktów!
        </div>
      </div>
    </div>
  </div>

  <!-- GRA -->
  <div id="app">
    <header>
      <div id="topBar">
        <div id="scoreBox">
          <div class="stat"><span class="label">PUNKTY</span><span class="val" id="score">0</span></div>
          <div class="stat"><span class="label">SERIA</span><span class="val" id="streak">0</span></div>
          <div class="stat"><span class="label">REKORD</span><span class="val" id="best">0</span></div>
        </div>
        <button class="iconBtn" id="hintBtn" title="Podpowiedź (-5s)">💡</button>
      </div>
      <div id="words"></div>
    </header>
    <div id="board"></div>
    <footer>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="timer" style="--p:100%"><span id="time">60</span></div>
        <button class="iconBtn audioBtn" id="toggleTick" title="Tykanie">🕒</button>
        <button class="iconBtn audioBtn" id="toggleSound" title="Dźwięki">🎵</button>
        <button class="iconBtn audioBtn" id="toggleHaptic" title="Wibracje">📳</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn" onclick="goFullscreen()">⛶</button>
        <button class="btn" id="back">MENU</button>
      </div>
    </footer>
  </div>

  <!-- WYGRANA/PRZEGRANA -->
  <div id="overlay">
    <div id="modal">
      <div id="msg"></div>
      <div id="modalScore"></div>
      <br>
      <button class="btn" id="again" style="width:100%;padding:14px;font-size:16px">🔄 ZAGRAJ PONOWNIE</button>
      <button class="btnFlat small" id="modalMenu" style="width:100%;margin-top:8px">⬅️ Wróć do menu</button>
    </div>
  </div>

  <!-- WYNIKI / STATYSTYKI -->
  <div id="resultsScreen">
    <h1>📊 Statystyki</h1>
    <div id="globalStats"></div>
    <div id="lastSessionStats"></div>
    <div id="todayStats"></div>
    <div id="streakStats"></div>
    <button class="btn" id="backToMenu" style="margin-top:24px;width:100%;padding:14px">⬅️ POWRÓT DO MENU</button>
    <div class="resultsCongrats">🎉 Świetna robota! 🎉</div>
  </div>

  <!-- HALL OF FAME -->
  <div id="hofScreen">
    <h1>🏅 Najlepsze wyniki</h1>
    <p class="subtitle" id="hofSubtitle">Top 10 dla wszystkich kategorii</p>
    <div id="hofList"></div>
    <button class="btn warn" id="resetHof" style="width:100%;padding:12px;margin-bottom:10px">🗑️ Wyczyść wyniki</button>
    <button class="btn" id="backToMenu2" style="width:100%;padding:14px">⬅️ POWRÓT DO MENU</button>
  </div>
</div>

<script>
(() => {
  // ============ KONFIGURACJA ============
  const MODES = {
    classic: { cols:5, rows:6, minLen:3, maxLen:4, words:4, time:60, label:"Klasyczny" },
    big:     { cols:6, rows:7, minLen:3, maxLen:4, words:4, time:60, label:"Duża" },
    xl:      { cols:8, rows:10, minLen:3, maxLen:6, words:3, time:75, label:"XL" }
  };
  const REVEAL_TIME = 6;
  const HINT_PENALTY = 5;
  const HINT_COST_PTS = 20;

  // ============ SŁÓWKA – TYLKO POPRAWNE POLSKIE ============
  const WORD_SETS = {
    religia: [
      "BÓG","WIARA","KRZYŻ","ANIOŁ","JEZUS","MARYJA","DUCH","GRZECH",
      "MIŁOŚĆ","POKÓJ","MSZA","POST","CUD","ŁASKA","PRAWDA","ŻYCIE",
      "SERCE","DUSZA","OŁTARZ","SŁOWO","OFIARA","POKUTA",
      "NIEBO","ZIEMIA","DOBRO","ZŁO",
      "PSALM","CHWAŁA","AMEN","BŁOGI","ŚWIĘTY","PRAWO","MOC","DAR",
      "MODLITWA","KAPŁAN","BIBLIA","KOŚCIÓŁ","RAJ","PIEKŁO","JUDASZ",
      "PIOTR","PAWEŁ","BRAT","SIOSTRA","HOSTIA","KIELICH","DZWON"
    ],

    przyroda: [

  function buildGrid(){
    const g = Array.from({length:GAME.rows}, () => Array(GAME.cols).fill(null));
    wordPositions = [];
    const list = [...active];
    for(let i = list.length-1; i > 0; i--){
      const j = Math.floor(rand() * (i + 1));
      [list[i],list[j]] = [list[j],list[i]];
    }
    for(const w of list){
      for(let t = 0; t < 500; t++){
        const d = DIRS[Math.floor(rand() * DIRS.length)];
        const r0 = Math.floor(rand() * GAME.rows);
        const c0 = Math.floor(rand() * GAME.cols);
        const rE = r0 + d.dr * (w.length - 1);
        const cE = c0 + d.dc * (w.length - 1);
        if(rE < 0 || rE >= GAME.rows || cE < 0 || cE >= GAME.cols) continue;
        let ok = true;
        for(let i = 0; i < w.length; i++){
          const ch = g[r0 + d.dr * i][c0 + d.dc * i];
          if(ch !== null && ch !== w[i]){ ok = false; break; }
        }
        if(ok){
          for(let i = 0; i < w.length; i++) g[r0 + d.dr * i][c0 + d.dc * i] = w[i];
          wordPositions.push({
            word: w,
            path: Array.from({length:w.length}, (_,k) => ({r:r0 + d.dr * k, c:c0 + d.dc * k}))
          });
          break;
        }
      }
    }
    for(let r = 0; r < GAME.rows; r++)
      for(let c = 0; c < GAME.cols; c++)
        if(g[r][c] === null) g[r][c] = ALPH[Math.floor(rand() * ALPH.length)];
    return g;
  }

  function idx(p){ return p.r * GAME.cols + p.c; }
  function clearSel(){ cells.forEach(el => el.classList.remove("sel")); }
  function paint(p){ clearSel(); p.forEach(x => cells[idx(x)].classList.add("sel")); }
  function line(a, b){
    const dr = b.r - a.r, dc = b.c - a.c;
    const sdr = dr === 0 ? 0 : dr > 0 ? 1 : -1;
    const sdc = dc === 0 ? 0 : dc > 0 ? 1 : -1;
    const adr = Math.abs(dr), adc = Math.abs(dc);
    if(!((adr === 0 && adc > 0) || (adc === 0 && adr > 0) || (adr === adc && adr > 0))) return [];
    const n = Math.max(adr, adc);
    const out = [];
    let rr = a.r, cc = a.c;
    for(let i = 0; i <= n; i++){ out.push({r:rr, c:cc}); rr += sdr; cc += sdc; }
    return out;
  }

    if(!dragging) return;

    if(!el) return;
    const cur = {r: +el.dataset.r, c: +el.dataset.c};
    const newPath = line(startCell, cur);
    if(newPath.length !== path.length) vibrate(8);
    path = newPath;
    paint(path);
  });

    if(!dragging) return;
    dragging = false;
    clearSel();

      const rev = txt.split("").reverse().join("");
      for(const w of active){
        if(found.has(w)) continue;

    msg.innerHTML = "🎉 Gratulacje!<br>Znaleziono wszystkie słowa!";
    let extras = `Punkty: <strong>${score}</strong>`;
    if(score >= bestScore && score > 0) extras += `<br>🏆 Nowy rekord!`;
    if(isDailyChallenge) extras += `<br>📅 Wyzwanie dnia ukończone!`;
    modalScore.innerHTML = extras;
    overlay.style.display = "flex";
  }
  function showLoseModal(){
    msg.innerHTML = "⏱️ Czas się skończył!<br>Spróbuj jeszcze raz.";
    modalScore.innerHTML = `Punkty: <strong>${score}</strong>`;
    overlay.style.display = "flex";
  }

  function win(){
    if(gameOver) return;
    gameOver = true;
    clearInterval(timer);
    isRevealPhase = false;
    updateStats(true);
    saveToHallOfFame(score);
    if(soundOn) safePlay(fanfareSound);
    vibrate([100, 50, 100, 50, 200]);
    triggerConfetti();
    showWinModal();
  }

  function lose(){
    if(gameOver) return;
    gameOver = true;
    streak = 0;
    streakEl.textContent = streak;
    updateStats(false);
    if(score > 0) saveToHallOfFame(score);
    if(soundOn) safePlay(loseSound);
    vibrate([200, 100, 200]);
    board.classList.add("shake");
    setTimeout(() => board.classList.remove("shake"), 600);
    wordPositions.forEach(pos => {
      if(!found.has(pos.word)){
        pos.path.forEach(p => cells[idx(p)].classList.add("reveal"));
      }
    });
    isRevealPhase = true;
    startTimer();
  }

  function triggerConfetti(){
    const colors = ["#ef4444","#f59e0b","#22c55e","#2563eb","#a78bfa","#ec4899"];
    for(let i = 0; i < 40; i++){
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.5) + "s";
      c.style.animationDuration = (2 + Math.random() * 1.5) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }

  function buildRound(){
    gameOver = false;
    isRevealPhase = false;
    overlay.style.display = "none";
    found.clear();
    wordPositions = [];
    grid = buildGrid();
    renderBoard();
    updateChips();
    startTimer();
  }

  function startGame(minLen, maxLen, wordCount){
    resultsScreen.style.display = "none";
    hofScreen.style.display = "none";
    recordsMusic.pause(); recordsMusic.currentTime = 0;
    menu.style.display = "none";
    app.style.display = "flex";
    score = 0;
    streak = 0;
    updateScoreDisplay();
    words4 = pickWords(minLen, maxLen, wordCount);
    applyActiveFromCount();
    renderChips();
    buildRound();
  }

  // ============ STATYSTYKI ============
  if(!localStorage.getItem("gameStats"))
    localStorage.setItem("gameStats", JSON.stringify({
      startDate: new Date().toISOString().split('T')[0],
      stats: {},
      maxStreak: 0
    }));

  function updateStats(isWin){
    const today = new Date().toISOString().split('T')[0];
    const stats = JSON.parse(localStorage.getItem("gameStats"));
    if(!stats.stats[today]) stats.stats[today] = {wins:0, losses:0};
    isWin ? stats.stats[today].wins++ : stats.stats[today].losses++;
    if(streak > (stats.maxStreak || 0)) stats.maxStreak = streak;
    localStorage.setItem("gameStats", JSON.stringify(stats));
  }

  function showResults(){
    menu.style.display = "none";
    resultsScreen.style.display = "flex";
    if(soundOn){ recordsMusic.currentTime = 0; safePlay(recordsMusic, {reset:false}); }
    const stats = JSON.parse(localStorage.getItem("gameStats"));
    const startDate = stats.startDate;
    const dailyStats = stats.stats;
    let globalWins = 0, globalLosses = 0;
    for(const day in dailyStats){
      globalWins += dailyStats[day].wins || 0;
      globalLosses += dailyStats[day].losses || 0;
    }
    const totalGames = globalWins + globalLosses;
    const winRate = totalGames > 0 ? Math.round(globalWins/totalGames*100) : 0;

    globalStatsEl.innerHTML = `
      <h2>📈 Globalnie (od ${startDate})</h2>
      <div class="statRow"><span>✅ Wygrane:</span><strong>${globalWins}</strong></div>
      <div class="statRow"><span>❌ Przegrane:</span><strong>${globalLosses}</strong></div>
      <div class="statRow"><span>🎯 Skuteczność:</span><strong>${winRate}%</strong></div>
      <div class="statRow"><span>🏆 Najlepszy wynik:</span><strong>${bestScore} pkt</strong></div>
    `;

    const today = new Date().toISOString().split('T')[0];
    const todayWins = dailyStats[today]?.wins || 0;
    const todayLosses = dailyStats[today]?.losses || 0;
    todayStatsEl.innerHTML = `
      <h2>📅 Dziś (${today})</h2>
      <div class="statRow"><span>✅ Wygrane:</span><strong>${todayWins}</strong></div>
      <div class="statRow"><span>❌ Przegrane:</span><strong>${todayLosses}</strong></div>
    `;

    const dates = Object.keys(dailyStats).sort().reverse();
    let lastSessionDate = null;
    for(const d of dates){
      if(d !== today && (dailyStats[d].wins > 0 || dailyStats[d].losses > 0)){
        lastSessionDate = d; break;
      }
    }
    if(lastSessionDate){
      const lw = dailyStats[lastSessionDate].wins || 0;
      const ll = dailyStats[lastSessionDate].losses || 0;
      lastSessionStatsEl.innerHTML = `
        <h2>⏮️ Ostatnia sesja (${lastSessionDate})</h2>
        <div class="statRow"><span>✅ Wygrane:</span><strong>${lw}</strong></div>
        <div class="statRow"><span>❌ Przegrane:</span><strong>${ll}</strong></div>
      `;
    } else {
      lastSessionStatsEl.innerHTML = `<h2>⏮️ Ostatnia sesja</h2><p style="color:var(--text-muted)">Brak wcześniejszych sesji</p>`;
    }

    streakStatsEl.innerHTML = `
      <h2>🔥 Najdłuższa seria</h2>
      <div class="statRow"><span>Maks. trafień z rzędu:</span><strong>${stats.maxStreak || 0}</strong></div>
    `;
  }

  // ============ HALL OF FAME ============
  function getHof(){
    return JSON.parse(localStorage.getItem("HOF") || "[]");
  }
  function saveToHallOfFame(pts){
    if(!pts || pts <= 0) return;
    const hof = getHof();
    hof.push({
      pts,
      cat: CURRENT_CATEGORY,
      mode: CURRENT_MODE,
      date: new Date().toISOString().split('T')[0],
      daily: isDailyChallenge
    });
    hof.sort((a,b) => b.pts - a.pts);
    localStorage.setItem("HOF", JSON.stringify(hof.slice(0,20)));
  }
  function showHallOfFame(){
    menu.style.display = "none";
    hofScreen.style.display = "flex";
    const hof = getHof().slice(0,10);
    hofList.innerHTML = "";
    if(hof.length === 0){
      hofList.innerHTML = '<div class="hofRow empty">Brak wyników. Zagraj pierwszą rundę!</div>';
      return;
    }
    hof.forEach((entry, i) => {
      const row = document.createElement("div");
      row.className = "hofRow";
      const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i+1}`;
      const dailyMark = entry.daily ? " 📅" : "";
      row.innerHTML = `
        <span class="rank">${medal}</span>
        <span class="name">${CAT_LABELS[entry.cat] || entry.cat} · ${entry.mode||""}${dailyMark}<br><small style="color:var(--text-muted);font-size:11px">${entry.date}</small></span>
        <span class="pts">${entry.pts} pkt</span>
      `;
      hofList.appendChild(row);
    });
  }
  showHofBtn.onclick = showHallOfFame;
  resetHofBtn.onclick = () => {
    if(confirm("Na pewno wyczyścić wszystkie najlepsze wyniki?")){
      localStorage.removeItem("HOF");
      showHallOfFame();
    }
  };

  // ============ PRZYCISKI ============
  back.onclick = () => {
    clearInterval(timer);
    isRevealPhase = false;
    gameOver = false;
    clearSeed();
    isDailyChallenge = false;
    app.style.display = "none";
    menu.style.display = "flex";
  };
  again.onclick = () => {
    if(isDailyChallenge){
      // Wyzwanie dnia można powtórzyć
      const today = new Date().toISOString().split('T')[0];
      const seedStr = today + ":" + CURRENT_CATEGORY;
      let s = 0;
      for(let i=0;i<seedStr.length;i++) s = (s*31 + seedStr.charCodeAt(i)) >>> 0;
      setSeed(s % 233280);
    }
    const m = MODES[CURRENT_MODE];
    score = 0; streak = 0; updateScoreDisplay();
    words4 = pickWords(m.minLen, m.maxLen, m.words);
    applyActiveFromCount();
    renderChips();
    buildRound();
  };
  modalMenu.onclick = () => {
    overlay.style.display = "none";
    back.click();
  };

  showResultsBtn.onclick = showResults;
  backToMenuBtn.onclick = () => {
    recordsMusic.pause(); recordsMusic.currentTime = 0;
    resultsScreen.style.display = "none";
    menu.style.display = "flex";
  };
  backToMenuBtn2.onclick = () => {
    hofScreen.style.display = "none";
    menu.style.display = "flex";
  };

  exitBtn.onclick = () => {
    if(document.fullscreenElement) document.exitFullscreen();
    clearInterval(timer);
    isRevealPhase = false;
    gameOver = false;
    clearSeed();
    isDailyChallenge = false;
    recordsMusic.pause(); recordsMusic.currentTime = 0;
    menu.style.display = "none";
    app.style.display = "none";
    overlay.style.display = "none";
    resultsScreen.style.display = "none";
    hofScreen.style.display = "none";
    categoryScreen.style.display = "flex";
  };

  $("copyLinkBtn").onclick = async () => {
    try{
      await navigator.clipboard.writeText(location.href);
      $("copyLinkBtn").textContent = "✅ Skopiowano!";
      setTimeout(() => $("copyLinkBtn").textContent = "📋 Skopiuj adres gry", 1500);
    } catch(e){ alert("Nie udało się"); }
  };

  document.addEventListener('click', e => {
    if(soundOn && e.target.closest('.btn, .iconBtn, .btnFlat')) safePlay(clickSound);
  });

  if("serviceWorker" in navigator)
    window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(()=>{}));
})();
</script>
<script>
function goFullscreen(){
  const el = document.documentElement;
  if(document.fullscreenElement){
    document.exitFullscreen();
  } else if(el.requestFullscreen){
    el.requestFullscreen().catch(()=>{});
  } else if(el.webkitRequestFullscreen){
    el.webkitRequestFullscreen();
  }
}

// Auto-fullscreen przy pierwszej interakcji (przeglądarki wymagają user gesture)
// Kluczowe: NIE blokujemy ani nie konsumujemy zdarzenia – fullscreen idzie w tle,
// a klik użytkownika dalej dociera do swojego przycisku.
(function(){
  let triedFS = false;
  function tryFS(){
    if(triedFS) return;
    triedFS = true;
    const el = document.documentElement;
    if(!document.fullscreenElement){
      const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if(req){
        try{
          const p = req.call(el);
          if(p && p.catch) p.catch(()=>{});
        }catch(e){}
      }
    }
  }
  // capture:false + passive – nie kradniemy eventu nikomu
  // używamy pointerup zamiast pointerdown, żeby gesture przeszedł cały cykl
  const handler = () => { tryFS(); };
  document.addEventListener('pointerup', handler, {passive:true});
  document.addEventListener('keydown', handler, {passive:true});
  // gdy użytkownik wyjdzie z fullscreen (np. ESC), pozwól wrócić przy następnej interakcji
  document.addEventListener('fullscreenchange', () => {
    if(!document.fullscreenElement) triedFS = false;
  });
})();
</script>
