function drawResults(){
  const t = Date.now() * 0.001
  const cx = canvas.width / 2
  const isWin = gameState === "win"

  // Tło — gradient + siatka
  const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height)
  bg.addColorStop(0, isWin ? "#001122" : "#110000")
  bg.addColorStop(1, isWin ? "#000820" : "#0d0008")
  ctx.fillStyle = bg
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  // Siatka w tle
  ctx.strokeStyle = isWin ? "rgba(0,255,136,0.04)" : "rgba(255,68,0,0.04)"
  ctx.lineWidth = 1
  for (let i = 0; i < canvas.width; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke()
  }
  for (let i = 0; i < canvas.height; i += 40) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke()
  }

  // Cząsteczki tła
  for (let p of resultsParticles) {
    p.x += p.vx; p.y += p.vy
    p.alpha += 0.02
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1
    ctx.save()
    ctx.globalAlpha = Math.abs(Math.sin(p.alpha)) * 0.6
    ctx.fillStyle = p.color
    ctx.shadowColor = p.color; ctx.shadowBlur = 6
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill()
    ctx.restore()
  }

  // Animuj wrogów dookoła
  for (let en of resultsEnemies) { en.angle += en.speed }

  // Środkowa kula / ikona
  const ballY = 130
  const ballR = 38
  const pulse = Math.sin(t * 3) * 0.15 + 1
  ctx.save()
  ctx.shadowColor = isWin ? "#00ff88" : "#ff4400"
  ctx.shadowBlur = 30 + Math.sin(t*2)*10
  const ballGrad = ctx.createRadialGradient(cx-10, ballY-10, 2, cx, ballY, ballR*pulse)
  if (isWin) {
    ballGrad.addColorStop(0, "#ffffff")
    ballGrad.addColorStop(0.4, "#00ff88")
    ballGrad.addColorStop(1, "#006633")
  } else {
    ballGrad.addColorStop(0, "#ffaa00")
    ballGrad.addColorStop(0.4, "#ff4400")
    ballGrad.addColorStop(1, "#660000")
  }
  ctx.fillStyle = ballGrad
  ctx.beginPath(); ctx.arc(cx, ballY, ballR * pulse, 0, Math.PI*2); ctx.fill()
  ctx.restore()

  // Wrogowie chodzą po dole — strip nad przyciskami
  const stripY = canvas.height - 60
  const stripH = 55

  // Pasek tła dla wrogów
  ctx.save()
  const stripGrad = ctx.createLinearGradient(0, stripY - 10, 0, canvas.height)
  stripGrad.addColorStop(0, "rgba(0,0,0,0)")
  stripGrad.addColorStop(0.3, isWin ? "rgba(0,40,20,0.7)" : "rgba(40,0,0,0.7)")
  stripGrad.addColorStop(1, isWin ? "rgba(0,60,30,0.9)" : "rgba(60,0,0,0.9)")
  ctx.fillStyle = stripGrad
  ctx.fillRect(0, stripY - 10, canvas.width, canvas.height - stripY + 10)

  // Linia świecąca nad paskiem
  ctx.strokeStyle = isWin ? "rgba(0,255,136,0.5)" : "rgba(255,68,0,0.5)"
  ctx.lineWidth = 1.5
  ctx.shadowColor = isWin ? "#00ff88" : "#ff4400"
  ctx.shadowBlur = 8
  ctx.beginPath(); ctx.moveTo(0, stripY - 8); ctx.lineTo(canvas.width, stripY - 8); ctx.stroke()
  ctx.shadowBlur = 0
  ctx.restore()

  // Update i rysowanie wrogów
  for (let en of resultsEnemies) {
    // Ruch poziomy
    en.x += en.vx
    en.bobOffset += en.bobSpeed
    // Odbij od ścian
    if (en.x < 20)  { en.x = 20;  en.vx = Math.abs(en.vx) }
    if (en.x > canvas.width - 20) { en.x = canvas.width - 20; en.vx = -Math.abs(en.vx) }
    // Pozycja Y — chodzi po pasku z lekkim bobowaniem
    const ey = stripY + 18 + Math.sin(en.bobOffset) * 5

    ctx.save()
    // Cień pod wrogiem
    ctx.fillStyle = "rgba(0,0,0,0.3)"
    ctx.beginPath()
    ctx.ellipse(en.x, stripY + stripH - 8, en.size * 0.4, 4, 0, 0, Math.PI*2)
    ctx.fill()
    // Emoji
    ctx.font = en.size + "px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    // Flip poziomo jeśli idzie w lewo
    if (en.vx < 0) {
      ctx.translate(en.x, ey)
      ctx.scale(-1, 1)
      ctx.fillText(en.emoji, 0, 0)
    } else {
      ctx.fillText(en.emoji, en.x, ey)
    }
    ctx.restore()
  }

  // Tytuł
  const titleColor = isWin ? "#00ff88" : "#ff4400"
  ctx.save()
  ctx.textAlign = "center"; ctx.textBaseline = "middle"
  ctx.shadowColor = titleColor; ctx.shadowBlur = 30
  ctx.fillStyle = titleColor
  ctx.font = "bold 42px Arial"
  ctx.fillText(isWin ? "🏆 WYGRANA! 🏆" : "💀 KONIEC GRY 💀", cx, 215)
  ctx.shadowBlur = 0; ctx.restore()

  // Nazwa gry
  ctx.textAlign = "center"; ctx.fillStyle = "#888"; ctx.font = "14px Arial"
  ctx.fillText(nazwaGry || "Gra", cx, 242)

  // ===== TABLICA WYNIKÓW =====
  const board = getLeaderboard()
  const tableX = cx - 180, tableW = 360
  const tableY = 262

  // Tło tabeli
  ctx.save()
  ctx.fillStyle = "rgba(0,0,0,0.5)"
  ctx.strokeStyle = isWin ? "rgba(0,255,136,0.3)" : "rgba(255,68,0,0.3)"
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.roundRect(tableX, tableY, tableW, 30 + Math.max(Math.min(board.length, 2), 1)*30, 10); ctx.fill(); ctx.stroke()
  ctx.restore()

  // Nagłówek — różny dla wygranej i przegranej
  ctx.textAlign = "left"; ctx.font = "bold 12px Arial"
  if (isWin) {
    ctx.fillStyle = "#00ff88"
    ctx.fillText("🏅 HALL OF FAME — " + (nazwaGry || "Gra").toUpperCase(), tableX + 14, tableY + 20)
  } else {
    ctx.fillStyle = "#ff6644"
    ctx.fillText("📊 NAJLEPSZE WYNIKI — " + (nazwaGry || "Gra").toUpperCase(), tableX + 14, tableY + 20)
    // Info że nie można zapisać
    ctx.textAlign = "center"; ctx.fillStyle = "#886644"; ctx.font = "11px Arial"
    ctx.fillText("⚠ Zapis tylko przy wygranej (dotknij flagi!)", cx, tableY + 20)
  }

  // Wiersze wyników
  const maxRows = Math.min(board.length, 2)
  for (let i = 0; i < maxRows; i++) {
    const entry = board[i]
    const ry = tableY + 46 + i * 30
    const isMe = isWin && resultsNameEntered && entry.name === resultsPlayerName && i === 0

    if (isMe) {
      ctx.save()
      ctx.fillStyle = "rgba(0,255,136,0.15)"
      ctx.beginPath(); ctx.roundRect(tableX + 4, ry - 12, tableW - 8, 26, 6); ctx.fill()
      ctx.restore()
    }

    const medal = i === 0 ? "🥇" : "🥈"
    ctx.font = "16px Arial"; ctx.textAlign = "center"; ctx.fillStyle = "#fff"
    ctx.fillText(medal, tableX + 22, ry)

    ctx.textAlign = "left"; ctx.font = "bold 14px Arial"
    ctx.fillStyle = isMe ? "#00ff88" : "#dddddd"
    ctx.fillText(entry.name, tableX + 44, ry)

    ctx.textAlign = "right"; ctx.font = "bold 14px Arial"
    ctx.fillStyle = "#ffcc00"
    ctx.fillText("⭐ " + entry.points, tableX + tableW - 60, ry)

    ctx.fillStyle = entry.win ? "#00cc66" : "#cc4444"
    ctx.fillText(entry.win ? "✔" : "✖", tableX + tableW - 20, ry)
  }

  if (board.length === 0) {
    ctx.textAlign = "center"; ctx.fillStyle = "#555"; ctx.font = "13px Arial"
    ctx.fillText(isWin ? "Brak wyników — wygraj i zapisz!" : "Brak wyników", cx, tableY + 46)
  }

  // Przyciski
  const btnY = tableY + 46 + maxRows * 30 + 16
  const btnH = 42

  // Jeden przycisk — EDYTUJ GRĘ (wyśrodkowany)
  const btn2X = cx - 90
  ctx.save()
  ctx.fillStyle = "#1a1a3a"
  ctx.strokeStyle = "#2a2a6a"; ctx.lineWidth = 2
  ctx.beginPath(); ctx.roundRect(btn2X, btnY, 180, btnH, 10); ctx.fill(); ctx.stroke()
  ctx.fillStyle = "#8888ff"; ctx.font = "bold 15px Arial"; ctx.textAlign = "center"
  ctx.fillText("✏ EDYTUJ GRĘ", btn2X + 90, btnY + btnH/2 + 1)
  ctx.restore()

  resultsBtn1 = null
  resultsBtn2 = { x: btn2X, y: btnY, w: 180, h: btnH }
}

function wczytajProjekt(){
  const input = document.createElement("input")
  input.type = "file"

  input.onchange = e => {
    const file = e.target.files[0]
    if (!file) return

    projectName = file.name.replace(".json", "")
    loadedFromFile = true

    const reader = new FileReader()

    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result)

        gameData = data || {}
        gameData.stats = gameData.stats || {}

        levels = gameData.levels || []
        if (levels.length === 0) {
          levels.push({
            players: [], platforms: [], blocks: [], enemies: [], bonuses: [], texts: [],
            backgroundType: "none",
            playerStartX: 100,
            playerStartY: 100
          })
        }

        currentLevel = 0
        syncLevelData()
        bonuses = levels[0]?.bonuses || []
        renderLevelsBar()

        const lvl = getLevel()
        playerStartX = lvl.playerStartX ?? 100
        playerStartY = lvl.playerStartY ?? 100

        let s = gameData.settings || {}

        nazwaGry   = s.nazwaGry   || "Moja gra"
        autorGry   = s.autorGry   || projectName
        opisGry    = s.opisGry    || "gra sobie od Groka"

        backgroundType = s.backgroundType || "none"

        respawnMode     = s.respawnMode     || "death"
        autoScroll      = !!s.autoScroll
        autoScrollSpeed = Number(s.autoScrollSpeed) || 2
        worldWidth      = Number(s.worldWidth) || 6000

        scrollX.max = worldWidth - canvas.width

        sterowanie = s.sterowanie || {lewo: null, prawo: null, skok: null, dol: null, strzal: null}

        counters = {
          lives: s.counters?.lives ?? 3,
          points: s.counters?.points ?? 0,
          time: s.counters?.time ?? 60
        }

        startTime = s.startTime ?? counters.time
        useTimer  = !!s.useTimer

        showIntro = true
        lastTime = Date.now()
        selectedObject = null
        trybKopiowania = false

        updateButtonStates()
        initAfterLoad()

        console.log(`Wczytano grę: "${nazwaGry}" by ${autorGry}`)

      } catch (err) {
        alert("Błąd podczas wczytywania pliku JSON")
        console.error(err)
      }
    }

    reader.readAsText(file)
  }

  input.click()
}

    neon: document.getElementById("txtNeon").checked,
    neonColor: document.getElementById("txtNeonColor").value,
    outline: document.getElementById("txtOutline").checked,
    outlineColor: document.getElementById("txtOutlineColor").value,
    outlineWidth: Number(document.getElementById("txtOutlineWidth").value) || 5
  }

  if (lvl) lvl.texts.push(newText)
  syncLevelData()

  zamknijPanel()
}

function zapiszEdycjeTekstu() {
  if (!selectedObject || selectedObject.text === undefined) return

  selectedObject.text = document.getElementById("txtInput").value.trim() || "Tekst"
  selectedObject.size = Number(document.getElementById("txtSize").value) || 28
  selectedObject.font = document.getElementById("txtFont").value
  selectedObject.color = document.getElementById("txtColor").value
  selectedObject.neon = document.getElementById("txtNeon").checked
  selectedObject.neonColor = document.getElementById("txtNeonColor").value
  selectedObject.outline = document.getElementById("txtOutline").checked
  selectedObject.outlineColor = document.getElementById("txtOutlineColor").value
  selectedObject.outlineWidth = Number(document.getElementById("txtOutlineWidth").value) || 5

  pokazPanelTekstu(selectedObject)
}

function usunAktualnyTekst() {
  if (!selectedObject || selectedObject.text === undefined) return

  if (confirm("Czy na pewno chcesz usunąć ten tekst?")) {
    const index = texts.indexOf(selectedObject)
    if (index !== -1) texts.splice(index, 1)
    selectedObject = null
    zamknijPanel()
  }
}

function zapiszUstawienia(){
  const autoEl = document.getElementById("autoScrollToggle")
  const speedEl = document.getElementById("scrollSpeed")
  if (autoEl) autoScroll = autoEl.checked
  if (speedEl) autoScrollSpeed = Number(speedEl.value)
}

function powrotDoMenu() {
  gameOver = false
  gameOverTriggered = false
  hitPause = 0
  pendingRespawn = false
  counters.lives = 3
  counters.points = 0
  counters.time = startTime
  bonuses = []
  document.getElementById("editor").style.display = "none"
}

function zapiszLiczniki(){
  let lives = Number(document.getElementById("editLives").value)
  let time = Number(document.getElementById("editTime").value)
  let timerOn = document.getElementById("useTimer").checked
  let livesOn = document.getElementById("useLives").checked

  if (!isNaN(lives) && lives >= 0) counters.lives = lives
  if (!isNaN(time) && time >= 0) { counters.time = time; startTime = time }

  useTimer = timerOn
  useLives = livesOn

  let el = document.getElementById("editWorld")
  if (el) {
    let w = Number(el.value)
    if (!isNaN(w) && w > 500) {
      worldWidth = w
      scrollX.max = worldWidth - canvas.width
    }
  }
}

    <div class="item" onclick="dodajKluczWin()" style="font-size:40px;">🏁</div>
    <br><br>
    <h4>POZIOMY ➜ teleport</h4>
    <div class="item" onclick="dodajKluczLevel()" style="font-size:40px;">🔑</div>
    <p style="text-align:center;">Kliknij aby wstawić<br>teleport do wybranego<br>poziomu</p>
  `
}

function loadDemo() {
  const demoUrl = "demo.json"

  fetch(demoUrl)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      return res.json()
    })
    .then(data => {
      gameData = data || {}
      gameData.stats = gameData.stats || {}

      levels = gameData.levels || []
      if (levels.length === 0) {
        levels.push({ players: [], platforms: [], blocks: [], enemies: [], bonuses: [], texts: [], backgroundType: "none", playerStartX: 100, playerStartY: 100 })
      }

      currentLevel = 0
      syncLevelData()
      renderLevelsBar()

      const lvl = getLevel() || {}
      bonuses = lvl.bonuses || []
      backgroundType = lvl.backgroundType || "none"
      playerStartX = lvl.playerStartX ?? 100
      playerStartY = lvl.playerStartY ?? 100

      let s = gameData.settings || {}
      nazwaGry   = s.nazwaGry   || "Moja gra"
      autorGry   = s.autorGry   || "DEMO"
      opisGry    = s.opisGry    || ""
      sterowanie = s.sterowanie || {lewo: null, prawo: null, skok: null, dol: null, strzal: null}

      counters = {
        lives: s.counters?.lives ?? 3,
        points: s.counters?.points ?? 0,
        time: s.counters?.time ?? 60
      }
      startTime       = s.startTime ?? counters.time
      useTimer        = !!s.useTimer
      respawnMode     = s.respawnMode     || "death"
      autoScroll      = !!s.autoScroll
      autoScrollSpeed = Number(s.autoScrollSpeed) || 2
      worldWidth      = Number(s.worldWidth) || 2000
      scrollX.max = worldWidth - canvas.width

      showIntro = true
      selectedObject = null
      trybKopiowania = false
      cameraX = 0
      gameState = "game"
      gameOver = false
      gameOverTriggered = false

      updateButtonStates()
    })
    .catch(err => {
      console.error(err)
      alert("❌ Nie udało się wczytać demo.json\nBłąd: " + err.message)
    })
}

function updateStats(isWin) {
  const today = new Date().toISOString().split('T')[0]
  if (!gameData.stats[today]) gameData.stats[today] = { wins: 0, losses: 0 }
  if (isWin) gameData.stats[today].wins++
  else gameData.stats[today].losses++
}

function ustawAutora(){
  pokazAutorModal()
}

function drawBackground(){
  let bgType = getLevel()?.backgroundType || "none"

  if (bgType === "water"){
    drawWater()
    return
  }

  if (bgType === "none") return

  if (bgType === "forest"){
    drawForest()
    return
  }

  if (bgType === "snow"){
    ctx.fillStyle = "#0f1a2b"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.fillStyle = "#ffffff"
    for (let i = 0; i < 120; i++){
      let x = (i * 97 - cameraX * 0.1) % 2000
      let y = (i * 53 + Date.now() * 0.2) % canvas.height
      ctx.beginPath()
      ctx.arc(x, y, 2, 0, Math.PI * 2)
      ctx.fill()
    }
  }

  if (bgType === "space") {
    drawNewStars()

    for (let i = 0; i < 18; i++) {
      let x = (i * 220 - cameraX * 0.15) % (canvas.width + 300)
      let h = 95 + (i * 53 % 95)
      ctx.fillStyle = "#1e2f52"
      ctx.beginPath()
      ctx.moveTo(x - 20, canvas.height)
      ctx.lineTo(x + 80, canvas.height - h)
      ctx.lineTo(x + 190, canvas.height)
      ctx.fill()
      ctx.beginPath()
      ctx.moveTo(x + 70, canvas.height)
      ctx.lineTo(x + 130, canvas.height - h * 0.65)
      ctx.lineTo(x + 220, canvas.height)
      ctx.fill()
    }

    for (let i = 0; i < 16; i++) {
      let x = (i * 260 - cameraX * 0.3) % (canvas.width + 350)
      let h = 140 + (i * 67 % 140)
      ctx.fillStyle = "#16243f"
      ctx.beginPath()
      ctx.moveTo(x, canvas.height)
      ctx.lineTo(x + 95, canvas.height - h)
      ctx.lineTo(x + 240, canvas.height)
      ctx.fill()
      ctx.beginPath()
      ctx.moveTo(x + 110, canvas.height)
      ctx.lineTo(x + 175, canvas.height - h * 0.7)
      ctx.lineTo(x + 260, canvas.height)
      ctx.fill()
    }

    for (let i = 0; i < 12; i++) {
      let x = (i * 320 - cameraX * 0.5) % (canvas.width + 400)
      let h = 175 + (i * 81 % 160)
      ctx.fillStyle = "#0f1a2e"
      ctx.beginPath()
      ctx.moveTo(x - 30, canvas.height)
      ctx.lineTo(x + 110, canvas.height - h)
      ctx.lineTo(x + 280, canvas.height)
      ctx.fill()
      ctx.beginPath()
      ctx.moveTo(x + 130, canvas.height)
      ctx.lineTo(x + 215, canvas.height - h * 0.75)
      ctx.lineTo(x + 310, canvas.height)
      ctx.fill()
    }

    ctx.fillStyle = "#0a1324"
    for (let i = 0; i < 10; i++) {
      let x = (i * 380 - cameraX * 0.65) % (canvas.width + 450)
      let h = 80 + (i * 40 % 70)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height)
      ctx.lineTo(x + 140, canvas.height - h)
      ctx.lineTo(x + 320, canvas.height)
      ctx.fill()
    }
  }

  if (bgType === "rain"){
    ctx.fillStyle = "#0b0f1a"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.strokeStyle = "#88aaff"
    ctx.lineWidth = 1
    for (let i = 0; i < 120; i++){
      let x = (i * 97 - cameraX * 0.2) % 2000
      let y = (i * 53 + Date.now() * 0.5) % canvas.height
      ctx.beginPath()
      ctx.moveTo(x, y)
      ctx.lineTo(x + 3, y + 10)
      ctx.stroke()
    }
    if (Math.random() < 0.005){
      ctx.fillStyle = "rgba(255,255,255,0.2)"
      ctx.fillRect(0, 0, canvas.width, canvas.height)
    }
  }

  if (bgType === "west") {
    const t = Date.now() * 0.001

    // Niebo — gradient zachodu
    const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7)
    skyGrad.addColorStop(0, "#2a0a3a")      // fiolet u góry
    skyGrad.addColorStop(0.25, "#8a1e3e")   // ciemnoczerwony
    skyGrad.addColorStop(0.5, "#ff4d1a")    // pomarańcz
    skyGrad.addColorStop(0.75, "#ff8844")
    skyGrad.addColorStop(1, "#ffd4a3")
    ctx.fillStyle = skyGrad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    // Gwiazdy na fioletowym niebie
    if (!window.westStars) {
      window.westStars = []
      for (let i = 0; i < 25; i++) {
        window.westStars.push({
          x: Math.random() * canvas.width * 1.3,
          y: Math.random() * canvas.height * 0.25,
          size: Math.random() * 1.2 + 0.4,
          twinkle: Math.random() * Math.PI * 2
        })
      }
    }
    for (const s of window.westStars) {
      const alpha = 0.4 + Math.sin(t * 2 + s.twinkle) * 0.3
      ctx.fillStyle = `rgba(255,240,220,${alpha})`
      ctx.fillRect(s.x, s.y, s.size, s.size)
    }

    // SŁOŃCE — wielkie, zachodzące
    const sunX = canvas.width - 160
    const sunY = 140
    // Zewnętrzna poświata
    const sunGlow = ctx.createRadialGradient(sunX, sunY, 40, sunX, sunY, 180)
    sunGlow.addColorStop(0, "rgba(255,220,100,0.5)")
    sunGlow.addColorStop(0.5, "rgba(255,150,50,0.25)")
    sunGlow.addColorStop(1, "rgba(255,100,30,0)")
    ctx.fillStyle = sunGlow
    ctx.beginPath(); ctx.arc(sunX, sunY, 180, 0, Math.PI * 2); ctx.fill()
    // Sam dysk słońca
    const sunCore = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 55)
    sunCore.addColorStop(0, "#fff5cc")
    sunCore.addColorStop(0.6, "#ffcc55")
    sunCore.addColorStop(1, "#ff8833")
    ctx.fillStyle = sunCore
    ctx.beginPath(); ctx.arc(sunX, sunY, 55, 0, Math.PI * 2); ctx.fill()
    // Pasek przesłaniający dolną część (jakby słońce za horyzontem)
    ctx.fillStyle = "rgba(255,100,50,0.2)"
    ctx.fillRect(sunX - 60, sunY + 35, 120, 6)
    ctx.fillRect(sunX - 50, sunY + 42, 100, 4)

    // SĘPY — krążą w tle
    const vultures = [
      { x: canvas.width * 0.3, y: 70, phase: 0 },
      { x: canvas.width * 0.55, y: 90, phase: 1.5 },
      { x: canvas.width * 0.75, y: 55, phase: 3 }
    ]
    for (const v of vultures) {
      const vx = v.x + Math.sin(t * 0.3 + v.phase) * 40
      const vy = v.y + Math.cos(t * 0.4 + v.phase) * 15
      const wing = Math.sin(t * 2 + v.phase) * 8
      ctx.strokeStyle = "rgba(20,15,10,0.7)"
      ctx.lineWidth = 2
      ctx.beginPath()
      ctx.moveTo(vx - 14, vy + wing * 0.3)
      ctx.quadraticCurveTo(vx - 7, vy - wing, vx, vy)
      ctx.quadraticCurveTo(vx + 7, vy - wing, vx + 14, vy + wing * 0.3)
      ctx.stroke()
    }

    // GÓRY DALSZE (fioletowe)
    ctx.fillStyle = "#4a2a5a"
    for (let i = 0; i < 10; i++) {
      const x = ((i * 300 - cameraX * 0.05) % (canvas.width + 400)) - 150
      const h = 70 + (i * 31 % 50)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height - 100)
      ctx.lineTo(x + 150, canvas.height - 100 - h)
      ctx.lineTo(x + 300, canvas.height - 100)
      ctx.fill()
    }

    // Skały/mesa (płaskowyże charakterystyczne)
    ctx.fillStyle = "#c46a2e"
    for (let i = 0; i < 6; i++) {
      const x = ((i * 380 - cameraX * 0.15) % (canvas.width + 500)) - 100
      const h = 100 + (i * 41 % 60)
      const w = 150 + (i * 23 % 40)
      // Płaski szczyt
      ctx.fillRect(x + 20, canvas.height - 100 - h, w, h)
      // Skośne boki
      ctx.beginPath()
      ctx.moveTo(x + 20, canvas.height - 100 - h)
      ctx.lineTo(x, canvas.height - 100)
      ctx.lineTo(x + 20, canvas.height - 100)
      ctx.closePath(); ctx.fill()
      ctx.beginPath()
      ctx.moveTo(x + 20 + w, canvas.height - 100 - h)
      ctx.lineTo(x + 40 + w, canvas.height - 100)
      ctx.lineTo(x + 20 + w, canvas.height - 100)
      ctx.closePath(); ctx.fill()
      // Cień
      ctx.fillStyle = "rgba(0,0,0,0.2)"
      ctx.fillRect(x + 20, canvas.height - 100 - h * 0.3, w, h * 0.1)
      ctx.fillStyle = "#c46a2e"
    }

    // GÓRY BLIŻSZE (ciemniejsze)
    ctx.fillStyle = "#8a3d1a"
    for (let i = 0; i < 5; i++) {
      const x = ((i * 420 - cameraX * 0.3) % (canvas.width + 600)) - 80
      const h = 150 + (i * 61 % 100)
      ctx.beginPath()
      ctx.moveTo(x, canvas.height - 100)
      ctx.lineTo(x + 180, canvas.height - 100 - h)
      ctx.lineTo(x + 380, canvas.height - 100)
      ctx.fill()
    }

    // ZIEMIA — gradient
    const groundGrad = ctx.createLinearGradient(0, canvas.height - 130, 0, canvas.height)
    groundGrad.addColorStop(0, "#e8b57c")
    groundGrad.addColorStop(0.6, "#c17f3f")
    groundGrad.addColorStop(1, "#8a5020")
    ctx.fillStyle = groundGrad
    ctx.fillRect(0, canvas.height - 130, canvas.width, 130)

    // Pasek przy horyzoncie
    ctx.fillStyle = "rgba(255,140,60,0.3)"
    ctx.fillRect(0, canvas.height - 130, canvas.width, 8)

    // Kępy trawy - sucha
    ctx.strokeStyle = "#8a6028"
    ctx.lineWidth = 1
    for (let i = 0; i < 40; i++) {
      const x = (i * 55 - cameraX * 0.6) % (canvas.width + 80)
      const gy = canvas.height - 80 - (i % 3) * 12
      for (let j = 0; j < 3; j++) {
        ctx.beginPath()
        ctx.moveTo(x + j * 2, gy)
        ctx.lineTo(x + j * 2 - 1, gy - 5 - j)
        ctx.stroke()
      }
    }

    // KAKTUSY — z kwiatami
    for (let i = 0; i < 10; i++) {
      const x = ((i * 220 - cameraX * 0.7) % (canvas.width + 300)) - 30
      const baseY = canvas.height - 95
      const sway = Math.sin(t * 0.5 + i) * 1

      // Ciało kaktusa
      const cactusGrad = ctx.createLinearGradient(x + 8, 0, x + 26, 0)
      cactusGrad.addColorStop(0, "#1a6a2a")
      cactusGrad.addColorStop(0.5, "#2a8c4a")
      cactusGrad.addColorStop(1, "#1a5a22")
      ctx.fillStyle = cactusGrad
      ctx.beginPath()
      ctx.roundRect(x + 8 + sway, baseY - 65, 18, 70, 3)
      ctx.fill()

      // Ramiona
      ctx.beginPath()
      ctx.roundRect(x - 6 + sway * 0.7, baseY - 48, 16, 22, 3); ctx.fill()
      ctx.beginPath()
      ctx.roundRect(x + 24 + sway * 0.7, baseY - 38, 14, 18, 3); ctx.fill()

      // Kolce
      ctx.strokeStyle = "#0a3a1a"; ctx.lineWidth = 0.6
      for (let k = 0; k < 4; k++) {
        const ky = baseY - 55 + k * 14
        ctx.beginPath(); ctx.moveTo(x + 10 + sway, ky); ctx.lineTo(x + 6 + sway, ky); ctx.stroke()
        ctx.beginPath(); ctx.moveTo(x + 24 + sway, ky); ctx.lineTo(x + 28 + sway, ky); ctx.stroke()
      }

      // Kwiat na górze (co drugi kaktus)
      if (i % 2 === 0) {
        const fx = x + 17 + sway
        const fy = baseY - 70
        ctx.fillStyle = "#ff55aa"
        for (let k = 0; k < 5; k++) {
          const ang = (k / 5) * Math.PI * 2
          ctx.beginPath()
          ctx.arc(fx + Math.cos(ang) * 3, fy + Math.sin(ang) * 3, 2.5, 0, Math.PI * 2)
          ctx.fill()
        }
        ctx.fillStyle = "#ffdd00"
        ctx.beginPath(); ctx.arc(fx, fy, 1.8, 0, Math.PI * 2); ctx.fill()
      }
    }

    // CZASZKA BYDŁA (rzadko)
    for (let i = 0; i < 3; i++) {
      const x = ((i * 600 + 250 - cameraX * 0.85) % (canvas.width + 700)) - 100
      const y = canvas.height - 40
      if (x < -50 || x > canvas.width + 50) continue
      ctx.save()
      ctx.translate(x, y)
      // Cień
      ctx.fillStyle = "rgba(0,0,0,0.3)"
      ctx.beginPath(); ctx.ellipse(0, 3, 14, 2, 0, 0, Math.PI * 2); ctx.fill()
      // Czaszka
      ctx.fillStyle = "#f0e0c8"
      ctx.beginPath()
      ctx.ellipse(0, 0, 10, 7, 0, 0, Math.PI * 2); ctx.fill()
      // Rogi
      ctx.strokeStyle = "#d0b090"; ctx.lineWidth = 2.5; ctx.lineCap = "round"
      ctx.beginPath()
      ctx.moveTo(-7, -5); ctx.quadraticCurveTo(-15, -10, -18, -4); ctx.stroke()
      ctx.beginPath()
      ctx.moveTo(7, -5); ctx.quadraticCurveTo(15, -10, 18, -4); ctx.stroke()
      // Oczy (ciemne oczodoły)
      ctx.fillStyle = "#1a0a0a"
      ctx.beginPath(); ctx.arc(-3, -1, 2, 0, Math.PI * 2); ctx.fill()
      ctx.beginPath(); ctx.arc(3, -1, 2, 0, Math.PI * 2); ctx.fill()
      // Nos
      ctx.beginPath()
      ctx.moveTo(0, 2); ctx.lineTo(-1.5, 5); ctx.lineTo(1.5, 5); ctx.closePath(); ctx.fill()
      ctx.restore()
    }

    // Kamienie
    for (let i = 0; i < 18; i++) {
      const x = ((i * 85 - cameraX * 0.9) % (canvas.width + 150))
      const size = 14 + (i % 5) * 6
      const rockGrad = ctx.createLinearGradient(x - size, canvas.height - 50, x, canvas.height - 40)
      rockGrad.addColorStop(0, "#b36d38")
      rockGrad.addColorStop(1, "#7a4420")
      ctx.fillStyle = rockGrad
      ctx.beginPath()
      ctx.ellipse(x, canvas.height - 48, size, size * 0.45, 0, 0, Math.PI * 2)
      ctx.fill()
    }

    // Kurz/piasek w powietrzu
    ctx.fillStyle = "rgba(200,150,90,0.08)"
    ctx.fillRect(0, canvas.height - 130, canvas.width, 130)
  }

  if (bgType === "city"){
    const t = Date.now() * 0.001

    // Nocne niebo — gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height)
    skyGrad.addColorStop(0, "#0a0a2a")
    skyGrad.addColorStop(0.5, "#1a1a4a")
    skyGrad.addColorStop(1, "#2a1a3a")
    ctx.fillStyle = skyGrad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    // Gwiazdy
    if (!window.cityStars) {
      window.cityStars = []
      for (let i = 0; i < 60; i++) {
        window.cityStars.push({
          x: Math.random() * canvas.width * 1.5,
          y: Math.random() * canvas.height * 0.55,
          size: Math.random() * 1.5 + 0.5,
          twinkle: Math.random() * Math.PI * 2
        })
      }
    }
    for (const s of window.cityStars) {
      const alpha = 0.5 + Math.sin(t * 2 + s.twinkle) * 0.4
      ctx.fillStyle = `rgba(255,255,220,${alpha})`
      ctx.fillRect(s.x - cameraX * 0.05 % (canvas.width + 100), s.y, s.size, s.size)
    }

    // Księżyc — duży z kraterami i poświatą
    const moonX = canvas.width - 150
    const moonY = 90
    const moonR = 48
    ctx.save()
    // Poświata
    const glowGrad = ctx.createRadialGradient(moonX, moonY, moonR * 0.8, moonX, moonY, moonR * 2.5)
    glowGrad.addColorStop(0, "rgba(255,240,200,0.4)")
    glowGrad.addColorStop(1, "rgba(255,240,200,0)")
    ctx.fillStyle = glowGrad
    ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 2.5, 0, Math.PI * 2); ctx.fill()
    // Księżyc
    const moonGrad = ctx.createRadialGradient(moonX - moonR * 0.3, moonY - moonR * 0.3, 1, moonX, moonY, moonR)
    moonGrad.addColorStop(0, "#fffef0")
    moonGrad.addColorStop(0.6, "#f0e8c0")
    moonGrad.addColorStop(1, "#d0c090")
    ctx.fillStyle = moonGrad
    ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2); ctx.fill()
    // Kratery
    ctx.fillStyle = "rgba(150,140,100,0.4)"
    const craters = [[-15,-8,7],[8,-12,5],[-5,12,6],[15,8,4],[-20,15,3]]
    for (const [cx, cy, cr] of craters) {
      ctx.beginPath(); ctx.arc(moonX + cx, moonY + cy, cr, 0, Math.PI * 2); ctx.fill()
    }
    ctx.restore()

    // Budynki - DALSZY plan
    const farBuildings = [
      { color: "#1a2440", winColor: "#5577aa" },
      { color: "#1e2a4a", winColor: "#6688bb" }
    ]
    for (let i = 0; i < 16; i++) {
      const x = ((i * 140 - cameraX * 0.2) % (canvas.width + 300)) - 100
      const h = 80 + (i * 37 % 130)
      const w = 90
      const b = farBuildings[i % 2]
      ctx.fillStyle = b.color
      ctx.fillRect(x, canvas.height - h, w, h)
      // Okna
      for (let wy = 10; wy < h - 10; wy += 18) {
        for (let wx = 8; wx < w - 8; wx += 16) {
          if ((wx + wy + i) % 4 !== 0) continue
          ctx.fillStyle = ((wx + wy + i) % 7 === 0) ? "#222" : b.winColor
          ctx.fillRect(x + wx, canvas.height - h + wy, 6, 10)
        }
      }
    }

    // Budynki - BLIŻSZY plan (większe, różnorodne)
    for (let i = 0; i < 12; i++) {
      const x = ((i * 200 - cameraX * 0.4) % (canvas.width + 400)) - 150
      const h = 160 + (i * 53 % 180)
      const w = 110 + (i * 17 % 40)

      // Kolory budynku
      const colors = ["#151c2e","#1a1f3a","#1e2838","#181a2e","#1c1e35"]
      const bc = colors[i % colors.length]
      ctx.fillStyle = bc
      ctx.fillRect(x, canvas.height - h, w, h)

      // Pasek na górze (dach)
      ctx.fillStyle = "#0a0f1e"
      ctx.fillRect(x - 3, canvas.height - h - 4, w + 6, 6)

      // Okna - świecące nieregularnie
      const winColors = ["#ffdd66","#ffcc44","#ffaa33","#88ccff","#ccaa66"]
      for (let wy = 12; wy < h - 15; wy += 22) {
        for (let wx = 8; wx < w - 8; wx += 20) {
          const key = (wx * 7 + wy * 13 + i * 31) % 100
          if (key < 50) continue  // część okien ciemna
          const col = winColors[(wx + wy + i) % winColors.length]
          ctx.fillStyle = col
          ctx.shadowColor = col
          ctx.shadowBlur = 6
          ctx.fillRect(x + wx, canvas.height - h + wy, 8, 13)
          ctx.shadowBlur = 0
        }
      }

      // === ANTENY I DACHY ===
      const roofY = canvas.height - h
      const roofDecor = i % 4
      if (roofDecor === 0) {
        // Antena TV
        ctx.strokeStyle = "#444"
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.moveTo(x + w * 0.3, roofY)
        ctx.lineTo(x + w * 0.3, roofY - 35)
        ctx.stroke()
        // Poziome pręty
        for (const py of [-10, -20, -30]) {
          ctx.beginPath()
          ctx.moveTo(x + w * 0.3 - 8, roofY + py)
          ctx.lineTo(x + w * 0.3 + 8, roofY + py)
          ctx.stroke()
        }
        // Czerwone światło ostrzegawcze
        ctx.fillStyle = `rgba(255,40,40,${0.5 + Math.sin(t * 3) * 0.5})`
        ctx.shadowColor = "#ff0000"; ctx.shadowBlur = 8
        ctx.fillRect(x + w * 0.3 - 2, roofY - 37, 4, 4)
        ctx.shadowBlur = 0

      } else if (roofDecor === 1) {
        // Talerz satelitarny
        ctx.strokeStyle = "#333"; ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.moveTo(x + w * 0.7, roofY)
        ctx.lineTo(x + w * 0.7, roofY - 12)
        ctx.stroke()
        ctx.fillStyle = "#555"
        ctx.beginPath()
        ctx.ellipse(x + w * 0.7, roofY - 16, 10, 4, -0.3, 0, Math.PI * 2)
        ctx.fill()

      } else if (roofDecor === 2) {
        // Klimatyzator + antena
        ctx.fillStyle = "#2a2a2a"
        ctx.fillRect(x + w * 0.5 - 8, roofY - 15, 16, 15)
        ctx.fillStyle = "#444"
        ctx.fillRect(x + w * 0.5 - 6, roofY - 13, 12, 2)
        ctx.fillRect(x + w * 0.5 - 6, roofY - 9, 12, 2)
        // Antena
        ctx.strokeStyle = "#555"; ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.moveTo(x + w * 0.15, roofY)
        ctx.lineTo(x + w * 0.15, roofY - 20)
        ctx.stroke()

      } else if (roofDecor === 3) {
        // === KOT NA DACHU ===
        const catX = x + w * 0.6
        const catY = roofY - 2
        const catBob = Math.sin(t * 1.5 + i) * 0.5

        ctx.save()
        // Cień
        ctx.fillStyle = "rgba(0,0,0,0.4)"
        ctx.beginPath(); ctx.ellipse(catX + 6, roofY + 1, 12, 2, 0, 0, Math.PI * 2); ctx.fill()

        // Ciało — sylwetka
        ctx.fillStyle = "#0a0a0a"
        // Ciało (owalne)
        ctx.beginPath()
        ctx.ellipse(catX + 6, catY - 5 + catBob, 10, 5, 0, 0, Math.PI * 2)
        ctx.fill()
        // Głowa
        ctx.beginPath()
        ctx.arc(catX + 14, catY - 7 + catBob, 4, 0, Math.PI * 2)
        ctx.fill()
        // Uszy — trójkąty
        ctx.beginPath()
        ctx.moveTo(catX + 11, catY - 10 + catBob)
        ctx.lineTo(catX + 12, catY - 14 + catBob)
        ctx.lineTo(catX + 14, catY - 10 + catBob)
        ctx.closePath(); ctx.fill()
        ctx.beginPath()
        ctx.moveTo(catX + 15, catY - 10 + catBob)
        ctx.lineTo(catX + 17, catY - 14 + catBob)
        ctx.lineTo(catX + 18, catY - 10 + catBob)
        ctx.closePath(); ctx.fill()
        // Ogon — zakrzywiony, macha
        ctx.strokeStyle = "#0a0a0a"
        ctx.lineWidth = 3
        ctx.lineCap = "round"
        const tailSway = Math.sin(t * 3 + i) * 4
        ctx.beginPath()
        ctx.moveTo(catX - 2, catY - 5 + catBob)
        ctx.quadraticCurveTo(catX - 8, catY - 10 + catBob, catX - 6 + tailSway, catY - 15 + catBob)
        ctx.stroke()
        // Nogi
        ctx.fillRect(catX + 2, catY - 1 + catBob, 2, 4)
        ctx.fillRect(catX + 10, catY - 1 + catBob, 2, 4)
        // Świecące oczy
        const eyeGlow = 0.7 + Math.sin(t * 4) * 0.3
        ctx.fillStyle = `rgba(255,220,50,${eyeGlow})`
        ctx.shadowColor = "#ffff00"; ctx.shadowBlur = 4
        ctx.fillRect(catX + 15, catY - 8 + catBob, 1.5, 1)
        ctx.fillRect(catX + 17, catY - 8 + catBob, 1.5, 1)
        ctx.restore()
      }
    }
  }

  if (bgType === "stars" || bgType === "neon") {
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
    grad.addColorStop(0, "#0a001f")
    grad.addColorStop(1, "#1a0033")
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    if (!window.bgParticles) {
      window.bgParticles = []
      for (let i = 0; i < 90; i++) {
        window.bgParticles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2.2 + 0.7,
          speed: Math.random() * 0.3 + 0.1
        })
      }
    }

    ctx.fillStyle = "#ffffff"
    window.bgParticles.forEach(p => {
      p.y += p.speed
      if (p.y > canvas.height) p.y = -5
      ctx.globalAlpha = 0.6 + Math.sin(Date.now()/500 + p.x) * 0.3
      ctx.fillRect(p.x, p.y, p.size, p.size)
    })
    ctx.globalAlpha = 1
  }
}

function drawWater() {
  const t = Date.now() * 0.001

  // Gradient wody — od jasnego niebieskiego u góry do ciemnego granatu na dole
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
  grad.addColorStop(0, "#1a5a8a")      // jaśniej u góry
  grad.addColorStop(0.4, "#0a4270")
  grad.addColorStop(1, "#031833")      // ciemno na dole
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  // Promienie światła z góry (caustics)
  ctx.save()
  ctx.globalAlpha = 0.08
  for (let i = 0; i < 6; i++) {
    const x = ((i * 180 - cameraX * 0.2 + t * 10) % (canvas.width + 200)) - 100
    ctx.fillStyle = "#aaeeff"
    ctx.beginPath()
    ctx.moveTo(x, 0)
    ctx.lineTo(x + 60, canvas.height * 0.6)
    ctx.lineTo(x + 100, canvas.height * 0.6)
    ctx.lineTo(x + 40, 0)
    ctx.closePath()
    ctx.fill()
  }
  ctx.restore()

  // Rośliny wodne (na dole) - parallax
  const plantCount = 12
  for (let i = 0; i < plantCount; i++) {
    const seed = i * 137
    const baseX = (seed * 3 - cameraX * 0.4) % (canvas.width + 200) - 100
    const x = baseX
    const height = 80 + (seed % 60)
    const sway = Math.sin(t * 1.2 + i * 0.7) * 15
    const baseY = canvas.height - 20

    // Gradient rośliny
    const plantColor = i % 3 === 0 ? "#0a4a2a" : i % 3 === 1 ? "#1a6040" : "#2a7050"
    ctx.strokeStyle = plantColor
    ctx.lineWidth = 4 + (seed % 3)
    ctx.lineCap = "round"

    // Łodyga falująca
    ctx.beginPath()
    ctx.moveTo(x, baseY)
    const mid1 = { x: x + sway * 0.3, y: baseY - height * 0.4 }
    const mid2 = { x: x + sway * 0.7, y: baseY - height * 0.7 }
    const top = { x: x + sway, y: baseY - height }
    ctx.bezierCurveTo(mid1.x, mid1.y, mid2.x, mid2.y, top.x, top.y)
    ctx.stroke()

    // Listki
    const leafColor = i % 2 === 0 ? "#1a8050" : "#0a6040"
    ctx.fillStyle = leafColor
    for (let j = 1; j <= 3; j++) {
      const ly = baseY - height * (j / 3)
      const lx = x + sway * (j / 3) * 0.8
      const leafSize = 8 - j
      ctx.beginPath()
      ctx.ellipse(lx + leafSize, ly, leafSize, leafSize * 0.5, Math.sin(t + i) * 0.5 + 0.4, 0, Math.PI * 2)
      ctx.fill()
      ctx.beginPath()
      ctx.ellipse(lx - leafSize, ly, leafSize, leafSize * 0.5, -Math.sin(t + i) * 0.5 - 0.4, 0, Math.PI * 2)
      ctx.fill()
    }
  }

  // Bąbelki — wznoszą się w górę
  if (!window.waterBubbles) {
    window.waterBubbles = []
    for (let i = 0; i < 35; i++) {
      window.waterBubbles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 2 + Math.random() * 6,
        speed: 0.5 + Math.random() * 1.5,
        drift: (Math.random() - 0.5) * 0.8
      })
    }
  }

  for (const b of window.waterBubbles) {
    b.y -= b.speed
    b.x += Math.sin(t * 2 + b.y * 0.05) * b.drift
    if (b.y < -10) {
      b.y = canvas.height + 10
      b.x = Math.random() * canvas.width
    }
    ctx.save()
    ctx.globalAlpha = 0.35
    ctx.strokeStyle = "#aaeeff"
    ctx.lineWidth = 1.2
    ctx.beginPath()
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2)
    ctx.stroke()
    // Połysk w bąbelku
    ctx.fillStyle = "rgba(200,240,255,0.25)"
    ctx.beginPath()
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.4, 0, Math.PI * 2)
    ctx.fill()
    ctx.restore()
  }

  // Mgiełka wody — subtelny overlay
  ctx.save()
  ctx.globalAlpha = 0.08
  ctx.fillStyle = "#0066aa"
  ctx.fillRect(0, 0, canvas.width, canvas.height)
  ctx.restore()
}

function drawForest() {
  ctx.fillStyle = "#0b1a2f"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  drawNewStars()
  drawRealFog()

  for (let i = 0; i < 40; i++) {
    if (i % 3 === 0) continue
    let x = (i * 90 - cameraX * 0.2) % (canvas.width + 200)
    let h = 80 + (i * 37 % 60)
    let w = 40 + (i * 23 % 30)
    ctx.fillStyle = "#0a1f16"
    ctx.beginPath()
    ctx.moveTo(x, canvas.height)
    ctx.lineTo(x + w/2, canvas.height - h)
    ctx.lineTo(x + w, canvas.height)
    ctx.fill()
  }

  for (let i = 0; i < 30; i++) {
    if (i % 3 === 0) continue
    let x = (i * 120 - cameraX * 0.4) % (canvas.width + 200)
    let h = 120 + (i * 47 % 100)
    let w = 50 + (i * 31 % 40)
    ctx.fillStyle = "#123524"
    ctx.fillRect(x + w/2 - 3, canvas.height - h, 6, h)
    ctx.beginPath()
    ctx.moveTo(x, canvas.height - h + 30)
    ctx.lineTo(x + w/2, canvas.height - h - 40)
    ctx.lineTo(x + w, canvas.height - h + 30)
    ctx.fill()
  }

  for (let i = 0; i < 20; i++) {
    if (i % 3 !== 0) continue
    let x = (i * 160 - cameraX * 0.7) % (canvas.width + 200)
    let h = 160 + (i * 63 % 120)
    let w = 60 + (i * 27 % 40)
    ctx.fillStyle = "#1f5f2e"
    ctx.fillRect(x + w/2 - 4, canvas.height - h, 8, h)
    ctx.beginPath()
    ctx.moveTo(x, canvas.height - h + 60)
    ctx.lineTo(x + w/2, canvas.height - h - 60)
    ctx.lineTo(x + w, canvas.height - h + 60)
    ctx.fill()
    ctx.beginPath()
    ctx.moveTo(x + 10, canvas.height - h + 90)
    ctx.lineTo(x + w/2, canvas.height - h - 20)
    ctx.lineTo(x + w - 10, canvas.height - h + 90)
    ctx.fill()
  }

  ctx.fillStyle = "#0a1a12"
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40)
}

function drawRealFog() {
  const w = canvas.width
  const h = canvas.height

  ctx.fillStyle = "rgba(20, 45, 55, 0.25)"
  ctx.fillRect(0, 0, w, h)

  const fogGradient = ctx.createLinearGradient(0, h * 0.4, 0, h)
  fogGradient.addColorStop(0, "rgba(25, 55, 65, 0.0)")
  fogGradient.addColorStop(0.4, "rgba(25, 55, 65, 0.35)")
  fogGradient.addColorStop(0.7, "rgba(18, 48, 55, 0.55)")
  fogGradient.addColorStop(1, "rgba(10, 35, 40, 0.65)")
  ctx.fillStyle = fogGradient
  ctx.fillRect(0, 0, w, h)

  ctx.globalAlpha = 0.25
  for (let i = 0; i < 5; i++) {
    const y = h * 0.45 + i * 45
    const alpha = 0.12 - i * 0.015
    ctx.fillStyle = `rgba(30, 70, 75, ${alpha})`
    ctx.fillRect(0, y, w, 90)
  }
  ctx.globalAlpha = 1.0

  ctx.fillStyle = "rgba(40, 80, 90, 0.08)"
  ctx.fillRect(0, 0, w, h * 0.35)
}

function formatOpis(el) {
  const lines = el.value.split('\n')
  const fixed = []
  for (let line of lines) {
    // łam linie dłuższe niż 40 znaków
    while (line.length > 40) {
      fixed.push(line.substring(0, 40))
      line = line.substring(40)
    }
    fixed.push(line)
  }
  // max 3 linie
  const trimmed = fixed.slice(0, 3)
  const joined = trimmed.join('\n')
  if (el.value !== joined) {
    const pos = el.selectionStart
    el.value = joined
    el.selectionStart = el.selectionEnd = Math.min(pos, joined.length)
  }
  const counter = document.getElementById("opisCounter")
  if (counter) counter.textContent = el.value.length + " / 120"
}

function drawMatrix(){
  matrixFrame++

  ctx.fillStyle = "rgba(0,0,0,0.2)"
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  ctx.fillStyle = "#0f0"
  ctx.font = "22px monospace"

  for (let i = 0; i < matrixCols.length; i++) {
    let text
    if (matrixFrame % 4 === 0) {
      text = String.fromCharCode(48 + Math.floor(Math.random() * 10))
    } else {
      text = " "
    }

    let x = i * 14
    let y = matrixCols[i] * 14

    ctx.fillText(text, x, y)

    if (y > canvas.height && Math.random() > 0.975) matrixCols[i] = 0
    matrixCols[i] += 0.2
  }
}

function drawPlayer(ctx, x, y, r, time){
  let pulse = Math.sin(time * 0.005) * 2.5

  let grad = ctx.createRadialGradient(
    x - r*0.35, y - r*0.35, r*0.25,
    x, y, r + pulse
  )
  grad.addColorStop(0, "#ffeb3b")
  grad.addColorStop(1, "#ff5722")

  ctx.shadowColor = "#ff9800"
  ctx.shadowBlur = 25
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.arc(x, y, r + pulse, 0, Math.PI * 2)
  ctx.fill()
  ctx.shadowBlur = 0

  ctx.fillStyle = "#111"
  ctx.beginPath()
  ctx.arc(x - r*0.32, y - r*0.22, r*0.13, 0, Math.PI * 2)
  ctx.fill()
  ctx.beginPath()
  ctx.arc(x + r*0.32, y - r*0.22, r*0.13, 0, Math.PI * 2)
  ctx.fill()

  ctx.fillStyle = "white"
  ctx.beginPath()
  ctx.arc(x - r*0.35, y - r*0.27, r*0.04, 0, Math.PI * 2)
  ctx.fill()
  ctx.beginPath()
  ctx.arc(x + r*0.29, y - r*0.27, r*0.04, 0, Math.PI * 2)
  ctx.fill()

  ctx.strokeStyle = "#111"
  ctx.lineWidth = 2.5
  ctx.beginPath()
  ctx.arc(x, y + r*0.15, r*0.35, 0.2, Math.PI - 0.2)
  ctx.stroke()
}

function drawSpaceship(x, y, r, time) {
  const t = time * 0.001
  const hover = Math.sin(t * 2.2) * 2.5
  const cx = x, cy = y + hover

  ctx.save()
  ctx.translate(cx, cy)

  // === WYDECHY — z lewej strony (tył statku) ===
  for (const side of [-1, 1]) {
    const flameLen = 14 + Math.sin(t * 18 + side) * 6
    const fg = ctx.createLinearGradient(-r * 0.9, side * r * 0.28, -r * 0.9 - flameLen, side * r * 0.28)
    fg.addColorStop(0, "rgba(0,200,255,0.95)")
    fg.addColorStop(0.3, "rgba(0,120,255,0.7)")
    fg.addColorStop(1, "rgba(0,50,200,0)")
    ctx.fillStyle = fg
    ctx.shadowColor = "#00aaff"
    ctx.shadowBlur = 10
    ctx.beginPath()
    ctx.ellipse(-r * 0.9 - flameLen * 0.5, side * r * 0.28, flameLen * 0.5, 5, 0, 0, Math.PI * 2)
    ctx.fill()
  }
  ctx.shadowBlur = 0

  // Cień pod statkiem
  ctx.fillStyle = "rgba(0,100,255,0.12)"
  ctx.beginPath()
  ctx.ellipse(0, r * 0.7, r * 0.7, 5, 0, 0, Math.PI * 2)
  ctx.fill()

  // === SKRZYDŁA — góra i dół ===
  ctx.fillStyle = "#1a3a7a"
  ctx.strokeStyle = "#3366bb"
  ctx.lineWidth = 1

  // Skrzydło górne
  ctx.beginPath()
  ctx.moveTo(-r * 0.1, -r * 0.18)
  ctx.lineTo(-r * 0.7, -r * 0.78)
  ctx.lineTo(-r * 0.9, -r * 0.48)
  ctx.lineTo(-r * 0.05, -r * 0.18)
  ctx.closePath()
  ctx.fill(); ctx.stroke()

  // Skrzydło dolne
  ctx.beginPath()
  ctx.moveTo(-r * 0.1, r * 0.18)
  ctx.lineTo(-r * 0.7, r * 0.78)
  ctx.lineTo(-r * 0.9, r * 0.48)
  ctx.lineTo(-r * 0.05, r * 0.18)
  ctx.closePath()
  ctx.fill(); ctx.stroke()

  // Końcówki skrzydeł (jasniejsze)
  ctx.fillStyle = "#2255aa"
  ctx.beginPath()
  ctx.moveTo(-r*0.6, -r*0.72)
  ctx.lineTo(-r*0.8, -r*0.78)
  ctx.lineTo(-r*0.88, -r*0.5)
  ctx.closePath(); ctx.fill()

  ctx.beginPath()
  ctx.moveTo(-r*0.6, r*0.72)
  ctx.lineTo(-r*0.8, r*0.78)
  ctx.lineTo(-r*0.88, r*0.5)
  ctx.closePath(); ctx.fill()

  // === KADŁUB — poziomy, dziób w prawo ===
  const bodyGrad = ctx.createLinearGradient(0, -r * 0.35, 0, r * 0.35)
  bodyGrad.addColorStop(0, "#aaccee")
  bodyGrad.addColorStop(0.3, "#6699cc")
  bodyGrad.addColorStop(0.7, "#334477")
  bodyGrad.addColorStop(1, "#112244")
  ctx.fillStyle = bodyGrad
  ctx.shadowColor = "rgba(0,150,255,0.5)"
  ctx.shadowBlur = 12
  ctx.beginPath()
  ctx.ellipse(0, 0, r * 0.95, r * 0.32, 0, 0, Math.PI * 2)
  ctx.fill()
  ctx.shadowBlur = 0

  // Linia podziału kadłuba (panel)
  ctx.strokeStyle = "rgba(100,160,220,0.5)"
  ctx.lineWidth = 1
  ctx.beginPath()
  ctx.moveTo(-r * 0.8, 0); ctx.lineTo(r * 0.6, 0)
  ctx.stroke()

  // === DYSZE — dwa otwory z tyłu ===
  for (const side of [-1, 1]) {
    // Obudowa dyszy
    ctx.fillStyle = "#223355"
    ctx.beginPath()
    ctx.ellipse(-r * 0.88, side * r * 0.28, 8, 6, 0, 0, Math.PI * 2)
    ctx.fill()
    // Świecące wnętrze
    const glow = Math.sin(t * 12 + side * 1.5) * 0.3 + 0.7
    ctx.fillStyle = `rgba(0,${Math.round(150 * glow)},255,0.9)`
    ctx.shadowColor = "#00aaff"; ctx.shadowBlur = 8
    ctx.beginPath()
    ctx.ellipse(-r * 0.88, side * r * 0.28, 5, 4, 0, 0, Math.PI * 2)
    ctx.fill()
    ctx.shadowBlur = 0
  }

  // === KOKPIT — kopuła na górze kadłuba ===
  const domeGrad = ctx.createRadialGradient(r * 0.1, -r * 0.22, 1, r * 0.15, -r * 0.15, r * 0.3)
  domeGrad.addColorStop(0, "rgba(200,235,255,0.95)")
  domeGrad.addColorStop(0.4, "rgba(80,160,255,0.75)")
  domeGrad.addColorStop(1, "rgba(20,60,140,0.4)")
  ctx.fillStyle = domeGrad
  ctx.shadowColor = "#88ccff"; ctx.shadowBlur = 8
  ctx.beginPath()
  ctx.ellipse(r * 0.15, -r * 0.14, r * 0.28, r * 0.22, 0, 0, Math.PI * 2)
  ctx.fill()
  ctx.shadowBlur = 0
  ctx.strokeStyle = "rgba(150,210,255,0.7)"
  ctx.lineWidth = 1
  ctx.beginPath()
  ctx.ellipse(r * 0.15, -r * 0.14, r * 0.28, r * 0.22, 0, 0, Math.PI * 2)
  ctx.stroke()

  // Połysk na kokpicie
  ctx.fillStyle = "rgba(255,255,255,0.3)"
  ctx.beginPath()
  ctx.ellipse(r * 0.05, -r * 0.2, r * 0.1, r * 0.07, -0.4, 0, Math.PI * 2)
  ctx.fill()

  // === DZIÓB — ostry nos z prawej ===
  const noseGrad = ctx.createLinearGradient(r * 0.7, 0, r * 1.05, 0)
  noseGrad.addColorStop(0, "#7799cc")
  noseGrad.addColorStop(1, "#aaccee")
  ctx.fillStyle = noseGrad
  ctx.beginPath()
  ctx.moveTo(r * 0.88, 0)
  ctx.quadraticCurveTo(r * 1.1, -r * 0.06, r * 1.12, 0)
  ctx.quadraticCurveTo(r * 1.1, r * 0.06, r * 0.88, 0)
  ctx.closePath(); ctx.fill()

  // Połysk kadłuba
  ctx.fillStyle = "rgba(255,255,255,0.12)"
  ctx.beginPath()
  ctx.ellipse(-r * 0.1, -r * 0.15, r * 0.4, r * 0.1, 0, 0, Math.PI * 2)
  ctx.fill()

  ctx.restore()
}

function drawSpaceshipScreen(x, y, r, time) {

function drawCrosshairScreen(x, y, r, time) {
  const wave = Math.sin(time * 0.0018) * 1.5
  const cx = x, cy = y + wave
  const t = time * 0.001
  const pulse = Math.sin(t * 2) * 0.08 + 1

  ctx.save()

  // Zewnętrzny pierścień — 4 łuki obracające się
  ctx.save()
  ctx.translate(cx, cy)
  ctx.rotate(t * 0.6)
  ctx.strokeStyle = "rgba(0,255,200,0.9)"
  ctx.lineWidth = 1.8
  ctx.shadowColor = "#00ffcc"
  ctx.shadowBlur = 12
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2
    ctx.beginPath()
    ctx.arc(0, 0, r * pulse, a + 0.25, a + Math.PI/2 - 0.25)
    ctx.stroke()
  }
  ctx.restore()

  // Środkowy pierścień — obrót przeciwny
  ctx.save()
  ctx.translate(cx, cy)
  ctx.rotate(-t * 1.2)
  ctx.strokeStyle = "rgba(255,60,0,0.95)"
  ctx.lineWidth = 1.4
  ctx.shadowColor = "#ff3300"
  ctx.shadowBlur = 8
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + Math.PI/4
    ctx.beginPath()
    ctx.arc(0, 0, r * 0.52 * pulse, a + 0.2, a + Math.PI/2 - 0.2)
    ctx.stroke()
  }
  ctx.restore()

  // Krzyżyk z przerwą
  ctx.save()
  ctx.translate(cx, cy)
  ctx.strokeStyle = "rgba(0,255,200,0.85)"
  ctx.lineWidth = 1.5
  ctx.shadowColor = "#00ffcc"
  ctx.shadowBlur = 8
  const gap = r * 0.28, arm = r * 1.4
  for (const [ax,ay,bx,by] of [
    [0,-gap, 0,-arm], [0,gap, 0,arm],
    [-gap,0, -arm,0], [gap,0, arm,0]
  ]) {
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke()
  }
  ctx.restore()

  // Znaczniki na 45° (złote, lekko obracające się)
  ctx.save()
  ctx.translate(cx, cy)
  ctx.rotate(t * 0.35)
  ctx.strokeStyle = "rgba(255,200,0,0.8)"
  ctx.lineWidth = 1.5
  ctx.shadowColor = "#ffcc00"
  ctx.shadowBlur = 6
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + Math.PI/4
    ctx.beginPath()
    ctx.moveTo(Math.cos(a)*r*0.72, Math.sin(a)*r*0.72)
    ctx.lineTo(Math.cos(a)*r*1.08, Math.sin(a)*r*1.08)
    ctx.stroke()
  }
  ctx.restore()

  // Punkt centralny pulsujący
  ctx.save()
  ctx.translate(cx, cy)
  const dp = Math.sin(t * 3.5) * 0.5 + 1
  ctx.shadowColor = "#ff3300"
  ctx.shadowBlur = 16
  ctx.fillStyle = "#ff3300"
  ctx.beginPath(); ctx.arc(0, 0, 3 * dp, 0, Math.PI*2); ctx.fill()
  ctx.shadowBlur = 0
  ctx.fillStyle = "#ffffff"
  ctx.beginPath(); ctx.arc(0, 0, 1.3, 0, Math.PI*2); ctx.fill()
  ctx.restore()

  ctx.shadowBlur = 0
  ctx.restore()
}

function drawCrosshairPlayer(x, y, r, time) {
  drawCrosshairScreen(x, y, r, time)
}

function drawNewStars(){
  let grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
  grad.addColorStop(0, "#0a001f")
  grad.addColorStop(1, "#1a0033")
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  if (!window.bgParticles) {
    window.bgParticles = []
    for (let i = 0; i < 90; i++) {
      window.bgParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.2 + 0.7,
        speed: Math.random() * 0.9 + 0.4
      })
    }
  }

  ctx.fillStyle = "#99ffff"
  window.bgParticles.forEach(p => {
    p.y += p.speed
    if (p.y > canvas.height) p.y = -5
    ctx.globalAlpha = 0.75 + Math.sin(Date.now()/300 + p.x) * 0.25
    ctx.fillRect(p.x, p.y, p.size, p.size)
  })
  ctx.globalAlpha = 1
}

function initObjectsBarPreviews() {
  // Platforma rect (46x17)
  const r1 = document.getElementById("prevRect")
  if (r1) {
    const p = r1.getContext("2d")
    const g = p.createLinearGradient(0,0,0,17)
    g.addColorStop(0,"#5a8fcc"); g.addColorStop(1,"#1e3d66")
    p.fillStyle=g; p.fillRect(0,0,46,17)
    p.strokeStyle="rgba(150,200,255,0.4)"; p.lineWidth=1
    p.beginPath(); p.moveTo(0,16); p.lineTo(0,0); p.lineTo(46,0); p.stroke()
  }
  // Platforma round (46x17)
  const r2 = document.getElementById("prevRound")
  if (r2) {
    const p = r2.getContext("2d")
    const g = p.createLinearGradient(0,0,0,17)
    g.addColorStop(0,"#6aaadd"); g.addColorStop(1,"#223366")
    p.fillStyle=g; p.beginPath(); p.roundRect(0,0,46,17,6); p.fill()
    p.strokeStyle="#88ccff"; p.lineWidth=1
    p.beginPath(); p.roundRect(0.5,0.5,45,16,5.5); p.stroke()
  }
  // Platforma line (46x17)
  const r3 = document.getElementById("prevLine")
  if (r3) {
    const p = r3.getContext("2d")
    p.shadowColor="#44aaff"; p.shadowBlur=5
    p.strokeStyle="#5599ff"; p.lineWidth=3.5
    p.beginPath(); p.moveTo(2,8); p.lineTo(44,8); p.stroke()
    p.shadowBlur=0
    p.strokeStyle="rgba(255,255,255,0.5)"; p.lineWidth=1
    p.beginPath(); p.moveTo(4,8); p.lineTo(42,8); p.stroke()
  }
  // Blok kwadrat (28x28)
  const b1 = document.getElementById("prevBlok")
  if (b1) {
    const p = b1.getContext("2d")
    const g = p.createLinearGradient(0,0,0,28)
    g.addColorStop(0,"#445566"); g.addColorStop(1,"#1a2530")
    p.fillStyle=g; p.fillRect(0,0,28,28)
    p.strokeStyle="rgba(0,0,0,0.5)"; p.lineWidth=1
    for(let row=0;row*9<28;row++){
      p.beginPath(); p.moveTo(0,row*9); p.lineTo(28,row*9); p.stroke()
      p.beginPath(); p.moveTo(row%2===0?0:7, row*9); p.lineTo(row%2===0?0:7, row*9+9); p.stroke()
      p.beginPath(); p.moveTo(row%2===0?14:21, row*9); p.lineTo(row%2===0?14:21, row*9+9); p.stroke()
    }
  }
  // Blok tall (18x32)
  const b2 = document.getElementById("prevTall")
  if (b2) {
    const p = b2.getContext("2d")
    const g = p.createLinearGradient(0,0,18,0)
    g.addColorStop(0,"#553322"); g.addColorStop(1,"#3d2010")
    p.fillStyle=g; p.fillRect(0,0,18,32)
    p.strokeStyle="rgba(0,0,0,0.5)"; p.lineWidth=1
    for(let row=0;row*7<32;row++){
      p.beginPath(); p.moveTo(0,row*7); p.lineTo(18,row*7); p.stroke()
      p.beginPath(); p.moveTo(9,row*7); p.lineTo(9,row*7+7); p.stroke()
    }
  }
  // Blok grid (28x28)
  const b3 = document.getElementById("prevGrid")
  if (b3) {
    const p = b3.getContext("2d")
    p.fillStyle="rgba(10,10,20,0.8)"; p.fillRect(0,0,28,28)
    p.strokeStyle="#cc7700"; p.lineWidth=1.5; p.lineCap="square"
    for(let i=0;i<=28;i+=9){ p.beginPath(); p.moveTo(i,0); p.lineTo(i,28); p.stroke() }
    for(let i=0;i<=28;i+=9){ p.beginPath(); p.moveTo(0,i); p.lineTo(28,i); p.stroke() }
    p.fillStyle="#ffaa00"
    for(let cx=0;cx<=28;cx+=9) for(let cy=0;cy<=28;cy+=9){ p.beginPath(); p.arc(cx,cy,2,0,Math.PI*2); p.fill() }
  }
  // Blok lodowy (28x28)
  const b4 = document.getElementById("prevIce")
  if (b4) {
    const p = b4.getContext("2d")
    const g = p.createLinearGradient(0,0,28,28)
    g.addColorStop(0,"rgba(160,230,255,0.8)"); g.addColorStop(1,"rgba(100,190,240,0.7)")
    p.fillStyle=g; p.beginPath(); p.roundRect(0,0,28,28,5); p.fill()
    const sh = p.createLinearGradient(0,0,0,13)
    sh.addColorStop(0,"rgba(255,255,255,0.55)"); sh.addColorStop(1,"rgba(255,255,255,0)")
    p.fillStyle=sh; p.beginPath(); p.roundRect(1,1,26,12,4); p.fill()
    p.strokeStyle="rgba(180,235,255,0.9)"; p.lineWidth=1
    p.beginPath(); p.roundRect(0.5,0.5,27,27,5); p.stroke()
    p.strokeStyle="rgba(255,255,255,0.7)"; p.lineWidth=1
    for(const [cx,cy,cr] of [[7,17,3],[18,13,2.5],[13,21,2.5]]){
      p.beginPath(); p.moveTo(cx,cy-cr); p.lineTo(cx+cr*0.5,cy); p.lineTo(cx,cy+cr); p.lineTo(cx-cr*0.5,cy); p.closePath(); p.stroke()
    }
  }
  // Blok wybuchowy (28x28)
  const b5 = document.getElementById("prevBomb")
  if (b5) {
    const p = b5.getContext("2d")
    const g = p.createLinearGradient(0,0,28,28)
    g.addColorStop(0,"#3a0000"); g.addColorStop(0.5,"#660000"); g.addColorStop(1,"#220000")
    p.fillStyle=g; p.beginPath(); p.roundRect(0,0,28,28,5); p.fill()
    p.strokeStyle="#884444"; p.lineWidth=1.5
    p.beginPath(); p.roundRect(0.5,0.5,27,27,5); p.stroke()
    p.font="16px Arial"; p.textAlign="center"; p.textBaseline="middle"
    p.fillText("💣", 14, 12)
    p.fillStyle="rgba(0,0,0,0.5)"; p.fillRect(3,21,22,5)
    p.fillStyle="#ffcc00"; p.fillRect(3,21,11,5)
  }
  // Piła (38x38)
  const sawPrev = document.getElementById("prevSaw")
  if (sawPrev) {
    const p = sawPrev.getContext("2d")
    const cx2=19, cy2=19, r=16, teeth=10
    const dg = p.createRadialGradient(cx2-3,cy2-3,1, cx2,cy2,r*0.85)
    dg.addColorStop(0,"#e8e8e8"); dg.addColorStop(0.5,"#aaaaaa"); dg.addColorStop(1,"#444")
    p.fillStyle=dg; p.beginPath(); p.arc(cx2,cy2,r*0.82,0,Math.PI*2); p.fill()
    p.fillStyle="#bbbbbb"; p.strokeStyle="#444"; p.lineWidth=0.8
    for(let i=0;i<teeth;i++){
      const a=(i/teeth)*Math.PI*2, an=((i+0.5)/teeth)*Math.PI*2
      p.beginPath()
      p.moveTo(cx2+Math.cos(a)*r*0.82, cy2+Math.sin(a)*r*0.82)
      p.lineTo(cx2+Math.cos(an)*r*0.58, cy2+Math.sin(an)*r*0.58)
      p.lineTo(cx2+Math.cos(a+Math.PI*2/teeth)*r*0.82, cy2+Math.sin(a+Math.PI*2/teeth)*r*0.82)
      p.closePath(); p.fill(); p.stroke()
    }
    const hg = p.createRadialGradient(cx2-1,cy2-1,0, cx2,cy2,r*0.2)
    hg.addColorStop(0,"#fff"); hg.addColorStop(1,"#666")
    p.fillStyle=hg; p.beginPath(); p.arc(cx2,cy2,r*0.2,0,Math.PI*2); p.fill()
    p.fillStyle="#333"; p.beginPath(); p.arc(cx2,cy2,r*0.07,0,Math.PI*2); p.fill()
  }
}

function loop(time){
  if (time - lastFrame < frameDelay) {
    requestAnimationFrame(loop)
    return
  }
  lastFrame = time
  update()
  draw()
  requestAnimationFrame(loop)
}
